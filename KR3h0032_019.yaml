body:
  text: 寶真齊法書贊卷十九宋嶽珂撰宋名人真蹟米元章書簡帖上兩卷共二十九帖並行書第一第二第九第十一第十二第二十五帖各九行第三帖四行第四帖二十一行第五第八第十四第二十三第二十七第二十八帖各十行第六第七第十三第十六第十七第十八帖各十三行第十帖七行第十五第二十四帖各三行第十九帖十七行第二十第二十二帖各十二行第二十一帖十六行第二十六第二十九帖各十一行芾頓首再啓今歲當從聖奏計故事代之者即奏也使節到都八月半例以九月軷行司西上十月到國門我公可到南都左右復西也餘並人吏西占芾頓首再拜芾頓首再拜䝉教二十一日望屈大斾雪圖上納橫軸非不愛未見公所愛者耳𢃄留數日奉納也向晚料峭起居萬福謹奉狀不宣芾頓首再拜大夫文節下太夫人玉裕萬福不及拜别怏怏老妻伸奉洎趙妹郡君各希加愛加愛芾再拜芾頓首再拜右丞資政春官恩主鈞席仲春漸凉恭惟台候動止萬福即日芾蒙恩昨以四月忝命改官盡緣知奬沒齒曷報六月被遣此邑聞台斾將至遲遲留七月以俟一識威采面感恩紀謁令弟始知不可俟抱悒之官近亦得命弟書始知對簾遂力疾作書以布下情其餘俟趨省詣府造門叩閣所懷非紙所罄不宣門生米芾頓首再拜右丞資政春官恩主台席謹空芾頓首啓蒙教審起居沖勝已支千條付邑腳錢既奉委惟所諭更不須申禀鮮禾方成更與放限十日佳般木亦須限外毋奪農時佳苦暑末可約過弊邑良食利人自愛草草芾頓首灊川宣德明哲閣下芾頓首再拜久違長者幸兹邂逅不謂行役莫獲少延節旄以寫傾慕昨日繼至舟次不可俟留刺快快而歸適蒙雅誨且承食已首塗方寒千萬珍養訓仲相聚道意謹附使陳情手凍草草芾惶恐上運副朝散老兄節下芾惶恐頓首專介踵門蒙手教荷溫眷有加自承鹽邑還日夕排比宿司以俟臨按杳不聞好音鄙棄下邑乃如此耶忽大熱恭惟比日尊體清勝芾抱冰中夕公和懼曠莽有何所聞且以見教去替數月矣過熱遂可買舟治行矣謹附使上謝不宣芾頓首再拜管勾推官丈閣下芾頓首十日之歡足慰故人遂别心目悽斷有興除酒安樂大是塵生好事惟為親珍攝今晚之意不怏歸念之不已區區别啓楚州運勾石仲謀清修可愛試一見之芾頓首方回老弟人英潁公相見道意今日不得同一笑恨恨珍重芾頓首再啓比苗幕過道從輿衛于琅琊之間為泉石之樂恨不接遊跖也滁天下佳山水且少過客諒稱高懷正恐賜環在邇不能久彼留也芾頓首再拜芾惶恐頓首再拜啓大雨恭惟台候萬福名筆為亂道遂塵汚矣七月一日大年約來蒲池閲邵伯瓜洲須十日一相見乃佳芾頓首成伯公門中各惟清勝郎娘長茂芾再拜芾頓首向承貽教無便久不得為答以致久仰之素想高明諒之春和道味何如一水之阻未遂展接千萬珍厚有便數枉書為望草草芾頓首僧正文公芾啓蒙教昨夕經義真蘇門生也待都佯不會却是惜岐首也今送去四十賢購于泗州一過賓陳主薄名師仲乃藝叟生甚艱揚有善傳寫者開節奉為吾顚出一千作手功畫八本奉寄取幞頭人來取也藥乂夜來告夢云去一顚得一賢亦何所在不知何祥也紙足為大案此帖文義多不可解疑有脫誤芾即日䝉恩未即詹望伏乞對時精調興寢下情䖍祝謹因便介附狀起居不備門吏米芾頓首再拜運使大夫丈節下六月二十日芾惶恐頓首上啓離潤得干珍旋聞入列卿寺雖少雄飛未弄翰墨未副手相策足足不一賀也到官衰疾相仍拜啓後時披晤未卜伏惟珍育不備芾頓首再拜産和大監台座濡須僻陋月十日無一遞無一過客坐井底爾有幹示下芾惶恐芾頓首再拜經宿恭惟台候萬福伏想般舟良勞神用俟到蕭閒參見次前蒙寵賜嚴命不許辭然今有所獻公亦何辭以拒之通圍願隨葺錦增光久為選人鈍滯非稱也若不以為不恭願檢入謹奉啓不宣芾頓首再拜知府鈐轄待制台座硯在合內芾頓首再拜君發太尉台座之把拜違旋得官江湖歸掃家山杜門不出人事殆絶比到都見陳豫真承動靜復知巳更王夫人之痛不覺嗟悼不能已復自咎不敏阻貢尺書以勞孝思內有慙負疚不能已比日台體起居何如謹奉啓通誠拳拳下情此不能宣芾頓首再拜君發太尉台座小兒益長人物不凡伯時姻事有期未芾頓首再拜彥和通判承議閣下端禮處拜違迄今不承音驛客至恭審到官冬序向凛伏惟神明扶持尊體起居萬福芾衰晚如昨未卜展晤伏惟珍厚謹奉啓不宣芾頓首再拜彥和通判承議吾友閣下十一月十九日狀芾頓首再拜觀使樞密太尉先生鈞席伏審榮拜宸俞遂請歸第天柱之任暫留時楝睿眷之重定將起矣惟初解浙西之節制聿居緑野之燕安神明掖扶氣體泰定有足樂也芾以出入不得阻隨杖屨看山揮麈詹企不極不備老弟子米芾頓首再拜觀使樞密太尉先生鈞席芾頓首再拜至孝景溫觀察台座區區已曾奉疏流落三年重來京國恍如夢覺治居未定未及上謁專介及門喜孝履多福三兩日詣慰既親又與令姪同官不妨否更俟一言燭下方客起不宣芾惶恐上景溫觀察親友台座芾頓首再拜聞公有官職壓人之說是何言歟公世德清茂才高望重越自小官慨然論天下事宜比馬周此未足賀老友固不奉佞也望日文德門多見諸公獨不見公何也癬方須得大假酬勞方傳恐前書真不逹耳芾頓首再拜知有令郎之戚此難遣者能書第二兒二十歲化去刳吾心肝至今晧白之由也癸未去國至今二兒二女老年何堪何堪再到案此下有脫誤卒三姊夫交游喪盡情懷落魄不振不振黻頓首再拜相從之樂自卯及已十五年矣自武林失恃遂髮白齒落頺然一老翁若與公相遇他處宜不相識耳比來慶侍下起居何如偶洽光同官劉穆之行奉書千里相望何日會合臨風悵然黻頓首通判朝奉君謨兄老兄幾子吾鼇兒十六矣又二子粗長黠後房進幾人郭德乂見報知蜀中一邑都未得消息郭憨猶通直洛陽命頑健如昨湖外有何勝事嶽麓雲水為我致意黻頓首賀知章草書唐人歌詩往往及之今有人收得否試託問之黻向承惠洪氏石刻多感往歲謝公處得之想其真蹟精妙何當一見之家藏墨蹟數本今以石刻奉寄一笑輒欲以告身質過數日奉遷如何黻頓首芾頓首啓適奉賀留刺晚來起居萬福舟兵自到日支錢餓得欲死今日旬下支一料米去告指揮日支與米為幸主簿甚嚴傳語皆不答聞有甚條貫吁可畏哉謹奉啓咨叩勿泄此語恐相惱不一一忉忉芾頓首再拜道濟通判中大夫芾頓首啓知曾賜教使下失去感愧異常知西第已為人貨已遣人去輟蓋一相知也若人口少别輟得一位與之甚幸甚幸諸處尋屋不得園中屋得數間芾亦可居也且望留意不敢忘德草草芾頓首太保吾親芾頓首再啓䝉眷有素不敢自外具有丹赤仰干左右芾今任不礙舉辟管勾文字或帳司得備驅策敢不自竭芾六月正滿三十箇月百指畏暑西上而貧無桂玉之費儻蒙恩私仰戴山嶽芾惶恐頓首知庵成自逸仰慕不已雨多種植必皆青活弊庵前柏活否更求數株益之黃鶴家山前水池水不乏否告問主者若不乏不須問也寶晉必蒙照管恐損漏開春求宣明東歸老拖曳不行也天啓曾有書去逹否芾頓首米元章書簡帖下三卷共三十五帖並行書第一第二十五第二十四第二十帖各七行第二第八第十六第二十五第二十八帖各十一行第三第十二第十七第二十三第二十五帖各九行第四第十九帖各八行第五六行第九第三十二第三十三第三十四帖各六行第六第十四第三十一帖各十三行第七第十三第二十帖各十二行第十一第二十一第二十二第二十七帖各三行第十八帖十八行第二十六第三十帖各五行芾啓早略一揖未慰久别承來語久候無耗故困憊歸息傾仰傾仰來早願同令兄見臨一飯訖同至山房然後歸治行未晚也切切餘面罄草草芾頓首致平國士芾頓首再拜右史舍人老兄閣下蒙手翰貺尚方珍醴拜嘉增幸來日當引九日拜臨顧之辱併叙謝意謹奉啓不能罄所言芾頓首再拜希聖舍人親家台座來日東華得一介相引乎吏部至今不見人來耳芾頓首再啓行日伏蒙尊造枉駕水次不遑迎謁內積悚恐不審尊兄資政何日到闕欲拜狀也芾疏謬正託德門每賜訓督使逃罪戾至幸至幸芾頓首再拜黻啓前人回郡官訪及方下船著公服又欲即行故草草數字必不怪也輒假小舟至敦送彥誠觀師還寺舟至即西至幸如期少頃至也餘到潤留書復古次百冗草草芾頓首不二禪師故人黻頓首雨寒安勝不知在施水資聖奉尋不見快快張公必拜見晚歸可少案此下永樂大典原本缺黻頓首彥誠觀師同此芾頓首再拜運副奉議明公節下去陳聞使節至許至建雄鎮專介上狀久之回至云汝還臺阻一披晤此情悵然故再奉啓并前狀上納霜寒深冷恭惟尊體動止萬福區區已具右狀中者不重述不宣芾頓首再拜運副奉議明公節下十一日狀芾惶恐再拜私居杜門以禪悅為樂彥舟去後不聞左右動靜嚮風永懷不能已已臘寒比日官況何如門中上下均慶去歲之念必少彌忘聞其素屬疾非小兒五日間忽然不見幼法有如是不以禪悅何以為遣者臘寒千萬珍重二月或所請宫觀不報即扣閣惟珍葆珍葆芾頓首再拜厚之知府學士德友芾頓首再拜昨日煩聒出京始一飽也經宿起居沖勝白熟求四枚差小者卓上碧水晶與老騃壓紙可否以吳顧道約來相見故未行早飯了東邁依依奈何奈何芾惶恐上厚之宮使學士思舊范寬四幅贈老友如何二十五日芾上啓得十四日書知已到官雖國士失進躐之序聊為知已屈甚善甚善專啓叙懷芾頓首再拜彥舟學士樞僚仁友黻啓昨日承教直夜不及答午間得暇訪及面叙俸錢支使之數屬出外邑五七日比畫能一逰寺乎草草芾頓首上公震太尉台座芾惶恐蒙教審台候萬福牌寫了久將謂已取去來日遣人來並今日者來取兒子入寺檢未得也區區别啓芾惶恐上公震太尉台座三月十一日芾頓首啓衰老蒙誤恩寵徑西不得少留以承二君子動止伏惟珍愛珍愛芾頓首再拜安中學士吏部二友麾下芾頓首再拜運使大夫丈節下昨以手拙附專介以代占謝恭想已逹左右即日春和恭惟神明相佑尊候動止萬福芾再啓高郵不須亂置生事暫居非吾鄉我里無人勾副定國是也牽復既去只養别人四時纂要四月一雨又主旱請借一閲道路人言高郵依舊水􅧣雨雪不少不知果否昨過彼時水􅧣見邵伯以次數道通湖港皆以土填塞斷從初救田今合放開耳想不一處豪姓因而擅之恐非公家利也芾頓首再拜芾惶恐前辱臨顧兩日打糧借人未得翌日馳造尊勝至今不見石工特來許借告給付區區面罄不宣芾頓首太易吾友芾啓適方上狀使至辱教欣審晚刻尊候萬福並蒙佳茗為貺併深感悚來日朝晚幸臨屈一飯也區區容面叙且奉此為謝不宣芾再拜志行通判承議老兄芾頓首再拜初熱恭惟神明相佑尊體萬福賓老以英才受睿知布上寬書暫至澤國而芾以官期當去不得少樓清芘以此為恨耳芾頓首再拜十一月二十一日芾頓首上記留守大資政丈鈞座私居乏人數探伺竟阻追攀大斾此情惘惘念蒙令弟拂拭而久與明甫遊也故自竭有以獻惟公宏恕其愚而矜其志之善也願公開懷以待天下之士猶恐人人不自信勿以泥塗之久懷廷尉榜門之心深閉固拒以絶天下之士願以常情處人而躬行高世之事忘恩怨會通一致出人意外晏然為明主安一世之人起治功致太平此為下識之所瞻望中夜而興披衣呵筆草略死罪死罪門吏米芾頓首再拜右簡尺先臣芾真蹟臣米友仁鑒定恭跋行書二行芾頓首再啓故人作發運使都不照管下邑今十連作帥當似臨淮縣長官時故事但一片心脾依舊佳在不知委悉得過否芾惶恐再拜倅同官來江寧少小相識父處刁幕熟鄉人一戎同官來須少過從亦是未得報間同出入遊山之人三處是飯主人貴人出入難不敢牽率知客位榜甚嚴此為常人設耳豈米老有不得船之理呵呵俟面千也芾惶恐再拜案此帖首行應有脫誤糖霜大治喉咽甘幸尤能發散含花佳芾頓首真麝香一劑置痛處薰透氣立安芾咨老妻上問夫人玉體萬福楊老夫人乍到未得去拜屈同官于此得欵還往也才回謁楊簽歸便行知有人在彼故立草草作數字不得周悉書表司與假遂令小官作書不罪不罪芾再拜芾頓首啓昨日特承寵臨屬王氏兄弟飯遂阻于門迎留以朝銜謹先上納旦夕祗造不宣芾頓首再拜景仁通判宣德兄芾頓首再拜在無為一書作廣州題逹未衰老忽西去出意外憂畏而已因賞心亭與元龍屬酒選三麗人歌自作詞云有人去廣德立作此書用致詹仰草草不罪不罪芾惶恐司諫台座門中各安勝安勝右楮紙詩書等十幅先臣芾晚年真蹟臣米友仁鑒定恭跋詩摘在詩文帖中芾頓首再拜丹陽人安舊治偃藩上游琴尊足以自適時來則為蒼生起耳芾頓首再拜海岱絶唱已刻于柱與劉顛者對也非二顛者不刻芾頓首七月六日芾頓首再拜運使大卿台座春序向和恭惟澄清之暇神明相佑德履起居萬福芾被遣俟命于左右已次于潤舟大水漲過橋不得未即參侍伏乞為上珍厚專介上啓不備芾頓首再拜運使大卿台座黻補填尚少八日以新府公至理須出見來日且參假登舟至真滁日移疾報本州不審尊意如何黻蒙恩有素不勝傾倒之至黻頓首再拜芾惶恐來早為一麵江樓少延道韻只今被衣在此烹茶久俟芾惶恐府公少監大夫公芾惶恐再拜彥稽提舉太史公甲兄節下抱疾之官十日九假事皆委薛侯改雙槐堂為寧一堂射堂雨敗堵悉見北山萬疊名曰仰止堂于甲兄可謂無負矣芾衰老之人每臨一事欲仰兄精力不已力疾答專使不宣芾惶恐頓首彥稽太史公提舉節下四月旦日狀芾啓衰晚辱誤恩法不可辭秪益悚懼蒙教賀重其慙悚附使具此草草芾頓首亦虛吾友不煩如此前言甚易當必不到入臺章也呵呵餓殺客也芾頓首安中吾友昨夕作此簡未及遣承寵誨荷垂眷今早食後作案作字上下有闕文晚阻城外約來早告顧舟中北城外一飯幸甚幸甚芾頓首芾頓首再拜先白吾友疏展晤思企暑中起居何如小兒未聞師誨願以童蒙之道處之謹遣侍筆研于左右惟久要終始造成之悚悚異日報德不宣芾頓首再拜先白吾友同舍萬福右崇寧南宮舍人寶晉米公芾字元章書簡帖真蹟六十四幅分五卷中興初思陵以萬幾之睱垂意筆法始好黃庭堅書故戒石之銘以頒而方國一劄遂皆似之後復好公書以其子敷文閣直學士友仁侍清燕而宸翰之體遂大變追晉轥唐前無合作珂家所藏詔墨幾百軸以歲月考之良是故紹興間公書盡歸九禁而世罕傳最後赤水得珠頤神北內躬御寶跗製翰墨志多紀公遣事益知帝心簡注惟公是嗜是帖多天上本間有內府圖書及紹興寶璽在焉前五帖嘉泰壬戊歲正月得之中都范氏次十帖開禧丁卯歲五月得之李奉寧客何師說又次四十帖嘉定戊辰歲二月得之京師官鬻又次九帖己巳歲八月得之豫章朱氏顛未印識全及半者通五十所贊曰論書自晉始蓋因其風俗之清而流之于妍降而六代又以其習尚之篤而溺之于專維唐設科身判書言作成自初歐禇爭先薛靚張顛顔真迎便中世而後雖經生楷隸猶得以揚鑣而鳴鞭五季日卑我宋興焉士以德進捨藝之偏既窒其進取之塗故世之以書名家者皆不雜以人而純乎天更八葉之豫豐乃設學而詳延有芾者出集其大全蓋繇羲獻而來遡崇觀而前或營萃以拔棘或宮墻而及肩或小醇而大疵或舍正而取權六書之統殆所謂芾之死不得其傳也巘巘喬嶽洋洋大川草木風雲波濤蛟黿我繫此評其然豈然較三十里後八百年米元章靈峯行記帖大字楷書十二行邵䶵胡端修吳亮米芾同遊靈峯寶剎崇寧甲申五月望日書易安居士一日攜前人墨跡臨顧中有先子留題拜觀不勝感泣先子尋常為字但乘興而為之今之數句可比萬金千兩耳呵呵敷文閣直學士右朝議大夫提舉佑神觀友仁謹跋行書十行右寶晉米公靈峯行記真蹟一卷天下未嘗無勝游惟人與境稱而後傳久其次以文其次以字畫考乎此亦可觀矣寶慶丙戌秋得之京口故藏易安室有元暉跋語繫焉贊曰永和之蘭亭列序時人文字之不磨千載莫鄰彼睎顔之徒雖未足倫觀其所傳亦庶幾倣佛乎清塵米元章獲硯帖草書十一行僕今日獲天下大奇硯世未有也他日使公欽賞不已石佳發墨眼大如錢大小適中渾厚古雅平生收端硯未有此比異日方知不誣也公家鳯池空大不適用爾今嵗有此奇獲真丙辛天地合也問九哥可知右十行皆吾家舊所收悉為邦人得之多以歸好事翟佑之蓋晚年字也子友仁審定真蹟右寶晉米公獲硯帖真蹟一卷豫作硯山園先一歲得硯山詩表英光堂將以殿帖謂足以大全矣錫山鄭子恭時中一旦來訪謂家有獲硯帖必與硯山事實相表裏欲持以見歸豫喜亟問亟求不愆于約居一月而帖至考之非硯山也蓋他一硯耳而其言鄭重如是豫嘗讀山林集有一帖曰辱教須寶硯去心者為失心之人去首者乃項羽也硯為吾首誰人教唆事須根究然而復有一說徐熙梨花人多識之請攜去遍示識者若可當硯猶為少存交情長年報答必欲吾首亦不免永鎮烏江兩手􅐝下分付且只成甚頭腦便希昆仲命駕早膳面議之噫嚱硯尤物耳固真足寶耶足寶矣固可以比首耶觀此寶晉之于硯亦可謂溺矣不特硯又連以山而肯易一居其江山在胸次足奪尤物之纍如此亦可見不凡今乃見園于豫而又得是帖以表澄之特書屢書又可以見帖而列之耶帖之言曰丙辛天地合而得是硯按寶晉生以辛卯術家以天地合言則丙戊歲在大觀之元如寶晉因得右軍王略帖作太師行固嘗以丙辛合論得帖之月日矣帖與硯均在所重理固然耳而葉石林熱語曰米芾詼譎好奇在真州嘗謁蔡太保攸于舟中攸出所藏右軍王略帖示之芾驚歎求以他畫換易攸意以為難芾曰公若不見從某不復生即投此江死矣因大呼據船舷欲墜攸遽與之是硯也首也帖也身也一而已豫據此江山得無愧耶硯山易居在何年不復可考而是獲硯帖公之子友仁指為暮年字攻其歲月蓋仙去前一歲也豈硯山已去而他硯無可屬意者又將因是以寄懷耶得帖之歲蓋紹定戊子月乙卯日甲子云贊曰公謂是硯生平之所無彼美硯山乃易其所居既舍其所寶聊假以自娛其亦人之情歟米元章四大字帖絹本智慧清淨右寶晉米公四大字真蹟一軸寶晉書偉矣而盈尺之字世亦罕傳寶慶乙酉歲十月得此于王文忠之孫􅂒上有先朝內府印已糜損不可復識蓋故家所藏之傑出者贊曰昔大令書壁作方丈大字觀者至數百人蓋能書家嘗以收斂觀楷則而以縱放觀精神豫觀此書大不失倫蓋自智而慧者筆下有天之真悟而惟清與淨者胸中無一㸃之塵也米元章曹子建應詔詩帖行書六十六行尾記匹行翼衡作翼翼稅此作稅北如醒作如醒當是筆誤肅承明詔應㑹皇都星陳夙駕秣馬脂車命彼掌徒肅我征旅朝發鸞臺夕宿蘭渚芒芒原隰祁祁士女經彼公田樂我稷黍爰有樛木重陰匪息雖有糇糧飢不遑食望城不過面邑不游僕夫警策平路是由𤣥駟藹藹揚鑣漂沫流風翼翼輕雲承蓋涉澗之濱緣山之隈遵彼河滸黃坂是階西濟關谷或降或升騑驂倦路載寢載興將朝聖皇匪敢宴寧弭節長騖指日遄征前驅舉燧後乘抗旌輪不輟運鑾無廢聲爰暨帝室稅北西墉嘉詔未賜朝覲莫從仰瞻城閾俯惟闕庭長懷永慕憂心如醒曹植應詔芾醉書于寶晉齊右寶晉米公曹子建應詔詩帖真蹟一卷帖凡二百有一字字字清徑如太液黃鵠商山紫芝騫雲吐虹各有出世間意醉中之天真蓋于是有神矣此先君祕笈第一物也得于淳熙之戊戌後五十年乃克贊之贊曰吁嗟乎丕摧幹弱支豫讀此詩何異乎煮豆而燃萁弔古以詩觀帖以奇瑤鈿銀泥以侈厥題米元章蠶賦帖行書六十七行里有織婦蓍簪葛帔顔色憔悴喟然而讓于蠶曰豫工女也惟化治絲枲是司惟服勤組紃是力世受蠶事以蕃天財爾之未生我則浴而種以俟化爾之既育我則飭其器以祗事爾食有節我則采柔桑以薦焉爾處不慁我則佴溫室以養焉爾惟有神我則蠲其祀而未嘗瀆也爾惟欲繭我則趣其具而不敢慢也爾欲顯素絲之潔我則具繅盆繹器以奉之爾欲布幅利之德我則操鳴機密杼以成之春夏之勤則髮蓬不及膏秋冬之織則手胝無所代豫之于子可謂殫其力矣今天下文繡被墻宇豫卒歲無褐緹帛飾犬馬豫終身恤緯寧我未究其術將爾忘力于我耶蠶應之曰嘻豫雖微生亦禀元氣上符龍精下同馬類昔在上世寢皮食肉未知為冠冕衣裳之等也未知禦雪霜風雨之具也當斯之時余得與蠕動之儔相忘于生生之域蠢然無見豢之樂熙然無就烹之苦自大道既隱聖人成能先蠶氏利我之生蕃我以術因絲以代毳因帛以易韋幼者不寒者者不病自是民患弭而余生殘矣然自五代以降雖天子之后不敢加尊于我每歲命元日親率嬪御祀于北郊築宫臨川獻繭成服非天城宗廟黼黻無所備非禮樂車服旗裳無所設非馭祀無制幣非聘賢無束帛至纖至悉衣裳萬物女子無貴賤皆盡心于蠶是以四海之大億民之衆無游手而有餘帛矣秦漢而下本搖未蕩樹奢媒以廣君欲開利塗以窮民力雲錦霧縠之巧歲變霜綃冰紈之名日出親桑之禮頽于上災身之服流于下倡人嬖妾被后飾者以千計桀民大賈僭君服者蓋百數一室御績而千屋垂繪十人漂絮而萬失挾纊雖使蠶被于野繭盈于車朝收暮成猶不能給況役少以奉衆破實而為華哉方且規規然重商人衣絲之條罷齊官貢服之職衣戈綈以示儉襲大練以去華是猶捧由堙尾閭之深覆杯救崑岡之烈波驚風動誰能禦之由斯而言則豫之功非欲厚古而薄今時之異也子之織非欲嗇身以侈物化使然也二者交墜于道奚獨怨我哉且古姜嫄太姒皆執子之勤今欲以一已之勞而讓我過矣于是織婦不能詰而終身寒云右寶晉米公蠶賦帖真蹟一卷有內府及楚胄印各一寶慶乙酉得之中都鬻書吳氏筆力差似少年時贊曰桑柘之利被天下而不足以芘一女鬢蓬手筥而身不縷雲織露組便疏曲戶世之類此者又何可勝數是將誰尤曰本是務彼棄我取維終以無窶米元章黃龍讚帖行書十八行米芾黃龍真讚髙宗皇帝御書的的曹溪一㸃開從茲驢足踏塵埃黃龍若不三𤣥接爭得東林八轉來黃龍真讚米元章壬申歲同君發伯充國休過訪因戲書右寶晉米公黃龍讚大字帖真蹟一卷高宗皇帝親題其褾有楚胄印四小璽一筆勢精健意象淳古蓋老作云嘉定癸未七月得之維揚贊曰華胄遙遙楚國宗風的的曹溪喚起爭名米老奎光長照珍題米元章獄空行帖行書五十二行獄空行寄獻府公朝奉麾下漣水令米芾惶恐楚州五邑口百萬擾靜盡繫太守公政由吏人民乃擾政由太守民氣通安土樂生善民欲惡民惟欲與吏同太守無能不戢吏精力不給吏乃庸兩獄百間塞有罪有耳未聞一日空晉昌唐公名世後清風素節為時宗五更三㸃運精思衆人安寢吏計窮百姓小妄赦不罪庶幾小屈能自致五色來者初亦彚久而官悚吏皆畏雖欲呼之亦不至乃知獄空空有理百萬無寃無枉吏來者迎刃無留滯赦來雨獄久無事太守政聲既如是廉車旁午目所備胡不剡章上天子追風早來促公起去入省闈或使指吏皆欲去民欲留我祝公去豈同吏長坂大車程萬里右寶晉米公獄空行帖真蹟一卷字故寫碧箋上天書濃墨蓋當時投之郡將唐君者江之廬山宮日太平有黃冠以好事稱多蓄法書豫託劉君道謙贖得此篇時嘉定癸酉八月也贊曰事上官當以信溢美而言是謂私徇唐君果何人而得此于寶晉豫蓋于是三歎則前朝之得士而未暇及筆法之神雋也米元章四大字詩帖案此帖行數標法原本缺佚鷗鷺寒依水蒹葭靜靡風朝烟開雨細輕素淡山重過當塗一園松竹冷隂森猶得桓公歎可臨却叵案英光集作匹劉琨看左傳玉壺徒缺誤雄心青山賞心亭上羣山雪三夕丹淵借月華呤盡江南清絶趣亟行歸覲紫皇家鑑遠樓昔夢浮生定是非家山且喜隔年歸扁舟又出欄湖閘出處初心老更違拜書學博士作右寶晉米公四大字詩帖真蹟兩軸公筆力雄偉而大字尤奇此詩比智慧淸淨字本不侔而氣象軒豁卷舒之已具全體所謂精神楷則蓋策之矣第二詩雜用桓元子劉越石王處仲事語意殆不聯屬似記憶之誤必有能辨之者詩得之京口紹定戊子三月戊子贊曰四詩之作句新而詞伉兩軸之書意軒而神王合此名蹟奇變萬狀豫得此詩季春既望風激海而濺霧月穿雲而崩浪開函卷舒于小萬有之上作而嘆曰是可以領略山川之清壯矣豫方望紫烟之岫具黃蔑之舫友二妙于百載寓三嘆于一倡正使持此而列衡門之素壁亦足對雲錦之九疊而夸瀑布之千丈也米元章海嶽詩帖行書十七行仲若呼不聞孝然呌不應東海衮底浪南山入雲徑西南嵯峨者起伏巧相競火輪激剛風倒化紫金境枕石不知冷鼓腹歌更逈右大字海嶽庵雜詩先臣芾真蹟臣米友仁鑒定恭跋行書二行右寶晉米公海嶽雜詩帖真蹟一卷御府之印小米之跋具焉豫始司淮左之餉肇整是園作海嶽堂嘗勒石為記謂海嶽在甘露之下繼而城東得故基或謂豫前記為誤豫曰皆是也蔡肇天啓銘公之墓曰過潤愛其江山遂定居焉北固既火作庵城東號海嶽日哦其間為吾州佳絶之觀是未火之前在甘露既大之後自西而東矣海嶽之名固也而地則不同昔在甘露謂江為海謂北固為嶽小矣潔之以東謂海為海謂四嶽為嶽顧不大哉今視其地信然此雜詩者固其地歟蔡絛鐵圍山叢談曰江南李氏後主常寶一硯山徑長才踰尺前聳三十六峯皆大猶手指左右則隱引兩阜坡陀而中鑿為硯及江南國破硯山因流轉數士人家為米老元章得後米老之歸丹陽也將卜宅久弗就而蘇仲恭學士之弟者才時孫也號稱好事有甘露寺下並江一古基多羣木蓋唐晉人所居時米欲得宅而蘇覬得硯于是王彥昭侍郎兄弟與登北固共為之和㑹蘇米竟相易米後號海嶽庵者是也硯山藏蘇氏未幾索入九禁矣時東坡公亦曾作一硯山米老則有二其一曰芙蓉者頗屈奇後主上亦自為二硯山焉視江南所寶流亞爾吾在政和末待罪時嘗預召入萬歲洞至硯閣得盡見之噫易之誠是也豈居之先後有異而傳聞者至于異辭歟今甘露寺下為絶壁又豈有所謂羣木唐晉人之居公之未東遺址蓋在鰲門鳯池之間所謂並江者尤疏也豫家有公所藏大令十二月帖上有東海嶽印海嶽之有東西尤足為的證紹定戊子二月客有在中都聞豫新硯山者持以售豫因訂其詳以繫斯贊贊曰海嶽之東西見于印而驗于碑觀乎此詩景與物隨於呼噫嘻此皆是也夫豈復有今是而昨非江湯湯其不移山窿窿其不虧登兮覽兮豫言其如之寶真齊法書贊卷十九
