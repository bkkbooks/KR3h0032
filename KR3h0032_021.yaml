body:
  text: 寶真齊法書贊卷二十一宋嶽珂撰宋名人真蹟邵仲恭展晤省見二帖並行書第一帖九行第二帖三行䶵叩頭哀苦無慘不獲時拜書問不審邇來尊候如何䶵哀瘵䝉恩未緣展晤仰祈對時保重區區祝頌謹奉手啓不次孤子邵䶵叩頭鴻慶太祝三十一舅三十一妗縣君到鄉事少間即常到省見外婆洎諸妗也閒恐知之右崇寧真龍圖閣知蘇州邵公䶵字仲恭展晤省見二帖真蹟一卷邵氏多以字畫顯如公主糧餉而有安衆之勇壻黨籍而無仕已之溫尤可嘉者帖以開禧乙丑四月得之丹陽顧氏蓋其里云贊曰寶晉大字之刻嘗同公遊必嗜好之素同故忘情乎尋壑之與經丘豫嘗陋貞觀慰問之不收得此帖于鄉考百年之風流識者必此曰吾宋之邵蘇州也龔深父南康帖行書十一行尾批二行原頓首辱惠書欣承法候萬福慰釋慰釋原蒙恩出守南康正逺良集千萬自愛以慰頌言遽中作復潦草尚冀道照不宣原頓首惠因信公法師㑹沈正叔煩致意人速不果上狀原右崇寧兵部侍郎龔公原字深父南康帖真蹟一卷按國史公自瑣闥以議泰陵喪禮出知南康軍此帖蓋以别所與遊之僧者有藏書家六印紹定戊子四月得之毗陵士人孟葵家贊曰公用王氏學術終始不易雖有歉于識然亦足以知其自信之力一偏之溺異端之惑視此手蹟張文忠至都帖草書七行商英啓辱教承已至都下薄寒起居佳休令甥書蟹已領旬休卜見不宣商英再拜知郡朝奉右大觀宰相太保張文忠公商英字天覺至都帖真蹟一卷豫舊與匡山西寺僧師王游以慶元戊午二月得此帖于其室玉得之僧聰聰得之僧傑傑得之無垢張待制家其自言付授如此贊曰無盡之學出入孔釋故其筆法倜儻斜直于跌宕中時入繩墨亦猶即紹聖以侮元祐之正用大觀以反崇寧之譎凡是心之所藴已畢寓于深畫雖曰自蓋斷猶可議使其知根荄之物則而推以芟葛藤之蒙闐如是帖者亦可以為傳世之名蹟矣張文忠草書韓退之桃源詩帖草書五十一行楷書名記一行前有何人標題一行後楷書前詩二十二行天覺丞相書韓退之桃源圖神仙有無何耿茫桃源之說誠荒唐流水盤回山百轉生綃數幅垂中堂武陵太守好事者封題逺寄南宫下南宮先生欣得之波濤入筆驅文辭文工畫妙各臻極異境恍惚移于斯架巖鑿谷開宫室接屋連墻千萬日羸顛劉蹶了不知地圻天分非所恤種桃處處惟開花川原逺近蒸紅霞初來猶有念鄉邑嵗久此地還成家漁舟之子來何所物邑相猜更問語大蛇中斷喪前王羣馬南渡開新主聽終辭絶共凄然自說經今六百年當時萬事皆眼見至今幾許猶流傳爭持酒食來相饋禮數不同樽俎異月明伴宿玉堂空骨冷魂清無夢寐夜半金雞啁哳鳴火輪飛出客心驚人間有纍不可住依然離别難為情船開棹進一迥顧萬里蒼蒼煙水暮世俗寧知僞與真至今傳者武陵人韓退之桃源圖右張文忠草書唐韓愈桃源詩真蹟一卷本朝草聖代有名人如公不以書稱而偉特軒翥如此蓋亦胸中之鬱勃不能伸于二蔡者故有託諸此也帖故藏沂恭孝王家有印識存不知何緣流落江浙紹定戊子三月豫得之京江首標一行及未系真書詩本俱不知何人筆意亦可取贊曰太守宰相張天覺草聖之神何卓犖幾年嘉禾識竒作餘事猶令墨池涸仙源三月桃雨落雲黑洞深風色惡夢回滿紙字如昨喚起龍蛇見頭角趙清憲近郡帖行書五行挺之再啓不才蒙恩臨守近郡方賴賢者助之承已解秩不勝慊然猶幸欣集少慰瞻企挺之又啓右大觀宰相司徒趙清憲公挺之字正夫近郡帖真蹟一卷元祐中公自御史以不言蔡忠懷安州詩事謪楚州是帖蓋當時與郡僚者不知指何人紹定戊子三月得之吳門士人王之德有藏書家二印贊曰兩蔓菁之為蒼生孽蓋不啻于潰腸爛胃之酷烈公為泰和亦既力辨而逆折矣顧亦知市中所貨之參苓即當日之鳩葛乎陵下授上之相從揣中人之㫖而倡紹𫐠者固後來之萌析也所趨蓋繇此而異輒矣今觀遺蹟清平茂恱又何不類乎一時之勇決也賦詩一絶首為是說豫聞之楊文節趙清憲挽辭帖行數原缺褐十七應之兄學士挽辭趙挺之廓落襟懷德藝優身名曾不問沈浮當年冊府曾同命早歲文場每並潺寂寂舊廬東觀曉翩翩歸旐北邙秋都城猶記樽前别余元祐八年出使京東應之錢别于相國寺第二院酒罷余遂出城精爽今隨逝水流右趙清憲楊應之挽辭帖真蹟一卷按應之名國寶東萊吕氏之甥其行已之介務學之純在伊川門人最表表者帖與張子野二辭借來較之手帖蓋無一筆不似異出而昭合信乎其真也贊曰公為中司排擊元祐故臣而猶拳拳于伊洛之門人豈奏疏陳事或為世資而詘而作詩懷友固不害于私情之伸耶於呼是私情也而實出于公言此吾之所以重歎而列之于斯文也吳開府前日帖行書九行居厚頓首前日獲從容教益少慰馳情信宿伏惟動止萬福使至蒙手墨尤以感佩知從御來旦遂南塗中萬萬若時倍加珍重不勝誠禱不宣居厚頓首再拜伯彊長官服次右大觀知樞密院武康節度使開府吳公居厚字厚老前日帖真蹟一卷裕陵嘗謂公才智有餘辦治為一時最然于天下不能無議也洪為公畫繡地慶元己未五月得此帖于洪人王集大成贊曰豫章之東湖有公之居西山薦圖味鳯滴蜍伊波之餘而無以昌其書嗚呼章申公展居帖行書九行尾批一行惇啓專人惠問佩服勤厚庚伏畏暑信後佳否衰拙屏居如昨相望十舍未有晤集之期千萬自愛奉此叙謝不宣惇頓首子高知軍大夫足下十三日右兩朝宰相太師章申公惇字子厚屏居帖真蹟一卷公才偉矣而用之者背馳使英道之姿與翰墨俱鬱悲夫欲厚之世因其蹟識其人猶不可弗録也開禧乙酉七月得之富沙贊曰張無盡嘗謂公竒男子夢中劇談若或見之矧豫于手蹟之遺猶足以覩百年之風姿仕繫于時才髙用違覽者朱嘗不三歎息于斯嘻薜黃門春聚帖行書兩行春聚伏惟雲休昻上問右大觀門下侍郎薛公昻字肇明春聚帖真蹟一卷豫嘗與公之孫𡨢為僚今二十年矣獨未識公字畫幅紙九字實與趙清憲帖偕來斯亦可以想太平之人物也贊曰九字在紙落落星晨此帖之傳猶及太平意象軒昻足稱其名作此贊焉惟字之評朝之道促裝帖行書十行尾記一行詠之再拜上覆領教答伏審尊體萬福下情感慰官期已迫當遂促裝久間亦宜早就道也詠之殊未有所向孤蹇愈難扶持且久忘懷矣未有承教之日千萬保重不備詠之再拜上覆八兄通判朝奉嫂縣君座前七月二十四日右大觀提㸃崇福宮朝公詠之字之道促裝帖真蹟一卷公上書入黨籍邪等文章名節照映一時豫家元江丱歲從公子壁游仰世德之弗替幸門素之有考是帖得之其家蓋慶元戊午十一月也贊曰仕以行義有時乎為貧也兄弟之間情事貴乎真也公起異科事不患不伸也囊封叩閽因以警失君也忠既弗售反以錮終身也扶持之難曷敢尤夫人也今觀斯帖凛乎其若存也於呼文元有以教子孫也德之不孤吾知必有鄰也霍仁仲指教帖行書四行小姪丈輿獲備灑掃之役凡所不逮乞一一指教深所望于大賢也切懇切懇右政和吏部待郎霍公端友字仁仲指教帖真蹟一卷太平文物至祐陵而盛公以龍首位豹從才學著聞實一時翰墨之選書蹟傳世固其宜也帖藏常之富公胡楶家嘉泰壬戌十一月得之㑹稽贊曰金斗之魁祥爛兮流光玉墀之西箱頎兮荷􅌩寶墨之淋浪蔚兮遺芳百年之中緗宜兮毖藏葛文康書簡帖十三行並行書第二帖十四行第二第四帖各八行第三第七第八帖各十行第五第九第十帖各十一行第六帖十三行第十一帖四行第十二帖七行第十三帖二行勝仲輒以少意上凂許師德少尹名操昨鈞從寓青墩日屢嘗望履幕捐館踰年小人乘隙凌蔑其家近有僧法初等昏賴墳山地已蒙漕臺僉㕔定斷係許家有理而秀州及歸安縣元斷不當更送使府司理院審許伏乞鈞察早賜結絶其子許孝納有事目上呈孝訥于勝仲為甥而家兄工部冡婦乃師德女也又聯蔡安世親好因其見委乃以冒聞非親黨不敢犯不韙幸恕諒勝仲惶恐上覆勝仲又啓先公銘文十九日遣介禀呈不知何故未逹重煩見速秖益恐惕并已有書道義諒是續到矣慮有要增損無惜示下勝仲又上勝仲特蒙寵餉美醖及死􅀢皆間居所難得深佩逺意勝仲以方去官例不拜知識之饋于左右原眷獨不敢辭然在事日數忤雅意今日辭受惟谷但有慙汗而已謹布啓道謝悃之萬一勝再拜又上勝仲咨目再拜𫐠功大孝大夫專使又拜教幅且審順履炎亭孝體如宜不任慰拃閔雨深有旱乾之憂奈何奈何未緣款晤伏祈以時保衛不宣勝仲頓首再拜勝仲頓首再拜大孝簽判大夫侍史乖隔歲久咫尺甲第未遂修謁每勤景嚮即日初暑伏惟晨夕孺慕孝履如宜勝仲竊祿詞館託庇粗如昨未間伏祈以時厚衛不宣勝仲頓首再拜勝仲又啓為郡幾年以賦輿不繼殆成怨府屢千間秩歘蒙賜罷如釋負擔况辱誤恩寵以故職豈勝感幸敢謂高誼特以書辭為祝禮勤意重何以克當前在事日不敢出城解官之初即至妙喜訪杼山遺跡因到盛庵榱題輪奐甲于境內仰服送終之孝深懷晤語之益未有造門之便伏紙詹仰勝仲又上勝仲咨目再拜𫐠功大孝大夫專介復奉手蹟具審邇日孝慕之餘起居如宜感慰無量授官月日及大父銘刻並已紙領餘當如戒謹奉啓布逹不宣勝仲頓首再拜𫐠功大孝大夫座前勝仲再拜又啓馳光荏苒歘復改歲伏惟名德之重宜濶步霄堮久矣乘此泰亨即慮峻用與國同體雖屏居無階為夀然傾祝不勝真切也方欲馳附而慶問先及但極感銘爾勝仲再拜又上勝仲又啓勤渥之春波及賤息兩造賔廡皆蒙飲食數載之感刻無喻乏便失于即謝悚仄悚仄時事旬日來無所聞蓋水村尤僻如鎮中胡編修可謂鳯鳴朝陽朝野共稱之聞平江權守大漕公亦獨不迎敵書雖在田畝惓惓實日有漆室之念爾勝仲又上勝仲再拜又啓去歲辱節饋甚腆俯俯一年又煩不逺百里輟人船賜以酒饌仰惟厚意何以克當但劇感愧而已勝仲近于舍南葺小園桐竹粗成倫次小亭三數不覺度日無得一冬無虞何其幸也頗聞甲第亦展林芿之勝未緣造門求觀臨書但劇馳繫勝仲再拜又上勝仲蒙餉清熱二醖仰荷不忘不勝感愧特勤介使尤荷尤荷勝仲拜謝勝仲再拜比日不審動履何若才諝有聞宜見褒擢尚此淹翔頗鬱公議行聞明薦亟踐要途以慰輿論勝仲再拜貴眷一一均慶勝仲上問右政和大司成顯謨閣待制葛文康公勝仲字魯卿書簡帖十三幅真蹟一卷公以文鳴盛朝流福燾後合文與康易名稱矣乎澤固太平君子之遺蹟斯亦足以想東都之風也帖因先後彚所蓄而得不能遍記歲月特其中指胡忠簡為鳯鳴朝陽者乃紹熙庚戌歲公之孫丞相在東府先君為都曹暇日燕見語及紹興講信事適有持此帖獻者遂舉以遺云贊曰辭以情逹義以氣激以素心期託名手筆都曹之獲中寓其一尚想風流太平人物二蔡陪輔展晤二帖並行書一帖十一行一帖六行京頓首拜久不敢數進記引望門闌不勝馳情邊閫比益多事伏想經畫夙夜仰勤台用雪寒不審動靜何如恭惟碩望天下所冀以福已者陪輔之任人立以須側聽告廷以愁士言非特區區私願所激京頓首拜啓昨夜得展晤雖不款盡亦粗慰區區也雪候極寒計安佳清燕堂二器送去助小飲不一縷叙卞上右宣和太師領三省蔡魯公京字元長崇寧知樞密院開府蔡文正公卞字元度陪輔展晤二帖真蹟共一卷公之子絛叢談有曰先魯公嘗問米芾今能書者有幾芾對曰自晚唐楊少師近時公家君謨後天下獨有筆三管公家兄弟與芾而已今觀所書良是惜也其無以傳也慶元戊午八月豫試江西漕臺得之豫章王氏贊曰王氏之鬻他帖也有紙繅其間豫見其物墨闌珊既磨而殘取而考其氏名輒長愾而永歎曰豫聞之叢談是與忠惠者若是班乎今驗其字體則豪放而具骨力激越而競波瀾使名節足以齊馳則亦何羡乎二難然而所立所趨其視忠惠何啻汙池之于泰山故雖鬻駔尚得而唾棄之世之以藝稱者斯亦足以觀矣徐明叔向熱傳逹二帖第一帖草書九行第二帖行書四行兢頓首再拜彥光提舉朝議丈台座即日夏序向熱恭惟台候動止萬福競間退之久日自知安正逺瞻對敢乞惠序保衛益介夀祉謹上啓不宣競頓首再拜彥光提舉朝議台座競惶恐再拜頃蒙台㫖寄方存道書奄傳逹得領書上呈伏乞視之競惶恐再拜右宣和書學博士刑部員外郎徐競字明叔向熱傳逹二帖真蹟一卷雞林求能晝公以介行歸奏圖經遂錫名第十學既設公以師著握蘭舍香寖極清選凡此者俱可以占其能矣嘉定辛未五月得之上饒贊曰書名之行始于東夷歸而範模則有餘師中興幾人存此絶技太平之風尚想漸被周美成友議帖行書九行拜彥叩頭罪逆不能奄及祥除食貧所驅未免祿仕言念及此益深哀摧此月未挈家歸錢唐展省墳域季春逺當西邁寖逺友議豈勝依依尋即奉書以候動靜拜彥叩頭右宣和大晟令徽猷閣待制清真周公拜彥字美成友議帖真蹟一卷汴都治賦公以文藝動人主而卒以詞名天下豈雕蟲篆刻之所推歟字畫之傳斯亦稱矣嘉泰甲子十二月舟過吳門遇公之孫某同上蘭省道中相從訪而得之贊曰左太冲賦三都十年門牆藩溷皆著紙筆豫意其因以寓墨池模倣之妙而未必徒以詫記事備言之𫐠不然則亦焉用是物也如公書法或者得太冲之髣佛乎有鳯樓之手以侈其標度有香奩之澤以醖其風骨體具態全夫豈一日情真之名公所自出世不當徒以考公之詞賦尚有因是著公之翰墨也翁端朝輕利帖行書七行彥國啓此承訪逮殊慰間濶秋雨伏惟起居輕利初七日輒屈象駕訪及兜率一飯千萬肯臨諸得面可䆒不宣彥國上啓普照禪師道舊右靖康御史中丞寶文閣直學士翁公彥國字端朝輕利帖真蹟一卷慶元已未六月豫在中都得之麋子長贊曰結字清而唆用筆精而穩雖箋以粉而墨蹟猶未損公之功名豫固未暇論而所謂書法要必有所本矣吳王造見應命二帖並行書第一第二帖各七行幵悚息起前日幸邂逅未果造見懷仰何量枉教欣審尊候萬福謹奉手狀參承不宣幵悚息再拜宏父知府少卿賢友台座惠札極欲應命屬目疾久為梗繼而復有御前文字遂不暇至今然已界下紙非久上納稽緩負愧深劇時雍再啓右靖康翰林學士承㫖吳公幵字正仲吏部尚書王公時雍字口口造見應命二帖真蹟共一卷圍城之事有識者不忍言也豫之得是帖蓋雜他書所録者字而已贊曰所書如此而事如彼既恱我目亦冷我齒我録此事與郗超比名焉不刋帖亦奚毁耿黃門讀易帖楷書十五行南仲啓數日間繼有客至勞勞無休息期今日得暇方親筆硯欲答前書後失來又辱言教就審邑事之暇眠食安佚為慰長箋見貺深戢勤懇煥然文縟誠為過禮寧不愧感也南仲少年讀易終無一得每逹老師宿儒未嘗不折節求教况吾賢令能講解其深藴乎何惜為我道耶雨雪未雱邑中沾足否何時接辭慰此懷想南仲頓首虹縣宣德足下右靖康門下侍郎耿公南仲字睎道讀易帖真蹟一卷和識之誤天下久矣公于厥初亦未知其䆒蓋如此嗟乎亦天時也哉帖得之先君之客耿端仁實開禧乙丑之八月贊曰堅屋履霜誨盜慢藏戒隳乎復隍亡繫于苞桑一乎柔以御剛確其信于殊方以是謀國迄于靖康則讀易之無一得蓋公之所愧殆非空言以成報章尚其監兹前事不忘宇文宿愍兩漢帖三册並楷書今掇髙惠吕后文帝記其四板又半板凡三十行繁贊餘文多不録前漢帝紀自髙祖諱邦彥起至文帝紀致敬無祈詔止皆則節漢紀成文今不録右建康簽書樞密院贈少保宇文肅愍公虛中字叔通四漢帖真蹟三册靖炎之交天地屯否公馳單車奉明詔以使不測之地留龍度踰二十年卒以忠死立身失節逾久逾彰逮乎乾道韓王之歸申以嘉泰褒表之制汗青炳如照映千古是詩蓋公在南時手所刪節于心有取片語弗遺細字貫珠一筆無誤雖螢窗雪几窮年矻矻以課拾芥之效者尚不能無始勤終怠之異而公之成編貫穿四百載薈萃十萬言約不失踈繁不失冗凛然翰墨之英炯烔在目凡公之必久折不變百鍊益剛弗渝弗磷有猷有守者殆于寫是書之時已可占之矣珂舊登公孫忠惠公紹節之門紹定戊子夏四月獲覩手澤繫贊述志于以想節義乏間真有以見公之無入不自得焉贊曰昔前輩之觀史也惜陰以分晷繼膏焚殫磨鉛刻槧之功以積數十年之勤夫豈徒以尚夫文哉忠義一節君臣大倫蓋不惟將以取諸人又將有以禔其身也今考公之行已豈不足以信豫之聞耶方其指事而料女真抗疏而諫燕雲先見洞昭隱憂畢伸蓋自比夫捐之之棄珠崖安國之爭和親賈生之慟哭流涕徐福之曲突徙薪逮既往之不咎歎冦患之益深主辱臣死不辭朔塵又欲比夫張騫之取月氐當惠之聘烏孫罷齊兵如酈食其御太公如平國君既而國勢未張中原霾昏哀頓挫于九死誓終身之弗諼又欲比夫剛直之揚信牚距之陳遵充國之自脫干胸奴蘇武之伏節于海濱所以發廋語之書以達川峽則道魔力之已退祈妻子之流以續家祀則先敵約以自陳昭然此心質于蒼旻其後家已遣身已倫盟㰱已牢以讎為鄰公于是出不得已而竊比乎李陵之自循有志于千秋之冠軍期于義陽侯之刺樓蘭庶乎開都尉之殺罽賓考初揆忠公之志業其有得于史者亦可謂鮮倫矣孰知夫繳蠟書以漏大謀黨仇敵而殲忠臣有如亡秦者哉此編其藏手䆁之真一卷得師公心不泯李忠定單騎帖行書六行貴聚伏惟萬福賤纍輩本欲只留福唐適臨行為海寇所驚不免挈行當泊家上饒單騎以趨行在也舍弟必時拜見有所諭幸告之綱再拜右建炎相國李君忠公綱字伯紀單騎帖真蹟一卷靖康之初長蛇薦食公起庶僚奮特天戈以攘以驅卒全廟社建炎爰立首明綱常用正大刑人心既回國勢亦活彼其救太原結契丹議巡幸噂􅊱是非要不足為大體疪也豫舊識公之孫架閣君大有屢求遺帖而不可得紹定戊子四月羽士劉君道謙以書自中都來緘是帖見遺始得公手澤蓋剛徑特立之操尚可概見云贊曰立國有大勢一退則必靡公之守京師蓋社稷之計異時之失緊守之者不通而泥在公無罪也立人有常道一隳則必廢公之正綱常亦天地之義異時之咎謂關之者不懷而畏于公無悔也謀敵有機術之隙則必逐公之結契丹乃當為之理異時之釁蓋用之者不密而跪非公本指也於呼天方長亂迭仆迭取人謀弗同特其一耳使世之任事者皆以公為諱誰則肯出身主國大議圖全者不愛于棄地僣僞者無嫌于竊位招㩦用間之䇿皆不客于置喙殆非有國者之利至于聞命單騎不以家為纍惟吾忠是視此又公之素志豫于此帖蓋得公經綸之緒餘而初不論其掞辭之與結字也寶真齊法書贊卷二十一
