body:
  text: 寶真齊法書贊卷二十三宋嶽珂撰宋名人真蹟劉季髙書簡帖六帖並行書第一第二帖各十七行第三帖十一行第四帖七行第五帖九行第六帖六行岑再拜東觀自昔必擇名流往嵗范淳夫為夕郎呂于晉為詞臣張文潛為右史近年楊中立亦自是為大諌朝以道為少蓬間出補外雖如劉無言以罪黜亦得建昌軍岑也不才誠曰濫處然自元豐改官制後著作郎無罪出待二年闕為興國通判者必自岑始也伏惟通前古事實熟本朝典故誰出執事右者岑今不敢覬望如前輩得進用且引當家惡例求一壘牧民可乎筠州本是舍人提封儻出一言岑可以飽願哀其窮力賜推轂不敢忘異時廟堂雍容則所覬望不但爾也岑再拜岑再拜岑孤逺辱被知遇所從來久拔茅連茹豈所敢覬自惟居閒衣食不足今筠州未有人如得續貂何幸似之然不知誰能動心出力也岑昨再出割河東郡縣以資敵國者使指也岑受命而不受辭違詔留地矯制督兵原岑初心出于忠憤無所坐罪適怨家當國入熟而遣之有識之士多為不平而蹤跡孤外曾無熟何之者今朝廷以至公徠士念失職于一夫適公入朝顧所存憐誰若門下或稍借重筆端膚寸膏潤枯槁一明賞罰以勸在位何獨岑之志也岑本書生無長才具足副時須方兹艱難試加使令直前犯患義不顧身或有寸長伏惟加憐察焉岑再拜岑惶恐百拜伏奉墨帖之賜拜受欣然如造師席幸甚幸甚䝉鐫喻曲折更荷門下眷記不忘之意岑疾病支離無復餘念志在醫藥而已得左揆答書未及他語岑不可但已須著再請岑得如志最上䇿也設左揆不以為然願借一言之重但易得一有醫藥處投老殘年生理可得敢忘大賜心之精微筆墨難見更惟垂察岑惶恐百拜岑悚息岑親妹之子葉熊為大府法曹掾願教之誨之仍求一改官狀成就他所深望也又有聓之子陶植為吉水令亦望青矚幸甚淮上有可教無小大下諭所願奉承也岑再拜岑惶恐岑輒有小懇冒凂台聽家弟嶸得備吏屬且自往嵗䝉顧遇厚甚相見此時芘賴不淺矣然去替甚近尚少關升一章岑與江西諸使者皆無雅素門下少留念似不難辦者不審可遂調護否言之僣易不恃深眷敢爾耶岑惶恐岑再拜見南山齊石刻似聞嘗見之敢以塵冒但居間無使令匆匆裝褾不辦因不復事此惟深察敝邑或有可教岑願聞願聞岑再拜右紹興徽猷閣直學士劉公岑字季髙書簡帖六幅真蹟一卷豫讀洪文敏容齊隨筆曰真宗時并州謀帥上謂輔臣曰如張齊賢溫仲舒皆可任但以其嘗厯樞近或有固辭宜召至中書詢問願往則授之及召二人至齊賢辭以恐為人所讒仲舒曰非敢有辭但在尚書班已十年若得改官端撥賜都部署添給敢不承命輔臣以聞上曰是皆不欲往也勿彊之王元之自翰林學士以本官刑部即中知黃州遣其子嘉祐獻書於中書門下以為朝廷設官進退以禮一失措置咎在廊廟某一在翰林學士三任制誥舍人以國朝舊事言之或得給事中或得侍郎或為諫議大夫某獨異于斯斥去不轉一級與錢榖俗吏混然無别執政不言人將安仰豫謂仲舒嘗為二府至於自求遷轉及增請給元之一代剛正名臣至於公移箋書引例乞轉惟其至誠不矯僞故也後之人外為大言避寵辭祿而隂有營求失其本真者多矣風俗使然也今觀公首二帖蓋亦有前輩用情之風焉帖併他帖六開禧丁卯七月得之霅上贊曰用情之真視古庶幾他帖雖不能盡知筆法皆清而竒我標淳風以戒言詭劉行簡前日帖行書十行一止頓首再拜前日幸獲一再瞻望屬懷抱茹痛不能甚欵違奉以來豈勝傾嚮伏計已拜綸綍即戒旌麾涓辰上道一止還邑微苦故疾尚圖趨拜併叙辭違之意兹不覼縷仰冀幸察一止頓首再拜右紹興敷文閣直學士劉公一止字行簡前日帖真蹟一卷開禧丁卯十月得之親安士人汪氏家贊曰情叶事之宜筆力亦稱之雖得於歙水之湄然望而識其為苕溪也劉武忠書簡帖十九帖並行書第一第五第十三第十八帖各八行第二第三帖各十一行第四帖十行尾批二行第六第十四帖各九行第七帖五行第八帖九行第九帖四行第十第十一第十二帖各六行第十五第十九帖各四行第十六第十七帖各七行錡再拜上啓間違賢範不勝馳向之劇信後未識興居復何如仰惟吉德君子罄無不宜錡承乏如昨不煩展念相望未有瞻見之日伏紙但切傾繫引領之至錡再拜上啓錡頓首啓辱書荷不忌之意且審别久起居萬福甚慰甚慰聞有鼓盆之戚不易排遣人之處世不如意者十常八九凡百更須以道自處無傷生也且居沙市否他日所之何地況味近如何錡凡百過分所居若村落人事幾絶亦自省事耳郎娘有幾人湘中或有所需勿外相㑹未卜願言加愛不宣錡頓首啓元英運屬秉義侍史錡頓首再拜昨日承訪及下情至感兩日緣與汝隂戰殁將士飯僧未果延欵誨益益增愧怍朝來伏惟孝履支持十一日解未已定否十小笏聊表區區少助僕馬之費幸望笑留乃荷近晚請謁併得面賦陳丈書已寫當面納有委不外謹上狀錡頓首再拜仲恭圍練至孝錡咨目再拜上啓仲恭制司宣贊即日春和不審孝履何如衮衮逼行未果上狀乃辱誨示尤用慚怍承聞便辦葬事想不易營集輒以五十縑少助費用輕凂深愧千萬客留旦夕專人奉狀次第無由面别謹上狀布左右不宣錡咨目頓首再拜仲恭制司宣贊友偶迫行了無須臾睱用是不果子細上狀他須後信也錡頓首午刻起居何如堂名欲易之以清美事出顧憲之傳公清儉彊力視古誠無愧焉所書額並八陳圖臺太平寺八字納去餘遲面言不宣錡再拜揚中知縣奉議侍史錡頓首上啓適沐訪逮至感至感移刻伏惟動止輕安承令預鄉飲酒此盛禮也敢不趨赴獲陪耆俊之㑹豫以為慰姑此奉復不宣錡頓首上啓揚中知縣奉議侍史周叔八哥大夫仰之保義子宜監場萬福未及奉書彼無事幸過我也錡再拜德瞻解元安休堂上泊仙集均休水路迂澀想勞神用安下處已有俟公到修治也少頃送飯食去次錡再拜錡頓首拜誨墨之賜審車馬還自鄂渚即遂披承豫增欣快他容面賦兹不宣錡頓首再拜德瞻先生友照閣中郎娘一一均休令弟同來否家人輩拜問有委豫冀示諭上問錡辱字至感堂上别無他否所諭備悉人馬已差去有委無外錡再拜德瞻宣教友錡啓早遣扈青奉手削矣辱誨示審信宿文履休暢既感且慰諸子荷鈐束十七日定歸復此致謝不宣錡再拜德瞻祕校友錡頓首啓意謂可出元日相聚也辱字乃審體中未甚平和獻嵗發春賢者履之倍迎景貺隨分衮衮未得奉謁幸照不宣錡再拜德瞻祕校友錡辱誨示至感至感竊聞苦臟府豈非脾胃弱耶李忠遣去藥不須自贖幸批示當遣人去取也今日極熱千萬加愛有所需勿外錡再拜德瞻賢友祕省家人拜意堂上輒以衣三件浼瀆幸恕而留之錡再拜豚犬輩豈非椎鈍不足教也復辱示字果肯嚴督功課幸甚幸甚錡與德瞻相與之厚日甚一日區區之情當有以照而諒之也錡再拜錡頓首啓午刻伏惟文履休勝錡生朝荷惠長箋佩服愛玩不敢忘也然奬借過實有所未安區區之懷更俟面賦匆匆不宣德瞻祕校賢友錡頓首啓晚刻緬惟動止安勝竊承誕日無以為意香酒微物祝千百之夀輕觸是愧冀容留也奉狀不宣錡頓首啓德瞻祕省足下舍姪深今遣去軍中已干王都統收留若肯留之緩急之間煩為周庇干煩為愧錡再拜右紹興開府劉武忠公錡字信叔書簡帖十九幅真蹟一卷世謂長鎗大劍與毛錐子為二今觀公字蹟其本固非不同也嘉定甲申三月始得此于維揚贊曰以徑筆力作往來帖婉有餘妍莊不可狎古者文武初非二流繫於卿士豫其從周劉武忠五詩帖五帖並行書門外蹄輪任迹疏一門里深稱水雲居平生事業將何用歎括空能讀父書用前韻呈德瞻一徑縈紆山更深滿川烟靄夕沉沉從來不問榮華事自有沙鷗信此心二月陽和花正繁軟風輕扇筍斑斑揚鞭江路心無事問舍求田過淺山題村舍錡呈德瞻友偶得一絶清風葉葉映黃鸝緑暗紅稀半掩扉我以忘言靜思慮子規猶道不如歸午寢寓跡唐興寺幽窗得盡眠西風縈破夢落日亂殘蟬嵗月俄如此功名豈偶然五湖秋欲好誰在釣魚船拋磚欲引玉也錡右劉武忠公五詩帖真蹟一卷豫于名將帖未嘗得也繫之卿士帖足矣而復出蓋有意焉於呼詩以寓志筆以掞竒觀公此帖謂公徒武固不可如先王者同被秦忌豈大將固不得以說禮樂敦詩書稱耶古今異宜豫得此帖猶信紹定元載二月乙丑贊曰豫表此詩蓋欲天下知將帥未嘗無人夫豈必弧矢之棄而筆硯之親合之一岐之分噫嚱斯藏何忝于文楊文靖早間帖行書八行時惶恐早間就時官借水皆以送憲車迓亷訪為辭以故未能造謁第深愧悚素荷愛念必能見諒也使舟未行當卜參侯區區非面承不究時惶恐再拜右紹興龍圖閣直學士龜山先生楊文靖公時字中立早間帖真蹟一卷洛道既南先生實為中興諸儒之倡延平之風洋洋乎其逮今也珂少讀語録竊欽傳緒寶慶乙酉六月始得是帖于京江處已接物之要尚可以想見云贊曰道之在人日用皆其事也待物必誠所以逹乎義也延平之津伊洛之涯涘也筆端波瀾亦可想見似也吳傳朋書簡帖四帖並行書第一帖十七行第二帖十三行尾記三行第三帖六行第四帖四行說咨目頓首再拜上啓澤民知府中大契兄台座寒律初嚴不審興居何似伏惟神所休相台侯動止萬福去違賢誼忽復許久區區懷仰與日俱深自承過豫章難值端便以故闕于承問記室負歉何已末繇瞻叙惟冀惠時嗇養沖氣前需節召禱頌真切不宣說咨目頓首再拜上啓澤民知府中大契兄台座說咨目頓首上記元俊學士賢友侍史說比幸披豁匆匆告歸為歉即日侍膳之餘尊履申福談命牧童還自廣德已面諭之今往請見可詳叩丞相行年也昆季意不殊前更不一一致問比獨不得一面元忠為不滿惟冀為親夀重遽中代傳言理無報教謹啓四月晦說頓首上記淮陰娑羅碑近得之納寄一本懇借古碑中有帶行草者告乘間檢尋更數日專介叩請說再拜上啓說數竒之迹分甘置散比閲邸報忽有盱眙之除繼報代人已有改命恐遂促行自兹瞻望愈逺情深邑邑匆遽聊此上詗良愧率略說再拜上啓說外弟梁校正克鞏占籍府下往干典謁幸垂顧盻聞舊嘗登門相不待鄙言之祝也說悚息右紹興主管崇道觀吳公說字傳朋書簡四帖真蹟一卷行都九里松本公題扁思陵嘗自歎以為不及筆法可睹矣今帖蓋小楷尤清偉可觀者紹定戊子三月得之京口贊曰小書楷則本晉人降而唐世體益真妙趨要識筆有神行行清妍雜竒偉竒為精神楷為體吳君筆力備諸此吳傳朋游絲書飲中八仙歌帖四十八行知章騎馬似乘船眼花落井水底眠汝陽三斗始朝天道逢麴車口流涎恨不移封向酒泉左相日興廢萬錢飲如長鯨吸百川銜杯樂聖避世賢宗之瀟灑美少年舉觴白眼望青天皎如玉樹臨風前蘇晉長齊繡佛前醉中往往愛逃禪李白一斗詩百篇長安市上酒家眠天子呼來不上船自稱臣是酒中仙張旭三杯草聖傳脫帽露頂王公前揮毫落紙如雲烟焦遂五斗方卓然髙談雄辨驚四筵飲中八仙歌傳朋右吳傳朋游絲書杜甫飲中八仙歌真蹟一卷紹熙壬子嵗二月先君以帥事如五羊道過太和之快閣外姻張子禮彥和輅於境上慿欄縱語偶及書法發奩共視古名蹟因歎近世鮮能書者張翌日攜數帖來乃中興以後諸賢詩簡因遂留此為儘是時置篷窗几上珂侍旁亦得日閲無算兄筍餘至南安舍舟而陸乃卷畀囊中按是體說自名游絲書云古所無有屏山劉子翬作詩曰清圓無瑕二三月時見游絲轉空闊誰人寫此一段竒著紙春風吹不脫蓋謂此也考之唐書呂向能一筆環寫百字若縈髮然也號連錦書則此書亦有所本特不系所繇名屏山之詩又曰定知苗裔出飛白古人妙處君潛得亦不系連錦豈忘之耶出竒衒巧牽合不斷勻徑媚直凡工書者例難之侯筆力之進退每以是為要法雖若纎巧不可廢也藏之以備書體之一焉贊曰天絲兮舞空春光兮怡融杲麗日兮柔風想八仙兮飲中倒景兮騎紅落紙兮游龍俱下上兮西東笑春歸兮無蹤墨皇兮化工留玩兮何窮吳傳朋四體書帖珠樹玲瓏振好音别來難步國門尋平􅉼萬象青天闊冷閉三山碧海深玉柙夜藏橫月劍錦囊春貯倚花琴碧雲才子應相問依舊釣魚烟水心行書十二行得道真僧不易逢幾時歸去願相從自言家住連滄海别有蓬萊第一峯楷書五行莫厭追歡語笑頻尋思離亂可傷神間來屈指從頭數得見清平有幾人游絲書六行故人昔隱東䝉峯已佩含景蒼精龍故人今居子午谷獨在陰崖結茅屋屋前太古𤣥都壇青石漠常風寒漠子規夜啼山竹裂王母晝下雲旗翻知君此計成長往芝草琅玕日應長鐡鎖髙垂不可攀致身福地何蕭爽草書二十一行嘉禾道正鄒淵明一鄉羽客之好事者余過郡頻日見臨䄂軸紙索書未暇作洎解行復出祖郊關之外意非苟然經吳江值便風發逺興乃為書之紹興丁卯初夏吳傳朋行書六行常時任顯晦秋至轉分明縱被微雲掩終能永夜清含星動雙闕伴月落邊城牛女年年渡河會風浪生草書八行紹興甲子重陽前一日書於新市海㑹禪寺傳朋草書四行誰將石黛淬春潮復撚黃金作栁條西崦東溝從此好筍輿追我莫辭遙草書六行日出籬東水雲生舍北泥竹髙鳴翡翠沙僻舞鵾雞游絲書四行了知身心畢竟原闕與法同生體無異知是空花同即無輪轉亦無身心被受生死游絲書八行說頓首再拜澤民提宗宮丞賢友比辱教墨久稽裁報愧甚比日尊履動止何似需惡札納上卷軸紙數太多恨不能精也說適過鄉里展掃過郡託蔣丞致逺不遑疊幅餘冀順序寶鍊以承休命不宣說頓首再拜澤民提宫宗丞賢友行書十一行右吳傳朋四體書雜詩頌真蹟二卷其一末有跋語凡四篇首篇以行次以楷次以游絲次以草通著一印其二末有手帖亦四篇半以草半以游絲通著一印是書皆以應人之求皆寓興而作隨體輒竒皆入能品信乎近世之名蹟也前帖得于嘉禾後帖得于京口相去凡六嵗其體也雜雖有草法不可以析故俱繫之能書用質所聞以代書斷贊曰先君嘗評近書世有曰公行書如漢武仙臺侍女飄居長袖清􅈺姣麗特患無出世間熊小楷如京師大酺少年縱觀毬馬韶秀時出闤闠氣象草聖如駿馬注城以其居天間之久終不失規矩惟游絲得弄翰遺意輕雲纎月自成一家易評難工不可輕置喙噫嚱其庶幾知言也哉不然則簡貴安徐玉斚瓊琚其亦深於書者矣趙忠簡送春詩帖行書七行次韻送春坐嘆空山落景催幾時江上葉舟回初無妙術留春住强覓餘歡並酒來體力寒多思故絮齒牙衰甚怯新梅秦川洛水紛華地白首天邉共此杯右紹興宰相太傅豐國趙忠簡公鼎字元鎮次范元長韻送春詩帖真蹟一卷公剛方之操正大之學經綸之用啓沃之忠所謂抗之萬乘而不懾置之九死而不顧言論英烈夏日秋霜近古社稷臣自漢蕭太傅而下惟公足以當此公以儲議之異為偃月所傾投荒纍年卒死竒禍詩蓋海上所作因元長所寄而賡之者秦川洛水猶不能掩北望之悲亦重可哀也已豫舊從公孫廬州君綸識公帖筆力徑甚此詩字體嚴穩平重蓋末年所書紹定戊子二月得之霅上故家感慨之餘竊迹楚辭大招之義以寫踟蹰不見之心庶因卷舒以慰忠憤贊曰陶陶孟春草木莽只白日昭昭照下土只瘴烟浩淫雜海霧只憔悴行吟闃島嶼只公乎歸徠無嫪此詩句只黎母之居家炎陬只崒嵂盤鬱蔽雲浮只蝮虺鰅鱅蜒僻幽只人跡闃絶魑魅仇只公乎歸徠空山不可以久游只鳴鳶跕跕墮滄溟只蛟蜃噀雨晝冥冥只折肱見沫瞻斗星只夕照黃濁波濤腥只公乎歸徠落景不可以久停只茅葦叢薄桃李囚只韶容駘蕩異中州只陽和弗舒金石流只短狐祕蜮起蟄環只乎公歸徠春不可留只卉服椎髻駢蜓艕只咿嚘啁哳言莫諒只烹蛇茹蠱食且恙只眇其愁豫雖迥曠只公乎歸徠歡不可並只毒洳下濕既沮疫只煩蒸焚惔交戰迫只中鬱鬲痞悼憭栗只層冰肅霜接朝夕只公乎歸徠寒兮無與乎體力只長鯨層浪隔帝家只鳥春蠱秋年華只星河八月記送流槎只杳杳萬里誰還沙只公乎歸徠衰兮不關乎齒牙只公乎歸徠尋川之衍夷公所生只解梁風鹹民萃營只土厚水深衎易平只洪河大川坎不盈只居之而安樂不可名只公乎歸徠洛水之繁庶公所寓只龍門伊闕風氣聚只葩竒俗淳康汰阜只圖淵書囿今古慕只資之而深適不可喻只公乎歸徠無歎乎江上只紫蓋黃旗天所王只浮埃蔽䝉騁逺望只聖主如天既殛放只聊以永懷無沮喪只公乎歸徠無悼乎天邊只資善大議同諸賢只復讎正義維萬年只質乎人心靡或偏只守此正中無遷延只噫嚱詩乎公以寫我心只彼蒼者天杳難諶只吁嗟時乎天以畁我公只彼亡者秦曷克終只樂只韶只舜之昭只無議其將聖維堯只讒慝煽凶同盛朝只公乎歸徠尚豫家之招只范元長觀梅詩帖行書七行久陰初晴奉陪宮使樞密觀梅沖掃盡陰氛儘見春荒山風物一時新謫仙自是和羮手聊與梅花作主人右紹興翰林侍讀學士資善堂翊善范公沖字元長觀梅詩帖真蹟一卷公以元祐故家克紹聲烈德履望實昭於搢紳所謂文獻接於中原典型盛於喬木南渡而後莫公先者詩蓋遺趙忠簡以建炎四載十月自右府歸奉祠故謂之宫使樞密云忠簡以三詩賡之其一曰曳杖山間自探春雨餘梅意已情新兵戎草草傷淪落一醉花前有幾人其二曰種栁栽花舊惜春不知春色為誰新年年青眼樽前客只有寒梅是故人其三曰歸來醉極一枝春照影凉蟾過雨新不似霸陵愁醉尉穿雲渡水寂無人今見忠正德文集中紹定戊子四月得之京口餉所贊曰范本蜀望世仍忠嘉南渡而來人門莫加帝咨典型詔起幽遐翊媺銅龍執經金華筆取端重而兼竒葩儒先所推奚待詡夸有偉豐公如壁不瑕卷懷樞庭寓賞梅花公從北方共之天涯均德此誼而兼莩葭寒谷將春輕陰不遮潔樽斯從寄驛匪賖倡汝和豫屏淫斥哇託彼陰晴以寫正邪愛君之心對越靡差一瞬百年遺墨驚鴉臭兮同蘭好兮投瓜二公其仙星箕漢槎如此帖者可復得耶清並玉雪秀同綺霞矢辭以藏庸識名家陳參政簡易帖行書六行台眷伏惟均被新祉城中有委願聞之䝉眷照之厚儻有所諭片紙貺之以從簡易不識可乎與義再拜右紹興參政資學士政簡齊先生陳公與義字去非簡易帖真蹟一卷士以詩翰宗於一時而致位丞弼直躬事上終始無闕如公者亦可以為名臣矣嘉泰甲子豫來行都遇公之孫某於湖上從容幾月而得此帖又二十載乃褾而贊之贊曰眼底中興日月手中建筆虹霓造化功成秋先生原有新詩陳參政陰雨詩帖草書七行陰風三日吹南極二月已晴寒裂石長林巨木受軒輕洞庭倒流瀟湘黑君不見古廬竹扉聲䇿䇿中有竛竮落南客㑹經破膽向炎官敢不修容待風伯右簡齊先生陰雨詩帖真蹟一卷按先生集題篇為陰雨今書則無之蓋惟以寓草聖也舊與帖同卷既别詩文亦别而彚之贊曰世謂北客惟暑之畏亦何至是先生之詩殆他有所謂新亭之泣如王導輩亦何嘗暍死於吳地蓋惟以其舉目有山河之異耳豫侍先君子每見言及河朔舊事未嘗不澘然隕涕嗚呼先生之作此詩其亦以是耶豫家江南者三世矣嵗月易易後生者當不復記傳此帖以示庶毋忘斯意寶真齊法書贊卷二十三
