湘月夜期友人不至一首坐待故人宿月華清欲秋管絃誰處醉池閣此時愁風過渚荷動露含山桂幽孤吟不可曙昨夜更登樓寄袁校書一首擾擾換時節舊山琪樹陰猶乖青漢志空負白雲心廣陌塵埃逺重門管吹深勞歌極西望未省有知音內極西二字元係西望字粉塗重改征西舊卒一首少年乘勇氣百戰過烏孫力盡邊城難功添上將恩曉風聽戍角殘日倚營門自説輕生處金瘡有舊痕王秀才自越見尋不遇題詩而回因以酬寄一首南齋知數宿半為木蘭開晴閣留詩遍春帆載酒回煙深揚子宅雲斷越王臺自有孤舟興無妨更一來送客歸蘭溪一首花下送歸客路長應過秋暮隨江鳥宿寒共嶺猿愁衆水喧嚴瀨羣峯抱沈樓因君幾南望曾向此中遊贈王處士一首歸卧養天真鹿裘烏角巾荗陵間久病彭澤醉長貧冠蓋西園夜笙歌北里春誰憐清渭北又老釣魚人送張厚浙東謁丁常侍一首涼露清蟬栁陌空故人遙指浙江東青山有雪松當澗碧落無雲鶴出籠齊唱離歌愁曉月獨看征棹怨秋風定知洛下聲名士共説膺門得孔融宿松江驛卻寄蘇州一二同志一首侯館人稀夜更長姑蘇城逺路蒼蒼江湖潮落髙樓迥河漢秋歸廣簟涼月轉碧梧移鵲影露低紅草濕螢光名園詩侶應多思暮醉笙歌掩畫堂寄雲際寺子敬上人一首萬山秋雨水縈回紅葉多從紫閣來雲冷竹齋禪衲薄已應飛錫過天台遊楞伽寺一首晚煙秋寺泛潮來水浸城根古堞摧盡日傷心人不見石楠花滿舊歌臺送薛洪秀才南遊訪山習業一首姑蘇城外栁初凋同上江樓更寂寥繞壁舊詩塵漠漠對窗寒竹雨蕭蕭憐君别路隨秋鴈盡我離觴任晚潮從此草玄應有處白雲青嶂一相招夜歸孤山寺卻寄上盧郎一首青雲有志路猶賒心在琴書似憶家醉别庾樓山色晚夜歸蕭寺月光斜落帆露濕回塘栁開院風驚滿地花他日此身須報德莫言空愛舊煙霞贈桐廬房明府先輩一首帝城春榜謫雲仙四海聲華二十年闕下書功無後輩卷中文字掩前賢官成每喜江山靜道在寧憂雨露偏自笑小儒非一鶚亦趨門屏兾相憐贈裴處士一首為儒白髮生鄉里早聞名暖酒雪初下讀書山未明字形翻鳥迹詩調合猿聲門外滄浪水知君欲濯纓石池一首通竹引泉脈泓澄深室盆驚魚翻藻葉浴鳥上松根殘日留山影髙風耗水痕誰家洗秋藥來往自開門送蘇協律從事振武一首琴樽詩思勞更欲學龍韜王粲暫投筆吕虔初佩刀夜吟關月苦秋望塞雲髙去去從軍樂雕飛代馬豪懷政禪師院一首山齋路幾層敗衲學真乘寒暑移雙樹尤陰盡一燈風飄髙竹雪泉漲小池冰莫訝頻來此修身欲到僧送荔浦蔣明府赴任一首路長春欲盡歌怨酒初酣白社蓮塘北青袍桂水南驛行盤馬道船宿避龍潭真得詩人趣煙霞處處諳秋夕有懷一首念逺坐西閣華池涵月涼書回秋欲盡酒醒夜初長露白蓮衣淺風清蕙帶香前年此佳境蘭棹醉橫塘秋霽寄逺一首初霽獨登賞西樓多逺風橫煙秋水上疏雨夕陽中髙樹下山鳥平蕪飛草蟲惟應待明月千里共君同經故行宮一首臺閣參差倚太陽年年花發滿山香重門勘鎖青春晚深殿垂簾白日長草色芉眠侵御路泉聲嗚咽繞宫牆先皇一去無回駕紅粉雲鬟空斷腸宣州開元寺贈惟直上人一首曾與徑山為小師十年僧行衆人知夜深月色當裨處齋後鐘聲到講時經雨緑苔侵古畫過秋紅葉落新詩勸君莫厭江城客雖在風塵别有期秋晚懷茅山石涵村舍一首十畝山田近石涵石涵風俗舊曽諳簷前白艾驚春燕籬上青桑待晚蠶雲暖採茶來嶺北月明沽酒過溪南陵陽秋盡多歸思紅樹蕭蕭覆碧潭送令間上人一首近日髙僧更有誰宛陵山下遇間師東林共許三乘學南國爭傳五字詩初到庾樓紅葉墜夜眠蕭寺碧雲隨秋江莫惜題佳句正是磷磷見底時送上元王明府之任一首莫言名重懶驅雞六代江山碧海西日照蒹葭明楚塞煙分楊桞見隋隄荒城樹接沈書浦舊宅花連罨畫溪官滿定應歸未得九重霄漢有丹梯東遊留别李業秀才一首煩君沽酒強登樓罷唱離歌説逺遊文字豈勞諸子重風塵何幸故人憂一程山路長侵夜十里家書動隔秋起憑欄干各垂淚又驅羸馬向東州客有卜居不遂薄遊汧隴者因題絶句一首海燕西飛白日斜天門遙望五侯家樓臺深鎖無人到落盡春風第一花送鄭寂上人南遊一首儒家有釋子年少學支公心出是非外迹辭榮辱中錫寒秦嶺月杯急楚江風惟恐故園思山秋梨葉紅霅上宴别一首山斷水茫茫洛人西路長笙歌留逺棹風雨寄華堂紅壁耿秋燭翠簾凝曉香誰堪從此去雲樹滿陵陽留題李侍御宅一首曾話平生志書齋幾見留道孤心易感恩重力難酬獨立千峯晚頻來一葉秋雞鳴應有處不學淚空流行次白沙館先寄上河南王侍郎一首夜程何處宿山疊樹層層孤館開秋雨空堂停曙燈歌慙漁浦客詩學鴈門僧此志無人識明朝見李膺重哭楊攀處士二首自號為緑雲翁緑雲多學古黃髮竟無成酒縱中山性詩留上海名讀書新樹老垂釣舊磯平今日悲前事西風聞哭聲從官任直道幾處脫長裾殁後兒猶小葬來人漸疏鄰翁占池館長吏覓圖書身賤難相報平生恨有餘茅山題徐校書隱居一首深居四十年語舊淚潺潺官滿春辭省兵來夜出關思隨江鶴逺心寄海鷗間莫訝頻相訪前峯似故山題倪處士舊居一首儒翁九十餘舊向北村居生寄一壺酒死留千卷書欄摧新竹少池淺故蓮疏但有子孫在帶經還荷鋤南鄰樊明府久不還家因題林亭一首湘南官罷不歸來髙閣經年掩緑苔魚溢池塘秋雨過鳥還洲島暮潮回階前石隱碁終局窗外山寒酒滿杯借問先生獨何處繞籬疏菊又花開下第貽友人一首身在關西家洞庭夜寒歌苦燭熒熒人心髙下月中桂客思往來波上萍馬氏識君眉最白阮公留我眼長青花前失意共寥落莫遣東風吹酒醒送楊發東歸一首江花半落燕雛飛同客長安今獨歸一紙鄉書報兄弟還家羞著别時衣貴遊一首朝回珮馬草萋萋年少恩濟衛霍齊斧鉞舊威龍塞北池臺新賜鳯城西門通碧樹開金鎖樓對青山倚玉梯南陌行人盡回首笙歌一曲暮雲低宿咸宜觀一首羽袖飄飄杳夜風翠幢歸殿玉壇空步虛聲盡天未曉露壓桃花月滿宫紫藤一首緑蔓穠陰紫袖低客來留坐小堂西醉中掩瑟無人會家近江南罨畫溪越中一首石城花暖鷓鴣飛征客春帆秋不歸猶自保郎心似石綾梭夜夜織寒衣春日題韋曲席野老所居二首背嶺枕南塘數家村落長鶯啼中婦懶蠶出小姑忙煙草近溝濕風花臨路香自憐非楚客春望亦心傷繞舍遍桑麻村南第一家林繁樹勢直溪轉水紋斜竹院晝看筍欄春賣花故園歸未得到此是生涯聞范秀水自蜀遊江湘一首蜀道下湘渚客帆應不迷江分三峽響山並九疑齊秋泊鴈初宿夜吟猿正啼歸時慎行李莫到古城西緑蘿一首緑蘿縈數里本在草堂間秋色寄髙樹晝陰籠近山移花疏處過􅓯樂困時攀日暮微風起難尋舊徑還晚泊七里瀨一首天晚日沈沈歸舟繫栁陰江村平見寺山郭逺聞砧樹密猿聲響波澄鴈影深榮華暫時事誰識子陵心子陵釣臺貽行侶一首故人天下定垂釣碧巖幽舊迹隨臺古髙名寄水流鳥喧羣木晚蟬急衆山秋更待新安月慿君暫駐舟江上喜洛中友人繼至一首戰馬兩河道風驚嵩少塵全家南渡逺舊友北來頻罷酒松桂晚賦詩蘭杜春何言今夜月同是洛陽人宿東橫山瀨一首孤舟路漸賒時見碧桃華溪雨灘聲急巖風樹勢斜獼猴懸弱蔓鸂鶒睡橫槎漫向山林宿無人識阮家貽遷客一首無機還得罪直道不傷情微雨昏山色疏籠閉鶴聲間居多野客髙枕見江城門外長溪水憐君又濯纓題韋山人山居一首􅓯藥去還歸家人半掩扉山風藤子落溪雨豆花肥寺逺僧來少橋危客過稀不聞砧杵動應解製荷衣再寄殷堯藩一首直道知難用經年釣水濵宅從栽竹貴家為買書貧就學多名客登朝盡故人蓬萊自有路莫羡武陵春陵陽送客一首南樓送郢客西郭望荆門鳬鵠下寒渚牛羊歸逺村蘭舟倚行棹桂酒掩餘樽重此一留宿前汀煙水昏途經李翰林墓一首氣逸何人識才髙舉世疑襧生狂善賦陶令醉能詩碧水鱸魚思青山鵩鳥悲至今孤冢在荆棘楚江湄錢唐青山李隱居西齋一首小隱西亭為客開翠蘿深處遍青苔林間掃石安棊局巖下分泉遞酒杯蘭葉露光秋月上蘆花風起夜潮來雲山繞屋猶嫌淺欲棹漁舟近釣臺與鄭秀才叔姪會送楊秀才昆仲東歸一首書劎功遲白髮新異鄉仍送故鄉人阮公留客竹林晚田氏到家荆樹春雪盡塞鴻南翥少風來胡馬北嘶頻洞庭煙月如終老誰是長楊諫獵臣贈桐江隱者一首潮去潮來洲渚春山花如繡草如茵嚴陵臺下湘江水解釣鱸魚能幾人送宋處士一首賣藥修琴歸去遲山風吹盡桂花時世間甲子須臾事逢著仙人莫看棊陳宮怨一首風暖江城白日遲昔人遺事後人悲草生宮闕國無主玉樹後庭花為誰題旌儒廟一首寒柏陰風萬古悲儒冠相枕死秦時廟前亦有南山路不學老翁歌紫芝謝亭送客一首勞歌一曲解行舟紅樹青山水急流日暮酒醒人已逺滿天風雨下西樓南遊泊松江驛一首漠漠故宮地月涼風露幽雞鳴荒戍曉鴈過古城秋楊栁北歸路蒹葭南渡舟去鄉今已逺更上望京樓松江懷古一首故人今何在扁舟竟不歸雨餘山漠漠江闊樹依依暮色千帆落秋聲一鴈飛此時兼送别慿檻欲霑衣孤鴈一首昔年雙頡頏池上靄春暉霄漢力猶怯稻梁心已違蘆洲寒獨宿榆塞夜孤飛不及巢簷燕西風相逐歸題李元之幽居一首宅前雲水滿髙興一書生垂釣有深意望山多逺情夜棊留客宿春酒勸僧傾未作干時計何人記姓名長興里夏日寄南鄰避暑一首侯家大道傍蟬噪樹蒼蒼開鎖洞門逺卷簾髙館涼欄圍紅藥盛架引緑蘿長永日一欹枕故山雲水鄉天街曉望一首曉星低未央蓮闕迥蒼蒼疊鼓送殘月疏鍾迎早霜關河浮瑞氣宮館耀神光再拜為君壽南山髙且長早春懷江南一首雲月有歸處故山清洛南如何一花發春夢遍江潭送友人自荆襄歸江東一首時友人新喪偶商洛轉江濆一杯聊慰君劎愁龍失伴琴怨鶴離羣楚驛枕秋水湘帆凌暮雲猿聲腸斷夜應向雨中聞洞靈觀冬青一首霜霰不凋色兩株交石壇未秋紅實淺經夏緑陰寒露重蟬鳴急風多鳥宿難何如西禁栁晴舞玉欄干送客南歸有懷一首緑水暖青蘋湘潭萬里春瓦樽迎海客銅鼓賽江神避雨沿風岸看雲渡栁津長安一杯酒座上有歸人送太昱禪師一首禪林深竹裏心與徑山期結社多髙客登壇盡小師早秋歸寺逺新雨上灘遲别後江雲碧南齋一首詩長安旅懷一首久客怨良夜西風吹鴈聲雲移河色淺月泛露華清掩琴獨凝思緩歌空寄情門前有歸路迢遞洛陽城春望一首南樓春一望雲水共昏昏野店歸山路危橋帶郭村晴煙和草色夜雨漲溪痕下岸誰家住殘陽半掩門酬杜補闕初春雨中舟次橫江喜裴郎中相迎兼見寄之什一首江館維舟為庾公暖波微緑雨濛濛紅檣迤邐春巖下朱斾聫翩曉樹中栁滴圓紋生細浪梅含香艷吹輕風郢歌莫問青山吏魚在深池鳥在籠題衛將軍廟一首并序將軍名逖陽羡人少習詩書仍學劎有武略二十七遊并汾間神堯皇帝始揭義旗逖進備行列洎擒竇建德逖持挾槍劎前突後翼太宗顧而多之天下既定第其功拜將軍宿衛以母老且病乞歸侍殘年辭旨哀激詔許之既而以孝敬睦閨門以然信居鄉里及卒邑人懷之廟于荆溪之湄以平生弓甲懸東西廡下嵗時祠祭焉或云頗福其土邑文士王敖撰碑詞實詳備惜乎國史闕載其功因題詩于廟壁武牢關下護龍旗挾槊彎弧馬上飛漢業未興王霸在秦軍才散魯連歸墳穿大澤埋金劎廟枕長溪挂鐡衣欲弔忠魂何處問葦花楓葉雨霏霏送前東陽于明府由鄂渚歸故林一首結束征車換黑貂灞西風雨正蕭蕭荗陵久病書千卷彭澤先歸酒一瓢帆背夕陽湓水闊棹經秋月甑山遙殷勤為謝南溪侶白首螢窗未見招內盆字元作秋字注改泛溪回寄道元上人一首南郭煙光異世間碧桃紅杏水潺潺猿來近嶺獼猴散魚下深潭翡翠間猶阻晚風停桂楫欲乘春月訪松關幾回䇿杖終難去洞口雲歸不見山留别裴秀才一首三獻無功玉有瑕更㩗書劎客天涯孤帆夜别瀟湘雨廣陌春期鄠杜花燈照水螢千點滅棹驚灘鴈一行斜關河迢遞秋風急望見鄉山不到家傷虞將軍一首白首從軍未有名近將孤劎到江城巴童戍久能番語代馬調多解漢行對雪夜窮黃石略望雲秋計黑山程可知身死家猶逺汴水東流無哭聲李定言自殿院銜命歸闕拜員外郎俄遷右史因寄一首白筆南征變二毛越山愁瘴海驚濤才歸龍尾含雞舌更立螭頭運毫閶闔欲開宫漏盡冕旒初坐御香髙吳中舊侶君先貴曾憶王祥與佩刀右唐郢州刺史許渾所書烏絲欄詩一百七十一篇真迹分上下凡二卷織組間錯辭格華古筆妙爛然見為三絶渾本丹陽人居丁卯澗豫再仕是邦每過其舊居遐攬雲山慨想清致未嘗不過車而式也安陽劉涇巨濟故與寶晉同時博雅尚古詩藏其家蓋與太沖序俱在祕笈第一物之數嘗剪一幅易與杜介又一幅在駙馬都尉王詵第書史具焉字法桞而不俗信乎其確論也豫家舊傳幅絹帖知其為晚唐詩嘉定癸未嵗客有自中都携來者始見首卷制作吻合序著五百餘篇合兩者才得六十五首冥搜踰年復得後一卷略計所存未及半豈猶有待耶然書史謂涇所藏止百篇又豈未盡覩耶度王杜之所分蓄固已具是矣劎津再合已煥龍文珠浦復還益彰蠙貢兩卷皆印紹興御璽又有一半印蓋唐詩之存而帝璽之信莫此若者贊曰玉􅙞詩府旌陽仙驂鸞翳鳯珊瑚鞭羽裳雲錦朝帝垣天鳯戛佩披琅玕瑶階十二琪樹連珠暉璧魄環非煙手挼碧蘂丹葩鮮崑閬七七爭芳妍翩焉來下探九淵攫頷驚起龍正眠茫茫塵劫今幾年北斗柄爛東海田袖中琲琲輝且圓琤淙落筆如流泉烏欄錦褾餘百篇獄寶上燭牛斗纒御題小璽今宛然已散復合庸非天鯨魚東去雲浪翻晴晝詄蕩開虎關紫金浮玉月滿川大招為賦乘槎騫崔逺送廣利詩帖楷書詩并序尾記共八行唐崔逺送廣利大師詩御書題籖送廣利大師歸江東楚山楓老楚江清笠挂髙帆浪注罌真往本無前後際葉舟誰問去來程忘機每與鷗為伴息念應憐月共明想見家山諸弟子盛誇新賜大師名中書侍郎平章事崔逺乾寧四年季夏二十九日書右唐乾寧宰相崔逺字昌之送廣利詩真迹一卷嘉定甲申九月贖之邵邸廣利師吾不知其為何如人方其江東之歸想見冥鴻將翔下避世網既遊時賢之門亦欲因決去之機以警在位者而盛誇新賜之名崔獨戀棧不念淪胥反將以腐鼠嚇之卑哉見也考之年表是嵗六月乙巳始拜中書侍郎而寫詩之月適同斯時汲汲持鳯池之名以衒鬻于緇徒之前益可羞矣卷首尾有小璽四御府印一宸奎題標目蓋書法之徑嘗動天鑒云贊曰唐而乾寧果何時作書及詩且恬以嬉淪胥之不知而拳拳于一緇吁其可悲寶真齋法書贊卷六
