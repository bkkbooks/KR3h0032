body:
  text: 寶真齋法書贊卷六宋岳珂撰唐名人真蹟唐許渾烏絲欄詩真蹟余丱嵗業詩長不知難雖志有所尚而才無可觀大中三年守監察御史抱疾不任朝謁堅乞東歸明年少間端居多暇因編集新舊五百篇置于几案聊用自適非求知之志也時庚午嵗三月十九日于丁夘澗村舍手寫此本内御史字係續添注登凌歊臺一首臺在當塗縣北五里宋髙祖所築宋祖凌歊樂未迴三千歌舞宿層臺湘潭雲盡暮山出巴蜀雪消春水來行殿有基荒薺合寢園無主野棠開百年應作萬年計巖上古碑空緑苔途經驪山一首聞説先皇醉碧桃日華浮動鬱金袍風隨玉輦笙歌迥雲捲珠簾劎佩髙鳯駕北歸山寂寂龍旗西幸水滔滔貴妃殁後巡遊少瓦落宫牆見野蒿咸陽西門城樓晩眺一首一上髙城萬里愁蒹葭楊栁似汀洲溪雲初起日沉閣南近磻溪西對慈福寺山雨欲來風滿樓鳥下綠蕪秦苑夕蝉鳴黄葉漢宫秋行人莫問前朝事渭水寒聲晝夜流送蕭處士歸緱氏别業一首醉斜鳥帽髪如絲曾看仙人一局棋賔舘有魚為客乆鄉書無鴈到家遲緱山住近吹笙廟湘水行逢鼓瑟祠今夜月明何處宿九嶷雲盡緑參差内鄉字元作象字注改山字元作氏字注改嶷字元作疑字從山添筆元日一首髙揭雞竿闢帝閽祥風微暖瑞雲屯千官共削奸臣迹萬國初銜聖主恩宫殿雪華齊紫閭闗河春色到青門華夷一軌人方㤗莫學論兵誤至尊金陵懷古一首玉樹歌愁王氣終景陽兵合畫樓空梧楸逺近千官塚禾黍髙低六代宫石燕拂雲晴亦雨江㹠吹浪夜還風英雄一去豪華盡惟有青山似洛中南海府罷南康阻淺行侶稍稍登陸而遇宴餞至頻暮宿東谿一首而遇二字元作至而頻字係注改晴灘水落漲虚沙灘去秦吳萬里斜馬上折殘江北栁舟中開盡嶺南花離歌漸怨如留客鄉夢初驚似别家山鳥一聲人未覺半牀春月在天涯聞開江相國宋公下世二首權門陰進奪移才駰騎如星墮峽來晁氏有恩忠作禍賈生無罪直為災貞魂誤向崇山殁冤氣疑從汨水迴畢竟功成何處是五湖雲月一帆開内忠字原係中字從心係添之筆月落清湘棹不喧玉盃瑶瑟奠蘋蘩誰令力制乗軒鶴自取機沈在檻猨位極乾坤三事貴謗興華夏一夫冤宵衣旰食明天子日伏青蒲不為言題汴河亭一首廣陵花盛帝東遊先劈洪河一𣲖流百二禁兵辭象闕三千宫女下龍舟凝雲鼓震星辰動拂浪旂開日月浮四海義師歸有道迷樓何異景楊樓登蒜山觀發軍一首羽檄徵兵急轅門選將雄蟲沙憂破竹貔虎極飛蓬定繫猖狂輩何煩矍鑠翁更探黄石畧重振黑山功别馬嘶營栁驚烏散井桐低星連寶劎殘月䕶雕弓浪曉戈鋋裹山晴鼓角中甲開魚照水旂颺虎挐風去想金河逺行知玉塞空漢庭應有問師律在元戎送前緱氏韋明府南遊一首酒闌横劍歌日暮望闗河道直去官早家貧為客多山昏函谷雨水落洞庭波莫盡逺遊意故園荒薜蘿題張司馬灞東郊園一首楚翁秦塞住昔事李輕車白社貧思橘青門老仰𤓰讀書三逕草沽酒一籬花更欲尋芝术商山便寄家内李輕車三字无係添注送張處士一首醼罷衆賔散長歌携一巵溪亭相送逺山郭獨歸遲風檻夕雲散月軒寒露滋病來雙鬢白不是别離時移攝太平寄前李明府一首病移巖邑稱閒身何處風光貰酒頻溪栁遶門彭澤令野花連洞武陵人嬌歌自駐壼中日艷舞長留海上春早晚髙臺更同醉緑蘿如帳草如茵晚自東郭迴留一二遊侶一首鄉心迢遞宦情微吏散尋幽竟落暉林下草腥巢鷺宿洞前雲濕雨龍歸鐘隨野艇迴孤棹鼓絶山城掩半扉今夜西齋好風月一瓢春酒莫相陵陽春日寄汝洛舊遊一首百年身世似飄蓬澤國移家田嶂中萬頃碧波魚戀釣九重青漢鶴愁籠西池水冷春巖雪南陌花香晚樹風縱倒芳樽心不醉故人今在洛城東將歸姑孰南樓餞送前李明府一首無處登臨不繫情一慿春酒醉髙城暫移羅綺見山色纔駐管絃聞水聲花落西亭添别恨栁陰南浦促歸程前期迢遞今宵月更倚朱欄待月明宣城開元寺贈元李上人二十韻一首一鉢事南宗僧儀稱病容曹溪花裏别蕭寺竹前逢燭影深寒殿經聲徹曙鐘欲齋簷睡鴿初定壁吟蛩詩繼休遺韻書傳永逸蹤藝多人譽冾機絶道情濃汲澗缾沈藻眠堦錫掛松雲鳴新放鶴池卧舊降龍露茗山厨焙霜秔野碓春梵文明處譯禅衲暖時縫層塔題應徧飛軒步不慵繡梁交薜荔畫井倒芙蓉翠户垂旂網朱牕列劎鋒寒飈金磬響晴雪玉樓重妙理三乗逹清才萬象供山髙横睥睨灘淺聚艨艟微靄蒼平楚殘暉淡逺峰林疎霜槭槭波靜月溶溶劎出因雷煥琴全遇蔡邕西方如有社支許合相從泛五雲溪一首此溪何處路遥問白髯翁佛廟千巖裏人家一島中魚傾荷葉露蝉噪栁林風急瀨鳴車軸微波漾釣筒石苔縈棹綠山果拂舟紅更就前村宿村橋與剡通津亭送張崔二侍御散北歸一首愛樹滿西津津亭墮泪頻素車應度洛珠履更歸秦水接三湘暮山通五嶺春傷離與懐舊明月白頭人韶州送竇司直北歸一首江曲山如畫貪程亦駐舟果隨巖狖落槎帶水禽流客散他鄉夜人歸故國秋樽前掛帆去風雨在西樓再遊越中傷朱慶餘恊律好直上人一首昔年湖上客留訪雪山翁王氏船猶在蕭家寺已空月髙花有露烟合水無風處處多遺韻何情入剡中寄題商山王隱士居一首近逢商洛客知爾住南塘草閣平春水柴門掩夕陽隨蜂収野蜜尋麝採生香更憶前年醉松花滿石牀留贈偃師主人一首孤城漏未殘徒侶拂征鞍洛北去愁逺淮南歸夢闌曉燈迴壁暗晴雪捲簾寒强盡主人酒出門行路難和祠部楊員外以僕射楊公拜官致仕舊府賔僚及禮部楊侍郎同年門生先輩合醼申賀座中飲後書事一首龍闕公卿拜後塵手持優詔掛朱輪從軍幕下三千客聞禮庭中七十人錦悵麗詞推北巷畫堂清樂掩南鄰豈同王謝山陰會空序流盃醉暮春序字係添注秋日候朝一首宵衣應待絶更籌環珮珊珊月下樓井轉轆轤千樹晚鏁開閶闔萬山秋龍旂盡列趨金殿雉扇纔分拜玉旒虚戴鐡冠無一事滄江歸去老漁舟内轤字元係添注經李倰殿中舊宅一首歸作儒翁出致君北山誰復有移文漢庭使氣摧張禹楚國懐憂送范雲楓葉暗時迷舊宅茅花髙處認荒墳朱絃一奏沈湘怨風起寒波日欲曛内起寒二字元作寒起係乙轉題靈山寺行堅師院一首西巖一逕不通樵八十持盂未覺遥龍在石潭聞夜雨鴈移沙渚見秋潮逕涵霧濕文多暗香印風吹字半消應笑南來又東去越山無路水迢迢嘗與故宋補闕次都秋夕遊永㤗寺後湖今復登賞愴然有感一首西風𣺌𣺌月連天同醉蘭舟未十年鵩鳥賦成人已殁嘉魚詩在世空傳榮枯盡寄浮雲外哀樂猶驚逝水前日暮長堤更迴首一聲鄰笛舊山川京口閒居寄兩都親友一首吳門煙月昔同遊楓葉蘆花並客舟聚散有期雲北去浮沈無計水東流一樽酒盡青山暮千里書迴碧樹秋何處相思不相見鳯城宫闕楚江樓卧疾一首寒牕燈盡月斜暉珮馬朝天獨掩扉清露已凋秦塞栁白雲應長越山薇病中送客難為别夢裏還家不當歸惟有寄書書未得卧聞燕鴈向南飛山行至雙巖溪訪元隱居隱居已榜舟詣開元寺水閣見送棹迴已暮因贈一首犬吠雙巖碧樹間主人朝出半開闗湯師閣上留書别杜叟橋邊載酒還櫟塢炭烟晴過嶺蓼村漁火夜移灣故鄉蕪没兵戈後慿向溪南買一山與韜鄭二秀才同舟東下洛中親朋送至景雲寺一首三十六峯同一川綠陂無路草芊芊牛羊晚食鋪平地鵝鸛晴飛摩逺天洛客盡迴臨水寺楚人皆逐下江船東西未有相逢日更把繁花共醉眠冬日登越王臺懐歸一首月沈高岫宿雲開萬里歸心獨上來河畔雪飛揚子宅海邊花盛越王臺瀧分桂嶺魚難過瘴近衡峯鴈卻迴鄉信漸稀人漸老只應頻醉北枝梅將赴京師津亭别蕭處士二首樽前萬里愁楚塞與皇州雲試瀟湘雨風知鄠杜秋潮平仍倚棹月上更登樓他日滄浪水漁歌更白頭津亭多别離楊栁半無枝住接猿啼處行逢鴈過時江風颺帆急山月下樓遲還就西齋寢煙波勞夢思經馬鎮西宅一首將軍乆已殁行客自興哀功業山長在繁華水不迴亂芹侵廢井荒菊上崩臺惟見軍中卒朝朝戲馬來早發壽安濟永濟渡一首東西車馬塵鞏洛與咸秦山月夜行客水烟朝渡人樹涼風浩浩灘淺石磷磷會待功名就扁舟寄此身寓居崇聖寺送客南歸一首野寺薛蘿晚官渠楊栁春歸心已無限更送洞庭人聞歌一首新秋絃管清時轉遏雲聲曲盡不知處月髙風滿城塞下一首夜戦桑乾雪秦兵半不歸朝來有鄉信猶自寄征衣晨裝一首帶月飯行侣西遊闗塞長晨鷄鳴逺戍宿鴈起寒塘雲卷四山雪風凝千樹霜誰家歌舞散沈醉卧蘭堂早别翛然上人一首吳僧誦經罷敗衲倚蒲團鐘韻花猶斂樓陰月向殘晴山開殿響秋水巻簾寒獨恨孤舟去千灘復萬灘早秋一首遥夜泛清瑟西風生翠羅殘螢委玉露早鴈拂銀河萬樹曉猶密逺山晴更多淮南一葉下自覺老烟波凌歊臺送韋秀才一首雲起層臺日未沈數村殘照半巖隂野蠶成蠒桑柘盡溪鳥引雛蒲稗深帆势依依投極浦鐘聲杳杳隔前林故山迢遞故人去一夜月明千里心送嶺南盧判官罷職歸華陰别墅一首曾事劉琨鴈塞空十年書劎任飄蓬東堂舊屈移山志南國新留煮海功還掛一帆青草上更開三逕碧蓮中闗西親友如相問已許滄浪伴釣翁贈蕭兵曹先輩一首廣陵隄上昔離居帆轉湘南萬里餘楚澤病時無鵬鳥越江歸處有鱸魚潮生水國蒹葭響雨過山村橘柚疎聞道携琴還載酒臨卭休羡馬相如南海府罷歸京口郊居途經大庾縣留贈張明府一首樓船旌斾極天涯一劎從軍兩鬢華迴日眼明河畔栁去時腸斷嶺頭花陶詩盡寫行過縣張賦初成夢到家官滿知君有歸處吳王臺殿舊烟霞村舍二首自剪青莎織雨衣村南烟火是柴扉萊妻早報蒸藜熟通子遥迎種豆歸魚下碧潭當鏡躍鳥還青嶂拂屏飛花時未免人來往欲買嚴光舊釣磯尚平多累自休難一日深居一日安山路有雲収獵網水亭無月掛漁竿花間酒氣春風逺竹裏棋聲夜雨寒三頃湖田秋更熟北牕誰拂舊塵冠將渡固城湖阻風夜泊水陽戍一首行盡清溪日已暮雲容山影水嵯峨樽前歸客怨秋夢樓上美人凝夜歌獨樹髙髙風勢急平湖𣺌𣺌月明多終期一艇載樵去來往使帆凌白波故洛城一首黍稷離離半野蒿昔人城此豈知勞水聲東去市朝變山勢北來宫殿髙鵶噪暮雲歸古堞鴈迷寒雨下空濠可憐緱嶺登仙子猶自吹笙醉碧桃題四皓廟一首桂花松暖廟門開獨㵼椒漿奠一盃秦法欲興鴻已去漢儲將廢鳯還來紫芝翳翳多青草白石蒼蒼半綠苔山下驛塵南竄路不知冠葢幾人迴出闗一首朝纓初解佐江濆麋鹿心知自有羣漢囿獵稀慵獻賦楚山耕早任移文卧歸漁浦月連海行沒塵埃花隔雲闗吏不行迎馬笑去時無意學終軍送從兄别駕歸蜀一首從兄彦昭與桂陽令韋伯逹貞元中俱為千牛伯逹官至楚王長史亦以藝文自任長慶初非罪受譴前年會赦復故秩詔未及而身已殁從兄自蜀而南發旅觀歸葬灞上既而西還因抒十韻貺别聞與湘南令童年侍玉墀家留秦塞曲官謫瘴溪湄道直奸臣屏冤深聖主知逝川東去疾霈澤北來遲青漢龍髯絶蒼山馬鬛移風凄聞笛處月慘罷琴時客路黄公廟鄉闗白帝祠已稱鸚鵡賦寧誦鶺鴒詩逺道書難逹長亭酒重持當慿蜀江水萬里寄相思内塞字鵡字係添注鬛字誦字係筆誤修改自洛東蘭若夜歸一首一衲老禪牀吾生半異鄉管絃愁裏醉書劍夢中忙烏急山初瞑蟬稀樹正凉又歸何處去塵路月蒼蒼行次潼闗驛一首紅葉晩蕭蕭長亭酒一瓢殘雲歸