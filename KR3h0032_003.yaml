body:
  text: 寶真齋法書贊卷三宋岳珂撰厯代帝王帖高宗皇帝諸門手札御書行書兩行外封半行自來日諸門可依舊更不搜檢御押右高宗皇帝御書諸門手札真蹟一卷以何内侍邵某葢當時職内省者寶慶乙酉歲五月于行都得之贊曰臣嘗于親隨帖妄陳蠡測謂推心置人腹本帝盛徳而檜實乗間肆其䜛慝今是帖之得其見于宫掖且如此益以知臣之説非出于胷臆也高宗皇帝蹙龍手札御書草書三紙第一紙三行第二紙六行第三紙三行聖人蹙龍貴妃蹙芙蓉紅大領造玉小娘子繫頭舌兒十副翠像生花頭兒艾虎寳堦穿珠子五十條紅粉紗半領末利素馨含笑荷花造一條雲月勤頭兒要配早來冠兒娘子底案前標題注三紙各有行數此牽連接書兼有脱誤遂不復可分今仍舊右高宗皇帝御書蹙龍手札三幅真蹟一卷臣將指江東與帳属臣趙崇豆為僚趙故濮邸近親其先臣諸王所藏天上遺蹟頗富是葢一嚬笑舉動之微而不失其正蟬蜎蠖濩之中聖徳其益可攷也得以嘉定庚辰十二月贊曰辛伯有言並后亂本惟聖齊家知益知損臣得此書反其三隅一卷之藏于昭宸謨高宗皇帝問命手札御書行書三行後一行草書陽丙戌丁酉戊子甲寅令和尚看子細寫來右高宗皇帝御書問命手札真蹟一卷紹興間有僧某以談命稱詔舘近璫家此幅葢宸札所問也臣得是帖與蹙龍帖同時崇豆謂臣曰是葢宗藩之從北狩者上心所念頻以諮詢帖藏趙氏宫邸所付受葢有源流云贊曰造命本不言命既拳拳于温凊復馳念于宗姓此葢起白雲之思而負羈靮者亦得以預于攷訂也高宗皇帝索藥手札御書草書二行今日出爐藥要二三錢不湏圓只今便要右高宗皇帝御書索藥手札真蹟一卷臣舊聞御醫曾良器為臣言帝以建炎御龍舟衝海氛因垂意藥石事侍醫效方技者率㫁以淵裁徃徃高盧華之上在北宫砂乙丹經品配節度尤妙得古意故能躬備五福壽軼三宗是帖以嘉定戊辰五月得之良器乃其家世所被受者贊曰道之真以治身帝其知之矣此治身之餘事也而垂意若此高五帝之壽開八荒之域有以也哉高宗皇帝御筆臨吳皇象如鷹帖草書六行文武將隊乃俾後臣慗我皇綱董此不䖍古君子即戎忘身昭其果毅尚其桓桓師尚七十氣冠三軍詩人作歌如鷹如鸇天有㤗一五將三門地右高宗皇帝御筆臨呉侍中青州刺史皇象字休明如鷹帖真蹟一卷有徳壽一印紹熙辛亥歲吳琚以敷文閣待制帥襄陽還以徳壽臨帖六遺先臣葢北宫燕閒以書法為事故左畹均得之贊曰書法淳古遡晉而上于上品中則有皇象漢歌大風思士之壯帝臨此書獵渭懐望于昭詒謀倚重惟將豈象之臨亦意之尚高宗皇帝御筆臨晉劉超如命帖行書三行超死罪白如命皆令有本末保任然後受隨宜分處謹白右高宗皇帝御筆臨晉衛尉零陵忠侯劉超字世瑜如命帖真蹟一卷帖出秘閣今書與閣本殆不别葢益以見天筆之妙本出吳琚家與皇象帖同得有徳壽一印贊曰臨字與宸筆平時者皆不同筆以倣而工手追遺蹤是謂天通高宗皇帝御筆臨晉劉惔思慕帖草書五行近不成面苦後今日思慕兼摧信不自勝奈何奈何旦便寒知足下昨大頓耿耿吾其悴力重何悉右高宗皇帝御筆臨晉丹陽尹劉惔字真長思慕帖真蹟一卷唐檢校刑部員外郎竇泉述書賦之稱惔有曰輕浮森峭穠媚藻媷落衆木于秋杪狎羣鷗于水曲又注其下曰今見具姓名行書及草各一帖六行葢詳且實矣今所臨及草書五行豈又别一帖出于泉之所未見耶帖之得與衛恒帖同時贊曰惔對桓論人物嘗自稱為第一大流其筆法故應有可求者矣然帖傳于至徳而所覩甚鮮刻彙于淳化而復不見収今觀天筆之所臨然後知江海之合衆流也高宗皇帝御筆臨晉衛恒徃來帖草書三行徳壽臨衛恒徃來帖御筆題籖往來者傳卿氣力故佳甚以慰思無但有信示問右高宗皇帝御書臨晉長水校尉衛恒字臣山徃來帖真蹟一卷按張懐瓘書㫁恒草書入妙隸入能衛夫人乃其從女固宜其不凡也臣從向氏得唐摹此帖葢徽猷閣直學士臣子諲䝉上賜者既贊之矣後十二年乙酉嵗六月得此于中都太府寺丞韓松家有奎筆標其首又有二印贊曰臣得此帖與舊京帖皆備其二或贊其字或贊其意俱為寶真之秘高宗皇帝御臨王羲之鄉里帖草書五行晉王羲之鄉里帖御筆題籖近因鄉里人書想憂知故靣惟耿耿今差否吾以日食意如差而髀中故不差以此為憂患憂不可以方力數字令弟如聞耳唐太宗評羲之書如蛇蠖若此䓁者皆是葢羲之為悟法書鵝頸之間故轉折與蛇蠖相似縈紆委曲不止筆法抑有腕法存焉楷書五行右高宗皇帝御筆臨晉王羲之鄉里帖真蹟一卷御書筆法于後有龍印三前有奎標初賜敷文閣直學士米友仁後流落人間嘉㤗甲子十二月臣如中都就試南宫道士劉元綱以遺臣云得之米氏之甥某贊曰昔鍾繇少隨劉勝入抱犢山學書後與曹操耶鄲淳韋誕孫子荆等議用筆繇乃求蔡邕筆法于韋誕誕靳固不與乃坐自搥胸嘔血操以五靈丹救之得活乃誕死繇知有人掘其墓遂得之由此繇筆法更妙嗟乎繇知有筆法耳安知天縱之悟又有進于是耶以死求之而不悔又安知人文之機必待聖人而闈其秘耶使繇復生于今臣知其必不徒死者矣高宗皇帝御筆臨王羲之小差帖草書三行王羲之小差帖大都食小差數便自痢政由不消化故右高宗皇帝御筆臨王羲之小差帖真蹟一卷有御書題籖思陵臨帖多識以龍印此亦吳琚遺先臣者贊曰臨帖出于游藝必有以觀筆意應龍之驤兮聊以為識高宗皇帝御筆臨王羲之嘉興帖草書四行青陵本逺得嘉興書計今日必渡喜慰可言足下憂慰今有書想足下有百信别告具之右高宗皇帝御筆臨晉王羲之嘉興帖真蹟一卷臣嘉定戊寅歲待罪右扶風得此帖與陳逵帖同時贊曰十章之在天意似而神全臣剖嘉興之符而乃得此書信非偶意原本然高宗皇帝御筆臨王操之舊京帖行書四行王操之書御書題籖十月十七日州民王操之頓首頓首舊京先墓毁動聞問傷惻痛不可言未得疎慰白牋不備操之再拜右高宗皇帝御筆臨晉侍中尚書豫章太守王操之字子重舊京帖真蹟一卷有御書題籖臣嘗于贊此帖繫于三王法書門葢以八陵北望之拳拳具寫聖意是時葢俄度爾紹定改元正月客有知臣好帖者得此札于中都貴璫家以遺臣問知故璫葢給事北宫者頤神大庭兼忘天下而未能忘此于宸藻游戲之間臣以是知俄度之不誣而天地大義古今盛心降衷秉彛若聖與愚俱無二本卷尾有徳壽小璽申繹窺管以對在天贊曰建炎之初國步方傾維先臣飛實從閭勍勍之使葢以保䕶陵寢名後紹興中北人來盟首命先臣袛謁八陵權臣沮之託于撫循抗疏再請卒尼于行觀君臣之用心未嘗一日忘北望而畫地者則指以為鴻毛之輕迨天臨于北宮澹百慮其弗攖雖四海之坐忘友無懐與大庭獨是拳拳猶託斯帖以寄情臣是以知臣之俄度足以對在天之靈參繹遺志瞻懐舊京如連璧竭忠于宗澤據山齎恨于翟興迨先臣之秉鉞始得以快孟邦傑一戰之復而廪廪乎間穟投機之成既主議之堅決悵遂隔于薦馨猶不卹掁觸之害事力出睿㫁而命巫伋祈請以抗旌于昭此心葢望乎九世而下或繼乎遹駿之聲臣是以覽斯卷而重之以涕泗之零也高宗皇帝御筆臨陳逵十二月帖草書三行青綾本十二月廿五日逵白嵗終感慘寒切足下何如遣不悉陳逵右高宗皇帝御筆臨陳逵十二月帖綾本真蹟一卷上著一印臣得之與嘉興帖同時贊曰陳逵書法見淳化閣帖肆筆所及彼固安能窺造化之工心摹手追意者或同雲章煒煌識者固知其出于淳熙之北宮也高宗皇帝御筆臨古法帖鶻等帖草書三行絹本鶻等不佳都令人弊見此輩吾衰老不復堪此右高宗皇帝御筆臨古法帖鶻等帖真蹟一卷帖故絹書有一印與嘉興帖同得而其書則攷之帖家皆未之見故歸之古帖云贊曰唐太宗収貞觀法書大王之草至三千紙率以一丈二尺為卷其富如此今帖所臨豈其一耶雖不録于秘閣而其為晉神品昭昭矣孰攷真蹟謹俟博識高宗皇帝御筆臨古法帖四皓帖草書四行往事不可迢足下道高意逺獨步當時此乃南山四皓之儔也賜王思恭右高宗皇帝御筆臨古法帖四皓帖真蹟一卷帖後書賜王思恭有一印不知其為何人嘉定丙子三月臣在農寺以三萬錢得之贊曰肆筆染楮惟四皓是取觀帝之心豈嘗一日忘萬世慮耶此付託之聖獨㫁所以開帝堯而窺伺之姧天下所以咎林甫也高宗皇帝御批樞密院綱馬奏劄劄子吏書七行趙鼎等書名後有御批兩行都大提舉茶馬司差使臣任敞管押第十四綱馬五十匹除沿路寄留倒斃外見在三十匹右謹具進入取進止十二月十三日臣檜臣鼎劄子馬皆不堪披帶付張俊右高宗皇帝御批樞密院綱馬奏劄真蹟一卷劄内著臣檜臣鼎名葢同時在西府嘉定丙子十一月得之中都葢忠簡被檜禍因散落人間云贊曰駔駿之用繫于國微必親也輔弼之用本乎兵有此二臣也傳亦有言十年之臭蕕勝薰也聖明如天所以終察乎君子之與小人也高宗皇帝御批鄭仲熊奏劄帖劄子一十四行御批三行臣近嘗累具劄子并靣奏陳乞解罷本職事差臣一在外宫觀再三之瀆方俯伏俟罪廼䝉聖恩特降詔㫖跪讀以還感極涕零伏念臣疏逺小吏誤被選掄驟登華要遂贊樞庭非常之遇捐驅曷報而臣坐縻厚廪禍過災生雖覆載函容之賜未即誅戮然自惟么麽疾戾寖加豈容貪啚伏望􅌖慈早賜處分上以全君父之恩下以安愚臣之分取進止六月日端明殿學士左朝奉即簽書樞密院事兼權參知政事臣鄭仲熊鄭仲熊除提舉在外宫觀任便居住職名仍舊放謝辭右高宗皇帝御批鄭仲熊奏劄真蹟一卷建康有市買卒顧某者故為秦氏門隸目不别書偶臣卧疾市藥輒以廢紙裹藥材至即此劄也臣見而驚之函介而求之如他所得諸帖多其所致嗚呼神毫雲藻軼于棄擲臣不得而見者可勝詫哉贊曰奎文在天河洛之祥彼稔惡者乃不能謹其藏如大臣之奏章市卒得以持藥石而代頃筐蠢彼膏粱固不當責之以敬王也孝宗皇帝杜甫夜宴左氏莊詩御書絹本草書九行風林纖月落衣露淨琴張暗水流花逕春星帶草堂檢書燒燭短看劍引杯長詩罷聞吳詠扁舟意不忘右孝宗哲文皇帝御書杜甫夜宴左氏莊詩真蹟一卷惟紹興淳熙天葩􅌖藻敷瑞慶霄帝王羲獻萬古一遇方選得清閒之燕從容游藝超妙入神所以絜媺縑緗垂情風雅實與復古奎章相為表裏雙龍驤動璽識俱存肆筆所形盤拏交峙煜煜詩星于耒之陽昭回餘光于焉增耀芒寒色正迨今猶可覩也臣生雖晚在紹熙庚戌嵗侍先臣來輦下尚及望步輦之塵感慨鴻恩未知美報嘉定甲申王正之月始獲是蹟于前揚州錄事臣趙師雩顧懐隕涕敢怠毖嚴宸章之藏豈獨私寳尚欲俾子孫世世知持䕶敬仰以無忘阜陵之思兹惟下臣之志爰繫斯贊用旌厥衷贊曰帝淳熙兮重華燦璧跗兮秀荂根六藝兮正以葩蔽一言兮思無邪噫後人兮誰耶有臣甫兮不浮以夸窮不詘兮之死靡他志不忘君兮于天之涯九淵兮鯨牙洶怒兮奔拏閲三百年兮鼓吹羣蛙皦如英韶兮屏滛斥哇搴月兮汎靈槎登鈞天兮㤗皇家御墨兮驚鴉十行兮整斜紫電兮丹霞因風兮塵沙臣有扁舟兮狀筆竈茶願託寶墨兮水雲蒹葭光清夢兮隨鑾車臣身江湖兮臣心不遐孝宗皇帝杜甫萬丈潭詩御書朱界行紙楷書十三行青溪合冥寞神物有顯晦龍依積水蟠窟壓萬丈内跼步凌垠堮側身下煙靄前臨洪濤寛卻立蒼石大山危一徑盡岸絶兩壁對削成根虚無倒影垂澹瀩墨如灣環底清見光彩碎孤雲倒來深飛鳥不在外高蘿成帷幄寒木疊旌斾逺川曲通流嵌竇潜洩瀬造幽無人境發興自我輩告歸遺恨多將老斯遊最閉藏修鱗蟄出入巨石礙何當炎天過快意風雨會右孝宗皇帝御書杜甫萬丈潭詩真蹟一卷詩史之名乆簡帝心臣固贊之矣今帖又出宸筆益見蜵蜎燕閒葢無日而不惟甫是嗜洩字下脱一瀨字實肆筆之誤尾有御書寳章二寳嘉定乙酉嵗十月得之中都贊曰于戲中興駐蹕東南江沱之安匪帝所堪飈起霆驅沛澤以甘慰于望霓意則可探念昔臣甫賦萬丈潭謂彼應龍潜雺隱嵐豈嵌竇是即豈泉石是耽救民一心大造實參方陽初驕民憂未惔彼界此疆飲瓢粟甔遵養必時畢毓畢涵亦既太甚炎威孔燂播奏之艱口口孰餤必其來蘇以溉以覃帝惟明習詎不我諳升自天衢時乗其驂視此沸鑪而忍弗戡維寧親是先匪樂之酣維復讎是懐匪垢之含鬰鬱久居若古有談毋功之幸成而徳之或慙臣謂此心久居若古有談毋功之幸成而徳之或慙臣謂此心與天地三龍變難諶龍髯已毿心畫之昭賁于寶函孝宗皇帝御製春詞御書草書題一行詞五行尾記一行和志忠阮郎歸留連春意晚花稠雲疎雨未収新荷池靣葉齊抽凉天醉碧樓能逹理有何愁心寛萬事休人生還似水中漚金樽盡更酬選徳殿作右孝宗皇帝御書御製春詞真蹟一卷賜近檔趙志忠在乾道間趙氏之孫不能保臣以嘉定乙亥八月得之都下贊曰春賦之作八荒是同掞詞寄情則其餘功徳異玩人理存觀妙臣藏其真以見電笑孝宗皇帝古體詩二篇御書行書十四行後批一行職事煩填委文墨分消散馳翰未暇食日昃不知晏沈迷簿書領囘囘自昏亂釋此出西城登高且遊觀方塘含白水中有鳬與鴈安得肅肅羽從爾游波瀾志士惜日短愁人知夜長攝衣步前庭仰觀南鴈翔景隨形運流響歸空房清風何飄飄微月出西方繁星依青天列宿自成行蝉鳴高樹間野鳥號東廂纖雲時髣髴渥露沾我裳良時無停景北斗忽低昂常恐寒節至凝氣結為霜落葉隨風摧一絶如流光賜志忠右孝宗皇帝御書古體詩二篇真蹟一卷上著御書一印詩闕一字葢避廟諱所以尊祖也肆筆適情不敢暇逸所以檢身也璫輩從容禁籞使之咸識書法所以示好也因書以賜用奬勤恪所以馭幸也書法賜趙志忠得之與春詞同時贊曰閔勞序情三百篇之所由作是雖後世之詩聖意亦于此乎有託肅羽波瀾霑裳露渥臣方有志于昔日又嘆簿書之如昨攝衣前庭猶得以望奎星于碧落也孝宗皇帝李廣事御書楷書十行李廣與望氣王朔語曰自漢征匈奴廣未嘗不在其中而諸將校尉已下材能不及中人以軍功取侯者數十人廣不為後人然終無尺寸功以得封邑者何也豈吾相不當侯耶朔曰將軍自念豈嘗有恨者乎廣曰吾為隴西守羗嘗反吾誘降者八百餘人詐而同日殺之至今恨獨此耳朔曰禍莫大于殺已降此乃將軍所以不得侯者也右孝宗皇帝御書李廣事真蹟一卷帝以世讎未復垂意中原肆筆所形多及將帥事是書之作葢神武不殺之本心而舞干格苖之大略示已然之戒圖方來之功固非苟然而作也臣以嘉定丙戌十月託士友得之中都貴璫家贊曰臣側聞昌陵之御宇也嘗幸武成王廟指白起像慨然謂殺降為不武以杖畫去後二百載神孫纂緒肆筆之書乃及于李廣王朔之語以侯封不可以忘取其所好惡葢脗合乎皇祖然則論帝王之蹟固若有守文創業之異而其􅌖知不殺之仁則未始不重規而疊矩也孝宗皇帝柑橘詩扇靣御書楷書四行碧玉枝柯柑橘林開花結子未成金何當爛熟經霜露更約提壼一訪尋右孝宗皇帝御書柑橘詩扇靣真蹟一卷上有壽皇書寶葢北宮肆筆也寶慶丁亥嵗十一月得之京口贊曰寓興而書託物而吟是豈惟有感乎嵗時培植之難葢亦可見乎天地生成之心也孝宗皇帝古詩聫御書楷書兩行風回蕙帳爐烟裊日到松牕硯水清右孝宗皇帝御書古詩聫真蹟一卷淳熙間先臣在朝列得于璽識之流傳者不復知所付受贊曰昔世宗之雄材大畧而招申公以加璧光武之廟謨雄斷而得嚴光于潄流豈羣賢彚征之盛朝而猶必加意于隱逸之求惟帝盛心並蓄兼収故當雲起龍驤之秋雖一肆筆之間未嘗忘夫裹蒲輪而訪羊裘也光宗皇帝夏竦雙頭牡丹賦御書楷書二十二行雙頭牡丹賦維五行之嘉秀鍾百卉以流形伊牡丹之淑豔寔造化之鴻英雜五色以交麗間千葉以敷榮結紫心而函實散黄蘂以傳馨幹扶疎而四擢枝綽約以相承乆潜芳于藥錄肆闕載于幽經首春華而擅美冠花品以騰名何分叢于帝圃遂得地于殊庭蔭琪株之璀璨藉瑶草之葱青潤五雲之滋液對六羽之威靈吐雙葩而並發效神貺以潜呈紅粉敷而接蕚翠香裊以聫莖較穠纖而不異等高下以無傾若霞裳之對舉類鳯羽之偕升表兩宫之􅌖聖共一徳以隆興實詒謀之燕翼固道䕃之彰明願書芳于信史永傳美于千齡右光宗温文皇帝御書夏竦雙頭牡丹賦真蹟一卷臣嘗逮事紹熙聞之長老言癸丑之春三月金輿黄繖聫幸天籞于時五殿均驩層闈曼祉重暉逮于四世累洽同乎萬方一豫一游載色載笑綵衣龍衮輝動玉巵傳聞是日聚景上池以雙頭瑞牡丹進上捧觴再拜上千萬嵗壽三宫歡愉俯為一釂孝治光華之盛冠軼史牒民到于今稱之臣以嘉㤗壬戌冬再入都偶閲帖于奉寧節度臣李孝友家恭睹是賦問知源委葢當時因有斯瑞肆筆擇前代之作而有是書拜手敬觀求而襲藏以侈下國賦幷題凡二百二十一字贊曰聖孝動天瑞則應之帝開紹熙天實命之三宫燕娛爱且敬之禁籞翠華時聫幸之萬葩其春綵服映之玉色怡愉霞巵醟之豈樂行都民物盛之乾坤同歡康衢咏之于牣靈沼魚鳥泳之天光下臨邦家慶之煌煌牡丹竒産並之帝王稱觴親捧迎之巍巍太皇萬壽稱之一徳隆興聖益聖之維太平臣嘗比興之國英竦名夏則姓之穠纖艷殊美則評之仁皇之祥今亦訂之堯父舜子本天性之寵樓鷄鳴乆温凊之晦明節宣臣或諍之瑜瑕未昭事則鏡之宸毫所傳神具聼之後三十年臣則勝之金匱名山尚克證之光宗皇帝杜甫詩聫御書草書兩行鵝兒黄似酒對酒愛新鵝右光宗皇帝御書杜甫詩聫真蹟一卷卷上著御書印臣㓜嘗望睟容于清蹕間天威凛然如嚴霜晶明萬彚澂肅今竊窺筆法神心中運發為奎畫殆近之矣是帖得之朝議大夫直秘閣韓松嘉定甲戌十月時簿正外府云贊曰法書家作字以戈發為先唐太宗嘗病其難工使虞世南足而全之矣淳化刊秘閣帖凡二王之書皆雜見戈體而其中鵝字獨翩翩其欲仙今葢可騐于舊帖之傳臣按此詩雖止一聫首尾凡兩鵝字肆筆之妙其亦兼取乎正與權耶先以示宸藻之自然後之倣法書之已然草不失聖行不失妍臣故曰帝之書純乎天光宗皇帝待月詩御書草書兩行入夜跏趺多待月移時箕踞為看山苔生晚片應知靜雪動秋根會見閒瘦鶴獨隨行藥後高僧相對試茶間疏篁百本松千尺莫怪頻頻此往還右光宗皇帝御書待月詩一篇真蹟一卷嘉定戊辰五月臣在九江得于太守韓松松故慈懿后家姻聫故多藏帝翰卷末有御璽一贊曰疏篁陰陰長松矯矯苔靜雲閒山清月皎樂以心㑹興因天隨以詩觀詩是謂管窺寧宗皇帝詩卷耳篇御書楷書十三行卷耳后妃之志也又當輔佐君子求賢審官知臣下之勤勞内有進賢之志而無險詖私謁之心朝夕思念至于憂勤也采采卷耳不盈頃筐嗟我懐人窴彼周行陟彼崔嵬我馬虺隤我姑酌彼金罍惟以不永懐陟彼高岡我馬𤣥黄我姑酌彼兕觥維以不永傷陟彼砠矣我馬瘏矣我僕痡矣云何吁矣卷耳四章章四句右寜宗仁文皇帝御書毛詩卷耳篇真蹟一卷臣概彚羣帖冠以列聖宸章竊伏維念自嘉定初綴名拱著出入玉墀下踰十有五年幸獲備九卿將明指鼎成之嵗奔走原隰獨不得旅臣民以望白雲有遺痛焉攀髯之餘竊欲訪遺珠以慰赤水之思爰從神都肇獲宸筆側聞在宥天下時萬幾之暇留心翰墨侍臣正講隨輒自課六藝數萬言並入宸藻表以歳陽之璽申以御墨之篆以紀次序流傳人間隨寓寶毖今他篇不復見矣驪淵既探明月獨抱荆山下盼虹氣騰空雋永天府一臠之珍率舞充庭九奏之盛是雖未窮王府之大觀而亦足以儷昭回而想餘光也況臣逮事敢忘葵傾敬陳刻槧之微以寓烏號之慕號紀寶慶時登仲秋寶函東來贖之陳氏贊曰偉王人之典學本天縱之多能續六藝之絶業環諸儒而講明璧跗蔚其流芳瓊字煥其騰英居蠖濩而儲精炳龜龍而效靈嵗嘉定之辛巳厯九閏而時乗旦孜孜而忘倦志兢兢而靡矜詩三百有五篇沃帝心而日聆儼露門之未竟已雲章之滿贏繄是詩之四章首二南而儀刑凡家齊而國治本大學之為經自求賢而審官見濟濟之以寧越染翰之雖同兹注意之實形昔徳壽之在御嘗史漢之留情傳復古之竒蹟亦流輝于古荆有詞臣曰萬里亟再拜而震驚謂縫掖之所難而帝王之躬行今寳章之誕賁知祖武之克䋲殆家法之相似聫自檢于宫庭𦕈周行之下走方虺隤而于征竦昭回之景光愧抱槧之餘生覽盈咫之昭華想繹純于九成得猗那而藏焉尚廟瑟之遺聲寶真齋法書贊卷三
