body:
  text: 寶真齋法書贊卷二十六宋岳珂撰宋名人真蹟李子至禀議帖案此帖行數原本缺若川近赴都督府禀議往來經月疎拜記府之問方深悚懼特被誨墨仰認謙眷之厚下情不勝感刻敵中多事報契丹復盛金人族中有立者且旱蝗大作前日報敵帥被殺繼聞乃副元帥中箭又云已死然皆未有端的宿州之舉敵皆騎兵我合用歩卒以勁弩尅敵弓制之乃專用馬軍彼衆我寡彼强我弱十四日之戰敵援未集我雖勝而馬軍傷中者已大半此一失也破城之後當傾府庫以犒將士振旅而歸以成全功乃占吝所獲恬不知退坐待其援兵之至此二失也敵援雖至若早入城堅壁不戰以逸待勞至如劉錡在順昌時亦可成功不知出此以致二十日二十一日之挫此三失也二十三日入城不待敵兵之解門小兵衆自成蹂踐壕外之兵為敵所乘此四失也既議班師合先約束不得遺棄器甲以備追襲更無隊伍紛亂而歸此五失也有此五失宜其成功而敗今大軍所損不及二分喪馬雖多亦不多半棄甲尚可添造猶為莫大之幸也使敵有謀詐為敗衂引我直至南京以兵斷其後路或不于宿州城下交鋒但立兩硬寨于濠泗歸路為之奈何今日思之猶不免寒心此皆不審彼已失于輕敵所致也今日之事尤宜以守禦為先守禦之䇿無如以重兵屯江上以固根本輕兵屯淮南以為藩籬淮東以水為形勢淮西以山為形勢可以壅水即壅以浸其地餘皆清野以軍官同民兵各據形勢堅壁為守敵冦之來勿輕與戰但斷其粮道刧其營寨使不得久住或敵冦大入力不可禦遏即渡江共為固守今防秋在近宜速定其議内外協力措置捨此恐别無此良䇿也措置已定根本已固如敵人衰弱以機會可乘亦不害于恢復如敵中多故復欲尋盟亦不害於講和若用區區愚見素守此論因以用兵昨日得盱眙探報謹禀封呈伏冀台照右謹具呈六月日右朝請大夫户部尚書郎中總領淮西江東軍馬錢粮李若水劄子右乾道户部侍郎李公若水字子稟議論帖真蹟一卷帖葢出于隆興符離退師之時予在京口與公從子權為寮因求得之實寶慶元年之八月贊曰金本世讎固當厲不共戴天之義遼本與國亦可同仇而互倚中原尺寸之壤皆天之所以全畀又不應不效前人之堅守而輕于棄是三説者固無可議然以予攷之其時則隆淳之間事體大與紹興異如帖中語固謂之失䇿而亦出于勢之必至也昔漢之席卷本肇于從東歸之士燕之復振葢猶有垂寶令麟之徒以為子弟本朝順昌之力守亦歲月之未深而人心戴漢有死無二既歴三十年矣則居者已安而無歸意誰復有敢為之氣亡者燼滅而不復熾彷徨故臣凋落宗裔亦何以為之地懐慕者既已閲世而遺黎之習已成其族類城壁雖不改于昔而所與共守者皆岌然而不可恃又安得以前日為比先生出師之議曰大遼有可立之形金人有破滅之理葢以及時經理為社稷無窮之計其在朱仙鎮去京師四十五里拳拳忠憤一日百啟亦必曰此正陛下中興之時金人滅亡之㑹又以欲弭後患惟在于乘勢於虖投機者間不容穟政使能者亦不能違時以致利而顯忠輩又何可求其備春秋之法責在于帥予意魏公之心亦懼其愈久愈忘而為是萬一之覬予故于此帖重惜先王之機而竊哀魏公之志也張安國書簡帖十帖並行書第一帖十一行第二第四第六第七帖各八行内第四第六帖各尾批二行第三第八第十帖各十二行第五帖九行第九帖十三行孝祥伏以秋令告中伏惟都運顯謨右司持要尊兄玉節在途台候動止萬福孝祥罪戾之迹又蒙罷免得還共子職實大芘之自政逺瞻承伏乞為時珍䕶亟膺禁宻之除右謹具呈八月日左朝奉郎充集英殿修撰賜紫金魚袋張孝祥剳子孝祥惶恐拜問台眷上下均有休祥令嗣皆在侍傍否老親久託大芘知感得四月問書久不聞安耗矣江東委令惟一一垂示孝祥惶恐拜問孝祥比奉還教極荷至意不勝感激春物已半伏惟台候萬福孝祥極欲一至府下孤危多畏欲發復止懇辭不獲今不免盡室泝江以行連年道塗吁可厭也買紙極荷篤念糧法如此足矣告為併手甚幸非理作煩惶恐死罪臨行别遣狀右謹具呈若虚總管御帶承宣台座二月二十三日左朝奉即充集英殿修撰張孝祥剳子孝祥再拜上問台眷上下均有休祥老親蒙問多感常收安問也過郡齋切為致千萬意亦作書告别矣妙鮓已領殊荷分甘湖湘間有委示及孝祥再拜上問恐有箆刀子佳者告求一副無即已之惶恐惶恐孝祥在池口具書託利君行後附郡中人必已逹即日不審尊候何如孝祥至九江累日以俟劉樞到小留奉近況極感告再四致問葉文極恨不一見也扁牓非所惜當託六哥帶行藥方先遣去餘俟後信四月二十二日孝祥頓首徳初宣教大哥座下孝祥惶恐再拜台眷上下均介休祉劉樞昨日得報約至九江相見當是舟行耳徳初幸得一見即還侍傍極悤悤也不知可蹔令至九江否孝祥至決須作五七日留耳孝祥惶恐再拜舟中不辦視所貺為報忽過孝祥伏蒙垂諭魏監謹悉台意渠但欲出門下淹速不敢計也未行尚圖再詣右謹具呈府判朝議台席十二月日左通直即提舉江州太平興國宫張孝祥剳子孝祥列郡地卑公府禮絶雖縁雅舊難躐等威不謂至仁尚記孤官下教収恤敷䕃庇庥飭誨載勤噢咻無量展刷摧羽不復驚弦封殖陳荄更俟吹律冀保危蹤不任叩叩之至右謹且呈承議即充敷文閣待制知靜江軍府事張孝祥剳子孝祥惶恐慶禮已右具啟比獻嵗以來履道何似惟天佑元弼壽日升而徳山立也孝祥逺守節符以大芘所洎幸脱罪尤然塵垢冠巾未得一侍几杖為恨心馳門下何日可忘右謹具呈承議即充敷文閣待制知靜江軍府事張孝祥剳子孝祥頓首比聞體候就平不勝欣慰況秋氣乘肅必于眠飯易為調適欲日夕間一詣齋坐祇欵未審可否公酎六器備飲劑之用幸留納右謹具呈承議郎充敷文閣待制知静江軍府事張孝祥剳子右乾道敷文閣待制于湖居士張公孝祥字安國書簡帖十幅真蹟一卷紹熙乙卯同舍沈聲甫以曬書節出諸法書徳化邑治中漪嵐堂下以前兩幅授予葢其祖詹事樞持要所藏書尺後八帖雜得之諸好事家不復編繫嵗月思陵嘗因進對見公奏疏玉音諭公曰稍進乎此便可名世觀公合作處骨力固已軒軒如鯤擊鵬運葢一日九萬未可量也公則仙矣故其可賭者止于是贊曰漢輕法言耳目所忽予藏于湖亦近世物氣並華劍烈同段笏匪尚其容亦尚其骨張國安寫坡詩帖楷書五行西湖處士骨應槁只有此詩君壓倒東坡先生心已灰為愛君詩被花惱多情立馬待黄昏殘雪消遲月出早江頭千樹春欲暗竹外一枝斜更好孤山山下醉眠處㸃綴裙腰紛不掃萬里春隨逺客來十年花送佳人老去年花開我已病今年對花還草草不知風雨卷春歸収拾餘香還畀昊右張安國書東坡和秦太虚梅詩帖真蹟一卷紹定戊子二月得之京江于湖少小楷今帖視他書特為遒婉可觀贊曰玉妃粲粲怯詩痩秦艶蘇腴畧先後于湖筆力並竒秀手執遺篇欲三嗅張安國東坡三養行書九行東坡居士自今日已往飲食不過一飲一啄有尊客盛饌則三之可損不可増有召我者豫以此告至人不從而過是乃止一曰安分以養福二曰寛胃以養氣三曰省費以養財元符三年正月七日于湖居士右張安國東坡三養帖真蹟一卷安國字法多竒而此帖尤勁挺以之書知德之言垂世之訓稱矣帖亦沈聲甫所遺葢後秋中二帖十四年云贊曰在易之頤飲食以節推而廣之有是三説蒸壺發羃衰髪滿幘機赤乳白未死神泣萬金之璧䕶一蟻缺彼過分者于我何得昔傳者詩今見者帖昔以事戒今以理悦吁嗟先生何學非易稱此翰墨是謂知徳陳正獻權攝帖楷書十二行俊卿悚息啟别忽嵗晩良以悁企辱惠書審寒甚履用佳福承有分教宗邸之命懽慶缺尚幾時與見任人為代耶俊卿碌碌且滿嵗來春力丏投間少休疲􅚿耳下諭教官闕已差詹令權旬日矣續有攝闕當即奉報也未有見日尚千萬加厚復狀不宣俊卿悚息啟宗教從政右淳熙宰相魏國陳正獻公俊卿字應求權攝帖真蹟一卷孝皇勵精庶政公以元儒受異知秉國成不激不隨以昌其藴當世稱厚徳者歸焉衮衣東山從容始終全節巋然尚可仰也帖以慶元丙辰七月得于公之孫坦實予婣家贊曰英宰翼天縡治象開淳熙雖云簡牘間已具梁棟資瀛海𣺌且清壺山秀而滋膚寸起膏澤筆意儻可知梁文靖南安漳巖泉福三帖並行書第一帖十七行第二帖九行第三帖十行克家頓首再拜持志運使朝議老兄台座自聞使節及境既再上狀想繼以逹秋暑特甚弭節之初伏惟台候萬福眷集小大均休克家衰病閒處為宜但深負空食之慚爾泉之南安令江君㢘平有威信邑人甚安之祖母年踰九十而使司使與福清對移公私之計皆非便今渠有申狀乞留舊任望主張依所乞也屬如晦婦病背瘡舉家甚惶駭而克家亦苦臟腑上狀草草不罪何當行部俾獲瞻欵餘冀倍自珍䕶以承寵用不勝至願不宣克家頓首再拜持志運使朝議老兄台座七月二十六日克家頓首再拜持志運使朝議老兄節下比上狀度通覽久矣至節俯臨伏惟倍擁休祉方嘉猷迪功今自踏逐得漳巖主簿丁憂闕度人皆未切望便以差牒付去介也立作此書幸恕草率十一月三日謹狀克家頓首再拜持志運使朝議老兄節下迪功郎新授郴州郴縣尉方嘉猷尊嫂郎娘一一安勝家人輩致問訊舍弟愁悶中未及上狀望加察前辱示書情文過當不更具外啟敢少懇表兄趙中父家得㫖所在應副葬事在法合得千緡有使臣狀子封納望便為施行令泉福兩州分認應副蒙賜厚矣老兄與渠兄弟契素不薄度不待多禱也克家再拜右淳熙宰相鄭國梁文靖公克家字叔子南安漳巖泉福三帖真蹟一卷祖宗盛時士習醇厚書牘間不為溢美謬敬而真意藹然可挹此帖雖出近世尚可髣髴也寶慶乙酉三月婺將張松自中都以國初四功臣像介帖見遺贊曰詞真意浹不屈不狎端重有法此近世名臣之帖承平流風尚或可接予欲以此觀相業范參政行臺兩司常州成都四帖並草書第一帖八行第二帖十二行第三帖十九行第四帖十七行成大少禀林得之見過求一言云有公狀詣行臺鄉親之故敢忘僭率且其言亦有緒論幸冀垂情他容探伺留中之除詞馳賀幅次右謹具呈五月日左朝奉郎集英殿修撰新知靜江府范成大剳子成大比蒙誨筆欽認眷意昨已盡郤鼓笛等謂可降臨竟辱鄭重如聞來日兩司之招軒盖欲二十二日午間具家飯欵契闊敢幸不外他遲面盡右謹具呈二月日中大夫提舉洞霄宫范成大剳子成大拜覆五一兄即日伏惟尊候多福比承累書知安慰甚且收三哥書知已赴常州且得食祿以歸養非細事須謝祖先積善所致也七哥九哥在此甚安但為先生丁憂廢學已議别請先生也但未有赴試藝解者極以為憂耳兄且得一子食禄自此可以水淺長流矣劣弟年來多病早衰鬚髪如雪骨痩如柴食少藥多如此度日可以想見況味未閒一味瞻想而已今略此通問三哥不及别書且善將息凡事勤謹三嫂姪孫安勝大姐且安跡不説親否未閒將愛為祝不備九月十一日成大拜覆五一兄座前更送去新附子十枚成大拜覆五一兄座前暑候伏惟尊候萬福成大自正月起離廣西六月七日方入成都府路界交割今已入城了在路恰四箇月以上川陸相半受萬千辛苦艱險他時歸來面説書中説不盡也新婦自遭壓後到荆南上下方得性命可保又為路中辛苦到漢川大病至今未能坐起擾撓可知成大止存四莖骨頭烏皮包裹其不仆于道塗者天也七哥九哥逺路一遭卻得安樂九哥氣弱多病全不及七哥也前日在桂林時先生不得人枉瓌了光隂今已得一佳士矣旦夕事定敦逼兩人為學矣三哥曽討得權局否新生想甚長進大姐想且安跡于髙氏也定女日長已議所向矣因遣成人過行在今過平江通安問未閒伏乞保重不備六月九日成大拜覆五一兄座前右淳熙參政資政大學士石湖先生范文穆公成大字至能行臺兩司常州成都四帖真蹟一卷近世能書惟范張相望筆勁體遒可廣可狹如公抑足以名家矣嘉定癸未十月得前一帖于維揚醫者劉大聲次二帖後一嵗十月得于平江鬻者何義又兩嵗三月復得後一帖于金壇士人劉克家贊曰縱之而矩不踰歛之而鋒無餘實藴而華敷雲爛而霞舒雖曰近世之書亦足以為軒几之娛久而信信而傳其殆留而為後世之須噫嚱石湖范參政書懐詩帖行書十二行書懐二絶重送文高季兼呈府公貳卿劍門雲棧守非難函谷泥封久未刋今日漢中誰國士莫教春草上齋壇西出陽闗有舊知薰風淥水泛蓮時煩君傳語詩書帥更寄臺城别後詞右不湖書懐詩帖真蹟一卷此詩似寄示興元連率者在淳熙間殆是章徳茂諸君而未得其人也帖以嘉定己卯十月得之建鄴贊曰當平世而慨想齋壇之國士因送客而遂及陽闗之舊知葢拊髀之思在上弗替故淳熙之士夫亦不敢一日而忘可將之奇斯帖之傳固未易例以近世之詩也王文定省中要津二帖並行書第一帖十四行第二帖十行淮昨承枉顧屬留省中歸捧盛刺悵仰何已奉教喜審即日尊候萬福夔憲歸守二書蒙不外謹納上已及周旋之意矣方總領少與之接者承命不獲惟推照何日戒行尚須面别右謹具呈十月日淮惶恐上呈淮頓首再拜淮違奉談塵閲時淹久山斗之仰不勝勤拳頃嵗一拜書函繼嘗具狀自是汩沒莫遑嗣音者謂如俊望宜踐要津日冀除召見有承教之樂何意尚貳近藩惘惘逮今愧生顏表辱台慈鑒諒萬萬之幸淮惶恐頓首再拜右淳熙宰相魯國王文定公淮字季海省中要津二帖真蹟一卷公輔阜陵嵗月最久總領衆職要必有以稱上意而非偶然者婺人劉多祜多蓄近世翰墨嘉定戊寅六月予得之嘉禾贊曰謹嚴而穩愜一筆之涉足寓心法淳熙之相業動守檢押耳目猶接列于書笈百體不乏是曰王魯公之帖周文忠寶眷帖行書六行必大僭易拜問年家寶眷敬想上下均祉或有委願聞台命必大僭易再拜上右兩朝相國太師益國文忠公必大字洪道寶眷帖真蹟一卷舜禹授受公以元臣陟降帝廷鎮安八紘磐石九鼎葢近世以文致身以道致主以學致用全名終始進退雍容未有公若者幅紙之得維以尚徳嘉定乙亥時維元夕觀于京酺售此真蹟贊曰廬陵之文忠前歐而後周筆法之可稽歐勁而周柔苟内心之是似豈外蹟之能求予嘗遡平原之津望二典之樓想公從容于墨客卿間猶足以接六一之風流也張宣公書簡帖六帖並行書第一第二帖各十六行第三帖十一行第四第五帖各七行第六帖四行栻頓首拜啟徳瞻茂才吾友座下為别寖久每用懐想手問逺貽慰懌可知也暑雨緬惟義履勝福栻幸爾安常不必念承在城中親炙正字想當日有進益來諭克己言持之難當用大壯之力誠然也然而力貴于壯而工夫宻若工夫不宻雖勝于暫終不能持于久而銷其端觀諸顏子沈潛積習之功為何如哉其有不善未嘗不知知之未嘗復行非工夫篤至久且熟也其能若是乎别紙亦答去有以復之是望其他互見諸書中矣晦叔多時不相見却嘗通書書已寄去未知再㑹之日更希茂勉厚愛不宣栻再拜徳瞻茂才吾友座下栻許時幸欵晤霅川之别良用悵然從者遂還金華否栻留此已幾半月館舍寛凉可以觀書但恨友朋之逺耳論語仁説亦稍稍改正矣早晩寫寄伯恭可就觀也左右天資之茂加以思慮細竊所期望惟力審自勉惟宏惟毅以進篤實之功君舉後來曽相見否近亦一得書也詣叔來吳江相見歸侍傍欲再求假來此猶未得却數通問他非此可既今日得雨更數日可以西去矣拭頓首啓徳瞻祕校吾友潘叔度兄弟因㑹致言晦叔已兩來相見嵗晩可遷來城中論及陸薛徐三君恨未識之此間數士略見正字書中矣敬亭記潘叔昌寫來方見之敬則實實則虚之意遺書中已有但虚則無事矣亦疑傷快了葢無事字殺此段意思不了如明道云兩忘則澄然無事矣無事則靜靜則明便完全近看惟二先生完全精粹説話比其他先生不同其次則尹又其次則中立次則謝上蔡後生何足以窺前輩但講論間又不可含糊爾更以其大者移于小物作日用工夫此語大意固好亦疑立言有病也栻又上栻稽顙再拜上狀通判學士座下即晨梅雨蒸濕伏惟開決有相台候萬福栻孤露餘生不足深軫尚冀若時厚自衛重不次栻稽顙再拜上狀通判學士座下栻稽顙再拜先公平生心純王室深痛讐恥之大誓不與俱存至于易簀惟以未克報兩宫知遇為念嗚呼痛哉不肖孤泣血何極輓章讀之更重感慟邇求盜賊屏息否長才淹汩為重歎也栻稽顙再拜栻叩首再拜齋醖及寶峰新笋見寄得以備薦奉愧感愧感建茶廿片輒馳凂幸檢留栻叩首再拜右淳熙侍講南軒先生張宣公栻字敬夫書簡帖六幅真蹟一卷公以道鳴孝宗朝學者從之如雲前三帖乃與婺士喬拱徳瞻者予嘗從公之猶子匠監忠恕丏遺墨以藏寶慶乙酉三月匠監書介徳瞻之孫宗亮來遂得之言皆諄諄所謂造次不離乎道者後三帖紹定戊子二月得之京師贊曰紫巖之傳原委一忠遡而伊濓根本一中事君致身其用則同自我淑人𣲖于五峯力久積真至公而充淳熙之間天下為公守道彬彬洙泗之風公于是時不下禹功據徳游藝言立志通故其遺書筆意俱工我得而藏敢忘所宗淵淵其心皜皜其容學冠穹壤名儕岱嵩萬世仰之曰人中龍寶真齋法書贊卷二十六
