body:
  text: 寶真齋法書賛卷十六宋岳珂撰宋名人真蹟劉忠肅候謁帖行書二行摯謹候謁子中學士閣下右元祐宰相觀文大學士劉忠肅公摯字莘老候謁帖真蹟一卷先君將指潼川淳熙丙午歲四月得於蜀士張箋家手題而藏四十年予既彚帖執而嘆曰是帖也先哲篤敬之風所由寓有君子之道四焉刺謁手書敬以直内也繁文之削真情之尚易則易親也字同舍而伸交情不諂不瀆也敬以簡致卑而不可踰也又惡比夫後世脅肩造請不避寒暑蠅字繭紙屑屑以為恭者哉雖曰幅楮數字以公名徳之重是可與荆璧齋琚比矣贊曰元祐之至於八九年也忠邪既判乎渭涇公秉輔㩞内外晏清宜羣隂之弗復萌矣而卒以黨傾今觀此帖之存固不知其事之當元豐與熙寧然攷公之本心實欲挽一世以為君子之朋至如答邢恕之書以致休復之問延章惇之子以伸同朝之情皆大賢厚徳事而豈顧于人言背憎然而託西垣之訓以極老奸之詆興同文之獄以陷必族之刑非公所與交徃來而示調停者耶彼小人者自覆出而抵巇公亦何敢逆窺人以其情之難明予之系此帖正欲以見符祐二黨之未爭苟不激而成之未始不同心而在朝廷也於戲正直如公風猷百齡烈日嚴霜夏杲秋晶是雖十字之藏蓋已與温申韓范數公同此不朽之名矣蘇魏公到鎮出京二帖並楷書第一帖十二行尾批一行第二帖十一行尾批一行頌頓首自承到鎮嘗因郡僧行咨詢動止稍不聞問豈勝馳誠冬序晏温伏惟政事優暇福履清適頌衰老待罪禁庭充位無補日有歸田之興非乆得請南去獲依仁庇誠所幸願也未閒更冀保䕶竚還詞掖以慰與論不宣頌再拜子中知府修撰親家閣下十一月二十一日啟惟頌頓首稍疎間訊惟日馳誠近孫子出京祗奉教筆深荷顧存兼承禁從清閒福履沖固不勝感慰之至江闗重複門宇夐遥願輔神倪上副柄用乃誠所祝百不一陳謹奉手啟咨候不宣頌再拜侍讀舍人閣下二十六日謹啓右元祐宰相司空蘇公頌字子容到鎮出京二帖真蹟一卷公以徳量服天下撓之不濁澄之不清與道卷舒功運無迹故位極廊廟而衆不忌身處消息而名不隳砥柱大河高峯喬嶽葢庶幾孔子所謂有始有卒者嘉定辛巳歲十月珂以餉節攝京口郡既幸瞻維風之風後二歲六月以臬事綰維揚符復獲接憇棠之愛因訪遺墨得之故家凡有三印識葢又後一歲之八月也勒鞭忻慕於是且有託焉贊曰徳量維昔該乾坤藝成而下道乃尊堂堂魏公古大臣劫火固燬靈光存直躬致主無間言餘事諭墨何足論百年劒佩紛如雲不於其書於其人范忠宣南都帖楷書十二行純仁頓首介來拜教之辱喜承累日動止康寧純仁到南都水漲阻橋未能東下去得甚邇彌增惠戀兒子依命遣詣左右愚騃失學公亦知之今託受賢門尤為非利惟深賜誨導庶無大咎漸逺風問惟冀自重不宣純仁頓首上公舒著作親家左右十一日右元祐宰相開府范忠宣公純仁字堯夫南都帖真蹟一卷先君舊藏云得之涑水司馬伋家手自裝禠嘗以示子弟珂㓜聞先君之言曰祐陵初政首召公於外倚以為相公以病不克造朝而治亂之源於是分此天也又曰中原故老大臣用心率廣大不偏故能調一天下今全盛之觀未還葢自士大夫心術先分裂始諒哉斯言如忠宣公其人歟珂嘉定己夘歲自右府掾持節江東獲踵公遺躅讀璧詩而見墨妙拜祠宇而想風標葢知手澤之在人間雖幅紙無不可寶帖有藏書家印四贊曰符祐戰九河溢砥柱植兮珪確競天地昏清風滌兮大中之道闗百聖而不熄兮用之不失其時公獨得兮公筆之不倚而字之不泐兮公意之不偏而態之不廹兮我觀此書公心尚可覿兮劉忠定書簡帖四帖並行書第一帖九行第二帖八行第三帖十一行第四帖六行示諭康節之語固嘗聞之安世每疑其太高若講解象數一切屏絶則聖人設卦立爻復將安用惟知其在象數者皆寓也然後可以論易故曰得意妄象得象妄言方其未得之際而遽絶之則吉凶與民同惠之理將何以兆恐非筌蹄之意明公以為如何安世上劉壯輿不謂亡後深可傷歎向者過此相聚累日共論春秋甚有可取亦嘗戒其太拘更定類例到唐州屢有書徃復啇確云就藁之日先當見示今則遂為絶學不知蘇氏能為收録否可惜也安世頓首揆間遂乆瞻嚮實勞杜門罕便候問疎闊每以自愧使至辱書承禮制外除伏惟追慕永感何以堪處不獲面慰仰冀以道自愛逺成所祝不宣安世頓首子虚從事年家侍史十一月初三日安世承示諭去歲移官之際外勢可駭正是鶴相恐迫濮上之策猶頼天輔忠賢曾不為動然技止此而已但安以待之餘不足道也安世上右元祐左諫議大夫寶文閣待制元城先生劉忠定公安世字器之書簡帖四幅真蹟一卷易之學寓于象數春秋之㫖明于類例舍則惑泥則拘此先生之言輕也屢變而不忘乎内守正而無懼乎外勉之切望之至此先生之淑人也一話一言何者非教豈徒帖也哉前三帖實慶乙酉嵗六月得之淮西副帥司幹官潘君忠恕又一月復得後一帖于中都張氏贊曰公心如鐵萬仞璧立聲名百年翰墨十襲絶景獨睨奔塵莫及曰誰為之目不妄入李公擇嘉裕帖行書八行常啓别乆殊劇馳仰兹有見期可勝欣沃秋暑尊履嘉裕謹先此啓少加裁重不宣常再拜府判同舍執事右元祐御史中丞李公常字公擇嘉裕帖真蹟一卷予家九江與修水為接畛至今有公子孫存焉因得從訪遺蹟以見景暴慶元己未冬十一月得日李氏贊曰予登五老峯其下葢山房焉繚閣層廊之疎松秀篁泉疁夜嗚答繡晨張公方讀書其間葢已㑹此趣于胸中之藏然則摛墨池之華擷採筆之芳發其緒餘書尺七襄固知其自然雲錦之章也孫莘老報狀帖行書四行拙詩并報狀封呈報狀看訖先示及覺上右元祐御史中丞龍圖閣直學士孫公覺字莘老報狀帖真蹟一卷予藏帖多以碑刻若舊蹟證其真贗獨公之書徧攷舊帖皆無所質訂藏家幾數十年本先君故物以是不復裝禠寶慶丙戌冬始繙故笈得此紙欲以訪諸人客或見之驚歎曰予家舊有此書蹟其真無疑予應之曰此侏儒觀優隨羣而笑問之曰長者决不相誤予幾是矣既而持帖來並果出一手贊曰遺墨之四行煜其如晨星之爛是曰元祐之名臣所當攷而申之以贊乆藏弗治客見而歎持並所攜毫髪無間予是以知其非贗范正獻書畢帖行書八行祖禹居洛一紀殘書僅畢誤蒙朝恩收寘祕省中春就職疎拙粗遣惟乆去鄉里日有歸思顧未能爾瞻望桑梓乃心依依不審軒斾何日還朝舍弟行謹附問禮且謝稽慢祖禹再拜右元祐太史内翰龍圖閣學士范正獻公祖禹字淳夫書畢帖真蹟一卷予先得公奏議既已系之詩文帖中後四年仲春復得公此帖于吳下於虖洛龍卧波四海屬心當熙寧元豐間雖未得以其所學膏澤漙率而鏡古衡今筆端膚寸垂百世明君之監續千古素王之統其討論潤色之功在公已不貲矣裕陵之耀在中祕葢用温公奏所謂紀一之淹公葢未嘗容心也藏之以識士出處且以見景慕之深焉贊曰王之以道義相從豈計其功而况乎公當其任紬繹唐事之寄所以極簡編之從容矣既上成書于邇英而公猶得以三百年之鑑信其遺風則是一紀之淹乃所以就百世之功石渠蘭臺片言帝聰考槃弗為皦然初終尤以見公之子元豐葢盡其魏國之心而裕陵之于温國未嘗不知其畎畝之忠也此帖之存公心天通詆斤之誣吁嗟麟窮范正獻奏議帖九草書藁本共二十幅兩卷通二百五十一行多有塗注改乙處並依本文謄寫薦賢劄子臣聞報國之忠莫如薦賢負國之罪莫若蔽賢昔臧文仲知柳下惠之賢而不舉孔子以為竊位又以為不仁臣蒙陛下累加㧞擢寘之諫省又遷門下兼職經筵于今累年受恩深厚無禆毫髪常思竭盡愚慮無有所隠庶幾以此少酬萬一竊慕古人報國以薦賢為忠實懼有臧文仲竊位不仁之罪臣今有劄子四道並乙畱中若陛下以臣言薄有可采乞出自聖意處分則臣之幸如以臣言為不然臣不敢避妄言之誅惟陛下裁赦臣無任震懼之至取進止乞畱中正月十九日第一劄子臣伏見經筵闕官宜得老成之人以重其選韓維素有鯾直之稱先帝以維東宫之臣眷遇甚厚維與王安石不合以此齡齬不至大用未嘗少屈于安石之黨天下皆以為賢陛下用為門下侍郎中外皆謂得人維于政事雖有執滯不通然其人風節素高疾惡如讎奸邪畏之前年罷免不聞顯過今乆領宫觀乃與章惇為一例甚非宜也先帝東宫之臣惟孫固與維二人見存陛下所宜加禮若召維以經筵之職不惟學識論議足以開益聰明維有人望物論必大以為愜臣竊恐執政以維獨忤陛下故不敢言夫君之于臣如父之于子有過則譴而逐之怒既息則召而使之豈有終怒而不解也陛下嗣位已來言事之臣亦嘗以所言過當上忤陛下或罷其職或出之外任已而皆復召還擢用是以天下皆知陛下聖意至公不以喜怒進退羣臣昔仁宗平生無怒惟是唐介彈文彦慱其日仁宗極怒貶介春州别駕尋復悔之改介英州未乆復召為御史因此重介剛直驟㧞擢至兩制天下皆知仁宗不徇喜怒最為盛徳陛下若出聖意復召韓維天下必皆服陛下之至公此深為聖徳之羙取進止正月十九日第二劄子臣伏聞翰林學士承㫖蘇頌近乞致仕陛下已降詔不允臣竊見頌慱聞强識白首好學至于詳練國朝典故尤非諸臣所及熙寧中王安石用選人李定為御史頌知制誥封還詞頭再三不肯草制坐落職歸班二年方除一郡其後又為奸臣所惡追攝對獄卒無一事恐其進用排斥在外然先帝素重其慱洽召令修書眷遇保全以至今日更厯以險操守不變方今朝臣資望履厯未有先于頌者頌年七十有一精力不減少壯之人陛下左右宜得殫見洽聞之士以備顧問臣且慮頌别有陳請伏望聖慈且畱之經筵取進止正月十九日第三劄子臣伏見知杭州蘇軾文章為時所宗名重海内陛下所自㧞擢不待臣言而可知臣竊觀軾忠義許國遇事敢言一心不回無所顧望然其立朝多得謗毁葢以剛正疾惡力排奸邪尤為王安石吕惠卿之黨所憎謄口于臺諫之門未必非此軰也陛下舉直錯枉别白邪正以致今日之治如軾者豈宜使之乆去朝廷况軾在經筵進讀最有補臣愚伏望聖慈早賜召還之今尚書闕官陛下如欲用軾何所不可朝廷撰授常患乏才每一官闕乆之不補今有一蘇軾而不能用不知更求何者為才也臣竊為陛下惜之取進止正月十九日第四劄子臣伏見刑部侍郎趙君錫孝行書于英宗皇帝實録臣謹按實錄尚書工部侍郎趙良規傳云子君錫甚孝以良規老而酒色不節棄官出入卧起隨之昔周宣王欲得國子之能導訓諸候者樊穆仲稱魯候孝宣王乃命之大雅宣王之詩曰候誰在矣張仲孝友言宣王使文武之臣征伐與孝友之臣處内古之選臣先取其孝葢孝者人偷之冠百行之首也人君與孝友之臣處則徳性粹羙而風俗淳厚是以輔道人君者宜莫如孝也君錫之孝士大夫所共知為人温良恭敬動有規矩給事中鄭穆館閣耆儒操守絶正中書舍人鄭雍慎靜端㓗言行不妄穆雍乆在王府清謹無過此三人皆宜置左右備講讀之職如經筵闕官伏望聖慈于此選擇取進止正月十九日進無逸講義劄子臣今月七日准入内供奉官李偁傳聖㫖今日邇英閣講過無逸義令詳備録進臣今寫録進呈二月八日侍講臣范某劄子元祐五年二月八日内中進納訖入内高劉淵傳宣進講義劄子臣等准入内押班梁惟簡傳宣今後邇英閣講説過所引證事口義令次日别具進呈臣等已知委訖二月八日臣司馬臣吳臣范劄子元祐五年二月八日内中奏聞奉㫖依奏入内高班劉淵疎決劄子臣伏見陛下以乆旱疎決在京及三京繫囚聖心焦勞欽恤庶獄祖宗以來赦過宥罪多蒙嘉應今今漙天下雨旱灾甚廣恐刑獄寃滯以傷和氣者不止於四京臣願陛下因推惠澤以及四方詔諸路轉運提刑司官疾速分詣所屬州縣引問見禁罪人疎理決遣仍先徧行指揮疾速結絶無令淹延深戒官吏務察寃枉使朝廷徳意及逺感動人心庶可消弭大異取進止二月十三日乞留中特出聖意指揮祖宗時遣使决獄或詔逐路監司疎决其例不一欲乞參酌簡易疏臣竊以治道有至易而必安有至難而必危有至簡而必治有至繁而必亂安危治亂之本不可不知也孟子曰夫道若大路然豈難知哉陛下得其路而由之則簡易而趨于治安舍其路而不由則繁難而入于危亂今方總攬庶政延見羣臣人人得進對于前此乃明四目逹四聰以開廣聖意之時也然人有邪正則言有是非若陛下聖志内定聰明不惑見大路而由之則聼言而知其是非知言之是非則知人之邪正譬如將適千里御六馬而行于坦塗雖使僕夫欲引車于險阻之轍驅馬于荆棘之林陛下必不狂而從之者無所疑也臣之所謂易者守祖宗之法與元祐之政則必安所謂繁者有為而任己則必亂守祖宗之法與元祐之政臣于前奏詳言之矣若夫無為而任人之理臣請徳以備論之今或勸陛下以有為其説必曰天下之事不可坐視其弊人君若無所為則中外懈惰萬事廢弛此言似是而不可聼古之聖王為天下之有事也故治天下天下不能以無事治事則不能不為也故自有為以求至于無為惟創業之主戡定禍亂則能有為多弊之世更張法度則必多事若繼體之君承平之日則當率由舊章謹守成法而已夫天下之事下能無弊雖堯舜在上亦不免也治多而弊少則為治世矣弊少而亂多則為亂世矣聖人雖欲天下無一物之失所然豈能使天下無一事之有弊乎是以治天下患不得人不患事之有弊如欲中外無懈惰而事無廢馳在於擇人不在于有為也人君好作事則事多而弊益甚雖欲中輟不能自已由用心之誤也若乃昧爽而聼朝正晝而講學清閒而訪問宴息而思道出入不忘儆戒左右必有箴規此則不可一日而不務也夫人之情莫不安于無事而苦于多事古之聖人知其然也故欲治天下先治其心君心靜則天下靜君心不靜則天下亦不靜一言而天下受其福一言而四海被其禍喜則濫賞至於軒冕塞塗怒則用兵至于流血漂杵皆生于一心而已小人之情惟喜多事不喜無事故不欲其君心之靜靜則小人無自而入矣上好貨利則小人言財利矣上好兵則又言征伐矣上好治宫室則小人言上木矣上好察則小人言細事矣君心愈勞事愈不治日入于亂迷而不反此有為之弊也孔子曰無為而治者其舜也與攷之于書不過曰咨四岳命九官擇人而任之恭己而已矣楊雄曰在昔虞夏襲堯之爵行堯之道法度彰禮樂著垂拱而視天民之阜也無為矣今陛下承六聖之鴻業奉文母之成規所謂襲堯之爵行堯之道以之垂拱而視天民之時也故臣敢以無為之説補聰明之萬一今或有勸陛下以總攬權綱其説必曰天子不可以權委人陛下獨斷則權在于己任人則權在于人此乃大誤不可聼也臣竊以為陛下任人則權在于己獨斷則權在于人何其明也然右之聖王知一君之身不可以獨為天下也故内有三公九卿二十七大夫八十一元士分職而治外公候伯子男千八百國分土而守之皆天子所與共為天下者也擇公卿之賢者以為一相一相總百官百官治百職又擇諸候之賢者以為二伯二伯帥九牧九牧帥諸候天子恭己黜陟之而已矣尊者所治衆故不可不約卑者所治寡故不可不詳約則舉其大詳則舉其細故君為元首臣為股肱上下有體不可易也今之宰相古三公也今之執政古六卿也侍從臺省寺監古大夫士也天下一千二百縣縣有令三百州州有守古諸侯也十八路路有監司古牧伯也朝廷之政當委之公卿也郡縣之政當委之牧伯宰相者總公卿之議而決可否于天子監司者察郡縣之治決可否於朝廷陛下執賞罰而臨之有功者賞有罪者刑賞一人則天下有功者無不喜罰一人則天下有罪者無不懼如此則天下仰之如日月雖在萬里之外如陛下臨之于上則其權豈不在陛下乎宰相不可以代百官之職監司不可以代郡縣之治豈可天子而行宰相之事也哉故天子而行宰相之事是宰相為無用也宰相而伐百官之職是百官為無用也陛下之職惟當擇宰相與執政之臣天下所欲用者用之所不欲用者不用之其用以天下其不用以天下陛下何所私焉如此則其權豈不在陛下豈必躬親細務乃為權乎書曰元首明哉股肱良哉庶事康哉言君能知人則明臣能任職則良此萬事所以治也又曰元首叢脞哉股肱惰哉萬事隳哉言君行臣職則叢而脞臣不任君之事則惰此萬事所以廢也天子任相而已矣宰相者擇人而已矣宰相之于庶官甄别邪正能否達之天子而進退之不可有所曲私也夫陛下擇宰相者也譬如天焉春夏為之長養秋冬為之歛藏日月為之照臨風雨為之動潤天何為哉黙運而已矣生成萬物其功皆歸于天故天道無為四時有為君道無為臣道有為堯舜以來未之有改也臣所謂任己則權在人者賈誼有言羣下至衆而主上至少所託財器職業萃于羣下今朝廷之事莫不在陛下雖欲獨行一事獨用一人必不多于三省之所僉謀羣臣所薦舉也且陛下所自行者若不訪之于左右則必得之于小臣如使公卿大臣不可委信則左右小臣豈皆可信乎若非可信之人不私其所愛則必排其所憎貨賂交結行于其間矣古者爵人于朝與士共之刑人于市與衆棄之言不出于人君之私也唐人有言不經鳯閣鸞臺何名為敕此言獨出于天子私意而不與有司議之者非敕鳯閣即中書鸞臺即門下也公卿之所僉謀羣臣之所薦舉其事固有是有非其人固有賢有不賢然皆有跡可見責有所歸若其不當則朝廷得以治之臺諫得以論之故不敢全為欺岡如使奸臣得以蜜白外事而使陛下自以聖意行之則威福集于私門而怨謗歸于陛下豈得謂之權在陛下乎仁宗深知無為之要御臨天下四十二年大事付之大臣小事付之有司疑事咨之衆人寄耳目于臺諫故君不勞而天下自治臣每于邇英進對願陛下法則仁宗葢以此也在昔帝堯之聖動必咨于四岳豈其智不足哉葢為君之道當以天下之耳目為聰明以天下之心志為思慮而不當自用也皇祐中諫官韓絳因對而言天子之柄不可下移事當間出睿斷仁宗曰朕固不憚自有處分所慮未中于理而有司奉行則其害己加于人故欲先盡大臣之慮而後行耳當是時仁宗在位三十餘年其操術常如此亦堯之用心也今祖宗法度無不詳蜜備具世厯六聖人情習安加以先太皇太后維持九年内外肅清陛下守之則甚易而必安易之則甚難而必危守之則至簡而必治易之則至繁而必亂惟無為以守之擇人而任之則太平之治可坐而致也臣願陛下宫中之事無大小一切循用祖宗治内之法朝中之事無大小一切循用祖宗治外之政君臣守之無敢有所變更則可以率天下而循法度矣若天子自壤法亂紀則何以禁羣下之不循法度者乎夫錙銖而積之至兩必重毫釐而累之至寸必差書曰不矜細行終累大徳成王作小毖之詩以求助于羣臣言小事之不可不慎也惟陛下毋忽于細㣲謹守法度以塞亂政之源則天下幸甚臣受恩之深職在近侍以經術輔聖徳思慮所及有可以禆益者不敢不竭盡拳拳之誠貪進小忠故不避煩瀆天聼惟陛下裁赦無任震懼之至取進止右元祐太史内翰龍圖閣學士范正獻公祖禹字惇夫奏議帖真蹟二卷其書皆當時副墨忠鯾之氣磅礴宇宙道義之藴昭明日星卓哉偉乎王魏以還世未嘗復覩斯人也珂舊從太府丞范君擇能游實公之孫笈中多公手澤以其世家寶藏不敢有請毎與客誦言之嘉定甲申歲八月山隂行徳老過予于京江棠中適藏是帖遂舉以見畀書率用赫蹏具草且多廢楮又有以見前軰質儉清素之實使尚徳者有考焉贊曰思魏徴之棠不如列疎屏之十漸愛衛公之栢不如存丹扆之五箴諫説豈謄口格君當以心想引筆而行墨方危冠而正襟追古事以比迹見忠臣之慮深是雖不足契當時之感悟不猶可以鏡方來之侫壬此左氏所以憤乾谿之痛而三歎于祈招之徳音寶真齋法書贊卷十六
