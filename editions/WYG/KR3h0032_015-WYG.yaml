body:
  text: 寶真齋法書贊巻十五宋岳珂撰宋名人真蹟黄魯直先王賜帖四帖並行書第一第四帖各六行第二帖十四行第三帖四行來日無他能囘車馬至騏驥甚惠仲謀延款之意甚勤不肖亦欲承教也踞邀恐悚庭堅頓首上伯時親家兄十日庭堅頓首逺辱惠書并寄蜀牋極荷勤懇都下匆匆人事畧不辨了眼前閲歲月如流耳以此音記不時想不以此為恩意疎宻也卽日官下何如頗得日力問學有同僚共文史之樂否令叔比數得安問然意思頗有生事自累之嗟令弟每相見于仲謀家意氣疎爽甚可愛也未緣㑹面千萬加重謹奉狀庭堅再拜景善主簿仁弟十一月十三日北物有所須因來示諭欲寄筆墨適眘修行日有公家事冗甚别因監司行寓書并信矣庭堅頓首庭堅頓首相與有𤓰葛又世舊今後惠書可不煩作公銜也當路諸公頗能相推挽薦章有㡬人矣因書一二疏之庭堅頓首右先王故藏紹興所賜山谷騏驥蜀牋北物世舊四帖真蹟一卷縫有内府書印三末有紹興小璽一始先生在兵間獨以垂意文藝稱字尚蘇體室有鄴架故姧臣特忌之不與他將比當己未初定盟時金人歸我河南地高皇旣議偃兵徧賜諸候大帥宸翰先王始得喬潭舞劔賦次得諸葛亮等屯田三事皆寓隆指珂幼聞之諸父言他賜尚多上亦聞先王好書帖嘗因近璫宣諭密賜蘇黄等墨蹟中更家禍皆就㪚軼惟舞劔一賦藏先兄吏部甫家其餘雖件目亦不復可省憶矣珂每竊慨歎謂帖固不得而見而先王寵褒雅尚亦無容少存風徽耶紹定戍子五月客有自浙右來攜此帖見售初觀楮墨特與他異又見印識如新亦止疑其貴臣家落遺者閲至卷尾乃有四半印存于鸞鶴縹卷之右騐其文則曰鎮南留後清逺鎮寧崇信武勝定國五節度正先王所佩者不知流落至何所而今日乃復獲之驚喜三歎繼以感泣於虖予收帖字半生矣王氏之青氈衞公之故物顧乃一旦自比于象罔之求珠而復還于漂摇之毁室是非天而孰為之耶此一帖也使太史之網羅放失皆幸而出于無心則子孫之所不及知史牒之所不及紀又可殫見耶泣而贊之以志復獲之喜贊曰賜帖不知其㡬而今獲其一四印之錯出百年之湮鬰神呵鬼䕶見此遺物鳴虖此固先徳之所寓而匪止于絶世之名筆旣軼而獲比繡質子孫守之謹勿失黄魯直覺民讀書帖行書十六行尾批一行覺民弟得書知侍奉叔嬸恭勤子職同新婦二即五郎八郎九郎八娘安勝甚慰逺思審不利秋官得失蓋有竒偶但要偷閒不忘學耳惟此一事身當潤澤又為子孫之基不可不勉也讀書要不雜毎一書自初至終日讀得一板嵗計之亦功多雜讀雖多終無功也漢儒多白首專一經皆成大儒蓋書在精不在多也念二弟所要文字及詩已具報之二郎開嵗已十四想已學作文字陳隱夫必能糾率諸兒讀書閒時更自為講解為佳諸甥皆有性格誰最精慧因讀報及雙連之慶計當在房下要早教道以成天予之美南北阻逺未有會集期但懷想千萬加愛不見兄庭堅寄睦相並附起居山谷勸其弟姪讀書一帖中三致意焉丁寧懇切惟恐其怠蓋非獨私其弟姪而已凡厥後學皆當敬佩斯言永以為訓隆興癸未臘日華陽老人張綱書行書五行讀書本以索理明道其緒餘則為文章至于文章決科尤其粗者余覽黄公家問至謂得失繫于奇偶而學終不可忘使人繫節稱善囘視韓文公讀書城南詩多媿辭矣張駒題行書六行右山谷先生讀書帖真蹟一卷張章簡綱等二跂題其後寶慶丁亥十一月予在京口得之張氏子蓋金壇故家贊曰學以進乎道不止于決科也厭飫優柔貴精不貴多也得失奇偶固未如之何也指端而言所以勉其切磋也三致意于丁寧式爾心之訛也因私淑以儆諸後學又有以見前輩用心之不頗也黄魯直食麵帖行書九行今日早食麵及麰飯各能酌中一杯自病來未始如此也承續寄藥感刻忽憶堯夫在相府時夏秋病暴下至潁昌猶不寧服附子黄耆竹瀝湯乃已此佳也堅腸㪚不知甚處合來乃㕮咀藥耳有虢州赤石脂否因檢藥惠黄耆二兩庭堅再拜涪翁書大率豪逸放肆不純用古人法度嘗稱杜周有言三尺法安出哉前王所是著為律後王所是疏為令以此論書而東坡絶倒雅意主于不俗有戈戟縱横之状不得已焉耳今觀此帖乃能收歛以就規矩本心之所形也良可寶云嘉定十四年七月丙子鄞川袁爕題行書九行右山谷先生食麫帖真蹟一卷絜齋袁公爕跋其後前藏書家四印後有袁氏二印寶慶丙戌三月得之京江贊曰山谷書法本于天才變而成家如萬壑崖骨痩氣清霜寒籟哀故其言曰法安出哉我師我心奚彼之儕今觀此書自葉而荄歛其角圭以復成才規矩崛奇闗機闔開故其跋曰自本心來誰其知言嘻噫絜齋黄魯直張處士帖行書七行張處士得所寄筆六種甚所功恨物材未極佳耳楊仲頴先輩報張通處士右山谷先生張士帖真蹟一卷筆工而以張處士稱豈唐世宣州諸葛流耶其必有以得此矣帖得與真一詩同時贊曰唐世稱不擇筆而妍㨗者惟虞與裴豈以先生翰墨之體而猶致恨于物材然而取妍命㨗要必有所自來世所共詫以為不根之奇是固務實者之所咍也黄魯直一笑帖行書六行不厭因其求書寓題紙尾他日五湖四海間相見回思此時亦足握手一笑也案此帖上有脱文跋中攷之今仍原本右山谷先生一笑帖真蹟一卷慶元庚申予在姑孰得此帖子書駔仲宜家卷端已不全莫知其為何帖有歐陽氏藏書二印贊曰帖字三十蹟如濕弔古其逢驚啜泣公來姑孰甫翔集書翰從容豈遑及此帖之獲雖此邑時猶可疑蠧誰葺至寶道傍世收拾乃以齧殘棄緗笈五湖浪卷四海立墨風雨中起蛟蟄黄魯直湯方蔬法帖行書十七行真珠菜淨濯去腥氣入䓤白數寸椎薑一塊椒數粒沸湯綽過研五味齏醋食之甚佳㮨花剝去皮及莖幹取成塊者湯中煮令熟錬薤油炒令香葱薑椒醋水相半沸微入鹽甚羙比之二種菜食之殊佳漫録上庭堅頓首荔枝湯擘生荔枝肉别貯其自然汁以水解白沙蜜漸入和令味相得卽井荔枝肉上火煮减半以甆合貯之計客數人一勺又人入湯小半盞煎沸用紗囊成龍腦先撲熱盞乃注湯餘甘湯餘甘用一種大如李皮皴肉黄赤者沙盆中微擦去皮乃以磨薑沙鉢細磨人用半水盞四人用炙甘草一寸同煎久之亦用龍腦囊撲熱盞乃注湯大率人不過餘甘一枝右山谷先生湯方蔬法真蹟一卷帖書與雜帖同出御府中有小璽欵縫而四種方獨殿故予特表而出之贊曰湯以濡唇蔬以適口撫藜腸而自驚奚龍腦之猶取予方笋蕨是茹蘖茶是友發遺帖而一笑正恐楊妃之百驛未足以比庾郎之三韭也黄魯直蹇􅐒帖行書六行蹇􅐒材力下中奉䇿周旋不能百里䝉被豹飾文采蔚然維鵜濡翼國風所刺僕人圉師一日三禠不堪龍象之任僅為麒麟之楦顧影長鳴畏我同早右山谷先生蹇􅐒帖真蹟一卷觀帖之語先生意殆必有謂惜也其不及聞也帖與趙清憲帖同得之王氏贊曰世固有飾其外而忘其中被服以為容而用之弗充又奚止一蹇􅐒哉予故因遺墨以三省吾身正恐自墮于黔技之窮而何暇以誚夫憧憧也黄魯直煎茶賦帖楷書大字五十八行前題一行尾記八行案前題一行原闕洶洶乎如澗松之發清吹皓皓乎如春空之行白雲賓主欲眠而同味水茗相投而不渾苦口利病解膠滌昏未嘗一日不放箸而收茗碗之勲者也余嘗為舍弟嗣直瀹茗因録其雪煩破睡之功爲之甲乙建溪如割雙井如撻日鑄如㔢其餘苦則辛螫甘則底滯嘔酸寒胃令人失睡蓋亦不足與議或曰無甚高論敢問其次涪翁曰然則味江之羅山嚴道之䝉頂黔陽之都濡髙株瀘川之納溪梅嶺夷陵之壓甎臨卭之火井皆向以薦兔褐之甌瀹魚眼之鼎者也或者又曰寒中瘠氣莫甚于茶或濟以鹽勾賊破家滑􅀢走水又況鷄蘇之與胡麻涪翁于是酌岐雷之醪醴參伊聖之湯液斮附子如博投以鰲葛僊之堊去藙而用鹽去桂而用薑不奪茗味而濟以草石之良所以固太倉而堅作强于是倮松實胡桃炰鴨跗菴摩以濟味折菊英水蘇濯勃賀蘼蕪以為芳前四後四才用其一少則羙多則惡發揮其精神又益于咀嚼蓋失匠無可棄之材太平非一世之略厥初貪味雋永速化湯餅至于中夜不眠耿耿旣作温濟案集本既作温齊句下有殊可屢歃如以六經濟三尺法雖有除治與人安樂賓至則煎去則就榻不遊軒后之華胥則化莊周之蝴蝶與此迥異贊中所謂于賦之尾與他本異莫詳其孰是者今並仍原本日饗四五得枕而臥夢為蝴蝶而飛去元符三年八月丁未阻雨𦍑峽中試嚴永􅀥核筆以銷飽懣此書似王定國而差有意味右山谷先生煎茶賦真蹟一卷是賦之書予嘗見數本文亦有稍不同者今字體差清謹豈先生試筆適意作耶帖故予舊家物不知所從來贊曰茶雖以藥煎斯失正味字託以筆試斯失正體以先生而比王定國抑未知其何似于賦之尾與他本異又莫詳其孰是要皆知乎識者之議敬藏以俟黄魯直真一酒詩帖行書六行尾記三行撥雪披雲得乳泓蜜蜂又欲醉先生稻垂麥仰陰陽足器潔泉新表裏清曉日著顔紅有暈春風入髓㪚無聲平生真一東坡老卻作青州從事名蘇文忠歸潁帖行書九行迨既忝薦赴省試遂可就親雖叔弼尚在疚想可别令人主婚已令子由咨禀彼此欲及時了當想蒙開許也癸丑三月十五日令畤題右山谷先生歸潁帖真蹟一卷趙徳麟跋戊子二月得之錫山贊曰事師之情期以百世言雖不多意則獨至識以嵗月越王之孫式時覽觀用攷大倫東坡真一法酒詩後題云予能作蜜酒格味與真一相亂右山谷先生所録東坡真一酒詩帖真蹟一卷韶定戊子三月得于髙平范氏有藏書家印六字體特飄逸過于平時蓋得意之蹟云贊曰以蜜為酒助于東坡託詩以傳百世不磨然而濁為賢而清為聖泛為醪而盎為酇自古而降厥名孔多要皆不以甜稱惟少陵昌黎始有如蜜若飴之歌豈時人酸鹹之嗜大槩畧同予固未辨其趣之如何也黄魯直詩藁帖八帖並行書弟一弟六帖各十四行第二第四帖各十三行第三帖八行第五帖三十五行第七第八帖各五行次韻呉可權題餘干縣白雲亭遇句屢仆趣蠧助翥聚去故處注曩誰築孤亭勝日有感遇永懐劉隨州因榜白雲句遺老不能談新陳忽成屢緑陰斤斧盡華屋風雨仆呉候七閩英宰縣有真趣弦歌解民愠根節去吏蠧材收佛宫餘工有子來助厦成燕雀賀水滿鳧鴈翥四海名士來一笑佳客聚雲與碧山留雲隨清江去斯須成蒼狗皆道不如故至人觀萬物誰有安立處寄語呉大今但遣糟牀注次韻明略奉陪呉明府燕白雲亭弦筵連船天姸宣然遷先江淨明花竹山空響管弦風生學士塵雲繞令君筵百越餘生聚三呉逺接連庖霜刀落鱠執玉酒明船葉縣飛乘舄壼公讁處天酌時多暴謔舞屬更成姸惟我孤登覽觀詩未究宣空餘五字賞文似雨京然醫是肱三折官當嵗九遷老夫看鏡罷衰白敢爭先奉答明略見寄長短句離亭宴十載樽前談笑天禄故人年少可是陸沈英俊地看卽瑣牕批詔此處忽又相逢潦倒秃翁同調西顧郎官湖渺東看庾樓人小短船絶江空悵望寄得詩來高妙夢去倚君傍蝴蝶歸時清曉南樓書事四顧山光接水光凭欄十里芰荷香清風明月無人管併作南樓一味凉畫閣傳觴容十客透風透月兩明軒南樓盤礴三百尺天上雲居不居言勢壓湖南可長雄胷吞雲夢略從容北船未嘗覩巨麗複閣重樓天際逢武昌參佐幕中畫我亦來追六月凉老子平生殊不淺諸君少住對胡牀庭堅承榮緒節推惠示沿檄崇陽道中六詩老孏不能追韻輒自取韻奉和頭陀全盛時宫殿梯空級城中望金碧雲外僧􅋾􅋾人亡經禪盡屋破龍象泣惟有簡栖碑文章巋然立右頭陀寺蟠空作風雨發地鳴鼓吹日晴四無人聲在高林際伊優兒女語蹇淺市井議我欲抱七弦寫此以卒歲右道中聞松詩俗物常偪塞令人眼生角永懐洛陽人論詩談畫壁青山吐秋月阻作南樓客但歌靡盬詩賞此無瑕璧右中秋山行懐子興節判邑下羮不和幕中往調護紛爭非士則各使捐細故頗憶郗參軍能令公喜怒應知鞅掌車歴盡崔嵬路右再登蓮荷嶺懐君澤知録張公少為令愍俗有遺書左販洞庭橘右擔彭蠡魚歌奔中夜女歸抱十年雛借一韻近嵗多儒學仁風似有初右崇陽道中咸寧走蘆子終日喬木陰太丘心灑落古松韻清深聊將不俗耳靜聽無弦琴非今豪部律而獨可人心右晚發咸寧行松徑至蘆子戲答歐陽誠發奉議謝予送茶長歌歐陽子出陽山山奇水怪有異氣生公突兀熊豹顔案此句下原本缺二十六字音者蒼龍璧官焙香涪翁贈許詩情合得嘗卻思翰林來鐀光直相千萬不啻過愛公好詩能多有更横戈奈此于思百戰何案黄庭堅集載此詩生公句下云飲如江入洞庭墅詩成十手不供寫老來抱璞向涪翁東坡元是知音者官涪香句下焙翁投贈非世味自許詩情合得嘗卻思翰林來餽光禄酒兩家人鑑共寒光余乃案敢比東坡有如玉盤金叵羅直相千萬不啻過愛公好詩又能多老夫何有更横戈云云原本闕遺過半因此書所載皆㨿當時之墨蹟故不復増入正文後皆倣此奉和榮緒節推之字四韻紛紛不可耐君子有憂之鞅掌誠似怨詩頺波看砥桂濁水得摩尼葉刳心只有皮案黄庭堅集載此詩第二聨云鞅掌誠莊語賢勞似怨詩第四聨云知我無枝葉刳心只有皮附誌于此奉謝榮緒割鮮見貽何處驚麏觸禍機煩公案原闕二字割鮮肥病新開肉糲飯寒鮮得解圍案黄庭堅集載此詩云何處驚􅀢解褐機煩洞遣弦割鮮肥秋來多病新開肉糲飯寒葅得解圍葅字與此異今從原本右山谷先生詩藁真蹟凡九幅論江西詩𣲖先生為稱首觀其鋟斵天巧磅礴萬象一字不苟作謂詩非徒工詎不信然舊人紹興御府卷尾著小璽縫有内府印八藏事家印亦八嘉定戊辰歲九月得之豫章蔡士羙贊曰句法之竒日鍊月鍜烏輕之過疾詎穩驢上之推㪣未判長吉之心欲嘔彌明之息猶鼾天巧呈露風期汗漫予方遡詩派而未能所以揜斯巻而三嘆也黄魯直催繡詞帖行書四行前嵗迷藏花桞恰恰如今時候諸事㡬時忺鏡中嬴得清瘐生受生受更被養娘催繡歸田樂令右山谷先生催繡詞帖真蹟一卷先生平生語莊此帖故游戱耳觀其序晏小山詞有曰余少時間作樂府使酒玩世道人法秀獨罪余以筆墨勸淫于我法中當下犁舌之獄其悔雕篆至矣此豈自放毫楮間三生結習猶有未忘者耶書出衆帖中亦别而繫之者贊曰詞以寓意何適作理於戲翰墨亦或張弛此篇所傳觀蜡之樂樂而不淫庻㡬在此寶真齋法書贊巻十五
