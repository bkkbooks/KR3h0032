body:
  text: 寳真齋法書贊巻二十二宋岳珂撰宋名人真蹟汪忠定栗冽帖楷書十行伯彦頓首拜啟大參政鈞席即日𤣥英正序寒氣栗冽恭惟恊贊政機内脩外攘神明相勞鈞候萬福謹奉啟起居不宣十一月二十一日伯彥頓首再拜啟大參政鈞席右建炎宰相保信節度使開府汪忠定公伯彥字廷俊栗冽帖真蹟一卷睢陽受莢公有翊載之勲首登台衡以穆天縡而卒以覆餗聞一跌不復猶能以聲烈被炎海問珂侍先君牧五羊遺愛之傳尚可接也帖蓋舊藏先君子其孫徳輸所獲之嵗月不識贊曰黃霸為相功名減于治郡尺或不足而有餘于寸文翰聲跡百年一瞬遺帖得于其家殆亦足以傳信朱忠靖按巡郡寄邸報三帖並行書第一帖五行第二帖六行第三帖三行勝非頓首上啟運使少卿直閣臺座春有餘寒伏惟按巡涉履臺候萬福勝非謹奉狀承問執事區區不宣勝非再拜上啟通使小卿直閣臺座初二日勝非頓首勝非叨冒郡寄兹踰半年實恃暉蔭未以罪去而衰疾日增不勝疲曵正初即匄外祠此日累上三章祇俟命下復還吴中儻遂善去悉自覆䕶之賜也豫以感激幸察勝非再拜眷集必偕行伏惟鈞福見邸報令弟中丞逺朝已有禮書之命必已知之勝非上問右建炎宰相魯國朱忠靖公勝非字藏一按巡郡寄邸報三帖真蹟一卷初帖之藏傳于先君其二得于慶元之丁巳其三得于嘉定之戊寅或出自閩中之李或軼諸溧水之秦付受有緒皆獲其真於虖翠華南巡𤾉谷未暾妖雺煽昏雲雷其屯晦䝉難之明夷迄再安于重輸如公之材己不愧于古人矣然而九河方暉龍馳虎奔挾義馭以不驚兆淵謀之經綸彼其胸中之竒顧不大于所就之勲耶更後六嵗予餉淮左之軍嘗以公軍之言及公二孫念景行之不忘撫遺墨而猶存庸贊一辭奉敭英芬贊曰士孰不排難貴乎安以徐士孰不立節貴乎平以舒既家國之兼全亦身名之裕如是興夫激切奮跲纓冠曼胡者蓋已同功而殊塗我思其人猶及屋烏而况乎遺書勝資政山中帖行書十三行第一行闕第二行六字闕親家兄臺座冬序淒凛伏惟燕坐山中盛徳有相臺候萬福康竊禄無補幸與諸累粗遺不足勤念䘏未知見日臨書增情天寒嵗晩敢冀上為本朝加䕶饔寢以俟追召謹啟不宣康頓首再拜上啟參議待制親家兄臺座閏月三日右建炎資政學士權知三省樞密院勝公康字子濟山中帖真蹟一巻公自江右扈從既以失職謫朞年而奉明道之祠此帖當在是時嘉定戊辰八月予得之彭澤贊曰沮徒民于中原廣好生于帝堯亦既三已歸而漁樵而書尺之間造次不忘乎本朝此所以為中興之大僚也趙伯山寳鍊帖行書七行子崧再拜比潦草上狀人至持辱還教累幅勤渠豈衰廢所宜得者以愧以感不可以況嶺外氣候不常下車既久頗能諳否惟以道對時寶鍊生理乃佳子崧再拜右建炎延康殿學士鑑堂居士趙公子崧字伯山寶鍊帖真蹟一卷近臣之貴宗姓之英翰墨文字足以垂世如公者亦足以稱矣嘉泰辛酉嵗三月得之潭州漕司吏施大源贊曰以公姓之麟定執登壇之牛耳即信厚以為俊竒蓋一家之自為體以道對時居夷何愧此鑑堂之所以處已而予察之于此劉資政符寶帖行書四行珏泣血叩頭再啟豚犬具狀拜屈從者初九日素飯望賜肯臨幸甚别無他客止符寶祝卿諸丈耳珏泣血叩頭再啟右建炎資政學士權同知三省樞密院劉公珏字希范符寶帖真蹟一卷公居湖之長興予以嘉泰壬戌七月得此帖于邑人宋介贊曰公兩登西掖前後抗論數十疏可謂剛且勁而扈衛江右遭時不競斯亦可以言命矣夫遺學所傳雖未足以盡乎平生而亦足以見其行已之簡敬也葉左丞同升遂意二帖並行書第一帖十二行第二帖四行夢得頓首上啟先用知府舍人台座馳響高誼之素茲幸同升不意乃復蹉跌豈勝帳惘久欲脩謁適舊苦肺病復作扶持造朝之外不復能辨外事昨日必先來乃䝉寵賜教誨不敏重增愧悚朝來伏惟台候萬福謹啟布下情不宣夢得頓首再拜元用知府舍人台座眷聚伏想均休叔問聞亦請宫祠甚力徑欲還三衢不知得遂此意否也夢得上問右建炎尚書左丞崇慶節度使石林先生葉公夢得字少藴同升遂意二帖真蹟一卷國朝將相以翰墨文章著名當世在中興後士夫每稱石林片楮流落蓋皆可寶玩寶慶乙酉三月得近世十餘帖于行都以公為首贊曰早登金扉踏仙鰲晚陪夫政歸擁旄石林風月出處高清心妙寄同揮毫麗如雲錦披宫袍横走健態霜鶻捎萬里筆陣誰能鏖摧鋒今識真孟勞沈忠敏勞軍帖行書十四行與求頓首去非知府侍郎老兄台座昨日具報書并度牒文字度已在途奉告伏審秋晴臺候萬福為慰二劄已施行然敵之求謂必避爾今車駕欲至江上勞軍因以督諸將用命要使他時視為成熟不作難也其他由折審如台諭當即以聞人遽草此幸察不宣與求頓首上去非知府侍郎老兄台座度牒已趣辨可以速求取也右建炎知樞密院沈忠敏公與求字必先勞軍帖真蹟一巻此帖蓋公紹興甲寅嵗與簡齋陳先生者簡齋時以徽猷直閣學士知湖州前輩風節之相似心志之相孚禮文之簡而情義之真皆非後世比藏其書者亦可以攷其時矣得以寶慶乙酉與石林帖同出贊曰仕同時也志同歸也相與以心無町畦也職位接蹱亦相齊也噫嚱此帖比傳衣也宗忠簡留守司二劄家書吾友三帖二劄並楷書各十行三帖並草書第一第二帖各二十二行第三帖八行今差迪功郎幹辨京城留守機宜文字提振京城四壁一行事務等宗頴朝奉郎親賢宅講書兼權太常寺丞呼延次升同捧表詣行在投進迎請聖駕還闕應合行事件及速施行右劄付幹辨機宜文字宗迪功準此建炎二年三月六日押承節郎劉晟齎到皇弟信王蠟封奏狀並與留守諮目遣差宗機宜齎蠟封奏恭詣行在投進須至指揮右劄付宗機宣照㑹齎赴行在投進施行準此建炎二年三月初十日押五三機冝得汝三月二十九日邵伯書知在路一向平善尤慰逺懷今天氣正難將息而汝在路不勝思憶四月初必逺行在兩遣人專寄書必不一案不一及何日下俱有闕文今並仍原本諸表不知何日後來㑹有旨許上殿否曾有六書與當塗諸公功為一一投之後曾指麾囘鑾未馬廣去料須見之滑州番衆盡遁橋亦斷之見措畫過河收復河西州軍若得萬乗歸即天下太平可必致矣亦不知諸公自為如是勞攘何也宋生者既背後為賊要與人出錢當時不欲收下禁何故尚在船中可怪可怪十一日葉荗見人説五三親婦已般入汴此月二十前後可到京遂得見孫子與七二一房矣汝若從駕回尤幸尤幸未相見間切好將息不一一押送五三機宜收四月十二日㑹呼延郎中為致意以事多且懶不果作書澤批宋生即遺之此人必作過恐累汝祝祝叔澤書寄民師四一姪承務暑熟計時奉姨姨太孺人安佳偕十六娘四一親婦七二秀才以次一一平書老叔自十二月十二日奔走將兵無毫髪補俯仰天地尤可差媿也今誤蒙朝廷録用皆翁翁婆婆與三哥積善所芘但增慚媿而已七五名目已奏上并樓三六走到南京得鄉中消息亦補與一承信郎吾姪但願老叔活得三五年次第亦可霑及骨肉但願有功有徳有以仰報國恩耳婆婆墳頭柴山與田地亦買些所有價錢老叔自還翁翁墳已託觀民為買四面山種松也投老了得這些事死亦瞑目五三已差二十兵士并兩使臣去取之矣七五纔得敕便遺歸拜嫂嫂也洪都行畧此報安不一不一叔澤書寄民師四一姪承務七二姪五一哥更不别書好看孩兒澤批澤悚息來人備知不肖之冗也撥忙遺囘亦不暇一物為左右問可羞可羞李法言之姪前任信州今在何處後來吾友曾有郎娘否自此後有書告只用幅紙書不必傚俗為累番圓書也戴元質今尚未赴任應亦窘矣澤再拜右建炎觀文殿學士東京留守宗忠簡公澤字汝霖家書吾友三帖真蹟一卷留司迎請及齎信王蠟表劄子繫焉方霸府開河朔公實副元帥事首議奪李固渡以邀敵歸路次復請屯澶淵以解敵圍雖為黃汪輩排抵不復與府中謀議不䘏也脽壇既啟公居留于京義旅百萬響應雲合又議迎清蹕歸正京闕汎掃龍徳改脩寶籙宫以俟二聖之還以神孝悌之義次復請躬自渡河乘人心未定奪敵之氣必期殄滅及信王榛起兵河北遣馬廣至行在又申前請凡二十餘上最後言丁進有衆數十萬願為陛下守京城李成願扈從還闕即渡河勦絶敵寇沒角牛楊進等領衆百萬亦願渡河兹三頭項人皆同寅協恭共濟國事願陛下速歸九重盜賊戎寇皆無足畏矣繼又言今不忠不義之臣但知身謀謂祖宗基業不足䘏謂宗廟社稷不足顧謂二聖后妃親王不足救謂山陵園寢不足䕶謂周室中興不足效謂晉惠覆轍不足羞效巡狩之名守偏伯之地儲金帛以為敵資樁器械以為㓂用慮勇敢之殘敵則禁守禦之招募慮流移之安業則掊保甲以助軍凡誤國之事靡不為之顧陛下以此章揭之朝堂今朝臣指摘如臣言涉狂妄乞明正典刑不然乞明告回鑾之期以安天下之聽蓋建炎二年之四月正公遣子頴及呼延次升時也既而黃汪輩益不合公自度無與成功憂憤疽發背七月癸未朔遂薨相去無三月遺表猶贊上還京先言已涓日渡河而得疾其末曰屬臣之子記臣之言力請鑾輿亟還京闕大震雷霆之怒出民水火之中夙荷君恩敢忘尸諫於虖公之心其與天通乎使天不憗遺卒公之志吾知黍離之痛不復至于今日矣雖然建炎距今㡬百年三尺童子稱忠者莫先乎公而或者猶以曰後之成敗疑公雖盡力于宗社猶有幸而不盡用之議予不可以不辨按李固之謀黃汪則曰此不量力也還京之請則又曰此不達時也龍徳寶籙之建河外元帥之授則又曰有後慮也丁進李成楊進等之用則曰不可恃也其後卒皆如言故苟安者幸得以僐其説合為牢不可破之談以迄成紹興分裂之勢予則曰是皆不然劉備挾輜重以南曹操固輕騎覆其軍矣何患乎力弱京索之戰劉項不肯失一寸土而後大業卒定于一進一退之頃何慮乎難守肅宗羣臣之表固無害于趣還之誥晉鄭焉依之忠抑何歉于過厯之永殆非所當憂也大業之羣盜用之太宗則為功臣五代之藩鎮用之藝祖則為良吏固未嘗不足恃也彼誤國者顧以此行其欺耳公其能伈伈俔俔以從之乎公之死在公則無憾而于中興之機則可惜也嘉定辛巳予漕江東嘗從公之孫有文見公遺墨跋而刻之籌思堂後八載予在京口始得此帖于其兄有徳嗟乎力扶大義識洞大機事擊大節有如斯帖者雖欲勿傳其可也哉贊曰人心大義不作不奮楚漢之間較者尺寸翼翼京邑九聖所都時方多艱天下之樞勢進則張狙許作使聚而遺毒不人則已一退則衂彼莫我宗子敵弗施各逞其鋒天方授吾狼貪如罕使乘其弊隻輪不返機夫于昨何捄匪今方憤之人未弱之心京國有君河外有統如彼見開孰不鼓勇犖犖忠簡蓍數龜陳瞭其胸中七十之身黃汪何知愛以姑息捐之中原俾自為敵謂不可敵公方渡河連壁百萬馬騰士歌公心何憂憤至于死紐不在上雖締易弛榮陽勿守漢業豈高屠狗攷儈何吠不嘈公之皇皇意固有謂究觀後來公則知至人謂公跡如祖豫州河南晉土未終其謀人謂公身如葛丞相祁山屢出竟沮凋喪惟我謂公特知所先用公之言必也萬全三光其分五岳其裂天乎奈何誰實為孽精衛往矣所填者波呌于九閽公心不磨宗忠簡贈陳秀才詩帖行書十一行詩贈雞山陳七四秀才澤叩首上渥洼生駿駒丹山生鳯雛家有寧馨子慶自積善餘粹然秀眉宇瑩徹真璠璵高聲誦論語健腕學大書頭頭欲第一李揆文學職業為天下第一氣已凌穹虚想其顧復意何止掌上珠更明速騰踏爾祖立以須幸視之以覆醬瓿石宗忠簡贈陳秀才詩帖真蹟一卷公忠誼根于天性篤實不華樸素自處惟思以立身揚名為尚毫楮之簡率字法之清勁詩句之淳質皆于是帖乎可攷予是以終信夫建功業垂名聲者之果無事乎外也帖亦得之孫有徳與家書帖同至贊曰赫號之紙幅不盈咫字雜衆體詩具二美不軼不毁相維天只意質功倖有志視此孫仲益和議帖行書九行覿咨台候動止萬福如聞和議報使來還一門百五十口遂可偷安卒此嵗矣大抵諸公不量力所及而輕信忘言無行之輩淮南數州又躁踐一空可難息也不宣覿咨頓首再拜知府宗丞台座右建炎户部尚書敷文閣待制孫公覿字仲益和議帖真蹟一卷帖故得之毗陵人胡世臣家時嘉定甲申之四月簡中詞語端欲為亡秦右袒云贊曰事君有大義彼國家之不計而惟顧乎妻子之避地則執筆䑛痔惟苟活是視岸然不愧固其素志于予乎何議蘇養直書簡帖六帖並行書第一帖十一行第二帖十六行第三帖十三行第四第六帖各十行第五帖四行庠頓首啟前曰䝉左顧甚寵但時已大醉了不記省未以縱誕見黜否恐悚無量奉手帖喜聞寒沍起居佳勝盛製連荷不鄙發藥多矣至感至感旦夕專詣謝次元遇必已全愈寒甚更珍䕶為望不宣庠再拜季華先生座下庠頓首啟近獲瞻奉已慰人闊之懐復從容池館之勝觴酌流行間聞警䇿許時塵土一掃無餘矣乍違已深馳仰比日伏想燕居萬福庠還山壁觀如昨山中雨餘草木清潤亦復可樂況麥曨連雲齋鉢遂爾有望想發函至此當亦絶倒也許遊馬跡日畧賜紆趾萬母渝斯盟也未聞萬祈珍䕶不宜庠再拜彥清居士几下庠頓首啟前邑中得連日承譚誨大慰間闊又辱擊鮮治具佩厚意無窮已也到家未果上狀令嗣至出所惠教伏審初寒起居萬福感慰無量庠曩晩一出歸輙病卧數日當且杜門曕見未期萬萬珍䕶謹勒參候不宣庠再拜彦清居士几下庠頓首曩病爾來尤甚公乃過形善禱施及未亡人慙荷可知又䝉專介恵字禮意尤厚感悚不可言庠抱病度病長夏若經千百大火聚涼秋再得見公蓋天爾非人也力疾作此不暇覶縷公八月間能結屨過我乎胷臆約結非面不能盡庠再拜彦清觀察因書煩致區區聞爾來香篋富甚能以一瓣見分乎松間林下一炷似差勝朱門華屋間耳如何如何庠頓首庠頓首再拜便中奉誨墨恭審訊後尊體萬福下清感刻東海非日見王仲玉者自彦正處歸所説但云與孟有不合其勢須去也回書遲遲亦請耳案亦請耳三字上下疑有脱誤庠俟醫者至即用藥垂老將與草木共盡又多此一叚亦可難爾車從何日定至大港拜見末期萬萬加愛不宣庠再拜徳祖兄座前右中興時人後湖居士蘓公庠字養直書簡帖六幅真蹟一巻予來京江顧瞻丹陽維公之居訪其後無顯者嘉定壬午正月而後陸續得此帖于好事家藏之以見慨慕焉贊曰其作字得東坡之骨而加以平實得山谷之體而去其越軼其應世接物得馬少游之善而持以卑詘故先生者施之長上居士者待其儔匹兄之又所以示其親且密意厚詞悉情真制質列之籖帙神采坌溢雖不識者亦將曰此隱君子之筆也蘇養直與四僧書簡帖七帖並行書第一帖十一行第二第三第四帖各十行第五帖十一行第六帖十二行第七帖六行庠啟使至辱手帖伏審即辰秋涼法候輕安庠賤生特䝉齒記及送夀香經疏至感至感來日千萬過此少欵已草草為具奉待也得乘早涼來甚佳匆匆不宣庠啟上山主先公几下來日更不須託故過此相聚半日為切望約南兄同來最佳庠上庠啟前者河上畧得邂逅次日甚欲一詣問訊應接紛然遂爾中輟豈勝悵仰比日諠濁不審法體何若見彦清云吾師確求一晝者作平逺欲以見與益見勤厚然不必如此得暇能拄䇿見過為閒齋數刻之欵乃佳耳匆匆不宣庠頓首觀音山主懐公几下初七日庠啟近得欵聞軟語為慰無量作别又已旬日懐向已深暑雨微涼想安禪無惱庠還山日幸粗遣南畝雖屢得雨尚未霑足然人心少安愈于前日無雨時耳乳泉必已復故近一想識惠建谿頗勝何時得再至泉上與公然鼎一瀹乎未閒珍䕶為祝不宣庠頓首觀音山主懐公几下十六日庠啟人至䝉示字具審即辰法體佳勝為慰無量乳香藏冰併荷走寄感怍何已極暑遂得飲冰一快何喜如之因出能畧垂訪幸甚不宣庠頓首觀音山主懐公几下乳泉南有土氣以憤怒之氣未平也一笑一笑壜􅀈回庠啟適奉問訊隨辱手帖區區感慰無已且審雨餘法體佳健竹萌銀􅀢頓爾叨貺珍佩何量豈獨琅玕滿腹殊覺光映七筯也如何得公過此同枯淡興味耶乳泉䝉諭乃如此豈泉上老人亦有步兵青白眼乎他日澄澈幸㩦一缶同試北焙早春也不宣庠頓首觀音山主懐公几下二籃同納芝山主曾否相見院中如此寛潔乃不肯來前日䝉委曲及之益見慈悲也稍涼能乗興見過試新茶乎因㩦泉來尤佳耳前者勞公有逺公之作實以熱甚竹輿觸熱而歸老病恐不禁湯水也必蒙垂察庠頓首見鄭助教且頓致意許見訪何日可來也庠頓首庠少懇芝山主昨日忽見訪適得渠院中報不戒于火一夕而燼可謂不幸其師孫已遭縲繋吾師能于何居士處方便一言觧此困厄亦納子慈悲之一端也率易悚灼悚灼庠頓首右蘇養真四僧書簡帖七幅真蹟一卷隱君子之與游游方之外宜也若夫跡似而名弗聞予意四僧之未足乎此也而帖得之丹陽數刹彼其嗣者知存而寶之以信于我予之意其薰芝染蘭猶有不泯者足以遺其嗣也輯而贊之以旌其所遇焉贊曰彼黃四娘詩于杜陵先南懐芝果何等僧視其與游尚或可喜于帖之存以識驥尾蘇養真留客詩帖行書六行戲成小詩留子靜兄庠上秋霜一夜到帖荷奈此南江秋色何蘄君未作一成去同聽竹牕鴻鴈過右蘇後湖留客詩帖真蹟一卷寶慶丙戌七月得之吳門僧惟永贊曰予在京江蓋慣識江南之秋一成之去而虚作十年之留也朱熹真書簡帖五帖並行書第一第四帖各十行第二帖九行第三帖三行第五帖四行尾批三行敦儒頓首再拜未遑繼請政爾懐仰辱手帖欣審甚熱尊履萬福承餉緑龜紫菓感佩珍貺副以回文鏡銘佛僊摹像投衴輟扇併得清暑區區皆需靣謝使還草草不宣敦儒頓首再拜序臣提幹奉議賢友座前合盌附還敦需再拜去嵗疾痛相仍春來方稍向平久曠音問惟增馳情敦儒居秀粗遣遂謀居于此相去不逺他日有從遊之便矣憂居想惟每事裝懐向熱千萬強飯為門戸自愛撥冗乘便草草布此敦儒再拜一姐孺人意不殊前二十六日晩幸相過也敦儒上敦儒再拜中問承惠書殊荷厚意公私衮衮不得即奉答甚媿也日來想已外除莫便赴行朝否佇聽新除也偶被旨往四明逼出百冗布此殊媿草草敦儒再拜一姐孺人久别喜聞安佳向寒更希將愛家中人都致問敦儒上承惠常筆何必及此不敢不愛極媿右紹興鴻臚少卿朱公敦儒字希真書簡帖五幅真蹟一卷中州遺老百年一人梅花清癯風流蓋與孤山相似幡然一出林宗之中墊矣帖尚足以見其意象之傳也贊曰洛陽耆英淪于朔塵三十年有人典型之存炙手絶倫一日之伸梅花兮繽紛孤山兮片雲葛常之犀表帖行書十行立方叩頭再拜又覆立方不望犀表忽已數年名徳之重不忘瞻仰竊惟知府朝議以文學政事受知廟堂不逺治封曰聞嘉績諒惟不待報政即有鋒車之召雖在哀疚不無徯望也立方叩首拜覆右紹興吏部侍郎葛公立方字常之犀表帖真蹟一巻予于葛氏帖所藏者三世此又嘉定己卯七月過舟吳門而得之者其無譌矣贊曰文康之學導其源文定之學濬其流三世之帖俱傳于予家其亦足以見植槐之志而占良冶之裘也歟蔣宣卿書簡帖五帖並行書第一帖八行第二帖二行尾批二行第三帖十二行第四帖十七行第五帖十五行伯愚知縣朝奉仁妷為别頻年不勝思渴冬寒惟所履佳勝比辱書并附陳提舉書已具報矣思今杜門鄉落無足言者但半生出仕歸無屋宇不免結廬以安老稚衰晩勞費可厭也聞甲第雄麗恨未得一拭目耳正寒萬萬加愛不悉二十三日璨手啟閤中孺人郎娘以次一一安佳道服甚煩惡念也維揚常得安問骨肉謝念問附伸意也璨上衣著二匹酒四斗希知到伯愚提宫朝奉仁妷即日惟所履佳勝思渴思渴顯親大蘆行兩地附問當無不達少意乗此乍涼決欲至府得㑹見以慰問别偶一二處假舟值出專走此介擬借仙舟一求庶幾途中得寛穩之適不識可否或辱應允仍借駕船人即得頤指就路尤幸但煩聞為媿他皆面言尚冀愛衛不悉十九日望手啟璨再拜啟昨日水衡出為江西常平宫靖康之初併罷是時初遭變故逺方恐駭二年間軍旅洊興身履危難既解秩便欲挂冠養病偶有召命遂至廣陵初差湖北漕繼改江西未到間寓居高安敵騎奄至竄伏山谷㡬年貧不能給有肇慶之除且還毘陵及錢塘忽差臨川到官半年大軍經行逋寇侵迫㡬不能保州邑既幸苟免目前無苦重事即丐宫以歸寄食親舍去秋被召賜對叨冒郎省未閲月得天台已而報罷雖祠廟不敢請忽䝉收用分符于此自惟衰頓退黜無􅃨出仕意而朝廷已行之命不敢辭到此殆半年矣兵火之餘廢法病民之政上下一律故于整革寛猛之際尤為費力老矣不能堪事但民社所寄不敢不勉耳通問故人自當縷縷亦恐要知也璨再拜啟璨再拜啟承居里社極安穩真是第一等福人璨從仕三十年無一梨之地一椽之居世故如此不比平日一旦緩急叩人之門猶有應者今但可為三篾束腰忍饑計耳自謀之拙如此故人聞之應發一笑村居堂有五字句云翻燕巢泥急喧蜂密蘂忙飛嗚俱有役時節豈相忘餒也思儲粟衣兮欲樹桑謀生吾若拙已矣鬢毛蒼又云掃軒容榻穩洗竹進風清樹繞扶疎夏山開錦繡晴屢空無足食多壘未休兵酒薄從深酌憂端或暫平可見懐況也專此馳問繼是别上狀庶不輟往來之信為慰耳璨再拜右紹興户部侍郎敷文閣侍制蔣公璨字宣􅀸書簡帖五幅真蹟一卷中興而來簡札曰趨于文降而不返真隨以亡思古之君子于是亦可以觀百年之流風矣帖得之義興吳氏寶慶乙酉之二月贊曰盧山之下仙佛之廬多公題扁予熟其體矣而今見其帖大抵小則遒而大則婉豈所施有異而筆法亦隨以變遒而不流于介婉而不失其健予猶愧乎知書之淺寶真齋法書贊卷二十二
