body:
  text: 寶真齋法書贊卷五宋岳珂撰唐名人真蹟歐陽詢陰符經帖楷書二十七行經曰觀天之道執天之行盡矣故天有五賊見之者昌五賊在心施行于天宇宙在乎手萬化生乎身天性人也人心機也立天之道以定人也天發殺機移星易宿地發殺機龍蛇起陸人發殺機天地反覆天人合發萬變定基性有巧拙可以伏藏九竅之邪在乎三要可以動靜火生于木禍發必剋姧生于國時動必潰知之修練謂之聖人天生天殺道之理也天地萬物之盗也萬物人之盗也三盗既宜三才既安故曰食其時百骸理動其機萬化安人知其神之神而不知不神之所以神也日月有數大小有定聖功生焉神明出焉其盗機也天下莫不見莫能知也君子得之固窮小人得之輕命瞽者善聽聾者善視絶利一源用師十倍三反晝夜用師萬倍心生于物死于物機在目天之無恩而大恩生迅雷烈風莫不蠢然至樂性餘至靜則亷天之至私用之至公禽之制在氣生者死之根死者生之根恩生于害害生于恩愚人以天地文理聖我以時物文理哲自然之道静故天地萬物生天地之道浸故陰陽勝陰陽相推而變化順矣至靜之道律吕所不能契爰有竒器是生萬象八卦甲子神機鬼藏陰陽相勝之術昭昭乎進乎象矣黄帝陰符經貞觀十一年丁酉嵗九月日書與善奴上清大洞三景弟子内供奉道士張平叔題此題係隷書右唐太子率更令歐陽詢字信本陰符經真蹟一巻楷莊而勁嚴而有法紙古以香態嶮而絶真歐筆也書與善奴又與右軍寫樂毅論賜大令者同一體製按率更之子曰通字通師官至内史號小歐陽亦以能書稱淳化閣帖中有所授筆訣亦云付善奴即其人也予壻陳天澤以寶慶乙酉五月見之中都知予篤好傾行槖購之以遺予有小璽在卷後贊曰内史書如率令善奴秀比官奴千古會稽楷則于今重見陰符陳子昂無端帖草書六行道既不行復不能知命樂天又不能深隱于山藪乃亦時出于人間自覺是無端之人况漸近無聞不免自惜如何右唐武后朝右拾遺清邊道行軍總管府軍曹陳子昂字伯玉無端帖真蹟一卷有小璽在卷端并米芾審定真蹟半印一古半印四書無始末因筆陳志而已得之與昭陵册文同時贊曰麟臺正字垂拱臣手持鴻筆扶金輪喔咿自擬教牝晨尚欲圭璧全其身筆精墨妙雖有神千載乃作無端人以人廢言古所聞尚可展卷書吾紳裴行儉衛公帖草書四行因檢文字見衛公論定襄用兵之勢歎服不能已行儉右唐金牙總管幽州都督裴獻公行儉字守約衛公帖真蹟一卷唐世名將公在甲乙選而以草隸名家嘗自歎曰褚遂良非精筆佳墨未嘗輒書不擇筆墨而妍捷者余與虞世南耳所撰選譜草字雜體至數萬言後為武后詔武承嗣就第取去不復行于世此帖葢追寫李衛公兵事也不特妍捷之態信其所言而用兵節度心融神契葢與衛公同一軌轍高宗謂文武兼備非公孰能當之張懐瓘書斷第公書法入能品信不誣矣幅紙之藏千載如對書入紹興御府拊髀之意寓焉嘉定戊辰嵗二月與懐素千文同得之官鬻者贊曰營陣部伍妙盡四十訣而不能忘情于前輩之遺轍草字雜體多至數萬言而僅能傳信于後世之一編古人用心豈徒自賢精思以求全隨所寓則然使用心皆如是則字法之妍何患乎不如其言今世之愚自謂兼善䕶前以矜名欲獨擅豈知公心靡恃靡夸我藏此書以愧坎蛙崔融荷華帖草書十行内長者字平起荷華想已殘處此過四夏到彼亦屢而獨不見其盛則是亦可訝豈亦有縁􅁘敝宇今嵗植得千葉者數盆亦便發花相繼不絶今已開頗有可觀恨不與望雖不逺披對邈未可期伏紙可勝悵惘耶右唐中書舍人崔融字安成荷華帖真蹟一卷筆勢洞精紙素古雅鳯鶱騠驟寔為竒蹟融本文士筆法不多見開元中張説常與韋堅論近世文章謂李嶠薛稷宋之問與融之文如良金美玉無施不可固篤論矣攷之此帖豈翰墨之妙其得于天者亦與之相表裹􅁘寳章之序武成之觀積千古之見聞攷一時之期屬固已知深于書矣印以小璽并古半印二不可辨嘉定癸未嵗十二月得之嘉禾王希吕尚書家贊曰六郎之風姿秀于清池初日之華㽔流景發暉種玩之誰宜有美人兮掞胸中之竒筆下其似之賀知章事宜帖草書三行以諸人不至今日自當得事宜諸人何為不報也國老題右唐秘書監贈禮部尚書賀知章字委真事宜帖真蹟一卷鏡湖老監以能書名固已見于李白之詩竇􅡄之賦今觀其帖高逸豁逹乃爾精絶益信開元盛時文館十八學士俱足以追貞觀之遺風歐褚清塵尚可及也帖有小璽葢蘇耆家舊藏有國老題字開禧乙丑嵗三月予在京口得之故簮紳家不欲名贊曰讀騎馬之歌而知其人之曠逹觀換鵞之詩而見其時之尊慕閲集賢之畫而識其像于後世拜千秋之祠而想其高于前古稽山之雲方霽鏡湖之月初吐一曲浩蕩千一呈露是不惟足以忘世間之塵紛而亦可因以攷筆端之風度也顔真卿朝迴帖行書六行不審所苦何如奉計已痊復真卿縁馬病朝迴已乏未遂馳謁謹勒參候不次真卿狀上李太保大夫公閣下右唐太子太師贈司徒魯郡顔文忠公真卿字清臣朝迴帖真蹟一卷文與秘閣帖相似而小大不同公忠節貫穹壤筆法冠古今胷中所存凜凜不屈筆下是以言言如生百世而下尚可拜而仰也帖本家藏無得書嵗月贊曰公之素守日烈霜嚴公之大節斗揭巖瞻筆勢所存心畫可占八法具體匪柔匪銛庶彚流形如鶱如潜坱圠是似端倪孰覘人以藝進公以徳兼凛其高風氣壓萬籖公神在天公書在奩繫贊以藏震于壬憸徐浩謝賜書帖楷書七行尾批一行臣言伏奉詔書賜臣漢故南陽郡太平鄧恢素書一十五行竒跡逺至臣孤見寡聞所未遇臣當臨倣兾日進益不任欣戴謹奉表以聞臣誠惶誠恐頓首死罪惠于必省之案此五字即所謂尾批一行然文義不可解當有脱誤昌朝觀于許昌郡齋癸巳五月楷書兩行陳表自揚携此書并魯公帖來見過時在白沙溫陵明父行書三行温陵明父字元係分注字圓熟而行筆工巧其人存心未可知也元祐三年十一月十四日熟中題楷書四行明年寒食元章倦游閣觀行書兩行晏元圭張彦通張敦叔同觀于禪居寺元符庚辰楷書一行元符庚辰字元係分注沈括存中觀于百花堆元祐五年季春十九日書行書兩行元符二年八月二十四日髙郵道中觀濓溪周壽元翁小楷一行阜嘗就觀己巳秋八月題楷書一行崇寧壬午孟夏李秉文章君邃同觀于泗上通守公宇中獨秀峯前小楷兩行右唐中書舍人尚書右丞集賢學士副知院事國子祭酒㑹稽郡公徐浩字季海謝書帖真蹟一卷有御府印一古半印二本朝賈曾二相光元章沈存中諸公皆書其後按史傳浩以八體名天寶至徳兩充訪圖書使能精而見博固後世之所莫及而浩之祖九隴縣尉師道父洺州刺史嶠之真行草皆名冠古今無與為比源長流浚又非淺學得以易窺信帖傳至今為可寶也嘉定庚辰嵗二月得之郿塢贊曰南陽素書浩之所珍而本朝觀浩之書又皆以為絶倫今視諸賢之跋凡十有三人嵗月幾何又不能髣髴其清塵書意日新而迹日陳白首之攻庶幾信今張長史春草三帖六行凡三本春草青青千里餘邊城落日見離居情知海上三年别不寄雲間一雁書旭書隱之昇元年十一月日重題印文房檢㸃銀青光祿大夫兼監察御史臣陳遵鄴文房押司官銀青光祿大夫兼御史中丞臣楊徳綸文房副使銀青光禄大夫兼殿中侍御史臣周承望文房副使銀青光禄大夫兼御史中丞臣邵周崇英殿副使知崇英院兼文房官檢校工部尚書臣王紹顔又二帖同前唐張顛春草詩一外籖古經紙上御書墨字一内籖青絹上御書金字右唐左率府長史張旭字伯髙春草詩三帖真蹟各一卷其一得之中都本江南李氏故藏有建業文房三印并古印二文房官職銜鴈行于左刻在御府帖中其二得之京口鍾氏卷左亦有文房印識二古印一并續卷後縫有小璽七其三得之忠訓郎苟夢玉苟使䝉古還至雲中以香荈易得之祐陵金字宸奎在焉首尾著政和宣和八璽亦有内府圖書璽予按長史以草聖得名葢其天真爛漫妙入神品而非榘矱步武者比前後所見大體如是然一詩三帖豈伯髙平生于此篇毎切寄意正猶大令作洛神賦人間合常有數本之比耶一以神雋稱一以法度著又何其不同也最後一軸則類後人所模倣者睿思外庫如儲宏輩固不可以賞鑒期所以例霑壁跗之寵殆以此故雖然既列天鑒矣詎復可以淺識汰彼其嶄然露頭角者亦自不可掩也因存鼎峙以俟知音贊曰䕫作八音莖韺咸雲婁辨五色朱紫𤣥纁偉絶藝之天成隨所施而冠羣既運斤而薦巧亦端委而長身或有若而闕里或蔡邕而虎賁是其同者體而不同者神藻繪既後素笙鏞無奪倫夫是之謂寳真張長史秋深帖十行帖首秋深至復字行書氣力字平起秋深不審氣力復如何也藏弊何知可論河南送物人近來得京中消息承彼數年不熟憂懸不復可論不委諸小大如何為活計幾日有京中信使知之當數報委曲耳右唐張伯髙秋深帖真蹟一卷按寳晉書史云真蹟四帖在杭州陸氏大姓家舊有五帖第一秋深第二前發第三汝官第四昨日第五承湏今所存四帖汝官後有一古印文訛不可辨昨日承湏二帖小襞紙也陸氏子素從闗景仁學闗因借摹三大帖余昔見石本于闗中宋氏及官桂林闗杞為使者語及始知石在闗氏又五年官潭闗把通判邵州以石本見寄又三年官杭而闗景仁為錢塘令因陸氏子登第者來謁與謝而閲之獨失秋深第一帖詰之顰蹙而言嘉祐中為太守沈文通借閲拆留余遣工摹餘帖即歸詰文通弟遫時為郡從事乃云在其姪延嗣處遂得閲徐購得之即是書也慶元辛酉嵗八月有鄂州姚氏嘗以西班仕孝宗朝乗軺按刑酷好帖字其家不能保故余因試漕臺介僧徳荗得之有古縫印及印迹可見者四并小璽在卷尾贊曰煒五帖兮迨今信第一兮秋深彼伯髙兮書滛人爭取兮千金攷步武兮可尋付纖穠兮何心嫓闗沈兮鳴琴尚海岳兮知音懐素千文帖一百八十五行内稱鳴毁彩明給又蓻素要任陋十二字並楷注内彩字又草注千字文敕員外散騎侍郎周興嗣次韻天地𤣥黄至焉哉乎也文全國老題行書右唐僧懐素字藏真草書千文真蹟一卷予嘗得内府舊帖此書在首卷中筆勁墨妙傳付甚真嘗動天鑒襄陽米芾元章著寶章待訪録其間第三十五事特載此書係絹本藏蘇液家有沈文通刻板本行于世後入章丞相子厚家又見于書史液葢太簡參政曾孫而耆國老之孫藏書精鑒為本朝第一今卷尾有國老題字及有武功印十九半印四皆蘇氏遺蹟又曾入山谷家後自御府賜貴臣有山谷與貴臣家二印并一小璽在焉按朱長文續書斷素長沙人自云嘗觀夏雲隨風變化頓有所悟遂至妙絶如壯士拔劒神彩動人顔魯公嘗有書云昔張長史之作也時人謂之張顛今懐素之為也僕寔謂之狂僧以狂繼顛孰謂不可耶其定著入妙品今視信然又按羣玉堂帖别有千文一卷亦稱素書與此敻異豈游戲翰墨隨寓輒寫其所出不一耶王大令之洛神賦張伯髙之春草詩筆塚用工之深殆不應出其下層見疊出固應爾耳嘉定戊辰嵗二月予既多得官鬻帖將歸有界南貨繒絲孫氏者射請囊帛得此書于故衣袽中予以二萬錢取之雖絹素塵暗而神裁軒翥如非烟卿雲輝煥九霄宿霧晨靄益助妍態真可寶也贊曰鵾鵬徙海龍蛇起陸思妙天隨神鍾鬼哭垂露在手非烟眩目錦紱瓊機光我韞櫝懐素秋風帖十二行此相遇極慰積心人情逼深江事來甫爾遂不果欵悉海案帖首及江字上下海字上下俱有闕文我有數行淚不落十餘年今日為君盡併灑秋風前右唐僧懐素秋風帖真蹟一卷草法入聖精藝無敵紙素亦蠧朽不可觸絶匪後人所能逕庭者著以御府印慶元庚申十月予來建康得之士人張琨家後二十四年卷軸經屢閲皆畟畟碎斷始以癸未嵗十一月重裝于維揚因取而贊之贊曰憭慄之秋騷人所悲彼僧何為乃寫以辭絶藝出塵亦寄焉耳雲烟蒼茫在此幅紙懐素律公帖九行貧道頻患腳氣異常憂悶也常服三黄湯諸風疾兼心中常如刀刺乃可處方數日服不然客舍非常之憂耳律公能枉步求貧道顛草斯乃好事也奉凂不盡垂悉沙門懐素白右懐素書律公帖臣米友仁鑒定真蹟恭跋右唐僧懐素律公帖絹本真蹟一卷凡帖非有意于傳也遇事而作合乎天真過是弗復可得矣兹帖也以問疾為酬答託諸好事寓以縑素固非無意于傳也天真之合雜草而行隨用無别則其所造非逢原自得者疇克爾哉按寶晉書史安師文家懐素絹帖三本此為第三元祐戊辰嵗安君㩗至留米家月餘臨為乃還後有呂汲公大防已下題今歸章子厚即此本也紹興間嘗入九禁遂命米友仁鑒定雖言其真而不及寶晉篤好之詳豈不之攷耶吕跋不復見矣小璽繫識于後又刻在御府帖中繼賜貴戚因遂流傳人間淳熙丁酉得之中都先君手裝贊曰噫懐素善草書雜真行世所無妙之臻理不殊盍反觀同其初叚文昌秋氣帖草書六行總不得書何為如此秋氣稍冷不知當如何也有華陽消息可報委曲十四日報右唐御史大夫叚文昌字墨卿秋氣帖真蹟一卷按唐世搢紳家以上逹下其制相承名之曰委曲葢今之批示也迄于國初猶多用之史傳所書如髙駢輩類不止一見此帖葢當時授其家隸者前有古印不可辨小璽并一小印在卷首尾得之嵗嘉定庚午月黄鍾日中澣售者江陰王氏贊曰唐世士大夫委曲之逹下多矣而曰此獨存其用情則通而真其下問則仁而温其字體之竒縱入神猶在所未論也於虖辨分有倫待人以身風俗其淳我思古人裴素明日帖草書八行裴素制誥書寶厯元年楊嗣復相公下及第更不知聞是何薄情也明日為吾人請假一日具空繪袛望候捨却他事早見訪也更無人惟有崔十學士此走狀不宣素再拜二十一官郎中使君閣下二日右唐知制誥裴素字明日帖真蹟一卷唐固多竒蹟如素亦未以能稱而可見者如此亦足以知其習俗之不凡也嘉定辛未嵗九月予因上澣過壽星山與客訪古有僧録壽者逮事髙廟多蓄名帖購得數紙以歸始末著五印按宰相世系表素系出東眷冕之姪冔之子云贊曰有王茂宏之筆勢予非取其麗從容而大肆巧者以愧尚庶古意唐史惟則篆千文帖一百一十八行尾記一行帖首五行絹素斷裂有字不全處内民淵基旦治幾機機字並當是避唐諱云果珍李柰至焉哉乎也河南府陽翟縣丞史惟則書八分書一行右唐殿中侍御史史惟則字篆千字文絹本真蹟一卷上有九古印髣髴可識者曰清河徳異圖書縫著内殿袐書等印六經賜李氏嘉㤗甲子十二月李保大孝純餞予之官京口以為贐按惟則在法書家以能篆名竇􅡄述書賦有曰心復世業階乎籕篆古今由中大小應變如因髙而瞩逺俯川陸而畢見朱長文續書斷又稱其與韓擇木蔡有鄰李潮四人皆能八分擇木為妙惟則亞之而有鴈印平沙魚躍深淵之評今此書前以篆後以八分葢兼有之矣集賢注記謂是開元時人嘗以二十年三月自吏部常選入院待制仍校理述書賦續書斷又謂嘗為伊闕尉後至殿中是帖結銜乃云河南府陽翟縣丞不著嵗月其在入院之先後皆莫可攷然觀其書法竒妙得雅趣所謂待制殆以善書備諮訪耶昔唐懐素草聖自序藏蘇泌家亡其卷首一幅其文集賢校理舜欽補之今在淳熙袐閣續帖中字態如出一手幾不可辨今此帖亦不存前幅安得如滄浪之書者為我成之斷珪瑕璧虹氣猶在顧亦可寶也已贊曰􅘴學在唐陽冰一䕫彼秩八音各有工師斯帖之竒體微而具何以譬之磬襄鼗武寶真齋法書贊卷五
