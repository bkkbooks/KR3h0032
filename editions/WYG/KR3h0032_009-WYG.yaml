body:
  text: 寶真齋法書贊卷九宋岳珂撰宋名人真蹟徐鉉小篆千文帖四十七行千字文敕員外散騎侍郎周興嗣次韻天地𤣥黄至焉哉乎也徐常侍字學與郭忠恕同時當代無出其右書學博士米芾題行書三行徐騎省書次韻髙古足為近代之冠然世多大字而此特謹小尤可珍貴政和元年二月晦王一卿題李平叔預觀焉篆書四行右太平興國散騎常侍徐鉉字鼎臣小篆千文真蹟一卷崇寧書學博士米芾繫而傳之故藏待制趙明誠家流傳有三印識亦有小璽自倉籕之學日趨簡便寥寥數千載罕嗣絶響鉉嗜古根性跨斯軼冰國初以來一人而已嘉定甲申嵗三月婺將張松書來遺予具寫所授贊曰於惟騎省神藝造古獮璇窟吸蜍銀浦千文爰襲百體具舉慶雲澄靄清風垂露鳥跡觀象魚書辨魯倉創籕述嶧夸咸詛如周金版如岐石鼓製比邈健勢窮斯嫵游史遜妍冰書挈度悠悠千載孰是去取寥寥幾人他莫比數世遺趙璧寶及康瓠矉心何尚徵睫何睹表而出之光我書府徐鉉篆五栁傳帖篆文三十三行尾記四行又李復主尾記一行用界行紙破行書五栁先生傳陶淵明先生不知何許人不詳姓字宅邊有五栁樹因以為號焉間靖少言不慕榮利好讀書不求甚解毎有㑹意欣然忘食性嗜酒而家貧不能常得親舊知其如此或置酒招之造飲輒盡期在必醉旣醉而復曾不吝情去留環堵蕭然不蔽風日短褐穿結簟瓢屢空晏如也常著文章自娛頗示己志忘懐得失以此自終唐保大二年六月望日東海徐鉉因游簡寂觀書送勤政東院収籍李後主楷書右徐鉉篆晉靖節先生陶潜字淵明五栁傳真蹟一卷簡寂觀在匡山之下予所躬厯幽靚雅宜為子墨客卿逸興之所寄卷有鑑寳齋印四末有半印二前一印葢流傳人間所用者其後又有勤政東院之籍建業文房之篆鉉為當時臣已見貴重益信絶藝之無古今也御府印著其下金題玉􅉜其有光焉嘉定甲申八月予得之建康檜家贊曰晉有逸民樂天不憂唐有遺臣嗜古好修或夷惠之儗倫或斯冰之與儔炯松姿而筠操又鐡畫而銀鈎集二妙之全美接千載之風流載酒拂石尋壑經丘吾將抱此而為栗里之游李西臺漕運帖行書十二行尾批四行建中啓漕運所繫道路云遥乆疎話言但生鄙恡仰惟政教在理翰墨攄懐以時必奉于急徵體道更資於善攝翹祝誠抱萬一寧宣即佇回音用諧披覯謹奉狀起居不宣從表直集賢院李建中狀上鎮海書記員外十月二十三日少事咨聞近知學生兒自鄧州來歸恐相次到餘杭請差人馳此記事分付縁只令且住杭州廨署内無令更過浙江來奉託建中白右淳化工部郎中李公建中字得中漕運帖真蹟一卷嘉定癸未嵗二月得之京江國朝以書名家葢昉于是贊曰國初自熙陵右文尚古時有二臣曰李得中蘇太簡亦篤好焉得中自西臺御史踐奉常綱羅放失其書滿家太簡以參預部彚中秘書萃諸僣偽國所藏天睠甚渥錫予寳章無算然得中翰墨入神品世所珍秘太簡無傳焉今視所書良信予嘗聞近世有言淳熙九卿中有好法書竒字者博雅之名滿天下而字甚惡客或謂九卿當今世亷吏人問其故則曰蓄古書蹟充棟而一字不入已非㢘謂何搢紳傳以為笑質以斯言得中其㢘耶否耶識者必能辨于此而後足以見西臺之書體是為贊李西臺淮潁帖行書五行建中白淮潁之郡事頗不繁寒凉之風嵗且易得加乎懶慢其性老大其心尺牘裁書為禮甚闕學士敦夙昔之舊抗知己之懐時因北風猥賜嘉問下慚固陋但感殊憐仰惟步武丹墀遊心書府佇當陞于兩制仍免試于五題側耳明恩永言多賀豈勝睠睠之䖍禱也調䕶谷神用協景福謹奉狀諮問起居兼道謝意不宣尚書金部員外郎直集賢院知潁州李建中拜上秘閣學士八月十日謹狀李西臺遺墨余頃覩于朱希真先生之室今獲再見何處不相逢豈但人之一生耶殊深感慨嘉㤗甲子季春己巳清林王明清仲言父題小楷三行右李西臺淮潁帖真蹟一卷帖本藏朱希真少卿家王仲言跋其後嘉定戊寅六月得之嘉禾贊曰昔之能書為世主所疾故或用崛筆西臺此蹟又何必出于此要是不擇而研别有其術聊欲自許以虞裴之匹厯乎希真之寶殿以仲言之述是固一世之竒物也李西臺啓詩帖啓楷書十五行詩行書十一行朝㪚大夫尚書工部郎中直集賢院權西京留司御史臺上輕車都尉賜紫金魚袋李建中右建中啓府吏自東京迴伏䝉侍郎集賢學士惠顧下臨寵寄仍厚内處新賜範金表其成規鄴中故臺合土得其遺物兼包詩筆併耀身章交光垂御史之衣抱璞入幽人之室等琴髙之控鯉愧預仙才效葛洪之著書頗增道氣永言佩戴何止鏤銘謹拜啓謝伏惟尊慈俯賜鑒念不宣謹啓九月二十六日李建中啓上郡齋偶書寄同院彭城學士兼簡兵部同年采覽建中上閒情閒憶事如空靜讀離騷向郡中冠劒老年傷逺别闗河夜月許相同晚花天氣孤莊雨流水人家小閣風行樂及時聊強飲不湏嫌作白頭翁劉聖可延安幕府中會張仲微楊如晦蔣仲和賈習之晁伯以同觀歎息斯人清徳絶俗閉目焚香之餘世人但玩其詩筆耳正和甲午孟冬二十八日記南渡以來法書名帖多值火厄僅有存者如西台遺蹟雖汴洛故家不一二見今蔣氏所藏詩文兩軸辭藻爛然筆勢遒婉葢未易得也紹興辛酉季秋癸亥淄國趙伯牛仲微父題于清江傳舍右李西臺謝金魚銅雀硯啓寄同院詩真蹟一卷有藏書家付授半印十一政和延安幕府嘗著跋語南渡後趙仲微題識二印繫焉帖故出無錫蔣氏開禧丁夘四月贖得之為錢五萬云贊曰予于是帖有感者四館職在外于學士不繫細銜于帶職者皆曰同院意親情洽所以見前輩之篤風誼也内賜金魚葢出新寵帶職者乃從學士轉致又雜以他寄焉所以見上恩交情之俱無内外也謝學士以啓而用楷法寄同院同年以詩而用行書又以見待人處已雖小節皆有體也承平幕府得一佳帖相聚以觀又以見時清事簡雖邊圉亦得以從容于文藝也於虖詩文之傳幾人于兹獨于此書有感有思流風之存妙墨之遺什襲是宜維以詩之李西臺退居詩帖奉酬楊少監見寄退居遣興之什賢哲道相扶經綸本近侍風雲如有會霄漢寧無志月窟桂抱林紛闈丹漆地一何華組束而謂浮名遂堆積圖史書朝昏鉛槧事登瀛才力劣對問神魂愧步驟古人蹤含虚君子器獻言既無狀出守連移次持憲懐真剛退藏生寤寐欲邀丘壑老靜作樵魚帥顥氣留丹田尺宅分品位寥寥洞府境落落煙霞意金簡題上清與兹塵土異右李西臺酬楊少監退居詩帖真蹟一卷楊少監者不知為何人知止不殆樂天自適斯亦君子人矣帖有藏書家半印三寶慶乙酉七月在京口得之勘其印識皆與蔣氏詩啓合豈元出一家耶贊曰以退藏心邀丘壑老唱酬之間意已足攷我以倦翼故應知還髙躅凛然庶幾是攀李西臺春盡詩帖行書九行春盡偶書七言四韻奉呈采覽建中上粉闈丹地白頭身書殿分廊遇直人不怕花枝驚老眼可無詩句送殘春因嗟紅影隨風去猶為青叢遶檻頻更把華燈照深夜一年情味隔音塵右李西臺春盡詩帖真蹟一卷予既得退居詩已又同時得此帖亦有半印似同出蔣氏而售者拆取以為一再取貲之媒者因同褾之而疊書贊語于後贊曰書殿寓真從容翰墨此固祖宗之所以待館職然三館之置舊在右掖紅影青叢有此遺跡百年黍離應不可復識矣覽事攷時于以想見藝祖之開闢悵觚稜之北望又不覺掩卷而繼之以嘆息也宋素臣惜别詩帖行書十三行再吟一首幸采覽翰林學士承㫖金紫光禄大夫禮部尚書知制誥上柱國宋白上年來又惜别清塵故國榮過喜氣新竹葉莫辭千日酒梅花惟寄一枝春苦心曾未抛黄卷得路終期近紫宸不待政成迎鳯詔頌聲洋溢桂州人右咸平吏部尚書贈右僕射宋文安公白字素臣惜别詩真蹟一巻公以文學事兩朝頌平晉之偉功擬唐相之榜子葢嘗以之簡九宸典兩制文詞翰墨固宜名世詩篇特餘事耳紹定戊子六月得之吳門贊曰桂州之帥予莫知其為誰也盍簮得朋其必有以稱此詩也黄卷之苦心意其樂之真足以忘疲也若夫屈伸則有時也而豈以是為富貴之資也得路之終期予固未免猶寘夫疑也林和靖木犀帖草書四行木犀囗換子一株後囗囗囗迥地上濶種之囗口切摘些木犀右本朝和靖處士孤山先生林逋字君復木犀帖真蹟一卷予生平不識先生字畫紹定戊子二月己巳得此帖于平江張君棟所亟羣玉堂帖視之筆法良信噫先生之節髙矣而筆力之髙亦稱耶贊曰青山之詩自喜其無封襌之書其絶塵之髙風葢夐乎不與世俱也而木犀之帖得于予託種藝以自娛是不特為梅花之癯霜清月明金璨玉疎二香郁如予將依其陰而結廬林和靖詩賦登科二帖並行書各九行逋奉簡大郎秀才前日辱賜惠訪仍示詩賦二通繹玩之暇歎羡寔多泥雨阻艱致謝稽晩所諭入山之期十一月初一日巳時甚佳謹馳此諮道不宣逋頓首逋頓首譙國秀才乆不披奉體履佳勝否中間所許為借文書至今杳然如何如何今仍有一事咨撓唐登科記為檢咸通中試被衮象賦此一冊畧賜借及即便馳納特走小簡致意諒悉為幸不宣逋呈右林和靖詩賦登科二帖真蹟一卷夫􅆯獵者弗課于竿餌坐賈者不謀于輪轄趣向既異用隨以殊此人情之所同也孰謂校藝之程文決科之陳迹亦復足以動煙霞之痼耶帖得于開禧之元八月時在京江售者邢麓贊曰孤山之青百世一人如二帖者夫豈曰不甘于隱淪哉古人用心惟其任真抱道自我用之在君彼英雄之入于網羅固足以自致于風雲予寧以一身獨處于寂寞之瀕要亦不忘乎吾道之伸也於呼行怪自絶聖門予意先生之所以為是特立之操者葢將為國家增九鼎之重而區區之心其亦望羣材之自見于當時之經綸也歟陳文僖上虞帖行書十行上虞素出四𦂳紗欲煩置一端慮公不見允不敢寄錢去果或相諾即後便寄錢或銀子去次然得絶佳者為妙或欲以所直置蘇物及留太君處皆可也然亦無固必可否俟命而已彭年上右大中祥符參政右僕射陳文僖公彭年字永年上虞帖真蹟一卷自登封而來符瑞應圖牒者以數千百計上廣帝恩下順民欲公之功居多然格心之用亦少貶矣一紗之置委曲鄭重如此又有以攷先朝士大夫約素之風焉帖之得實與王文公帖同時贊曰論字體以人論人材當以世如公得君祥符盛際雖未得剴切之骨骾已可想清修之風味意其鴻藻麗筆淳風素履發揮于聲名文物之間自足以為希世之瑞正不必徒為傅會以啓後世之議也張文懿珍果帖行書八行士遜啓乆不拜奉豈勝傾渴猥承手字兼貺珍果銘紉記憐莫殚比述大禮在近諒多榮頓不宣士遜拜手都知太傅坐右右康定宰相太傅鄧國張文懿公士遜字順之珍果帖真蹟一巻慶元己未嵗六月珂在中都得之士人司馬若谷家偉矣哉明哲之髙風也仁皇方開至治以師臣之禮待公秉鈞在朝納政就第進退之節雍容可攷葢自相位謝事在東都時惟公一人實垂芳史冊翰墨所藏猶足以想其福履勲名之盛固不容無述也卷末藏書家印二所謂都知太傅者葢先朝清議尚寛外庭北司猶相往來云贊曰以帝傅從赤松有榮名華厥躬超二疏列三公瞻中臺祖上東煥衮舄樂鼓鐘壽九袠天報豐思其人想清通觀筆法猶雍容呂文靖亭候帖行書十三行尾批四行夷簡拜白伏念亭候匪遙風煙在望忽承公翰尤認撝謙忝事契以稠重辱顧盼之優厚過䝉踈鄙但切悚惶微霰戒寒嚴飈赴節倍希愛重即副僉求企詠之私旦夕于是謹奉手狀叙謝不宣從表弟兩浙路按獄吕夷簡頓首歙州通理同院十一月十六日貴眷必計康又郎中大夫已進發到秀州甚安歐陽同年因致意右慶厯宰相中書令許國吕文靖公夷簡字坦夫亭候帖真蹟一卷珂晩學再仕于朝生三十有一年而始識公書僅得一再閲如見瑞雲澄月于慶霄之上敬而望之弗敢有也又十年乃得公此帖而寶藏之始克慰此忻慕巻有藏書家半印二得之嵗月與夫次序則具贊語云贊曰嘉定乙亥珂丞軍器居于寶蓮鄰有善士曰范擇能實祖太史百年相承文獻攸萃暇日啓鑰抉竒出袐有三軸者實公程藝捧玩再拜始識公字丁丑禾興刻寘官寺􅀥肥失莫盡體勢粤來維揚嵗在癸未客出公帖相示嘆喟如昔所見毫髮畢似于翰墨間更著風誼客謂此書伐木無愧亟以歸我備名臣體瓊函錦繰明牕裴几時一展玩若鏘劒珮是嵗七月日維乙巳淮海堂下清陰蔽芾我時受藏午暑猶熾月紀嵗合時又其位于日之吉與初覽對載見載識若合符契豈非天耶尚勿失墜范文正問醫帖行書十二行仲淹啓人回領誨字喜慰喜慰目疾尤不可急治湏漸漸退急則傷之也補藥不可熱熱則損目亦要和之也卻湏惜直氣以補之或要出外勾當亦足以就醫更請相度多愛承所要藥并醋今送去醋大熱損眼患人喫之立有效且學喫淡食不能即以水和之庶減毒力請問醫者不宣仲淹上師魯舍人左右二月三日右慶厯參政范文正公仲淹字希文問醫帖真蹟一卷國初人物胚腪渾厚柔嘉易直不露圭角殆更百年而公始揭忠勁之準興㢘恥之維以砥礪之于是搢紳靡然知所宗向氣節風誼凛凛可觀所謂富貴不能滛貧賤不能移威武不能屈質之孟軻之言公其有之矣遺帖所在神物呵拱豈曰翰墨云乎哉帖以慶元庚申十月得于蕪湖士人張鴻遇家贊曰元氣在天日星繋焉骨骾在身四體恃焉王國之幹公實似焉有煒翰墨抑其細焉是書之傳自尹氏焉厯年雖多人爭毖焉彼名家者衆或棄焉脅肩夏畦亦何利焉一卷之師覽者愧焉蔡忠惠書簡帖十一帖内第四第七帖楷書第六第十第十一帖草書餘並行書第一帖七行第二帖十四行第三第六帖皆有尾批各十行第四第七帖六行第九帖十一行第十一帖四行襄至南閩乆縈微恙動即經年輒廢書牘冬候乍寒襌體輕利否懃上人者遍遊山水佳勝之致今將北歸道過故鄉因問動靜十月十九日襄白寶月廣上人襄啓今日遞中奉教審尊候安豫喜慰之極淝上當閩北途兵卒時有往還者稍平安即當寄聲福唐但寂寞無朋游耳昨以疾懇求興化庶其事少可以養疴至今未得報若不得請今嵗亦將滿二年即求早罷且歸鄉闗侍親絶慮怡神去其病根儻或遂安復從仕矣大意如是不敢不盡也襄上四月二十八日襄啓為别日乆傾系良多自抵京都首承問書感激賢郎迴日適以縈冗不果裁答秋凉官下安鬯未期展晤更自壽不一一襄白崇班足下閏月十七日𣙜局為新條在任不得舉恐知之襄啓近以侍親還鄉復過舊治惟是耆老不厭昔年無狀相􅂝見過又以妻孥二䘮特為祭奠是日神靈中夕發行至于酒食以祭為名則神靈已行理不可納重煩厚意但有感激謹馳書謝諸老幸為逹之二月十二日樞密直士學起居舍人知泉州事蔡襄頓首潁川荗才足下謹空襄啓請補外郡仍被朝恩數年留都無裨萬一今緣私便復爾遷陞感慚之懐何可言也承問多荷俟朝謝罷即造謁不一一襄再拜元伯太尉閣下送路之童應湏踐言也呵呵案第五帖亦有尾批而珂標題下小註止及第三第六帖應係佚去第五二字襄啓兩日支體不快今日閒眠粗適䝉手誨并石本拙詩詞翰無取但欲寄名壁間以為榮耀耳謹奉啓陳謝不一一襄再拜公謹座右蓮花香合附納宣州白蜜一簍并鴨腳寄上襄近承解紱歸休止足之戒古人所慶方深歎美遽煩信問感刻感刻謹奉手啓謝不宣四月二十四日一襄頓首致政太保足下謹空襄近于遞中馳狀當逹節下兼曾末赤石脂藥餌之急務也泉山日得晝眠鈴下殊無事或讀醫書數卷而已新傳多麗詞述飲宴之娛使病夫舉首增歎耳謹奉手啓不一一襄上元伯太尉閣下謹空八月二十日襄啓近經延平得接少選之論殊解邑鬱属以在道日乆曾不槃留逮至鄉閭過家上冢始于七日署郡事温陵號為閒靜然初至不免少有煩勞耳春暄惟寢味調䕶以慰瞻馳耳不一一襄頓首君輔同年都官足下十一日襄啓别乆可量思詠初寒想動止佳休僕來此如宜頗留心于醫書奈無所從學所知者但得其迹耳其尤難通者脉故診切之要計非文字可尋湏當有所傳授也相見無期日益馳戀足下自愛自愛不次十一月五日襄頓首大隱何君足下逺承惠及鄉信感激感激林英赴漳州亦垂訪陋居也乆處京華得無勌走塵埃或少留當成資序耳因風時飛教字以慰窮僻幸幸右慶厯諫官端明殿學士蔡忠惠公襄字君謨書簡帖真蹟十一幅分二卷按朱長文書斷合唐而下妙品凡十六人而公居其中筆法清妙固天下所共聞兹不復論前八帖得之泉山人家葢嘉定壬午嵗十二月次三帖得之京師􅆵鬻及好事者時日不復可悉記國朝不以書取士故士亦鮮以書名家公巋然為一代冠而又將之以直節養之以勁氣不獨以一藝自足此書之所以尤可尊也卷中有舊印識七贊曰凌雲成而楷遂絶太極建而書仍存藝不足以名世士亦貴于自珍彼其之子以賤待其身而又安能以重望夫人偉四諫之直聲並翰墨而流芬方其作元舅之碑以伸天子之孝拒佞倖之請而杜䙝取之門則片言隻字之落人間者世固待之以褚顔之節而豈復儕之于芝繇之倫後二百年珂得而藏其真是葢不特寶其書而模楷其縱筆之妙思又將因其字而髣髴其絶世之清塵也蔡忠惠趙氏風度帖三帖第一帖草書十二行尾批一行第二帖行書八行第三帖行書七行尾批二行襄啓秋間被命升預詞掖属都下人事遂不及修唐走馬來承書感激感激數日前忽有福唐之命會汴流已涸乃固辭之恐知陳公濟家属尚在畿邑窮困可知壽星為惠嘉貺嘉貺海品多無竒者來年必循江下出或有興南歸便之泉南也冬寒客官善自將愛臨書耿耿之至不一一襄拜上仲堪博士兄足下十一月五日士安已至部襄啓自執䘮野外疎絶人事承君侯還鄉以禮不及往詣不期眷記逺訪敝廬雖幽憂之抱蹔爾慰遣然村舍寂寥曾無以為具菲薄之禮理應情恕軒車北歸繼以多故乆不果致謝又增悚愧耳冬寒末由請見願以時自重副此遐想不次十二月十五日襄頓首頓首博士陳君鄉兄足下十月二十八日孤子蔡襄頓首頓首比有北來人時聞動靜少慰遐想大幕事多想煩贊畫村居愁若殆無生意幸而無恙得以侍養偏親號奉几筵或裁答四方書問之外閉門度日如此而已諸公相皆奉知也冬寒末由相見千里馳想服食自愛不次襄頓首頓首公濟兄足下師迴書近此月方示乃師迴亦訪及下處子直且爾閒居東坡先生論蔡公書云真不及行觀三帖風度信然趙令畤書右蔡忠惠公趙氏風度帖三幅越王之孫令畤字徳麟題跋真蹟共一卷予彚諸帖非詩文不别出而有名跋不可雜裝褫者特别之此其一也徳麟家居南宗慶元丁巳嵗五月得之泉山贊曰前朝之名臣承平之王孫筆妙而跋真一旦而並臻此葢不特適千里而喜似人也蔡忠恵趙氏神妙帖三帖第一帖前四行行書後七行草書共十一行尾批三行第二帖前七行行書後五行草書共十二行第三帖行書九行襄自聞伯鎮出守越土日遲使旌尋得泗州所貺書牘乃知滯留之因計今當已至常潤也兩浙三節度盡為君家昆仲所有亦為榮何時當過錢唐幸早治行舟到杭少留一笑為樂所望也謹拳手狀咨候不一不一襄再拜伯鎮鈐轄知府足下貴屬佳安七月十四日謹空襄啓端午氣候微熱想君執事佳安書問殊慰傾素卧龍珍茗猶在日鑄之上然頃年曾得日鑄其品甚髙今之造茶者不及曩時卧龍前無此等非精意不能至此也春三月湖上閒游時有篇什今錄數首要之雖老尚管風物耳不一不一襄頓首伯鎮老兄足下六日襄再拜使至惠書感激感激十六日遂行至蘇臺或更且遲留如其不便前路不過潤揚艤舟山水可游者時一攬之亦仕宦者難得也還京日尚在道傍為郡猶可笑噱為一飲之樂耳十一日襄再拜伯鎮尊兄足下君謨書評者以為本朝第一今觀其書尺信不虚也建炎戊申四月甲戌蔣猷題行書五行予在會稽嘗玩其石刻今此又見其真蹟頗識其筆法云政和丙申嵗二十一日彦逺書行書四行説之嘗觀于吳門開元東第丙申殘臘日楷書三行張縝獲觀楷書一行蔡傳素同觀建炎戊申四月十九日楷書二行此帖章氏子售之京師予以二百千得之去年秋西兵之變予家所資蕩無遺餘老妻獨㩗此而逃未幾江外之盜再掠鎮江此帖獨存信其神工妙翰有物䕶持也建炎二年三月十日行書四行後缺右蔡忠惠公趙氏神妙帖三幅待制趙明誠字徳甫題跋真蹟共一卷法書之存付授罕親此獨有徳甫的傳次第而將仲逺猷晁以道説之張彦智縝俱書其後中有彦逺者未詳其為誰承平文獻之盛是葢蔚然可觀矣徳甫之夫人易安居士流離兵革間負之不釋篤好又如此所憾徳甫跋語糜損姓名數字帖故有石本當求以足之嘉定丁亥十月予在京口有粥帖者持以來叩其所從得靳不肯言予既從售亦不復詰云贊曰公書在承平盛時已售錢二十萬趙氏所寳也題跋皆中原名士今又一百年文獻足攷也易安之鑒裁葢與以身存亡之鼎同此持保也予得之京口將與平生所寶之真俱佚吾老也蔡忠惠家書帖五帖第一帖行書五行第二帖草書十二行尾批一行第三帖行書十行襄啓宿來尊候萬福舟船已差得請令人計會文字背了特納去微暑飲食愛重不宣襄頓首上著作十叔大娘將領兆孫密姐而下各安侍奉次親家縣君道起居近為患瘡㾿乗騎不得並不出入飲食且如常郡太四日入城甚安陳家荔支一千顆附去上縣君不怪少今嵗結寔不多難得也門中眷愛各安候有荔支别令送去次謝郎近得書否不具吾押付大娘七日晚十叔不及冩書郡太婆婆歸夀扶䕶南還十二月二十八日到家近謝郎來始知寄家桐廬日夕客途不易𦵏事猶在冬間爹脚膝未得輕快只在新宅時復到赤湖造墳乍歸百事如客今來漸漸成次第有粮食可以了當賔客謝郎昨日來此相看不具二月十九日吾押書送大娘兆孫以下安樂續有便信附書信次人行速也謝郎袐校近得杭州遞中書并一官員處寄粉來並各収得聞秋凉方過嶺極良䇿道路遥逺不易不易近差奉使北方已辭免得甚幸甚幸門中尊眷萬福大姐以來無恙襄乍抵鄉里賔親叢集雖得相見曾不得從容赴官日逼難以滯留上路各且安樂所示具知殊末事也到官加意詳明奉禮在杭兩次將書戒約他全不聴今日之患必不能免何故葢彼有求勝之心此無防患之心日月既長安能脱也人還具此不次襄書送林郎三娘將兒女安樂甚思憶也右蔡忠惠公家書帖五帖真蹟一卷予既賛公帖又彚公家書獨為一類按歐陽文忠集公長女適著作佐郎謝仲規此書是矣猶不知林郎者何人也帖雜取之家藏别而褾之不復紀嵗月贊曰家書正所以寄情之真徒得觀筆力之神又以見公之褆身予彚而藏以警夫人寶真齋法書贊卷九
