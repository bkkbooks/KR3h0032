body:
  text: 寶真齋法書贊卷十七宋岳珂撰宋名人真蹟張文潛九華帖行書六行尾批六行耒再拜近得二哥書四丈在九華無恙也吾丈新復舊諸更将䕶耒賤軀自閒居來極安泰不煩念也二卒借留甚得氣力悚荷悚荷表再拜宛丘有幹委因信幸諭柴親侍行幸為呼名門中各計安佳家婦同伸問右元祐右史張公表字文潛九華帖真蹟一卷公文名在天下久矣而帖則未多見也文筆之相湏或者於師承有攷焉是帖本先君家藏贊曰結字小而密氣放以逸措意婉而姸神閉以全公固不以書名盖無一而非天然則汪洋澹泊一倡三歎攷之東坡先生之言盖不特公之文為然也秦少游書簡帖五帖並行書第一帖十一行第二帖十行第三第四帖各七行第五帖六行觀再啟自公之西終日閉關而已郡中比來多事萑苻䲭張未就擒滅仲謨亦出督捕煎熬尤甚也怱怱無聊未有脫去之期為之奈何美授畢想行李即歸竚文車音慰此引繫也觀再拜宅上甚安今令人去取得齋郎書信附上乞檢之觀再拜觀頓首啟觀雖已罷免然所承者公坐耳不煩深念也兼已破省符令在外聴候指揮吏議才畢便還淮南待報然親老高年時氣向熱湏官舟以濟輒欲從使府射一舟到高郵幸望開允未欲寄公狀去且乞准備留下幸甚幸甚當此時非公誰憐我者觀再拜上元明侍講移守姑孰不知便赴上否家叔得閩漕約四月赴任今已愆期不知何也杭州報除省郎然不見告詞此中都不報恐是妄傳或得其詳幸望批數字見報此中如井底無從知也紀常今在何處永州得信否觀再拜觀頓首方此炎暑小舟溪行盡室如在甑中老母多病尤以為苦至郡下欲歇一兩日敢告蹔借船一隻幸望指揮豫備為賜大矣白直亦乞差借數人觀再拜觀頓首昨日獲款晤甚慰馳仰之懐比辱教欣承履候佳勝文字已領稍閒參候不宣觀再拜方叔賢友閣下右元祐祕書正字淮海秦公觀字少游書簡帖五幅真蹟一卷蘇門四君子公名在伯仲間山谷以字法著而下是則無攷也今觀是帖清勁古雅重之文采豈不足以傳歟繫以三印盖流傳好事家用以識卷者前一帖得之高郵士人臧珝次二帖得之呉門王汝周不復繫以時贊曰昔江淹夢五色筆而不以能書稱天昌其文字偕以行如公辭章淹豈能京既已禪長公之文籙奚必夸大令之墨精託敬賢之盛心尚遺蹟之可憑然則我得其詩手之而不釋予方将借荆國之書以為此帖之評李端叔命駕神仙二帖並行書第一帖九行第二帖五行之儀特蒙命駕相期此特出於風義周旋視古人一時羙趣為不難到則剡谿放戴不獨前日之勝可紀也欽企欽企家山自是天下佳處永嘉之後人物典刑多萃於此曲直是非雖未能一貫要之陳迹班班可采不妨投兹空曠相與攜攜指顧笑語相接亦不惡特未果接武後塵徒有愧羡之儀再拜魯直五月已到南宜傳得詩闋如神仙中語而悽惻感人一諷詠之為之出涕彼已與世齟齬惟幸其不死多作得好言語使知好膾炙相資其他非可念者之儀右元祐樞密院編修官李公之儀字端叔命駕神仙二帖真蹟一卷公盖姑孰人龍山苧亭之下有遺蹟焉嘗代范忠宣作遺表辨宗廟之誣名動天壤遂入黨籍淳熙己酉歳珂侍先君趨召行在所舟過采石有遺孫某以謁入告不自振先君一見惻然哀之輟齎糧數斛僎鏹幣賙焉其孫喜曰歳儉且死今無以報獨遺帖兩紙在願以歸文府先君卻不取則又曰留此亦将為他人有不如持以敬售又捐數十千與之感泣而去予時髫齔撰杖屨蛾睂亭上見先君與客廬陵張子禮彦和筠陽李之任商老古桂耿良翰周臣及二道士展讀一再過思之宛然在目嗚呼今三十有六年矣其孫歳久忘其名贊曰姑溪之水清且漪青山之源衍而汰鍾此竒士亦一雋快風義磅礴筆鋒嶮怪盖已具書體之五雲不但得發遣之三昧范資政早饌帖楷書六行百禄啟近疎瞻奉霜秋福履休裕晦日輒具早饌以邀從者幸冀凌晨迂訪不宣百禄頓首承之金部右元祐中書侍郎資政學士范公百禄字子功早饌帖真蹟一卷蜀公家法之懿世載厥忠熏芝染蘭以鍾馨徳公其近者也帖得之蜀士張箋家先君手題云淳熙丙午歳五月贊曰元祐多世臣公之徳由忠文岷有阜江有源傳是帖存名門元祐八詩帖序楷書大字三十一行前三詩並楷書第一第二詩各十五行第三詩十四行第四詩𨽻書十五行後四詩並行書第五詩十二行第六詩十七行第七詩十五行第八詩十四行東坡書簡行書八行元祐八年三月二十四日㑹於信安西園餞中濟帥慶分韻賦詩仲至元字中濟戎字明叟十字孝錫乗字器資以字子瞻先字穆父啟字彛叟行字皆五言十韻工部侍郎王公仲至李送中濟經略侍郎赴鎮慶州得元字欽臣上逺馭寡上策羈縻有前言平生西戎論感慨江應元家世近三河游厯多塞垣誰言一方靣十載滯上恩前日詔書下旌麾方及門部曲已稍集始知旗鼓尊邊書尚羽急戍卒仍雲屯東山舊部落自昔為牆藩銛鋒固可用内實湏禾釁胷中自有策肯為淺見論前户部侍郎環慶經略安撫使范公中濟子竒承諸公酌别西郊分韻得戎字西戎未解嚴置帥濫及蒙自揣非長才自使制羌戎仰頼廟堂算庻幾或成功此行春已晚桞絲華正紅聯轡向名圃四筵皆鉅公高韻薄虹霓笑談生清風顧予實何似有媿參其中遽然千里别不辭一樽空浮雲聚與散臨岐西復東無以報禮意舉目攀飛鴻兵部侍郎王公明叟送中濟侍郎帥慶分韻得十字覿上承平萬事康干戈百年戢蠢哉彼西戎乃敢侮邊邑慶陽用武地戰士一當十指縦惟其人破竹在呼吸堂堂高平君謀帥公論及擁麾當一靣意氣動百執聖時務懷柔閫寄貴安輯賀蘭黃口兒焉用長纓縶方當仁草木况忍尚首級佇見貢琛人還從玉關入刑部侍郎杜公孝錫送中濟侍郎帥慶得乘字純上羌馬軼河西詔下純貢聘自是封疆臣都俞命彌敬莫如小司徒欽哉往臨慶􅆛貅十萬人大半爵公乘恩将懷其心威足繫其頸牧無南向塵指揮罔不定邊氓歌夜耕更續公劉政今日燕西園愧接儒林盛陽關斷誰腸笑把金鍾聴家世本詩書無勞霍去病吏部尚書彭公器資汝礪得以字池水日夜流日行無停軌人生長道路擾擾還如此莫辭飲我酒酒盡君且起贈君䨇寶劔有言慙近俚聖仁之于物愛視獨一子顧復愁不至不知分能爾誰兹較尋尺竟莫知所以夷外當反内表傷湏及裏邊陲今無事自可緩𢃄理願君宏遠業赫赫光祖禰禮部尚書蘇公子瞻軾從諸公飲餞中濟經略侍郎分韻賦詩得先字梁李久樂禍自焚豈非天兩鼠鬬穴中一勝亦隅然謀初要百慮善後乃萬全廟堂選世将范氏真多賢仁風被草木緑浪搖秦川號令聳毛羽先聲落虛弦我家天一方去路城西徧投竿困障日賣劔行歸田贈君荆魚盞副以蜀馬鞭一醉可以起毋令祖生先户部尚書錢公穆父分韻奉送中濟侍郎出帥環慶得啟字㑹稽錢勰除戎問邉鎻謀帥繫國體遴簡出絲緡光華建旌棨威謀重兼濟垢玩當一洗游刃無全牛豈復論肯綮勇猛不為邊九伐秉周禮行期凱歌還宸廷聊聚米遊從惜暌離合醵置甘醴靈囿鬱敷腴天潢湛清泚偕賦踵前修銀鈎閟方底從予輕若飛吾方慙七啟吏部侍郎范公彛叟送中濟侍郎帥慶得行字純禮上為國雖以徳禦戎難去兵夏人久犯順邊氓常廢耕遣帥揚我武謀帥直非輕輟自金穀寄倚以關塞行壯懷吞猖狂沈機足經營新傷乃民力未振亦軍聲既膺閫外寄當思千里清吾家世此官所得蕃漢情未嘗任殺戮接以信與誠方畧固多在惟公守其成軾啟數日不接奉渴仰殊深承旦夕進發治装勞矣台候何似拙詩納上備數而已愧悚之至畱别之作敢請一本即詣違次不宣軾再拜中濟侍郎經畧公閣下先大父自地官貳卿出帥慶陽同省諸鉅公飲餞西城分韻詩賦盖一時盛事歳律遄邁垂四十年遭時艱難慮或遺墜特命工刋石以傳好事君子紹興元年八月旣望孫宣教郎權通判桂州軍州事范伯思謹識行書九行右元祐朝賢送行八詩帖真蹟一卷紀行之歳月書事之本末分韻之姓氏官爵皆見於首帖不復申叙卷末有東坡手簡范氏繫跋紹定戊子四月得之霅上贊曰此戊之元凱承休服案此下原北十字其師干有方案此下原缺七字之在旌纛兜園池樽俎從容之間已足以折遐衝于窮塞彼以俊稱者徒虛名之慕以仙歌者惟酣適之快要皆不足以望兹游之塵而同此詩之派也錢文肅家書三帖三帖並行書第一帖七行第二帖十行第三帖九行相别後只得揚州一書及汴上人來又一書外近見内藏庫納小綾㑹認方知弟已到京不知在甚處住差遣有何次第遞中千萬早附一字來忙中大暑為十二郎今夕成結遞中且此為問押如期至逼惟紗㡡宜促為之餘雖末集亦不必備也柴郎日來假升用之類宜不可緩也氈骨一體透背紅絹各一匹可為八娘作一褥此與念三者同也希收餘有所湏言來押白七弟二十六日幷畫孔雀屏風已了亦希來取之透背止可三幅甚有餘雜用也累日逋逃不歸喜已到家來日兄上殿請早來同早餐也王和甫已相見否六舅無恙耶户部問江東西就不就牒適已見來必已收得也值夜相問草草四兄白七弟戸部帖司蘇潭自攜去收得未右紹聖翰林學士侍讀錢文肅公勰字穆父家書三帖真蹟一卷錢氏以忠孝承家世有聞人穆父其一也以文學進名在國史帖字肅散朴雅不類近時書豈學有根柢然耶寶慶己酉五月予壻陳天澤得之中都好事家以見歸贊曰代言無讇辭居約見素守元無刀劈口乃若神運肘立身本孤直落筆已耐久家聲到於今此帖儻不朽錢穆父赴越詩帖行書五行尾記三行鑑湖清泚對胥山兩地相望一水間共佩天涯太守印猶聯丹陛侍臣班君方白傅才何愧我比微之思苦慳莫把舊詩猶見詫繁雄未必勝清閒樂天寄微之詩云知君暗江南郡除卻錢唐盡不如赴越書呈杭州熊侍郎右錢穆父赴越詩帖真蹟一卷按國史熊本自吏部侍郎補外由洪徙杭公此詩豈其時也嘉定甲申歳予壻陳天澤得此帖於中都以歸於我贊曰公之與熊同治杭越時皆待制龍圖閣此詩所謂聯班丹陛者耶公以繫囚他所熊以八洞失謀皆以黜居郡此又詩所謂同在天涯者耶承平士夫以東南為遷謫之區而今為駐六龍之輿此先王所以許先帝以馳驅身之不圖汎掃上都必欲以正宅中圖大之居也林文節定力帖行書十一行希啟比者造門及蒙臨屈皆不獲面奉豈勝瞻仰新冬伏惟案此下原缺十二字家在定力院有合破散從官多不來者望仲至為指揮根究庻其有憚不敢頻詣府中何時可一見乎奉啟怱怱不宣希再拜右紹聖同知樞密院林文節公希字子中定力帖真蹟一卷書以粉牋字畫半已脱落筆法與所著日記同出一手意態清雅宛有法書家風度米元暉跋寶晉摹帖謂公為好古博雅筆力進退繫於識以是帖覘之可想其不誣也帖中稱仲至盖是王欽臣知開封時亦紹聖間云紹定戊子四月得之姑蘇贊曰公以好古兼博識固宜著聲於翰墨予觀此帖實在京師之定力是時盖初掃元祐之迹使其不為三子之累則後日之筆嘗不至於輕擲也林文節參候帖行書二行希謹參候平甫學士右林文節公參候帖真蹟一卷寳真所藏帖前輩手刺惟公與劉忠肅而二此帖亦先君之故藏者贊曰平甫之與荆公盖當同而異而公則當異而同者也當刺謁之相從以朋友之切磋極兄弟之友恭使合同異之見而惟是之歸予知其必有以助善政於熙豐也林文節贈賈收詩槀二詩帖行書六行呉興贈賈收二絶句樂天遺句滿呉門謝朓牕中列岫存試問白蘋洲上客詩人賈島有曾孫歳中謾説易三麾風月何嘗有别離盡是昔賢吟醉地惜哉此老不能詩又云可憐醒老不能詩右林文節贈賈收詩槀二詩帖真蹟一卷公文章翰墨表表符祐間固時宰所倚以鼓動四方者詩筆餘事也紹定戊子四月初得公帖繼聞尚多遺墨可以攷證中原之文獻者再從訪之於是此帖與昭靜祭文等陸續俱來按國史元祐初公自中書舍人以集賢殿修撰知蘇州更宣湖潤杭亳五州此詩所謂歳中易三麾者盖自蘇而宣而湖云贊曰歐稱醉翁公稱醒老尚論平生豈以詩攷慶厯之滁元祐之湖醒歟醉歟醉歟醒歟林文節昭靜祭文帖行書九行勅祭沈貴妃文祕閣撰維熙寕九年歳次丙辰十二月乙未朔二十四日戊午皇帝遣太常丞集賢校理同知太常禮院陳侗祭於故昭靜貴妃沈氏祥符之初慎選女徳維勲維賢進輔宸掖孰非良家莫如相門彼徳之茂有儀温温内政是毗婦道克化刑於公宫以教天下七十考終旣厚厥報上感兩宫素服是悼彤管之傳則無已時厭翟載途象物孔悲祖奠國門靈其格思尚饗右林文節昭靜貴妃祭文帖真蹟一卷公仕神祖廟知太常禮院是帖盖當時所撰者帖中惟行書與公他帖毫髪無異而小楷則端嚴靜莊如出兩手或正或竒不踰榘則如公之於書亦可謂能矣帖與二詩同得於一時先朝典禮尚或於此有攷云贊曰昔祥符議立后趙文定以沈才人系出相門宜配宸極王文穆乃以文定受知沈恭恵思報其徳譽為長者事遂中格今觀昭靜之夀考四朝亦可占名相之相澤矣祖宗盛時禮别宫掖哀榮之規具在詔策如移牒於祕閣與具囊於禮職惟此幅紙藹然足以想承平之品式如公筆跡兼備楷則使非有行書數字以為並則亦終疑而莫釋也林文節元祐日記帖行書三十六行前後各闕文晚與開育詣右相則閽者逺已見拒云今日不見客深疑其有謂也與二君至寶勝火氣滿面寺居既廹狹帷帳亦蕭索惟鄧陸及余三人者至又訪鄧陸而歸季謙得告鄧方據几揮筆如屬藁者是夕鏁院庚辰垂箔崇政朔班起居畢移班常起居文徳吕左丞押麻蔡揆以本官罷為觀文大學士判陳州不遷官不加食邑司馬門下遷左僕射宣制畢微雨閭卷翕然云司馬雨邦直云典午密薦持國代已恐除作門侍降詔論右相以異省無嫌辛巳恵卿揚州景温寳直太原唐坰濠州陳師錫無為倅霍翔太平觀熱舒范二丞入晚同開育見新相司馬公頂光㡌而坐氣潔清而瑩精神康安云足腫瘡面大如手掌黄水出未止足弱無力未知何時可出更聞新命戊子昭憲淑徳忌西閤東門慰退景靈行香當設食訪杜訢孔宗翰鄭穆劉邠臥内云兩腳脱去兩皮襪臥而言皆名理之談也己丑聞於進邸追取蔣之竒古内批夜大風雨庚寅中伏早出西城凝真觀同次中别舜卿於長慶長慶楊太后父母墳寺也初斸地得龜蛇因於寺東建小觀設真武像今俗以寺為龜兒寺觀為黑殺觀觀後以水移在寺西南隅隔一垣爾季謙解舟辛卯六參潞公乞面退至都堂晚見厚卿壬辰天貺節假晚晤謝子敦劉兗州葉祖洽等癸巳批問王存因何除樞密直學士璪甚撓引恵卿向除大資政以服未受後再除為對甲午垂箔潞公司馬公吕公皆門謝封贈及加俸潞公初特班升殿同奏事奏事少頃三省樞密先下潞公獨留身出一劄子奏對右林文節元祐日記帖真蹟一卷元祐之際盛矣公道肆啟羣賢彚征肖翹翾蠕熏和茹粹以濟登於太平震古盪今前無唐虞攷之一卷之書藹然徳馨尚可挹也帖以廢紙後有鄧文約中丞簡尺字甚楷正不類其為人紹定之元五月得之蘇門士人王之徳贊曰漢大中大夫東方曼倩之對孝武曰誠得天下賢士公卿在位咸得其序譬如以周召為丞相仲尼居御史府畢公高備拾遺遽伯玉為太傅博士則以顔閔執金吾以季路衛尉以卞嚴子光禄以仲山甫郡守以子産詹事以孔父史魚司直申伯為御下至旄頭式候亦羿萬之伍則唐虞之隆成康之際陳功比徳自無以喻武帝為之大笑盖甚言其難遇也今視元祐之時彼固何足慕哉羣賢㧞茅大姦脱距如確如恵必斥必去師保萬民維温維潞大老既歸百揆時序師表以韓押麻以吕班廷謝門紛鵷振鷺守正如王博聞如顧錢劉曾孔滃雲烝霧其未登於録者又不可一二數宣制正衙天人交助翕然閭巷曰司馬雨公盖異時攘臂於代言之間而染指於同省之賂顧猶有是語則是非之公盖未嘗不具也然則插齒吐吻擢項結股委蛇其跡偊旅其歩雖辨知閎達溢於文辭而詼諧者猶皆不之與後之君子其必知所去取矣幅紙之得正邪以寓式闚厥衷逸史是補林文節紹聖日記前帖行書十六行前後各闕文等搆陷乞置獄例興獄朴助云頻頻興獄不是好事陛下且與含容今若再勘即是以斷張啇英俱為不當上云羣小結搆傾陷宰相不是好事自與張商英事不干涉宣云臣從初便奏開封獄事不為無意章某既有所陳莫湏與他明辨上曰差何人勘得宣即探上意云常安民如何上摇頭曰不可宣曰莫是此人不平穩否上曰然宣曰案此篇凡稱宣者曾布盖因布字子宣朴者指韓忠彦猶曾布日錄稱章惇為䕫李清臣為齐也孫諤如何上曰諤得莫又道是章某所引薦人否宣曰諤乃衆人共稱之非獨章某也上以為然又云見説全是吏人酈保者為之字酈保李燾長編作酈寳盖酈本賤吏當時隨手記載不復詳攷也是夜批出與路昌衡同勘閣子内同坐相云適來上前諤所奏皆有實跡王誼李祉莫要付獄推究盡有來厯安李黙然安徐曰相公有許多機智又要興獄真有鄉風也謂福建子答云某雖是建人云右林文節紹聖日記前帖真蹟一卷首尾糜爛僅存一幅盖記施珣嶽事按李氏續通鑑長編紹聖二年八月癸未宰臣章惇奏臣嚮聞開封府司勘盖漸公事户曹施珣初言干涉臣子弟緣臣舊曾薦舉欲乞廻避兼士曹王謹術嘗與人言府官本意欲從盖漸及僧本召求張商英之罪復從此數人推及臣與蔡京又司録陳厚亦言蔡京受漸錢百千并言事連貴要近臣不可不治乃至稱説王震親得聖語傳言吏人酈寶使人窮究物論騰播駭於衆聞今來盖漸等案内並不見有上件事節未曉所以若臣之子弟果於漸事有所干預則法自貴者始所當先治豈以臣故為之隱諱撓法審或無之未委施珣何故輒欲廻避恐出於陳厚等陳厚初時脅致囚語有中傷臣之心臣備位宰臣而為羣小結架如此若不根治恐小人陰相交通愈肆姦險傾搖國事無所不至欲望特賜選官依公盡理根究施行御批可差路昌衡同孫諤置司根治尋又批應干連人特不以赦原仍令路昌衡等依公盡理根究不得滅裂先是開封鞫盖漸假貸行賂事事連主管府司檢校庫王厚并及宰相章惇厚者韶子也訴於惇云府司録陳厚承王震意鞫獄不實故惇亟自列乞别推上以論布等忠彦曰如此即湏并張商英重勘商英已貶恐不可更行上曰惇但為衆人因商英事譖害己無預商英事布曰此事虛實曲直自繫惇舉措朝廷為之别推亦不妨然又湏起獄上曰起獄固非好事然惇既有文字殆不可已此事虚實卻在王厚忠彦曰數起獄不便布曰此事更在聖意裁處忠彦亦云然翼日上又諭忠彦等惇堅乞别推而安燾以為無此例忠彦曰别推即前日責商英及陛下從初行盖漸事都非是上曰不為此惇言燾等架造事欲傾已布曰如此則事體愈大燾何可沮止上曰不治此但治其下耳惇云吏酈寶者具知本末但治寶則其他情實皆可見王厚所指證佐甚多如王謹術施珣陸長倩及一同監檢校庫宋侍禁者俱是兼所聞皆陳厚之語又云陳厚言連元台及其子弟以此珣言欲廻避盖惇曾舉薦珣又云蔡京亦受百千忠彦曰此等事案中有否上曰只為陳厚言罪人有此語卻不曾取狀後來案中亦無忠彦曰如此起獄乃只是理㑹閒言語若且隱忍寢罷甚善上曰羣小交結中傷宰臣不是好事兼惇有劄子豈可已布曰臣向曾申請以為小人在下架造事端動摇執政不可滋長兼王震於此事不得謂之無心百姓理索債負若非人有導之其語言豈敢便及宰相兼震親詣府司臨問自來府尹未嘗如此所以驚駭衆聴今日陛下為之推治亦不妨但恐獄官難得人上曰只為難得人布曰必得於彼此不觀望向背者乃可上曰安得如此可信者因徧問從官曰許将如何布與忠彦曰前執政差難上曰蔡京又妨礙黃履如何又曰蒋之竒孫覽亦不可豐稷乃燾門人王古又不可忠彦曰虞策近勘公事上又恐與前勘妨礙布曰臺諫官可差否常安民如何上摇首布曰不平穩否上曰然布曰郭知章或可使上曰謬人於是命昌衡及諤後七日忠彦等再對忠彦奏曰尚書省關到昌衡奏獄事事體已不小又聞昌衡獨詣都堂稟旨上曰無他上殿自為衛尉事耳忠彦黙然布曰陛下選差昌衡副以諤可謂得人矣上曰然陳厚繼亦訟王厚詔送御史臺常令常安民勿預盖惇疑安民黨燾已謀逐之御史臺訖不受陳厚獄惇等每相與爭辯於上前上意頗右惇惇嘗有劄子自論李清臣寢之已而上批令行出及究治所乞追攝官員中書吏匿不呈惇惇詰之乃曰門下侍郎令檢條門下侍郎謂燾也他日惇謂布曰惇在此何敢如是遂以白上上對忠彦及布言之且曰文字安可不呈宰相布退即語惇惇方與清臣相詈也大抵清臣及燾皆惡惇欲去之忠彦亦素與惇異布獨助惇云安民尋罷御史震等皆作附㑹欺罔降黜燾遂去位予攷此帖所書略同而其間如安燾等語則無之盖長編以曾布日録為正不復見他書也還攷公之升右府在四年閏月壬寅是時尚未登政地閣子内同坐殆非公目繫似是紀他人所傳者然是年東府則章惇左僕射安燾門下侍郎李清臣中書侍郎鄭雍尚書左丞西府則韓忠彦知樞密院曾布同知院共政者只此六人耳今帖中謂惇為相忠彦為朴布為宣安李各以姓著而獨無雍名雍至十月甲子始罷是殆雍所記而公從而筆之者南渡前記録多矣史氏網羅獨於雍未聞而今見諸此孰謂殘編斷簡無補於史之闕文耶帖之得與元祐日記同時贊曰史本乎公不厭於複重觀紹聖以來之記述初無及於鄭雍非親札之具存雖欲攷之而就從如王誼李祉之實迹徧攷史録皆無頼乎此案之中酈保姓名亦各不同至於韓忠彦力諫興獄直乞陛下且與含容安燾面折章惇以為鄉風此皆繫其人之大節而金匱之汗青皆泯泯於二人之忠凡此帖紙之所具以同時附㑹白帖子之人猶能秉直以寫其衷抑可以見人心之是非本無所蔽蒙也然於此時凡六人者皆有所抗論猶雍首尾噤然若不預者佩玉端委接武䕫龍又何其絶無一言之獻賛廣於四聰耶迎合於始循黙於終而乞不免於黨籍之歸此枉道事人之所以不勝於直躬也林文節紹聖日記後帖行書十六行前後各闕文崇政文徳呈利珣申八月二日已杏子河破土二十七日連夜出甲倉猝便行王愍等不預知亦不敢申禀上以星變多由邊事深患恵卿此舉衆皆以為非恐且以破土示有興築之名誘致賊兵未必便興築上曰更速戒約因諭邊兵且休妄動如杏子河未進築有何闕事布遂言鍾傳又有卓囉之舉尤為未便陸行則無水草相云有草面無水水則黄河不通舟旋令釘樁橛挽舟而上運至軍儲及板築之具平夏趨鎮戎四十里而用車七千日夜般運水行勞費艱難百倍於此斫龍又是青唐之地青唐未免有疑臣未見其可俟賊兵不犯涇原且令共謀南牟㑹通涇原之路即此數路相應邊事有涯自元豐三年至今十有七年經營邊事未有如今日之形勢今鄜延輕於進築鍾傳又謀卓囉一有敗事前功頓棄右林文節紹聖日記後帖真蹟一卷杏子河事在紹聖四年本末詳悉具戰國史泰陵之仁聖畏天其足以對越而無媿矣此帖出於當時者也又與前帖同得顧不可因是以表聖徳耶國史書破土以九月二日城圍一千七百餘步得工十二萬有竒十二日而成是月二十二日賜名平戎寨而此帖則以為八月殆筆悞云贊曰進築之策是古兵法之所未有而始於本朝予意其欲毁齒而兒不知所以為是漸取而漸摇曾不虞乎兵分力疲反足以啟戎心之矯方聖主之側身凛天變之未消章吕合謀惟敵之挑豈知夫璿璣七政之必齊而舞干兩階之自足以格有苗哉我鼓其鼛我弓其弨此帖之存聖心是昭寶真齋法書贊卷十七
