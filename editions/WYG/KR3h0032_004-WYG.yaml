front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0032_WYG_004-1a, image: WYG0813/WYG0813-0601c.png}
body:
  text: 寶真齋法書贊卷四宋岳珂撰晉名人真蹟王獻之洛神賦帖小楷九行嬉左倚采旄右蔭桂旗攘皓腕于神滸兮採湍瀨之𤣥芝余情悦其淑美兮心振蕩而不怡無良媒以接歡兮託微波以通辭願誠素之先逹兮解玉珮以要之嗟佳人之信修兮羌習禮而明詩抗瓊珶以和予兮指潜淵而為期執拳拳之欵實兮懼斯靈之我欺感交甫之棄言悵猶豫而狐疑収和顔以静志兮申禮防以自持于是洛靈感焉徙倚彷徨神光離合乍陰乍陽擢輕軀以鸐立若將飛而未翔踐椒塗之郁烈兮步蘅薄而流芳超長吟以慕逺兮案珂書體例毎帖皆有跋冇贊此帖無跋凝係脱去贊曰慶雲絢彩河漢縈之列星垂天日月明之先民授能維聖成之英英後先疇其勝之有晉大令父而兄之一門擅竒世共稱之小楷之傳抑更精之芝靈葩竒杳莫名之賜書官奴既凖䋲之洛神出藍而復青之閲幾何去劫火經之鬼神護持莫慿陵之煌煌炎圖帝中興之嚴除清廂又南榮之翰權墨衡千古程之神覽睿藻二難并之一真既藏大訓形之流秘下方萬目驚之或軼而傳式經營之十閲嵗華迄克膺之竭槖以醻尚或矜之恍然舊觀緘且縢之有煒廟瑟天球鳴之鄙俚混淆敢曰聲之金籥玉箋謹毖扄之咨爾子孫思拱承之王獻之蘇氏寶帖草書五行米䟦小楷十一行十二月割玉不中秋不復不得想未復還慟理為即甚省如何然勝人何慶等大軍右蘇氏寶帖故連右軍快雪時晴帖元豐甲子獲于子美子志東探𤣥子國老也印二分在快雪帖合縫四角亦有褚氏印崇寧元年五月十五日易跋時甘露下吾家寶晉齋碧梧甘本猗太宰秀當代靈襟疎冲韻邁一筆落兩行帶雲龍廷走百怪驚電掣㫁兕快盤偃蹇意無在藐百川會北海人那知冠千載襄陽米芾審定真跡手裝秘玩時以芾字行適一䋲米元章示及二王寶墨世所罕見與予家藏十四帖筆跡深相類也嘆服嘆服元祐丁夘孟秋二十二日李瑋題楷書五行右蘇氏所寶王獻之十二月帖真蹟一卷寶晉米芾以贊識其後副車李瑋跋具焉所謂二王者葢與右軍快雪時晴帖同此書也晉代遺帖今存無幾大令襲芳名父得法自心書品人神天真造妙為法書家傳付之祖筆竒墨古不可殫述按寶晉書史有曰余家最上品書畫用姓名字印審定真跡印神品字印平生真賞印米芾秘篋印寶晉書印米姓翰墨之印鑑定法書之印米姓秘玩之印玉印六枚辛夘米芾米芾之印米芾氏印米芾印米芾元章印米芾氏以上六枚白字有此印者皆絶品玉印惟著于書帖其他用米姓清玩之印皆次品也無下品者今此帖凡著二十一印凡所載印文大概畢具又印以承平禮部名表之印葢方在瑞錦窠因以官識帖首有古半印七唐褚河南家褚氏印在焉末有兩古印又半印二下題君倩字印文不能别白隱約國老二字可見芾謂之蘇氏寶帖葢出太簡參政家耆之故藏也方芾無恙嘗刻寶晉齋帖于無為此帖葢首出又有河南書標題小紙今不存其後轉入中都貴游家珂嘉定庚午歲叨官故府已聞此帖名嘗宛轉得拭目繼聞貴游死其子舉書畫以售人又流落他處冥搜厯嵗託士友以十數僅而得之葢癸未八月暌初見時已十四年矣帖三十二字以世系先後故繫于晉三帖之次贊曰世未始無帖有眼如月真贗以别帖不可無傳有筆如椽舂容大篇猗歟寶晉萬古一瞬厥鑑以心嬙嫫奚遁晉帖之存今幾何人有右軍之跡以竝其秀有太簡之識以揚其芬竒氣干霄丹霞紫雲宜乎南宮之仙下睨海嶽發金章寶篆之信振玉佩瓊琚之作葢不如是則不足以表㤗山之䋲檢而合洞庭之拊摶也王操之舊京帖行書四行十月十七日州民王操之頓首頓首舊京先墓毁動聞問傷惻痛不可言未得陳慰白牋不備操之再拜天成二年三川搜訪圖書使尚書都官郎中庾傳美西川訪到右晉王操之舊京帖真蹟一卷思陵臨本即此帖也按右軍諸子操之次長筆法之妙放當與大令相似而慰問帖率多以操之名傳淳化秘閣帖比比皆是此帖舊藏天上嘗見之帖石刻中禁後經賜奉寧節度李孝友奉寧祖雍王道嘗起先王麾下故羣從入都其家率致問因得見之慶元己未歲六月燕酌席間舉以見昇卷末有後唐天成訪搜故迹并著前朝印藏書家印識及半印通十有五筆法大與淳熙閣帖第一卷所載門左帖相類白牋等字風骨如出一手信家學之有傳也自癸亥定和八陵不祀主議者畫伊嵩而棄之高皇每晨夕北望未始不流涕也辛巳哀痛之詔首以坏土之悲告天下於虖人誰無君彼州民者事郡將尚如是曾謂䇿名委質迺有愧于斯耶考心蔽罪固已上通于天矣贊曰永嘉戎馬摇乾坤渡江一馬黄屋奔中原文獻無復存僅有筆陣興王門猗歟大令趾右軍幾年埓美名金昆片紙斷爛如瑤琨鸞蛟蛇蚓置勿論為問此帖當何人豺狼父子蟻君臣綱常肇自清濁分孰能自植無君恩是時咸洛塵霾昏阡原變徙陵谷翻家人丘隴何足言痛裂乃爾摧心肝義熙九土封函闗遺氓遮道挽息真矢口止誦公家墳人心大義端不泯誰其主議畫淮濆伊瀍王氣􅆰膏屯悠悠千載有此臣委質無乃慚州民感嘆遺墨氣涌山我欲請劒同朱雲収亭楸檟方成阡大呼為呌天九閽王洽永嘉帖草書七行後兩行半紙糜爛字不可辨永嘉路逺難遂歸計國士旦晚得至右晉領軍中書令王洽字敬和永嘉帖真蹟一卷按晉史洽葢始興文獻公導之子典午復興導為宗臣洽親承過庭之傳門地人物風流典型為晉世第一是時書法高古王謝子弟無不以書名家而王門為最盛葢中原氣脉之近卓然自為一𣲖扶摇峻極如洽所書又為渡江第一晉之去今乆矣世之先後何止數千嵗翰墨流傳豈復多存于人間此書紙素斷朽幾不可觸而神氣嚴慗體勢具在若親見佩玉珥貂之風度古雅瓌特又為今代第一右軍嘗謂弟書不減于吾信不誣也庾肩吾書品列之中下李嗣真後品升之上下張懐瓘書詁著之第二又以入妙品古今之議咸推宗馬珂閲書半生既真且逸莫此軸若者嘉定戊辰嵗二月得之中都官鬻者凡十七年不敢議裝褫甲申三月在維揚且受代躬命工指授汎治一室覆托潔蠲為蠟池以導水浸熨累旬始就祓飾而蟫怠悠颺已覺加損葢自是不復可容手矣紙首有古印二不可識尾著小璽實在御府亦為第一帖繫之以詩次于寶帖之後以侈存古之盛焉贊曰瑞牛出谷既秉金籙短轅逐犢池鳯是續棲梧食竹葩竒韻馥在此寶軸手不可觸神觀立玉宛若在目恍其展讀烏衣之曲梁陳名人真蹟梁阮研宰相帖草書五行為異事計此事自當徹宰相汝宜秘之惟可輕心處粗言之耳吾初來本欲乞暫還拜掃除詹事意令侍臨還今直被代否不知當時右梁交州刺史阮研字文機宰相帖真蹟一卷舊嘗入承平中興御府有宣和半印紹興全印在焉卷首標小帖著姓名并古半印七不可辨按淳化秘閣帖研有書跡在羊諮蕭確之間庾肩吾嘗評其書在上之下李嗣真書品則以為在中之上竇泉述書賦有軟媚横流姿容美好之襃袁昂論法有貴胄失次不能排突英賢之議取予雖不同要是以書名家者今觀字法與帖大類益足以驗其真嘉定辛巳八月得之建康檜家贊曰巨濟取帖斷于李唐而予何人波及于梁然而攷硬黄之流别辨緗素之古香並之以淳化秘閣之蹟印之以紹興御府之章於戲斯文不忝厥藏梁羊諮期聚帖草書三行羊諮期聚帖御書題籖期聚欵聚同嵗功翔言囊昔絶因厯三私仰懐充右梁羊諮期聚帖真蹟一卷宸翰題其首開元小璽永存珍祕印具焉噫唐以前法書印識之可證者惟開元與貞觀在遂良則有審定在王涯則曰永存太平則有三藐母䭾范陽則有審定游藝或著龜益竇泉之號或分陶安東海之名知章以劒閣稱金繹以彭城别懐瓘載永寶之字周顗紀東翰之書貴襲亭侯類分翰概其所見大畧可觀偉矣哉此帖既上于帝宸復登于相第隱然遺蹟二媺並得繼入紹興復標清賞彼辨才答蕭翼以付受之緒寶晉對林希以上下之標方古以今夫豈多遜帖出檜家得以嘉定庚辰三月贊曰色秀而古湛然銀何之垂露瞭其非近世之楮態婉而新瑩然玉壼之無塵䆒其似六朝之人迹澹于屢褾隱其印識之可攷維唐世之寶帖出于尚方冠之題壘之一行維雲漢之章厯數百年之乆詒彼遺醜莫之能守予得而售或指而歎曰是為開元之秘儲固非王涯之所當有陳僧智永歸田賦帖四十二行真草間列歸田賦張平子遊都邑以永乆無明略以佐時徒臨川以羨魚俟河清乎未期感蔡子之慷慨從唐生而決疑諒天道之微昧追漁父而同嬉超埃塵而遐逝與世事乎長辭于是仲春令月時和氣清江隰鬱茂百草滋榮王睢鼓翼商鶊哀鳴交頸頡頏闗闗嚶嚶于焉逍遙聊以娛情爾乃龍吟方澤虎嘯山丘仰飛纖繳俯釣長流觸矢而斃貪餌吞鈎落雲間之逸禽懸沈淵之鯊鰡于時曜靈俄景繼以望舒極盤遊之至樂雖日夕而忘劬感老氏之遺誡乃迴駕乎蓬廬彈五絃之妙指詠周孔之圖書揮翰墨以奮藻陳三皇之軌模苟縱心于域外焉知榮辱之所如右陳僧智永真草歸田賦真蹟一卷按張懐瓘書斷永書在妙品中真如佩玉瑞委之立朝草如繋壤謳歌之樂聖體雖不同其致則一書故藏襄陽魏㤗家有故南昌人裝題曰虞世南有古跋曰開成五年白馬寺臨一過潭記今不存葢即是書也源委存于米芾書史中興而後書入九禁憲聖慈烈皇后嘗以暇日躬御翰墨臨摹今在秘省羣玉堂帖第一卷中體製奪真故無少異璽刻表于思陵之錄縫有蘇太簡家國老印四代相印武功圖書審定真跡印并半印凡十三又出于淳化所賜信而可稽九代流傳兩朝著定聖鑒賢紀餘無述焉嘉定乙亥十月得之吳韜仲綱贊曰平子作賦六一著錄前乎一千年既傳于草堂之手後乎四百載仍託以稗官之目衡製永述修題珂續寶真齋法書贊卷四
