body:
  text: 寶真齋法書贊卷二宋嶽珂撰厯代帝王帖徽宗皇帝臨右軍蘭亭序御書二十七行尾記一行永和九年歲在癸丑暮春之初會于會稽山陰之蘭亭修褉事也羣賢畢至少長咸集此地有崇山峻嶺茂林修竹又有清流激湍映帶左右引以為流觴曲水列坐其次雖無絲竹管絃之盛一觴一詠亦足以暢敘幽情是日也天朗氣清惠風和暢仰觀宇宙之大俯察品類之盛所以遊目騁懷足以極視聽之娛信可樂也夫人之相與俯仰一世或取諸懷抱晤言一室之內或因寄所託放浪形骸之外雖取舍萬殊靜躁不同當其欣于所遇暫得于已快然自足不知老之將至及其所之既倦情隨事遷感慨係之矣向之所欣俯仰之間已為陳迹猶不能不以之興懷況修短隨化終期于盡古人云死生亦大矣豈不痛哉每攬昔人興感之由若合一契未嘗不臨文嗟悼不能喻之于懷固知一死生為虛誕齊彭殤為妄作後之視今亦由今之視昔悲夫故列敘時人録其所述雖世殊事異所以興懷其致一也後之攬者亦將有感于斯文宣和殿書右徽宗聖文皇帝御書晉右軍將軍金紫光祿大夫王羲之字逸少蘭亭序真迹一卷維帝天縱博雅日新典學太平文物之盛跨漢軼唐興書學以勵能繪古圖而詔後蓋已揚光千載冠媺百世復因肆筆申賁前賢不泥其法而尚其材不考其文而托其意帝王盛心于是乎寓嘉定壬午歲江東漕幕臣趙與勤過京江以是書升臣珂有宣和御府印具焉望瑤池之駿空想遺蹤驚化壁之龍可無留恨式毖寶翰用懷天遊贊曰太霄帝君升壽丘夢中靈篆垂鸞蚪翩然下作八極遊赤符羽蓋臨中州神機天縱凌口口日口月口孕口口口口殿前卷罳罘口口口口侍衛休昭回雲漢光正浮萬象不足供雕鎪蘭亭當日褉事修筆力一挽回千牛不特字健文亦遒蕭統作選棄不收藿羮詎識羅珍羞掎托碔砆遺琳球帝謂口口豫欲口巨筆霞練扶斗航寫成斜月輝瓊樓羣真鵠立光射眸六丁雷電不可求倐忽一瞬三千秋長安千門曲江頭桞色曾繫金口口天涯恭覽涕泗流蒼梧呌口口口愁徽宗皇帝詩聫扇面御書暖河消雪帶風栁散冰絲御押右徽宗皇帝御書詩聫扇面真迹一卷臣得此帖時與裕陵龍字偕牒者謂是年敵人頗收拾本朝字迹蓋遁逸河南意欲復和而然帖因是多出扇敝甚乃褾而藏之贊曰四海如春時維帝心遇物而感其傳至今宫扇之存有此神翰願揚仁風慰彼塗炭徽宗皇帝秋賦御書絹本界行楷書三十行楚襄王以雲夢新秋章華遙矚顧謂侍者言于宋玉吾聞白帝令行金烏景促凄涼兮天地之內搖落兮山川之曲昔恨何已今悲不足玉曰臣聞泬寥兮空高水清寂寞兮傷心軫情況溽暑方退涼飈乍生楚岫添碧吳江更明或當别浦或在邉城莫不對景魂斷嗟時骨驚至如晃曜天區蕭條帝里有栁色初減有蟬聲自起會牛女于銀漢别昏明于漏水金盛難測火流河已漠漠淒淒乃孟秋之節矣又若律建南呂風驚北邊氣分琴怨時當月圓燕將蝶以朝别螢照蛩而夕翻葉黃兮露灑秦地草白兮雲愁朔天凛然肅爾乃仲秋之節候焉洎乎始漲湘波初驕代馬木落江上霜飛天下衣可授于中土菊方開于四野既混川嶽寧殊夷夏憀栗颼飀乃季秋之氣也古往今來悲乎信哉爽徹誰運昏沈洞開漢宮之扇詠垂誡鄭國之蘭香亦摧自然夕景方寒晨光不熾雨洗高而更碧煙凝逺而逾翠千門之絺綌無彩五夜之星河有次此時羣鴈飛耒絶塞之聲何處孤砧搗出幽閨之思斯則天道推移人事盛衰鷹祭鳥以當候雷收聲而應期楚王乃悄爾凝睇端然益悲察榮枯之至理戒驕奢于是時秋賦宣和殿御札右徽宗皇帝御書秋賦真迹一卷金縷百花裝縹緣朱界玳瑁雙龍軸太平盛時百工技巧咸精其事臣固聞而未之見也嘉定癸未歲九月初遣諜者得此迹于燕時距宣和已百年矣而褾褫砥平雖間關毁摺不少損動金縷之妙細比毛髮殆與神工鬼能較竒逞異于秋毫間臣是以知史漢之稱孝宣初無溢辭驚喜歎息又幸神蹤之迄還殆天所升將復見如本始地節之中興也贊曰帝宣和之太平兮欣朝野之多娛偉楚臣之託辭兮侈肆筆之特書猗百工之精能兮璨玳軸而金朱宛百年其如砥兮方日卷而霞舒維宸筆之天縱分臣固不得而議也若一藝之必極其致兮亦盛時之細也彼舞衣與竹矢兮猶三代之祕也知苟且之必無兮亦可觀其治也在本始與地節兮漢室稱為中興豈尚方之工萃兮反有愧于西京紛天葩其在前兮晃銀海其欲眩縷黃金以為飾兮駭萬態而千變雙龍宛其在軸兮森毛髮以骨寒厯溽潤與埃塵兮曾不可乎犯干巫咸下招兮天門詄蕩臣得而藏兮徒慨歎以興想鸞翔龍翥兮太平之蹤神睒鬼哭兮太平之工五陵松柏兮蕭蕭秋風此賦之傳兮與天無窮徽宗皇帝御製冬祀詩御書宣和乙巳冬祀大禮卿以執綏侍玉輅回鑾禮畢以詩來上俯同元韻賜伸仍宣示俅傑羽衛森嚴錦繡城夜寒璧月有餘清皇壇奠玉橫參近柴燎升煙宿霧晴晏粲九天風露回雍容羣辟珮環聲執綏更喜多儀肅盛事應傳伯仲榮右徽宗皇帝御書御製冬祀詩真迹一卷臣謹按李燾續通鑑長編曰宣和七年十有一月丙戌有事于圜丘十二月丁未幸陽德觀凝祥池中太一宮戊申詣上清儲祥宮神御殿癸丑童貫至自太原先是上躬祀圓壇才下壇而金師至邊密報至及欲恭謝而金兵入界報又疊至左右皆祕之但曰恐壞卻恭謝凡五日報益急蔡攸始語白時中李邦彥因共奏請聞燕山有急報至乞付外廷議之恭謝以是日畢而貫回中外泮然知為北方事作矣今考此詩蓋是年禮成之後賜執綏官高伸等後五日辛卯太宰白時中方奏祥應詔付袐書省赤白囊固未徹乙觀而亦未至中書也長編所書信矣左右凡臣揚埃霧以晦日月其罪可勝誅哉箋以金龍制作精妙蓋與賜張瑴金華詔紙同出一時嘉定癸未歲十月臣在揚州遣諜至河南舍京師民家自言高氏子孫得此以歸贊之以見燕山之得女真之交皆臣下蔽欺之過云贊曰宣和之伐燕上意本不然攸和其終貫倡于先稔釁開邊以啓敵人之垂涎肇聖德之毖禋即雲陽而奉瑄馳赤囊以扣閽乃閟閼而遷延自今觀之雞竿初收鸞輅載旋濟濟顯相洋洋大篇宸筆睿藻方且侈臣下之貺而灑金華之箋是左右之臣未嘗有一臣也於呼噫嚱彼蒙蔽者其忍于欺天耶然臣考聖作閲史編是歲之郊敵騎披猖雖暫壅于黈聽而側身哀痛之詔不旋踵而遽宣一念發中三靈森前臣固知其足以格帝命回天心而開中興于萬年也徽宗皇帝諸閣支降御筆楷書三行龍圖天章寶文顯謨徽猷閣等處道場數內恩澤應支見錢者並支一半見錢一半折絹係御筆如違以大不恭論朱印一行宣和七年六月二十八日未時張去為封降下貼黃二行右徽宗皇帝諸閣支降御筆一卷朱印其旁卷末著宣受內臣月日姓名臣謹按蔡絛國史後補曰內降自祖宗來有之但作聖旨行下崇寧有親筆乃稱御筆大觀四年夏始詔違御筆以違制論六年春凡御筆頗不類上字宣和改元後內降則又時時作吏體非宮人筆札魯公因奏曰陛下號令何可由師成體外人書上曰宮人作字舊樣不佳朕教之今其書頗類男子良可嘉卿蓋誤矣其後始通知今􅌖思殿文字外庫使臣若楊球等掌之張補等點檢小閹三四人主出納用寶以付外處之于宣和殿之後廊但謂之東廊即其所也實梁師成統之焉又降御筆曰諸御筆承受官司住滯一時杖一百一日徒一年一月加一等罪止流三千里又詔違御筆以大不恭論不以赦降去官原減是後凡進擬入者必禱補球輩使點竄訛舛內外相關而上但謂外廷不知也臣固嘗疑其書之妄既得此帖參以臣家天筆之藏蓋昭乎其不類也楊球張補之迹蔡京梁師成之罪著矣嗚呼黍離百年中原霾昏東廊所須理無復存孰知此帖之得足以備太史氏之闕文耶悼羣姧之蔽欺掩遺卷而三嘆得之歲月蓋與太宗南牙帖同時贊曰昭回之袐天所示風行雷厲動一世獨持八柄昭馭貴馭貴馭富抑其細百年史牒記金匱木腳東廊果何地誰從六閣得幅紙朱書旁行儼如此貴璫日月書紙尾宛如宣和見宣底參稽天筆良不類恭覽比方三嘆喟王蔡諸臣真可罪區區球補蟣蝨耳汴都倣徨塵未洗此帖間行來萬里大書尊堯詆王氏責以格君法當爾姧諛直筆誅既死願以所書裨太史徽宗皇帝傳旨御批楷書二行御批其後指揮天章閣高伸每歲生日可特許前二日受賜李彥二字亦御書右徽宗皇帝傳旨御批真迹一卷御筆李彥二字于後臣按汪藻所編詔旨內載高伸在宣和四年十二月辛丑自保和殿學士提舉上清寶籙宫兼侍讀為保和殿大學士應千恩數請給等並依昨蔡攸宣和殿大學士已得指揮生日之賜疑是此時恩數之一也李彥領西城所名位甚著命之宣旨豈以重伸之寵耶嘉定己卯臣在郎舍有市鬻者持此帖求售云高氏孫尚居帝闉之外家甚窶待此以晨炊臣以萬錢得之贊曰既侈恩數復念其初度帝之于羣臣可謂無負矣運鍾陽九曾無一人能振國維拯天步以答不世之遇若人者曾何足以膺三錫之榮適所以為九府之蠧也欽宗皇帝御押內藏御筆行書四行內藏庫支錢一萬貫付李彀充應副道君皇后修造使用御押右欽宗恭文皇帝御押內藏御筆真迹一卷天步多囏飈回九州倥偬戎馬之時遹追曾孫之志在靖康之元所以加惠帑儲為懲艾之圖者至不忘也而寧親之孝先意之承則弗敢有靳豈非養以天下聖心知所先後者歟觀其幅褚以上動經􅌖藻憂勤夙夜業業致孝實迹具在聿昭帝心又足以備史氏闕文之登載帖中內臣李某中興後更名志道蓋避建炎諱云宸章軼于北方蓋多厯年臣以嘉定癸未因遣間至燕境遇使者苟夢玉之還得之宣德州民間以歸用旌鼎湖之遺以寫羑里之憤贊曰臣嘗覽史録靖康之初耿南仲等執事兩宮不能謹于調娛既旋啓宣德正門之讒是以有擷景西園之居噂􅊱一談紅紫亂朱臣以今帖考之始知天下有不可盡信之書方倥偬于艱危調軍國之百需內臣傳母后之旨而口墨染翰曾若頃刻之不可須字小大以體變筆欹傾而行疏是殆養志無違之孝根于聖心故得一頤指廪然不敢自安于舒徐彼李志道亦一城狐亟升亟從俱不敢計其餘是又知間言之易啓而欲泯其迹于末有原之問其視曾子蓋已異世而同符矣陽九會逢數不可踰具臣匪材顛不能扶天固難窺人當豫圖若是則可深責又安得肆浮雲之翳以掩居諸聖靈在天奎文炳如臣時其藏以昭邦誣欽宗皇帝御押防河御筆楷書兩行後有御押及御批支字內藏庫取銀五千兩日下交割付王褒充犒設防河將兵等使用支御押右欽宗皇帝御押防河御筆真迹一卷奉親之孝臣固嘗表之矣而當時秋防之殷在國事之重莫此先者宸藻睿斷蓋均有考焉臣得此書與內藏帖同時贊曰軍志有之兵無財士不來觀當時之搶攘實欲扼蒲孟批衛懷控河津之流澌而掃敵馬之氛埃捐賞如泥沙而終不能以卻嘗讀是書而痛哭悼將臣之乏材豈皆天運之偶然其殆始于人謀之好乖是知夫挾纊之恩投醪之惠雖在上之有餘而馭之失宜以致于橫潰亦不得不致恨于黃金之臺也高宗皇帝舞劎賦御書界行紙上行書四十五行內胄字側注交相字誤作相交乙起將軍以幽燕徑卒耀武窮髮俘海夷虜山羯左執律右秉鉞振旅闐闐獻功于魏闕上享之則鐘以捍虡鼓以靈鼉千妓度舞萬人高歌秦雲動色渭水踵波有肉如山有酒如河君臣樂飲而一醉夷夏薰薰而載和帝謂將軍拔劎起舞以張皇師旅以烜赫戎虜節八音而行八風奮兩階之干羽公于是貝胄朱綅而正色虎裘錦裼而攘臂抗稜威飄鋭氣陸離于武備婆娑乎文事合桑林之容以盡其意照蓮花之彩以宣其利龕然鷹揚翼爾龍驤鋒隨指顧鍔應徊翔取諸身而聳躍上其手以激昻縱橫躍潁左右交相觀乎此劎之躍也乍雄飛俄虎吼搖轆轤射牛斗空中悍栗不下將久歘風落而雨來果愜心而應手爾其凌厲清淳絢練敻絶青天兮可倚白雲兮可抉覩二龍之追飛見七星之明滅雜朱干之逸勢應金奏之繁節至乃天輪宛轉貫索回環光沖融乎其外氣混合乎其間若湧雲濤如飛雪山萬夫為之雨汗八佾為之慙顔及乎度曲將終發機尤捷或連翩而七縱或瞬目而三接風生兮蒨斾襜襜電走兮彤庭煜煜陰冥變見靈怪離獵將鬼神之無所逃遁豈蠻夷之不足震懾嗟夫藺子之迭躍其人未雄仲由之自衛其武未工曷若將軍為百夫之特寶劎有千金之飾奮紫髯之遊刃發帝庭之光色所以象大君之功亦以宣忠臣之力載歌曰洸洸武臣耀雄劎兮清邊塵威逺夷兮率來賔焉用輕裾之妓女長袖之才人天子穆然詔伶官斥鄭衛選色者使􅀈乎軍容教舞者使觀乎兵勢變激楚之結風為發揚之蹈厲僉謂將軍之劎舞古未之至右高宗武文皇帝御書賜先臣飛唐喬潭裴將軍舞劎賦真迹一卷按唐文粹賦在第四卷中臣珂家藏天筆盈笈大概皆兵事節度臣固嘗具之甲子奏篇惟是書以遊戲翰墨渙錫口口舊藏臣兄甫家嘉定辛巳歲二月始得之故弗及載有御書璽及己未小璽以殿于篇臣既繫宸章復伸蠡測輒陳蕪贊式著聖心贊曰維中興焯人文燀皇靈即清燕垂翰墨光日星揖怒蛙市駿骨期混并寫古作示休寵作豪英臣有劎淬三河包兩京舞絶世抉浮雲開太清帝有訓誓臣節式欽承誰掣肘起奮袖憤裂纓鬱干將在寶匣長悲鳴後百年血郅支鍔尚腥刻斯贊表帝心傳龍庭高宗皇帝韋杜三詩御書前一詩金龍黃箋楷書七行後二詩金華紅箋楷書十行北風昨夜雨江上早來涼楚岫千峯翠湘潭一葉黃故人湖外客白首尚為郎相憶無南鴈何時有報章早發湘潭寄杜員外院長養拙江湖外朝廷記憶疏深慚長者轍重得故人書白髮絲難理新詩錦不如雖無南過鴈看取此來魚酬韋韶州見寄九農成德業百祀發光輝報效神如在馨香舊不違南翁巴曲醉北鴈塞聲微尚想東方朔詼諧割肉歸社日右高宗皇帝御書唐韶州刺史韋迢寄劎南節度參謀檢校尚書工部員外郎杜甫一詩甫答迢一詩社日一詩凡三篇真迹一卷前一詩書以金龍黃箋後三詩書以金華紅箋天筆所掞聖意所存惟北風是歌惟南鴈是懷斯心也天明地察固昭昭矣周事者獨可無將順之心乎臣嘉定乙亥歲三月濫丞戎監與外府丞韓松同登天開圖畫閣偶言及金華箋事松謂今亦有此紙遂持此帖以遺臣臣既伏讀因為松言所以書之意松復于臣曰子為是説固臆度耶抑有所本耶臣應之曰昔紹興十二年九月辛丑上論及經筵賜御書扇子事聖訓有曰朕閲唐史見太宗面評羣臣才德長短似有所傷今朕所書皆杜甫詩蓋因以見意也金匱之藏固紀之矣誰謂燕間肆筆之頃獨無所託哉松甚然臣言勉臣筆之以宣宸衷贊曰古者賦詩惟以言志或陳卒章或托首意惟聖秉籙啓于多艱北鄉之悲鑾輿未還歲時顧瞻雪涕凝􅀈宸毫寄心亦或有取維唐二臣一唱一酬節物感懷下筆不休西清燕間念此敻隔鬱乎居南淒其望北璧跗琅鈕舒卷龍箋白雲其翔契闊十年臣之管窺嘗讀國史曹勛衣襟洪皓幅紙或慟或泣或命以官或間持書或使問安玉音琅琅具記青汗宜其注思感此歸鴈三詩之作迭寫杜韋社日二篇獨書前詩昭哉聖情如古之賦迄其弗償徒切舜慕霜露之履誰無此哀止或尼之謂之何哉是帖之傳式嫓遺訓敵愾于王見者必奮高宗皇帝虛堂詩御書絹本草書四行虛堂燕坐悄無言欲斷殘香冷自煙秋色滿山松桂靜一輪霜月瀉寒泉右高宗皇帝御書虛堂詩真迹一卷赤水得珠兼忘天下臣聞之書傳矣而今乃見之大庭穆清此詩概可想見其萬一也嘉定戊辰五月臣在九江得于隨龍醫曾良器贊曰淳熙詞臣周必大進北宮端午帖子詩有曰聚逺樓頭靣靣風冷泉亭下水溶溶此詩之書豈其地耶楊萬里賦尤袤所藏宸翰詩有曰自言天風來帝旁拾得復古殿中雲一張臣得此詩豈其類耶松偃桂芳霜清月墜心齋坐忘聖處其似髙宗皇帝馬盂手札御書草書三行降馬盂四隻未得細造先抹成擇無病者入細造右高宗皇帝御書馬盂手札真迹一卷有成忠郎王藎臣家以後苑工進從蹕于南都實得此帖開禧乙丑七月臣得之北府任軍庾時贊曰方赤伏之集于鄗壇也外侮內訌士無解鞍馬上之治方興鸞旗之驅未還則糒水之須豆粥之進固無俟五鼎之安此帖之獲蓋出于當時之服官贊而旌之所以彰王業之艱難也高宗皇帝除目手札御書楷書十一紙第一第六紙各三行第二第十紙各四行第三紙五行第四第七第八第九第十一紙各二行第五紙一行張中孚除使相中彥除節度使卿等若議定今晚或二十一日可進熟狀羅汝楫除起居郎日下供職若便除中書舍人如何可奏來程克俊除端明殿學士簽書樞密院事日下供職可兼權參知政事王㬇除敷文閣待制知臨安府日下供職王珉除右正言日下供職施巨除參知政事鄭仲熊除端明殿學士簽書樞密院事並日下供職鄭仲熊合得恩數並依執政例施行湯思退除端明殿學士簽書樞密院事日下供職湯思退合得恩數並依執政例施行董德元除吏部侍郎王珉除禮部侍郎張扶除右正言徐嘉除殿中侍御史並日下供職董德元除參知政事日下供職案前標題注及後跋語作十一幅此分為七或有缺佚與誤連之處今並仍其舊右高宗皇帝御書除目手札凡十一幅真迹一卷臣恭惟祖宗御朝以心腹寄大臣一札十行日達政本惟耆德宗工祗宣王命裒對制札罔不于德之承中書黃門時嚴其藏具有故事臣寶慶丙戌二月自京江餉所遣吏如建康有為秦氏鬻書者來告曰日者乳醫媪入秦門見故卷軸墮房廡間扯裂過半因㩗以出謾從求售遂以三鐶得此以歸于臣臣斂襟雪涕再拜而歎曰是固私室之藏耶蝸侵蠧毁孽子孫者其皆習所見聞而視為當然耶棄置抵擲是又忍之而不復顧耶嗚呼零落散揚之餘乃使臣幸而得之固足以表中興之􅌖謨而竊柄者之無君亦將于是乎有證矣贊曰煜煜宣底匪天筆之比有司之謹視龍翔鸞峙維四近之委屋角之捐棄何物老嫗收拾敖戲目以廢紙幾何其不毁臣得而裝褫天殛神棄彼其之子高宗皇帝馬政兵事手札御書行書八紙第一紙十八行第二第三紙各七行第二紙有外封一行第四紙六行第五紙四行第六第七紙各二行第八紙五行西和州宕昌縣階州峯鐡峽兩處買馬場每歲起發綱馬赴樞密院押綱使臣往往不得其人因公自私餵養失時多致倒斃可自二十五年為始循環撥付殿前馬步三司如二十五年並撥付殿前司二十六年分撥付馬步軍司二十七年卻撥付殿前司周而復始皆循此三年為例仍自今後令逐司當撥馬年中每一綱選差有心力使臣一員軍兵三十人就買馬場團綱起發直赴樞密院交納賞罰依已降指揮每二十綱更差將官一員量帶白直鞍馬管押使臣軍兵提點綱馬通計分數比附賞罰差去官兵與每日添破本等驛劵錢米往回批請所經由州縣仰豫行椿辦錢糧草料不得臨時闕誤如有少闕去處仰押綱使臣徑申樞密院取旨西和州岩昌買馬處夏月山水泛漲道路艱惡馬多損斃可都大茶馬司説諭買馬客人自今後遇四月一日閉場住買至八月一日開埸收買所用茶須管豫期津發在場無令闕少阻滯客人付秦檜已降指揮起發兩浙路弓弩手可委逐路帥司將諸州軍見教閲人盡數起發于七月內須管並到行在不得占留仍令差得力官兵等押前來潭州駐劄裴鐸元世顯陳元郭孝思所管軍兵共二千七百餘人可勾付行在令田師中差統領官一員將帶三千人于潭州駐劄每歲一替步軍司改刺充陜西振武軍黎廣等五十人可令户部自到司月日為始放行諸般請給劉紹先李顯忠下人兵並撥隸步軍司建康駐劄張淵閻德可勾付行在張淵閻德官兵可盡數勾付行在令張淵閻德目下起發前去管押合用舟船令所屬應副起發錢依例支右高宗皇帝御書馬政兵事手札真迹一卷臣既多得秦氏帖移節京口之再歲奉詔閲戰艦因如金山主僧永聰來迎蓋舊主建康蔣山剎臣所舊識因及郿䲧事窗為臣言曩于移忠寺僧某處亦嘗得宸章一卷皆馬政兵事秦氏凡朝夕裹什器撒窗牖莫匪斯比故寺僧得之亦甚富臣驚索視如其説聰因以遺臣贊曰秦氏之不恭至矣軍國之機事顧亦不復留底于有司其必有所為也今不能以考其深意然而門媪市卒之餘亦及于羣緇散棄如彼蓋君臣之心亦不及于螻蟻矣又何議哉又何議哉高宗皇帝親隨手札御書草書六行韓世忠下親隨人有三十餘人未曾發遣前去并王權見在此可令王權管押速起發前去楚州此三十餘人不係合留人右高宗皇帝御書親隨手札真迹一卷始秦檜將議和以蘄王韓世忠初謀劫北使張通古千洪澤指為首罪密命胡紡告捕世忠親校耿著置之獄時先臣飛與張俊實以宥府出分楚軍謂著倡言以撼軍心圖叛逆且謀還世忠掌兵柄將遂以左證上逮世忠而甘心焉出使之際召先臣與俊諭之中堂授以羅織之説偽託以上意議已定矣先臣不忍世忠之以忠被禍而告之世忠號泣以訴于上上驚而詰檜故著既減死遂又移所以誣著者而誣張憲蓋出一轍焉方三樞密並命而世忠獨留先臣與俊不惟不釋兵柄且將分總淮東軍是出使也非罷兵也其意膫然可見矣檜之屬先臣與俊以陷世忠是亦猶後日屬張俊以陷先臣也二人受命而先臣獨不肯從則先臣獨歸班而留俊于外著既出而憲之獄遂一力成于俊之手遷怒之本末指授之次序固應然爾不然則世忠異時之死上將臨奠檜命中書吏韓瑊出危語以撼其家何以亦出于此一意度而檜于紹興時政記所書敷陳之際曾得聖訓褒張俊之功謂與世忠萬萬不侔又何以專及俊于通古來宣力之一説終始本末乃若是其不可渝耶今之談者不察顧謂展燕具以待勞還初謀專為先臣之後至是皆目睫之論而未嘗考夫二使並出與夫一使獨留之本意也臣嘉定庚辰歲三月在建康于檜家偶得此札計其月日正在行府將出之時檜之譖忠臣蓋深矣臣既重悲家禍將以著檜之用心故表之使與辨誣互見贊曰惟帝推赤心置人腹固未嘗以置衛疑大臣蓋參會之獄將發于外則熒惑之言未嘗造膝而密陳先臣屹然而不從故張機之巧轉諉于同列而自移于厥身二事後先皆曰分軍其亦可以觀誣言之本根昔在唐室羅織既興有狄仁傑獨不肯引楊執柔以自伸其觸柱之詞曰皇天后土乃使仁傑為告密之人乎即是而論誣他人以自脫者先臣之必不能而張俊則一嗾而亟奔也此札之存足考檜讒之因薰蕕未分蘭艾斯焚詒于信書以訂闕文寶真齋法書贊卷二
