body:
  text: 寶真齊法書贊卷二十五宋嶽珂撰宋名人真蹟潘子賤改月帖行書九行良貴叩頭上啓改月伏惟尊候萬福引嚮引嚮良貴即今過南山作少緑事中秋後方歸恐左右旦夕須差考校無由候别不勝悚仰謹布此區區秋暑方熾千萬珍愛不次良貴叩頭上啓文伯教授學士賢友侍史初三日右紹興徽猷閣待制潘公良貴字子賤改月帖真蹟一卷公徑正之操聞于一時字畫之存雖近猶可敬也嘉泰癸亥十月得之臨江之彭氏贊曰公立柱下直聲凛如氣則不餒而况于書待人以情真意浹洽于嗟前修動則可法胡已茂鶚章帖行書十二行交修惶恐再拜上啓少懇輒塵嚴聽從姪㠓備員德清丞吏事明敏公勤潔廉胥吏畏戢甚得民譽頃左右剖符之初嘗令謁見于臨安已蒙清顧方此薦士之初輒敢求玷鶚章之末逮此終更獲遂改秩皆出門下之賜載德豈淺淺耶敢恃眷舊之私特加留念幸甚干冒愧悚殆不勝云交修惶恐再拜上啓右紹興端明殿學士胡公交修字巳茂鶚章帖真蹟一卷自薦舉之失初意晉之祁奚本朝之曹呂蓋世以藉其口而售其私者以古自信庶幾于中興之人物見之帖得之京師寶慶元酉之八月贊曰矰繳之冥鴻人心所同是內舉者何足以害其公世道之趨或汙其隆此帖之存所以愧今日之憧憧向伯恭旁午帖行書十行子諲惶恐再拜請違鈞席倐爾兩月不勝瞻仰之情乍到官所賓客旁午應酬不暇念欲上狀少謝前延遇之意執筆輒已屢矣洊蒙寵賜手教仰服眷厚且愧不敏耳大參虛位側聞環召復歸廟堂以福四海子諲惶恐再拜右紹興户部侍郎徽猷閣直學士薌林向公子諲字伯恭旁午帖真蹟一卷豫少侍先君帥東廣道出清江嘗登薌林之麓後十五年與公之孫公起公謹游屢見手墨又十四年寶慶乙酉六月始得此帖于京江贊曰塗水漣漪未改薌林風月如新一紙重觀遺蹟百年無復斯人劉彥修江岸帖楷書十五行子羽頓首再拜上啓侍講內翰台座江岸請違載更嵗籥景仰德誼與時俱積謁歸故棲繼之行役擾擾多事疏奉起居春寒伏惟論思餘閒神明協相台候動止萬福子羽嵗暮抵漫陵交郡事海邦僻逺民淳訟稀竊祿養親誠為安便正阻清覿願言加愼䄄鼎益隆眷注謹拜手狀不宣子羽頓首再拜上啓侍講內翰正月七日謹空右紹興徽猷閣待制劉公子羽字彥修江岸帖真蹟一卷公自徽猷閣待制守泉在紹興丙辰嵗是時翰苑蓋朱公震陳公與義朱方勸讀則公所與書陳其人也嘉泰壬戌嵗七月得之都城士人錢萬贊曰其忠足以繼忠顯其教足以傳西樞其略足以佐魏公其識足以知二吳於呼斯亦足以列寶真之儲矣梁仲謀去月帖草書卜九行汝嘉惶恐去月二十八日以辰子得竒疾不幸二十九日劉丈見過告以廟堂呼召分委職事方知淮甸已擾次日得㫖促出自此不復更得少暇修人事亦不得略為亡兒取日作佛事一切付之牙校輩相繼報益急遂議挈家三數日來孥纍既行府事逺交與章丈方少通氣得親書問耳不審得見量否即日伏惟開府之初神相起居台候萬福不勝瞻仰惓惓之至汝嘉初得指揮獨以本部事從行繼得與劉丈同行指揮今又獨行矣終當率劉丈同行也啓行未有定日聞已擬二十三日又聞二十九日相君云有警即動不許擇日也餘已具劉文書中更不縷縷向寒乞相時珍重以俟寵數不宣汝嘉頓首再拜知府徽猷侍郎鄉兄台座右紹興寶文閣學士梁公汝嘉字仲謀去月帖真蹟一卷豫開禧甲子冬初筮仕南徐公之子季珌實以九卿總餉尚及見典型帖得之其門人鄭子夀蓋或持以獻者贊曰當邊境之多虞士君子出而備馳驅見于盈咫之書觀其六鑾之行雖擇日亦不可以少須其時為何如燀燀出車投袂以趨母寧以家而忘此胸奴豈其私是圖此敵愾之士必即是以察忠臣之區區也魏邦逹聖訓帖行書十四行矼惶恐再拜知府侍郎徽學台座拜違未一月馳仰已窮即日恭惟下車布政台候萬福矼以面奉聖訓略至劉候軍前取道治境拘文故不敢拜謁又事頗亟不欲少駐告借一知路人問徑道或云須由四安廣德而往或云自長興有水路尤便聞劉在太平或在建康惟欲取疾耳矼所乘舫子稍大遂至崇德易一小舟而來然復太小缺伸不能使府或有可至四安或長興者小舫子欲易以往無之即已不敢必也咫尺不獲少承誨益愧悚之劇舟次姑布執事不宜矼惶恐再拜知府侍郎徽學台座右紹興吏部侍郎集英殿修撰魏公矼字邦逹聖訓帖真蹟一卷事讎之議初起公獨以綱常折其鋒竟以坎壈去國名節嶤然嚴霜皓日猶可想也勾黨浸淫異軌同轍覽卷追慨為之憮然寶慶乙酉六月得于京口贊曰意有不可東帶之立弗與也事所當盡杭葦之急弗顧也詩不云乎侁侁征夫每懷靡及覽此遺墨斯足以觀君子之于役而考古義于原隰矣再拜什襲噫吾何執汪彥章譽望求賢薦書三帖並行書第一第三帖各六行第二帖五行藻頓首啓承聞譽望固非一日衰遲宦遊莫遑瞻對第馳欽詠昨者劉君汝一能言執事嘗及姓名即欲寓書因循至今負愧深矣藻方負讉屏迹丘園趣舍殊途未有馳謁之日臨紙為之太息藻再拜藻頓首啓下車今已幾時政譽藹然良用欽歎求賢如此雖公不薄淮陽士論謂何佇聽詔除庶幾善類知所激厲焉藻再拜藻頓首啓小兒快負丞獲預奔走之列天豫之幸也昨朱守嘗許其剡章未幾罷去聞當補發輒欲預薦書之末雖未果少接色辭所以冒聞者臭味同焉惶恐藻再拜右紹興翰林學士龍溪先生汪公藻字彥章譽望求賢薦書三帖真蹟一卷中興嗣命之臣公為稱首翰墨所傳與文章稱其可尚也已豫家九江道如行京屢出黟歙間知公故家所在訪求公帖慶元己未嵗八月得之文溪士人汪氏贊曰納交以道不殊乎丘園觀政以人歎息于求賢言情以真無事乎脅肩此前輩之流風今不復見者幾百年矣使覽者跫然曰古道之存存乎尺箋盍思乎免旃則如寶真者亦將預有榮焉朱文靖報稱帖行書十四行倬久不聆動靜殊用思企奉手翰之辱從審霜寒台候萬福感慰感慰倬叨預機政日思報稱未職故人有以垂教否因風幸冀不外令嗣已庸新命想深慶慰迫冗草略奉復悚仄悚仄合并未期更冀順時調獲以需晉寵奉頌之至十二月日倬劄子右紹興宰相朱文靖公倬字漢章報稱帖真蹟一卷近世字法宰傳如公以鼎鉉之貴兼翰墨之妙片紙之存皆可祕襲帖得之金沙士人陳元頴實嘉定壬午六月贊曰徑而柔端而遒奔八驥回九牛功玉鉉名金甌藏此書識前修劉無言餉茶帖行書五行餉茶略一閲皆精緻不俟㸃試可見也花子并通應佳味併煩分惠尤用感怍區區面謝坐客草草燾頓首右紹興祕閣修撰劉公燾字無言餉茶帖真蹟一卷建中靖國初祐陵手賜緍錢十五萬刊袐閣續帖彚輯名跡以踵元祐右文之規以紹淳化詒謀之列公是嵗為宣德即正字班在館閣之末獨被㫖專董斯刻且書標目及事因于後蓋書名已動九重之聽久矣然而官獨連蹇不大進至宣和末猶止寓直中祕而已豈抱至藝者不肯輕售耶山谷謂使公春秋髙江東又當出一羊欣薄紹之斯言猶信嘉定甲戌八月得此帖于蘇門僧顯時贊曰筆勢之偉筆意之詣筆法之粹是三者固足以名家而無愧矣於呼祐陵天縱八體公蒙識拔獨在初嵗亦宜其有此具美也寶此幅紙以見太平之游藝惟袐閣是視劉無言輞川詩帖二十題共四十首有序並行書一百行後四題大字標詩八首分八行小字注又劉尾記草書三行尚書右丞贈袐書少監王維摩詣余别業在輞川山谷其游止有孟城坳華子岡文杳館斤竹嶺鹿柴木蘭柴茱萸沜宫槐陌臨湖亭南垞欹湖栁浪欒家瀨金屑泉白石灘北垞竹里館辛夷塢漆園椒園等與裴迪閒暇各賦絶句云孟城􅀈新家孟城口古木餘衰栁來者復為誰空悲昔人有結廬古城下時登古城上古城非疇昔今人自來往裴迪華子岡飛鳥去不窮連山復秋色上下華子岡惆悵情何極落月松風起還家草露晞雲光侵履跡山翠佛人衣裴文杏館文杏裁為梁香茅結為宇不知棟裏雲去作人間雨迢迢文杏館躋攀日已屢南嶺與北湖前看復回顧裴斤竹嶺檀欒映空曲青翠漾漣漪暗入商山路樵人不可知明流紆且直緑篠密復深一徑通山路行歌望舊岑裴鹿柴空山不見人但聞人語響返景入深林復照青苔上日夕見寒山便為獨往客不知深林事但有麏䴥跡裴木蘭柴秋山斂餘照飛鳥逐前侶彩翠時分明夕嵐無處所蒼蒼落日時鳥聲亂溪水緣溪路轉深幽興何時已裴茱萸沜結實紅且緑復如花更開山中儻留客置此芙蓉杯飄香亂椒桂布葉間檀欒雲日雖回照森沈猶自寒裴宮槐陌仄徑䕃宮槐幽隂多緑苔應門但迎掃畏有山僧來門前宫槐陌是向欹湖道秋來山雨多落葉無人掃裴臨湖亭輕舸迎上客悠悠湖上來當軒對尊酒四面芙蓉開當軒彌滉漾孤月正徘徊谷口猿聲發風傳入户來裴南垞輕舟南垞去北垞渺難即隔浦望人家遙遙不相識孤舟信所泊南垞湖水岸落日下崦嵫清波殊渺漫裴欹湖吹簫凌極浦日暮送夫君湖上一回首青山卷白雲空闊湖水廣青雲天色同艤舟一長嘯四面來清風裴栁浪分行接綺樹倒影入清漪不學御溝上春風傷别離映池同一色逐吹散如絲結隂既得地何謝陶家時裴欒家瀨颯颯秋雨中淺淺石溜瀉跳波自相濺白鷺驚復下瀨聲喧極浦沿涉向南津泛泛鳬鷗渡時時欲近人裴金屑泉日飲金屑東少當千餘嵗翠鳯翊文螭羽節朝玉帝濚渟淡不流金碧如可拾迎晨含素華獨往事朝汲裴白石灘清淺白石灘緑蒲向堪把家住水東西浣沙明月下跂石復臨水弄波情未極日下川上寒浮雲淡無色裴北垞北垞湖水北雜樹映朱欄逶迤南川水明滅青林端南山北垞下結宇臨欹湖每欲採樵去扁舟出菰蒲裴竹里館獨坐幽篁裏彈琴復長嘯深林人不知明月來相照來過竹里館日與道相親出入為山鳥幽深無世人裴辛夷塢木末芙蓉花山中發紅萼澗户寂無人紛紛開且落緑堤春草合王孫自留玩況有辛夷花色與芙蓉亂裴漆園古人非傲吏自闕經世務偶寄一微官婆娑數株樹好閒早成性果此諧宿諾今日漆園游還同莊叟樂裴椒園桂尊迎帝子杜若贈佳人椒漿奠瑤席欲下雲中君丹刺罥人衣芳香留過客幸堪調鼎用願君垂採摘裴豫每見右相輞川圖想見其處復于其集得此詩尤想見其人風度髙絶非復世人也裴迪在唐無聞而其詩如此抗衡摩詰則其人亦可知矣偶有繭紙一軸大小字書之僅足以見余景慕不忘之意無言右劉無言輞川詩帖真蹟一卷輞川竒勝甲唐世名墅槩觀諸詩亦可想已豫舊藏唐人所繪圖每暇日一縱覽飄飄然若身在華岡北垞間今見此蹟筆力清徑與詩頡頏是可與圖並甲袐笈矣得帖之日寶慶乙酉十月售者錢氏贊曰輞川之勝新詩之詠所以適性也繭紙之瑩筆力之徑所以寫興也維詩與筆景物交映也並于唐圖于是為稱也呂居仁瞻仰收召二帖並行書第一帖十四行第二帖十一行本中再拜比稍不聞動靜瞻仰之至即日伏惟尊候萬福本中久留閩中比已治北去計復被召命顧自春多病日頗增劇須俟旬日稍閒乃行衰羸如此亦復何用前路當懇求官祠再任期必得請或見諸公敢乞先致一言張本至幸尚阻侍見倍乞為時護重不備本中再拜徽猷侍講姑夫淑人四十七姑座前四月二十八日本中拜覆收召雖出推奬然本中衰病不堪若冒昧求進必致顛隮將來自陳尚乞垂意不能者止聖人明戒亦或不辱題品萬分之一矣其他覼縷當俟後狀曽壻到行朝請見敢乞矜憐六哥十哥續别作書大同包上起居本中拜覆右紹興中書舍人直學士院呂公本中字居仁瞻仰收召二帖真蹟一卷中原文獻之傳如呂氏一門道德文章世載厥媺固難乎析薪之責也公在南渡後巋然靈光尊王賤霸之一語著于王言天下凜然始知有大義其正人心扶世教功不淺矣所謂負荷復何議哉嘗考史録見史臣秦熺之言曰紹興四年三月秦檜拜右相議和之計決矣而左相趙鼎抑沮甚力因修史加恩密諭直學士院呂本中為制詞蓋豫為後日姧圖鼎為首相不復留意國事用兵則徒擅都督之名略無措畫議和則隂懷首鼠于進對之際未嘗有可否隂結黨與肆為詆欺其負眷意如此於呼天下有公是非如公之不匿厥指顧可以為誣乎帖得之髙平范氏難進之風溢于盈咫之幅計其嵗月當在公賜科第還行都時百年聲猷槩可覘矣紹定之元上已日豫修禊研山而帖適至贊曰呂氏一門我朝韋平衣冠既南孰為典刑猗歟北扉翰墨騰英難進之風藹于心聲其進維何風雷隱砰賤霸尊王萬古作程天將開之以豁瞶盲孰遏其萌維盜實憎觀公初心何止懲羮親朋斯升方喜彚征私書之詒猶欲卻行豈願空言與乳臭爭道之將宏非人所能俯首事讎衆方若醒詎知禍胎自漢公卿淪胥一談大呂為輕綸音一頒四海竦聆臧宮鳴劒賈誼請纓書下奉天已識中興曲筆誰歟反肆譏評隂險何知雲收霧明公帖初獲我心未寧謂彼噂􅊱臆度以情是或鼠腐猶疑鴻冥既見公書懇懇至誠視彼儻來雖寵若驚肯以王言屈于姧朋公義既昭公論既明逮今百年猶歉混井時歟數歟迄莫我聽公帖雲煙公心日星彼犬之狺何吠非形天澄氣清修竹蘭亭閲此帖焉對于汗青李商老酬答詩帖行書十二行謹次髙韻奉酬禹功司録博士彭再拜煙霞痼疾自藏身刮膜頻窺佳句新學博還同杜候庫才慳深愧庾郎珍倚風終日掃松徑披霧何時對玉人西掖鑾坡須妙手如公那復困無津右江西詩派日涉居士李公彭字啇老酬答詩帖真蹟一卷詩𣲖詩蹟未登于寶真丙戌八月始致此帖于賜山蓋託士友搜訪而得之者有藏書家七印贊之以備詩體之一焉贊曰九𣲖之沕潏注于溟渤寓此詩筆烟霞之痼疾園涉以日紓寫盤欎豫于西江搜抉遺軼備體之一陳文正黃庭帖楷書十行康伯惶恐頓首再拜上覆康伯輒有少意于禀近搜訪得禇河南小字黃庭經一卷雖未辦真贋要似非近時墨蹟仰恃眷私率爾持納為書府之玩儻賜指留不勝萬幸郡中馬氏有唐盧稄迦髙僧畫像乃禁中舊物印記頗多上亦有唐寶今已依近降指揮收買專人申納太師公相府亦乞鈞照康伯惶恐頓首再拜上覆右兩朝相國維師魯國陳之正公康伯字長卿黃庭帖真蹟一卷海陵煽凶九垠沸騰封豕長蛇薦食上國瞰然有投鞭必渡之志維時元臣鎮物如謝安效忠如陸贄輔聖斷如裴度佩安危如郭子儀在公一身吾國九鼎然則楊休玉色正笏垂紳之氣象固可即遺墨以占之也是帖蓋與秦熺者當是知漢川時孽㷔滔天雖如公者猶不免于避礙致曲此則重可歎也嘉定辛巳四月得之建鄴秦氏致之者亦市買卒顧姓云贊曰隆興聖主臨盛朝元臣堂堂冠蟬貂鎮撫百度服天驕九鼎安固屹莫搖凛然遺墨松後凋美錦不璞不雕百年攸熺均童妖惜我喬木屈艾蕭圍棊賭墅意自消後來偉蹟可岧嶢我來郿塢鳥焚巢乃見拱璧汚脂膋卷藏再拜刻琰瑤百花藩溷隨飄飄願續洛譜從午橋不問處所知春饒史忠定蚤作帖草書六行浩再拜上覆辱教伏審蚤作尊候萬福示諭若詢之在渠想無不可者萬一求之不得無如之何不可不問也是亦一機㑹幸裁之紙札不精望恕之浩再拜上覆周丈祕省賢友座前右興隆相國太師越國史忠定王浩字直翁蚤作帖真蹟一卷三代而下帝王之學不講久矣堯疇舜咨指為迂談無逸易圖金華倚席格心之效曠不復見根枿失養因世治亂視其天姿培溉一源民澤所繫德修罔覺基于斆半其孰能顧舊興想如啇宗之于甘盤者乎寥寥數千年發精一之藴紹下風之問惟公之遇孝宗皇帝實維有之盛德光明前隆後淳大倫用章大誼用伸大原用傳大業用昌華重文敷道統勃興緝熙之功蓋非一日珂齠齔侍先君子行都尚及見賜几杖時生四十有三年寶慶乙酉嵗二月始得遺帖于京口竊覩墨妙淳徑嚴重儼如佩玉端委于廟堂之上其學力功用之所充尚可即此以占之也留候掉三寸桓榮陳五經方斯以稱抑多恧焉贊曰危微精一傳之在心二典勳華光于有臨大原自天端倪孰尋豈無疇咨培髙浚深寖明以昌舉元難壬蒸哉明良嗣此德音匪鑑而諷匪扆而針啓迪在初有開宸襟巖廊南風袗衣鼓琴淵躍籋雲匣鉶發鐔逹其已充澤彼蒼黔王度之恢如玉如金進而虞淵賓晹發䨧坱圠璣衡開闔陽隂九韶其楷萬奏皆瘖退而卷懷蓻圃書林出入歐顔而加㪺斟湛湛秋江岧岧春岑如彼德人危冠整簪不伐不矜森嚴深沈我考問學惟心靡諶端本自我何用弗欽重抵九鼎價踰萬琛維帖可觀為世之砭針尚信我言匪今斯今洪文惠盍簪帖楷書五行適再拜非才猥叨誤擢遂有盍簪之便欣愜可知所幸餘潤可借得苟免大譴百懷俟面兹不繁及適再拜右隆興丞相魏國洪文惠公適字景伯盍簪帖真蹟一卷公相孝宗僅纍月而歸自嵇隂徘徊緑野者十有餘載澤雖不下䆒而難進之操凛然有可觀者珂雖屢識公𨽻古而真蹟之見則昉于兹蓋寶慶乙酉之正月得之中都馮氏贊曰公作𨽻古與先漢侔發為書翰順塗挾輈公相孝宗曽不少留歸安一丘終始休休我護淮餉祖公前修登華信亭步得江樓摩挲石題瞻睇銀鉤風靜鵲巢月明沙鷗意公其來偕造物游蹟則不磨心兮焉求蔣丞相得男帖草書八行芾再拜上問尊嫂安人恭惟懿候萬福姐姐致意新婦都拜起居諸令嗣承務以次各計侍奉休吉芾屯孤多難舉無與比娶後十八年方得一男甚慰牢落半年之間百病迭至竟以不起哀惱無聊上狀崖略併幸照恕也芾再拜上問右乾道宰相資政大學士蔣公芾字子禮得男帖真蹟一卷公家于常豫以嘉泰壬戌十一月道由錫山得之士人蔣深蓋公族云贊曰仕遭時相真主材之充澤斯普以端逸御妍嫵諒豫言法當取虞忠肅萬里帖行書十四行允文自建鄴分携相去萬里不奉一行書君子之思勤甚扶病逺來次鄂渚竊知易節江西清議以久外為淹允文不敢以賀也如病身骨立豈當復出況懇辭之章六七上必有報可者即西湖為投老計矣不果一一親作報書亦久病有未能勉者千萬深諒之也行止稍定别上狀右謹具呈正月允文劄子右乾道相國維師雍國虞忠肅公允文字彬甫萬里帖真蹟一巷公以任重之器邁往之識濟時之才基殊勳位元宰表表為世名臣當其自西掖出掃邊氛遂戡大憝江上之人至今能誦其遺烈是時沈憲敏以樞曹隨軍此帖蓋與公西湖後往還書尺金石交情藹然尚可覿也紹定戊子二月豫在京口得之憲敏之孫鏜聲甫贊曰方長鯨之干誅駭百川之騰浪撼坤軸其欲裂有雍公之思壯策數船之竒勳射天狼于北向既旄頭之夜殞窘紛披而投仗歎微管其左衽曽垂褒于素王凛百年而若存耿英氣于江上攬遺帖以在手並風雲而獻壯斂胸中之崛竒為筆下之豪放念舊交于漕挽寓執訊之還往慨寶傳之至今猶足慰夫馳想豫嘗考史牒之終始論餘功于翼亮觀其位上宰以秉成猶未忘大義之獨唱謂取秦而下燕可拊背而扼吭軒墀靡慕于金鉉節斧乃攽于玉帳當王業溺于積安之久而人心頓有振起之望逮時數之未偶墜妖星于五丈故議者不見于異時之所就而得以置疑于當日之自將何鴧毒之難瘳本亡秦之蠱喪嗟羣情習見于苟且宜隻手莫支于締創豫所以抱遺槧于五紀悼成心于一相既什襲以致其尊慕又三歎而繼之惆悵也曾丞相臨平帖行書十一行懷悚息匆匆片札叙違方愧率略舟至臨平逺勤誨翰所以慰藉甚寵顧懷危蹤得以善去心匪木石寧不知歸更冀涵覆以終大惠引睇光儀第劇依戀之至右謹具呈觀察節度太尉宗丈六月日觀文殿大學士宣奉大夫提舉江州太平興國官曽懷劄子右乾道宰相觀文殿大學士曽公懷字欽道臨平帖真蹟一卷宣請故家再秉相軸實自公而復此帖乃公去位時豫當時近臣之同姓者嘉泰辛酉嵗八月得之鄂渚曽氏孫監征家忘其名贊曰書尺之作趨簡便情之所託斯可見志雖少貶言猶婉體雖少詘敬猶簡堂堂相國緇衣彥明哲自將亦通願竦然述贊覽遺卷我欲以之參世變寶真齊法書贊卷二十五
