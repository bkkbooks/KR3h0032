body:
  text: 寶真齋法書贊卷十宋嶽珂撰宋名人真迹蘇舜欽草書四詩帖二十行寄陸同年忽憶前年科第後此時雞鶴暫同羣秋風惆悵忽吹散雞在中庭鶴在雲楚天楚天遙望每長嚬宋玉襄王盡作塵不作瑤姬歌入夢更為雲雨待何人觀煬帝寶帳漢文窮相作前王慳惜明珠不斗量翡翠鮫綃何所直千裨萬補上書囊春晚紛紛從此見花殘已覺長繩繫日難樓上有愁春不殘小桃風雨憑闌干右慶歷湖州長史滄浪先生蘇公舜欽字子美草書白樂天等四詩一卷豫嘗觀先生草聖代懷素作首篇如出一手筆妙如此得其緒餘豈不足以名一世乎滄浪蓋蘇州亭名亦先生自稱豫得此詩于寶慶乙酉七月丙子年月日時皆水與滄浪之名若合符節云贊曰滄浪之存乎蘇智者是居夫豈知後二百載豫得兹帖而歲月日時之偶符先生濯孺子之纓而豫乃驅祁山之車蓋已判然其兩塗心之同迹之殊庶幾乎知書邵餗篆歸去來辭帖界行紙上書二十二行歸去來兮田園將蕪胡不歸既自以心為形役奚惆悵而獨悲悟已往之不諫知來者之可追實迷途其未逺覺今是而昨非舟搖搖以輕揚風飄飄而吹衣問征夫以前路恨晨光之熹微乃瞻衡宇載欣載奔僮僕觀迎稚子候門三徑就荒松菊猶存攜幼入室有酒盈樽引壺觴以自酌眄庭柯以怡顔倚南窗以寄傲審容膝之易安園日涉以成趣門雖設而常關䇿扶老以流憩時矯首而遊觀雲無心以出岫鳥倦飛而知還景翳翳以將入撫孤松而盤桓歸去來兮請息交以絶遊世與我而相違復駕言以焉求悅親戚之情話樂琴書以消憂農人告余以春及將有事于西疇或命巾車或棹孤舟既窈窕以尋壑亦﨑嶇而經丘木欣欣以向榮泉涓涓而始流善萬物之得時感吾生之行休已矣乎寓形宇內復幾時曷不委心任去留胡為乎遑遑欲何之富貴非吾願帝鄉不可期懷良辰以孤往或植杖而耘耔登東臯以舒嘯臨清流而賦詩聊乘化以歸盡樂夫天命復奚疑篆籒之法難于華𥚹而又難于小字邵公此作遠過嶽陽題署豈其妙䶖精力至到者耶治平甲辰子玉見贈閿鄉驛同書余素不嫻書畫以湖州君之竒之也余安得不竒之博陵崔公度識兩題並行書共七行元祐六年仲夏晦日河中司理司馬槱借觀會稽孫沔曽觀兩題楷書兩行紹聖二年黃符嘗觀𨽻書一行右慶歷隱君沖素處士溪齋先生邵公餗手篆陶靖節歸去來辭一卷篆籀之學自二徐後惟邵氏先生之弟龍圖閣學士飶蓋嘗以石經刻監學名垂當代而先生獨髙蹈丘樊終身不仕故書迹之妙罕傳豫嘗聞范文正謫守嚴瀨作客星祠記奉書先生有曰扺桐廬郡有嚴子陵釣臺築堂而祠之又為之記念非托之以竒則不足傳後仐先生篆髙出四海或能枉神筆于片石則嚴子之風復千百年未泯於呼亦可想其人矣觀先生此帖意與筆稱自可挹栗里之風于千載之上雖幅楮猶可寶也而況乎孫威敏文與可司馬才仲崔伯易輩之題彪列其後耶彼在同時已盛稱如此又況乎書郎柳瑾子玉家柳以弗復可考豫得之歲十月本出德清李氏之故藏有李氏二印存焉贊曰豫江人也挹柴桑之風望廬嶽之雲不惟傳蠧編之藝蓋亦接鄉社之枌摹寫淳古發揮隱淪獨並蓄于一齋是豈不足以比乎松菊之存意籒學之天畀使如豫者得以附逸軌而瞪絶塵如彼崔公度寄自湖州君亦既託可知于不知是亦審所因于當因豫于文正亦云宋景文言志帖楷書七行尾批一行祁啓被教已審凡言志者是藏隧記者是立之墓前故志備而記略想已周知然不敢不告祁惶恐上咨君玉舍人執事十九日張安道所撰五本納上看訖垂示右皇祐翰林承旨宋景文公祁字子京言志帖真迹一卷公為益部筆迹多散落蜀中淳熙丙午五月先君漕東川得此手識歲月云獲于閻才元侍郎家贊曰既有史才又得墨妙今古言辭事功談笑蜀人之藏曰維甘棠我時其傳以著不忘龎莊敏魁柄帖楷書十一行籍再啓非的不敢上記繫託之懇曷嘗暫忘每傳諭誨惟銘刻于中并誠佳地藏庇老軀殊幸常念當是時當魁柄固多憂勞中外倚賴披接方逺切冀保衛為廟朝之福不宣籍再啓右皇祐宰相侍中龐莊敏公籍字醇之魁柄帖真迹一卷豫家舊藏題云得之湖湘間龐氏孫枝之仕于彼者不復紀歲月亦有藏書家二印公輔仁宗致升平德履才實嫓于文富論勳較績雖有大小比之考室均棟梁之用也帖中有并誠佳地之語蓋公自罷相守鄆繼以節鉞帥并門云贊曰漢有德公天下士皇祐相國實其裔雖云出處有同異今古龐宗開顯晦我觀清風勵百世未若太平以身致鹿門遺墨不可覬聊寶此書貴行志梁莊肅苦熱帖行書十四行適啓前日承過訪殊慰别後之思苦熱渡江頗艱阻尚稽馳謝方甚企嚮遽枉手教兼惠土冝祗紉勤眷愧感深矣就喜動止順裕尊闈福康諸眷均慶赴上有期未旦夕趨舟次姑此區區不宣適啓志成賢今年家閣下十八日右皇祐宰相司空侍中梁莊肅公適字仲賢苦熱帖真迹一卷有藏書家二印仁皇御四海聖德如天瓌材並生無所不幬如公之英敏宏逹蓋輔㩍之偉人也而猶未以最稱信乎思皇多士所以致以寧之效于一時者益卓乎其不可及也帖與社祁公帖俱易之京氏贊曰盛世之英宰固不可以一節議方其尼朱梁之賞沮端門之瑞反四使之命正皇儀之禮其徑正如此則胸中之所存固足以印其字體又何必徒取其遒美惟得其物尚寶此紙韓忠獻北道京邑二帖並楷書各十二行琦再拜府判祠部春律尚寒想惟體候休勝自承入贊天府更不領音教諒京邑浩穰甚勞餘刃也琦近更守常山見已在道于後月初可到本任恐知尚賖款晤切希順時珍愛不宣琦再拜府判祠部左右正月十六日琦啓近忠彥與王仲保相繼至府洊辱誨筆且承動止清適不勝感慰感慰北道今秋大稔至于梨棗蕎蔬無不成熟農里皆言一二十年未嘗逢此但河決許灣東去壤魏之清平夏津恩之歷亭永靜之將陵滄之臨津饒安樂陵一帶縣鎮田廬為害不小而得恩冀數郡化為沃壤信使道路無患御河可還故流利亦多矣天意豈可測耶不宣琦又上右三朝相國尚書今魏國韓忠獻王琦字稚圭北道京邑二帖真迹一卷嘉祐治平間把天再傾公手扶重輪敷曜四極晦冥以闓清寧以奠羣生萬彚各適其所勳烈冠彝鼎聲光流竹帛社稷宗臣惟公為克當之首帖乃家世毖藏云先兄吏部甫自四明假守還朝時紹熙庚戌先君實為左司郎家庭聚燕互出名帖見公真迹甚多就折得之有藏書家一印次帖以寶慶乙酉正月偕祥符朱表唐摹尚書帖得之大名末有金工部印蓋嘗為金廷顯仕所得用以識其藏前後有六印識帖中印名用安陽戇叟蓋公自稱使留滄景間幾半歲地多蚊虻燎煙以熏其紙半黔珂嘗攝事淮海親拜公像故于慨想尤切繫贊以傳庶幾立懦贊曰扶桑擎日厥幹萬尺以為公筆天夀平格元圭昭錫以為公墨隂陽闔闢鰲柱立極見此偉特太山絶壁九河碣石莫動筆力有雲五色曽著瑞籍多士辟易繄天實啓迪豈以詡飾如彼韋陟公騎鵬翼歸侍帝側有是遺迹榮光交射星月珠璧終古不忒維珂之得再拜歎息坱圠孰測几几赤舄尚想公德永鎮下國韓忠獻早夏衆春二詩帖草書十二行早夏脫幘吏休後憑軒風快餘瀑泉增瀨急新葉補林踈暑初天未熱觀閣進輕涼果熟愁枝重荷生覺渚香衆春園堂上作十里溪源注北塘貯成寬碧淡泱泱新蒲弱荇參差緑去鶩來鳧斷續行一纜輕波搖鷁舸河罾斜日曬魚梁使君思拙無清夢髙柳隂成草自長右韓忠獻早夏二絶句衆春園七言詩凡三首真迹一卷北塘衆春皆在中山塘始于宣徽李公昭亮園始于公公之記文嘗書于皇祐間今三詩獨不載安陽集中蓋刊刻失傳輯萃弗整雖前輩不能免嘉定甲申二月得于維揚其筆法徑正與公北道京邑二帖宛然相肖楷墨又皆一種益有以驗其真云贊曰五言簡嚴而意不迫七言豐腴而體不忒意公倣徉于景物之間所謂造化生意者蓋亦畢寫于翰墨如彼纖巧旬鍛月錬又焉得以踐其間閾春萌夏假默具帝力公詩自然于以觀德富文忠出身帖行書十二行弼啓近小六歸已曽拜狀竊計誠素尋達聽覽仲夏毒熱伏惟大叔大嬸尊體起居萬福諸眷聚亦想康寧此中上下粗且如常不用憂及葉郎已成出身乃與科場一也諒慰尊抱諒慰尊抱正逺趨侍可量詹仰暑濕切冀倍加保愛少副下情虔禱虔禱不備弼再拜大叔祕監大嬸郡君坐前七日右兩朝相國維師韓國富文忠公弼字彥國出身帖真迹一卷家世寶藏云得自遂寧守故監察御史徐詡家有藏書家之印傳曰思其人猶愛其棠況夫心畫所存手澤攸寓凡事業之所形見功名之所發越德望之所充積揆厥繇原眹于方寸皆是物也曷可不傳毖以昭髙山景行之思贊曰其溫而惠有青州救荒之意其徑而竦有北庭抗議之勇其端而直有鎮撫百度之績萃是三德發為遺墨蓋靜而正者公之心而用而變者公之迹端委搢紳言孚意親我思若人古社稷臣文忠烈治裝帖草書七行彥博啓知郡承制久别漸企良深專介至辱書感激感激末由瞻對酷暑萬萬保愛治裝西行匆匆修報不悉彥慱啓右四朝相國太師平章潞國文忠烈公彥博字寬夫真迹一卷公以盛德元老弼亮四世勒勳彝鼎夀雋光明佩天下之安危極人臣之福履巋然為本朝第一自唐世汾陽而下未之見也有是名德著之翰墨于後百載維珂之得三印繫後傳寶無斁歲登紹熙在攝提格中秋秋夕遺者羽客贊曰德威堂中有漢相袞繡晝扶靈夀杖龎眉鮐背猶克壯手展炎圖開治象虹霓椽筆光萬丈落紙珠璣爭獻狀凜然手澤端可仰三復嵩髙慰瞻想杜正獻與歐公書簡帖前六帖楷書後三帖草書第一帖二十一行第二第三第四第六帖各十一行第五帖十二行第七帖四行第八帖五行第九帖六行衍啓此月初上記為兵騶輩愆期直至中旬始行果塵左右否方傾想次忽捧真筆且審服舍間平常差慰萬一衍辱知之深非有寸長蓋明主憐其孤直耳禮遇隆厚雖則知感或因染削曽為語及及沐誨諭莫匪假借捧玩研味不覺惴栗顧自效之不暇徒且緘祕而已佩服佩服衍夏秋而來支體罷惰益不如昔亦年齒使然也後會無期可勝悽惻漸冷動息適變無至過哀為祝謹奉手啓布謝兼問起居不宣衍頓首永叔龍圖執事八月二十四日衍再拜龍圖執事違間半年餘以真切欽慕之心則靡日不思矣弟罷􅚿不時寓書尺為問耳執喪又經冬奉几筵外伏計順變少安祝史昆仲道長衍比别時又衰自餘不欲縷述委順而已凝寒惟保護是祝不宣衍手啓再拜十一月九日衍頓首永叔龍圖公卓還出書伏審執喪盡禮外體候如常頗慰經年之别思也衍老態病容日有加矣未知為會之計歲晏惟若時適變為禱謹奉手啓起居不宣衍頓首蠟前一日衍再拜昨日蒙枉髙軒久陪清論莫匪庇民之畫罔知更僕之勞歎服彌多感愧兼至比期謁謝尋辱誨言猥念衰羸不校往復雖認厚意可喻靦顔謹奉手啓以代面述不宣衍悚息上留守學士鈴下十三日衍啓浹日之間旌騎再至諭以誕節燕設俾預坐末雖名交遊語乎分義則天倫無異上為衰罷不應來教然承見諒終負愓息須當翌日前詣訪也謹奉手啓代意不宣衍悚感頓首留守龍圖閣下申刻衍拜手衍前日上記以拜賜感懼間殆不成文方悚息未已猥貽真筆褒假非汪汪之量何以少安佩紉佩紉連日賓拓駢集匪易尤喜寢餗彌裕差慰傾想俟暇謁候次謹奉手啓述謝不宣衍頓首留守龍圖鈴下二十五日希文猶在彭門或聞疾勢未解深可憂也彼中必得的信早晚到任希文英竒挺特百身莫贖非鴻筆麗藻何以旌其封樹明公卓然高識許郎為之銘亦亡者積德之有感召也聞之使人感慨何已衍再拜蘇集編次審已畢事非大君子藻尚素異何以及是存沒增感矣行狀鄉亦封納未知此家子孫胡以為報也同感同感襄事實日早希密示千萬顒俟顒俟思渴思渴衍上右杜祁公墨迹公當景祐中為御史中丞時余亦鎮南軍掌書記為館閣校勘始登公門遂見知奬後十五年余以尚書禮部郎中龍圖閣直學士留守南都公已罷相致仕于家者數年矣余歲時率僚屬候門起居見公福夀康寧言笑不倦歲餘豫遭內艱去居于頴服除來京師蒙恩召入翰林為學士與公書問往還無虛月又二歲公以疾薨于家余既泣而論次公之功德而銘之又集在南都時倡和詩為一卷以傳二家之子孫又發篋得公手書簡尺歌詩類為十卷而藏之余與時寡合辱公之知久而愈篤宜于公有不能忘矧公筆法為世楷模人人皆寶而藏之然世人皆莫若余得之多也嘉祐八年六月晦日楷書二十行右慶歷宰相司徒祁國杜正獻公衍字世昌與歐公書簡帖九幅真迹一卷帖後有參知政事六一先生歐陽文忠公修跋二公本同仕仁祖朝德業文章先後相望而推尊景慕乃如此益信所謂不自髙故能成其髙非虛言也帖藏歐陽氏故有十卷今存者惟此上有印識三十二文忠名印一又有建炎諫院印在卷末當是轉入藏書家有居是官者後復入丞相京魏公鏜第其子司農簿沆二郡九江暇日出名帖相示因得以他畫易置祕笈實嘉定己巳歲六月贊曰厚德如祁公黃鐘大鏞和樂且雍尊賢如六一朱絃疏越三歎廟瑟道比志叶不膠而漆顧中外之雖異猶同堂而合席思遺迹而不可見幸二賢之為時出所以前乎此則致太平之明效後乎此則贊受遺之定册既以廣元氣之運亦以夀斯文之脈然則湍瀨無縱鱗風枝無寧翼涵養成就見此輔弼故後世尤得以歸功于慶歷也孫威敏及物帖行書十八行沔啓奉别踰紀疏闊附問企渴何言人至承惠字及著文足見智者用心之遠而思功及物也嘆服才識故非一日矣沔居憂三四年臥病自今春來方有生意朝廷不知纍被恩命切切辭免未能快去又此重任本差來江西湖南撫慰士民中途改往廣南衰病之質惟憂瘴瘧增舊疾不能保天年何暇賊盜為已三次上章求免未蒙允許必須至勤切期于得請矣觀足下之文病者安敢承當也此事不免與余楊同其道矣少年時無病尚可驅策如今何為何為冬寒保愛保愛草草奉聞不宣沔上新除簽寺丞仁弟十一日狀右至和樞密副使觀文殿學士兵部尚書孫威敏公沔字元規及物帖真迹一卷按國史皇祐四年夏四月廣源州蠻儂智髙反八月辛卯公自新知秦州改湖南江西安撫使入內押班石全彬副之公行至鼎加廣東西安撫使九月庚午命狄青宣撫而公副之越明年正月戊午遂敗智髙于歸仁鋪五月丁未公登樞管考是帖乃在四年之冬所謂余楊蓋知桂州提舉兵甲余靖同知諫院廣東西體量安撫使楊畋俱以經制無功被降謫者開禧丙寅八月豫在京口彚名帖得此于金壇一名家蓋與孫氏有連傳寶其真云贊曰有文事有武備公之筆札蔚然可占也兵凶器戰危事公之此事非直一謙也以公之才持必勝之䇿而于顧慮猶如此其嚴也嗟今之人萬不一逮談伊吾望天山乃抵掌而奮髯也爾言則輕民之殱也好謀而成視吾奩也歐陽文忠索碑遷居二帖並行書第一帖十一行尾批四行第二帖八行昨承見索碑隂題刻今已勉強多難衰退文無次第不足以道述盛德多愧愧汴渠已淺阻舟行不通郡齋甚靜又得君謨一二餅新茗恨無知者一啜爾安撫不久應當到彼寂不聞其有所為恐知之見許碑文不知何時可去請幸留意恐公旦夕有新命耳已寒保重不宣修再拜碑隂如刻石時前後勿加題並官街並不要其中亦要題空起只明天子一處空其餘不要空也貴稍近古恐知修啓公私多故無由少奉間燕惟深企仰秋寒喜承體氣清安敝居安敢為久計嚮以小姪孤幼一房新來遂欲遷一寬處既而賃得旁舍數間遂且不移苟度時日若獲脫去謹專如教也人還聊此不宣修再拜通直內翰執事二十六日右治平參政太子少師歐陽文忠公修字永叔索碑遷居二帖真迹一卷豫贊率更及杜祁公帖嘗敘公跋矣雄文直節如公者獨未特表出于籖縢間可乎近世傳公帖多楷書頗未見行體今首帖清逸絶俗如神仙中人擁絳旌鳴翠旓下上乎九光三晨之表次帖端雅藴藉如逢掖之子鏗希瑟書垂紳步趨乎杏壇槐市之間兼二妙之能事揭千載之傳信幾世幾塵固可望而不可即也一以寶慶元日得之金沙朱翌亮父有舊印識三一以是歲五月得之厯陽張汝昭無印識贊曰公于率更每稱吾家是書之傳似耶非耶書出于心既徑且方世多公書行或未藏易方而圓飄飄若仙楷以其人行以莫天堂堂斯文維軻與雄我觀二書如或見公唐彥猷談奉得達二帖並行書十三行第一帖尾批四行第二帖尾批一行詢啓昨者經途幸得談奉迫于行邁不能從容仍煩出郊足見勤止别來動息如何介至辱書并示佳什奬愛之厚曷以克勝續當繼和少酬淑貺衰拙無狀方臨劇郡或有所聞幸冀見諭秋涼自愛不宣詢頓首十二兄二十九日杭醖不佳輒送木蘭二十四器以為重九一醉之賞二郎謝書三郎不見薦名更宜寬勉尊嫂萬福九姊同此詢啓近元昆虞部行曽奉書想尋得達左右暑濕不審哀慕之外動止無爽姑蘇自月初即淫雨相仍民田頗以為苦今尚未霽不知餘杭何如吳中卑濕殊可患兼往往因此為疾吾兄憂居且踰年久寓于杭還粗安否咫尺不能面奉徒勞引領餘宜自重不宣詢再拜正叔國博五月二十三日貴眷各想平暢右治平翰林待讀學士判太常寺唐公詢字彥猷談奉得達二帖真迹一卷今祕閣羣玉堂帖嘗有公書以此帖較之真出一手蓋竒筆也帖具藏書家大小九印首帖得之錫山次帖得之上饒一士友家皆嘉定癸未歲按國史公始以任進繼賜奉常第遍歷清華才學簡于昭陵朱長文續書斷所謂筆迹遒媚繫之能品六十六人中又謂行書學歐體殆非誣也贊曰公于國史以好硯稱石焉取斯蓋協其能遒媚之觀在此尺紙善工利器豫鑒如此曽宣靖類見帖楷書八行公亮啓暌違未幾傾詠良深訊介兹來書函垂貺逺迂勤禮彌切感悰方卜首塗祗修類見即諧披覯預積欣愈秋氣未平公餘善愛謹復手書為謝不宣公亮拜啓鹽倉判官左右右三朝相國維師魯國曽宣靖公公亮字明仲類見帖真迹一卷亞勳之篆侑食之典熙寧之詔維見可觀相業所存固毋庸以詞贅也慶元丁巳四月豫侍親在閩得于泉之好事家蓋公桑梓云贊曰公在嘉祐輔政受遺如畢公髙勳烈堂堂奉同而隮也公在治平清淨畫一如曹相國德心休休比規之隨也公在熙寧功成身退如裴中令夀雋番考樂以全其歸也帖字宛然既莊而復竒也周密無間筆法繇此推也豫得而藏尚可以想麒麟之英姿也趙清獻勤潔帖行書四行節之户曹暑極安否日來秋賦如何恐十一月初歸長沙提舉懿州城寨必恐霑恩兹可喜爾光景如箭千萬勤潔自重至禱至禱七月十二日抃白右熙寧參政太子少師趙清獻公抃字閲道勤潔帖真迹一卷公有惠于蜀西州人多寶遺墨先君漕潼川得此帖于小溪文氏不記歲時贊曰為御史而稱以鐵面宜筆力之健尹成都而琴鶴以行宜字體之清書法何出心即其物可以比魏公之笏寶真齋法書贊卷十
