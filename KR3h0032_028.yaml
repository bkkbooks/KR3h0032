body:
  text: 寶真齊法書贊卷二十八宋嶽珂撰鄂國傳家帖鄂忠武王出師疏帖楷書四十三行行御批四行臣伏自國家變故以來起于白屋實懷捐軀報國雪復讎恥之心幸憑社稷威靈前後粗立薄效而陛下録臣微勞擢自布衣曽未十年官至太尉品秩比三公恩數視二府又增重使名宣撫諸路臣一介賤微寵榮超躐有踰涯分今者又蒙益臣軍馬使濟恢圖臣在何人誤辱神聖之知如此敢不晝度夜思以圖報稱臣揣敵情所以立劉豫于河南而付之齊秦之地者蓋欲荼毒中原生靈以中國而攻中國尼瑪哈因得休兵飬馬觀釁乘隙包藏不淺臣不及此時禀陛下睿算妙略以伐其謀使劉豫父子隔絶五路叛將還歸兩河故地漸復則金人詭計日生他時寖益難圖然臣愚欲望陛下假臣日月勿復拘淹速使敵莫測臣舉措萬一得便可入則提兵直趨京洛據河陽陜府潼關以號召五路叛將則劉豫必舍汴都而走河北京畿陜右可以盡復至于京東諸郡陛下付之韓世忠張俊亦可便下臣然後分兵濬滑經略兩河劉豫父子斷必成擒如此則大遼有可立之形金人有破滅之理四夷可以平定為陛下社稷長久無窮之計實在此舉假令汝頴陳蔡堅壁清野啇於虢略分也要害進或無糧可因攻或難于餽運臣須斂兵還保上流敵定追襲而南臣俟其來當率諸將或挫其鋭或待其疲敵利速戰不得所欲勢必復還臣當設伏邀其歸路小入必小勝大入必大勝然後徐謀再舉設若敵見上流進兵併力來侵淮上或分兵攻犯四川臣即長驅搗其巢穴敵困于奔命勢窮力殫縱今年未盡平殄來嵗必得所欲亦不過二三年間可以盡復故地陛下還歸舊京或進都襄陽關中惟陛下所指揮也臣聞興師十萬日費千金邦內騷動七十萬家此豈細事然古者命將出師民不再役糧不再籍蓋慮周而足用也今臣部曲逺在上流去朝廷數千里平時每有糧食不足之憂是以去秋臣兵深入陜洛而在寨卒伍有饑餓間走故臣急還不遂前功致使土地陷僞忠義之人旋被屠殺皆臣之罪今日惟賴陛下戒敇有司廣為儲備俾臣得一意靜慮不為兵食亂其方寸則謀定計審仰遵陛下成算必能濟此大事也異時迎還太上皇帝寧德皇后梓宫奉邀天眷歸國使宗廟再安萬姓同歡陛下髙枕無北顧憂臣之志願畢矣然後乞身還歸田里此臣夙昔所自許者伏惟陛下恕臣狂易臣無任戰汗取進止三月十一日起復太尉武勝定國軍節度使湖北京西路宣撫使兼營田大使臣嶽飛劄子覽奏事理明甚有臣如此顧復何憂進止之機朕不中制惟刺諸將廣布寬恩無或輕殺拂朕至意右先大父維師忠烈鄂國忠武王手奏出師疏帖真蹟一卷髙宗武文皇帝御筆批其後於呼靖康元年之禍酷矣烈矣不勝說矣楚齊代妖王綱絶矣先王發憤古鄴思澡思雪必欲挽河漢而決之一念既立髙厚對越驅馳倐忽叱咤隆缺障橫潰于既倒扶不周于將折此其立志蓋霍去病所謂不立家于胸奴之未滅諸葛亮所謂鞠躬盡瘁以正祁山之代裴度所謂賊未授首臣不還闕千載相望異世同轍勳名未究卒僨權孽此籲天之書所以俯伏天閽泣盡而繼之以血也手澤散軼百年驚閣寶慶乙酉春王二月恭獲墨寶仍賭奎札一璽獨焕三印參列既以伸霜露之痛遂可相楓雲之節百拜毖襲庸附前哲贊曰於惟紹興扶危支傾椻校泣戎不識一丁先王奮呼起自諸生經通誼明筆妙墨精翠微之時五嶽之盟祁陽整旅東松紀行蹟遍九州氣凌三精粵時出師首兹抗旌規模弗愆忠憤莫攖上心載嘉奎章式形謂朕何憂惟爾責成以百萬師觀我甲兵僅四十里復我舊京日郤陽侯星隕中營萇血遂碧狐史漫青天不誘衷曷其底寧傷哉離騷坐此修能冰鏤芷馨惟帝鑒忠惟人與誠烈並褎鄂志恢幽并有奕龍跡遹昭駿聲遺墨既刋大猷是經對于廟祧豈惟雲仍鄂忠武王書簡帖十一帖內十帖行書第三帖楷書第一第三第四第十一帖各八行第二第八帖各三行第五帖六行有內外封各一第六帖十二行第七帖九行第九第十帖各七行第九帖首數行紙爛不存飛惶恐再拜飛愚陋無堪備數兹者仰遵聖算招捕湖寇幸于朞月之間平靜亦賴餘芘所及耳遽辱寵問過䝉推借秖益感慚而已伏惟幸察飛惶恐再拜台問寶眷伏惟上下萬福飛僣易上飛頓首再拜上啓安撫制置侍郎台座即日伏惟坐鎮之暇隂有神相萬福千祿來護興寢謹拜啓承候不宣飛頓首再拜上啓安撫制置侍郎台座飛咨目再拜知縣宣教即日伏惟裁剸多暇尊候萬福末由後晤願言加嗇以俟殊顯不宣飛咨目再拜知縣宣教執事飛再拜承惠翰感慰比得元樞劄子令回師貴池至建康議事撥冗奉謝崖略幸冀照諒飛再拜咨目再拜知縣宣教飛謹封咨目上無為知縣宣教鎮南軍承宣使充湖北路荆襄潭州制置使嶽飛謹外封飛咨目啓上即日伏惟倅二多暇神相有休尊履禔福承惠翰感慰飛始生之日逺辱為禮益荷勤意也襄陽邊城全務撫蘇雕瘵戢姦吏也凡事勉力以赴功名至望至望餘希加愛不宣飛咨目再拜襄陽通判學士飛咨目啓上通判學士即日伏惟尊候萬福介來承惠翰感慰之至飛前日還自行朝乍歸迫行冗不可言襄陽葺治想成次第尚冀勉力甚善餘惟眠食加重不宣飛咨目再拜通判學士閣下公改承務郎告今専人送去希視之飛再拜鈞候動止萬福末由參晤伏冀為國倍保崇重前膺召還以副中外之望謹拜狀承詢不宣飛咨目頓首首拜上啓大安撫參政相公鈞座飛頓首再拜飛受寄上流區區無補過辱謙光特貽教翰佩服鈞意何以為喻使旋裁報不究所藴伏冀髙明有以照察幸甚飛頓首再拜飛頓首再拜奉違鈞範倐爾許時瞻念之懷未嘗少忘伏蒙鈞諭趨朝飛未得指揮尚冀欲聞他有所委幸乞示下飛頓首再拜右大父鄂忠武王書簡十一帖真蹟一卷珂既以出師奏疏併紹興宸章列于傳家之首復厯訪尺牘于前朝士夫子孫遺落之餘僅存此帖先王夙景仰蘇氏筆法縱逸大槩祖其遺意奏疏則小楷而此則行書也心正筆正觀者于是可得其藴焉珂自幼嵗網羅放失首一帖得之家藏次一帖得之嘉興又一帖得之維揚又八帖得之京江皆故家所毖以歸于我不復編繫歲月贊曰昔李西平之在鳳翔嘗以直道致主慕魏鄭公雖叔度之進言猶毅然而弗從謂幸備于將相詎愛身而苟容猗歟先王亦師文忠凡引筆而行墨皆刻志而比蹤今觀碑刻之在天下雖小大真行之異工視此帖之所傳蓋不約而皆同然則有犯無隱挺焉直躬唾當道之豺狼嬰九淵之神龍蓋當心摹手追之時已有之死不顧之遺風矣銀青制劄帖三十五行敇仁皇在位親明利用之勳神祖御邦首祭狄青之像蓋念舊者不忘于抆拭而勸功者當急于褒崇朕祗禀睿謀眷懷宿將兹仰承于素志肆盡洗于丹書故前少保武勝定國軍節度使武昌郡開國公食邑六千一百户食實封二千六百户嶽某拔自偏禆驟當方面智略不専于古法沈雄殆得于天下事上以忠至無嫌于辰告行師有律幾不犯于秋毫外摧孔熾之金人內翦方張之劇盜名之難掩衆所共聞會中原方議于櫜弓而當路力成于投杼坐急絳侯之繫莫燃內史之灰逮更化之云初示褒忠之有漸思其姓氏既仍節制于嶽陽念爾子孫又復孤惸于嶺表欲盡還其寵數乃下屬于眇躬是用峻升孤棘之班疊綰齊壇之組近畿禮葬少酬魏闕之心故邑追封更慰轅門之望豈獨發幽光于既往庶幾鼓義氣于方來嗟夫聞李牧之為人殆將撫髀闕西平而未録敢緩旌賢如其有知可以無憾可特復少保武勝定國軍節度使武昌郡開國公食邑六千一百户食實封二千六百户奉敇如右牒到奉行紹興三十二年十月十六日臣寮上言臣嘗謂自昔帝王深居蠖濩之中四方萬里之逺肅然退聽而不敢犯者無他道焉不過示之以好惡合天下之公而已故罰以威不恪在于一定而不可易刑以當其罪在于一成而不變堅于金石信如四時若定者復易成者俄變則功罪不分情實貿亂其敝有不勝言者矣臣竊聞故相秦檜當國二十餘年依勢盜權積奸稔惡一時羣小恃為黨魁逮其喪亡猶思救助太上皇帝深加省悟察其平日私相厚善夤緑升進或為之擠害正人或為之中傷善類或共營貨利或憑恃姻親或專告訐以事脅持或興犴獄以報仇怨者莫不悉從屏竄削籍除名示不復用衆論欣快咸以為宜陛下嗣纂丕圖廣覃大霈俾投荒之輩稍令自便德至渥也為檜之黨者固當仰戴寬恩終身念咎今乃擅入國門紛馳朝路力祈叙復除落過名甚者欲朝脫羈纍暮求收用儻若黑白有時而可變冠屨有時而可移則所謂威福之柄與夫三尺之法果安在哉臣愚欲望聖慈特賜懲革令臨安府榜示限日驅遣出門不許輒至行在庶免鼓唱是非惑亂聞聽以為後人不自愛惜者之戒如有實緑檜所誣陷傳致其罪情涉無辜見今陳訴未蒙昭雪即與早賜施行使冤抑得伸朋邪少戢不勝幸甚取進止二月二十九日三省同奉聖㫖依奏仍限十日右先君兵部侍郎敷文閣侍制銀青光祿大夫制劄帖真蹟一卷珂少不天罹隕霜之哀于五領之外手澤遺藁類多湮淪既彚傳家之帖獨得先君在隆興間手抄二帖于雜録之首天監昭明羣邪睍消凛然涉筆意概可想也先君受筆法于家庭多用蘇體尤精小楷此特以可割取者因其事與翰墨稱故褾而傳子孫以昭世德之用心焉贊曰先王筆法源于蘇奕然世體繇庭趨奩中手澤他豈無義與事比當特書巨編剪取刪繁蕪盛心端可傳遺孤百年小楷照乘珠為問汗青誰董狐銀青清白頌語楷書四行平生列缺到死分明前程一路月白風清珍重右先君銀青遺書清白頌語真蹟一卷紹熙壬子十月先君子帥廣微若不適猶治事如平時壬子平旦起書數語于紙口占遺奏略不及家事遂深衣幅巾而啓手足珂時始十齡侍大寧自五嶺歸既克襄大事因托清白為塋傍精舍之題嗚呼死生之際如先君子者亦可以為達矣繫之傳家帖以見瞻岵之思贊曰嗚呼死生如一旦暮達觀其大等視來去如古之聖賢所謂曵杖山木之歌啓手淵冰之語其皆超然知所處矣手澤之存慨其孺慕贊詩不文以配陟岵大寧夫人二書楷書七十七行珂子暇日謂豫佞佛豫曰非也非佞其福也愛其說也憶豫年十二三時博取而易信于道釋髙深惝恍之論輒皆諦聽心服之不疑闢一室事二氏像設甚謹豫母楊宜人雅不甚樂謂豫曰爾必好此當擇一以休其心毋多岐以滋惑也豫固泛愛不知所從一日讀圓覺經有曰幻身滅故幻心亦滅幻心滅故幻塵亦滅幻塵滅故幻滅亦滅幻滅滅故非幻不則釋卷而歎曰儒不言死生之際豫不得聞道則言之矣上焉全形以超升不敢言而敢疑也中焉鍊真以尸假不敢知而敢議也下則掇屮木實謂可幸延蓋有不足議者矣人一身皆不能有所思有所為惟心之恃身恃心心生塵動息舉作皆塵也有塵必有滅動者塵也滅之者非塵也無以别之强名曰滅凡平日所以收其放心制其軼情約而歸之正有所愧而不為有所慕而願為者皆是物也而皆托于幻譬之寐然髙枕而卧百無營為湛然若虛不夢不覺是心滅也金珠在前而不顧刀鋸在後而不怵是塵滅也有喜有怒以心制之泊然無思亦無以制是滅滅也而尚存出入息何也即非幻之比也能存出入息則形不死能存非幻即惟不死矣此佛之所謂法身常住如海湛然者非是經其孰能與于此哉世之人有二說弗之信者以為人受體父母以五行之禀為五官之用氣盡而死如膏竭燈燼信之者以為人之死形而已智愚仁鄙其禀不同其所以用是者出入死生而莫之竟觀之人生幼則無所知老則耄于識是隨形而生者必隨形而滅則前之說理也有所思而兆于夢無所感而息焉死生大夢也惡知其不出入于或兆或息之際哉則後之說亦理也形為性之消長既耄矣而不還于幼之無知則形盡耳性何預焉心有疾則不能思今刳而出之一臠肉耳所謂用其思者何所托以出入耶二說至此皆窮豫所以有感于非幻之妙而未能至也豫既愛其說而求其至則固將尊其人他日翻經間有㑹心輒為之喜而不厭老倦難槩陳特誦其一二以釋汝惑豫好飯僧作像法至老不厭然未始自為皆以為親耳其次則吉凶之事豫之言曰豫于親而不用其情豫惡乎用其情今有人告其親疾病于道塗其子未嘗不匍匐而救之也二氏之說人以為誕也而幽明之理聖人猶難言之豫惟懼世人之議已而望望然避夫惑之名不盡豫心則終不能以一日安古之人詔祝于室而出于祊以為交神明之道不可一處求也使無是也豫不過于惑而已而心則免于忸怩萬一有焉是豫愛費而不盡乎豫親亦非所以教孝也今之原廟二氏且用焉顧獨疑于一女子非也豫家世用伊川主法冬至祀始祖立春祀先祖秋祀禰以邵康節之議焚楮幣豫竊謂安雖適嶽氏猶不敢不循行焉且有則無之匹也事之有有則有無故謂之無者烏知其果無而非有也是亦不逆道塗之詐而用其情于親者也豫之意止此右先妣大寧夫人所著遺訓二篇真蹟一卷珂少不天間關鳶跕鞠肓教撫以逮于成人帷慈訓是恃追思先夫人平日結字端徑作文簡麗讀書淹貫獨以苦自祕晦不肯使人知故皆不傳今笈中所存惟此二篇蓋以示子孫而已殆不止杯棬之痛也珂故同僚國子祭酒蔡公闢狀行之日嘗表此事諌議大夫李公大異亦述之隧碑焉後十五年因彚傳家帖併褾而藏以示來裔贊曰釋老之異佞者惟酷喜排者惟疾抵死生之大達者晦其理昧者尚其詭喪祭之正徇古者失于泥行今者溺于鄙如遺訓者亦可以守而勿墜矣我懷緒言杯棬之比子孫傳家真蹟在此吏部二詞帖行書第一帖十三行第二帖十二行編修樓公易鎮武昌安陽嶽甫作歌頭一闋奉祖行色甫再拜魯口天下壯襟楚帶三吳山川表裏營壘屯列拱神都鸚鵡洲前處士黃鶴樓中仙客拍手試招呼莫誦昔人句不食武昌魚望樊岡過赤壁想雄圖寂寥霸氣應笑當日阿瞞疏收拾周黃策略成就孫劉基業未信賞音無我醉君起舞明日隔江湖甫輒賦滿江紅敬祀百千遐算甫再拜碧海迢遙曽窺見赤城樓堞因傲睨塵寰猶帶憑虛仙骨武庫胸中兵十萬文場筆陳詩千百記向來小試聽臚傳居前列世間事都未說親為大官毫末況諸郎鍾慶夙齡英發銀莬篇韻皆音銀菟一作銅虎頒符方易地金鑾寓直行趨闕更相期盡節早歸來傳丹訣右先兄尚書吏部郎甫字大用二詞帖真蹟一卷先兄自隆淳間以詞翰雅好與張范劉龔諸名人游遂達九禁阜陵嘗召對便殿賜硯器有字體似薛紹彭之諭今觀其書圓健端緻聖鑒固不虛矣是帖得之京口寶慶之元夏四月贊曰薛在近世意莊體葩倣而肖耶偶其好耶筆動聖鑒藝兼詞華繫詩而藏維以傳家寶真齊法書贊卷二十八
