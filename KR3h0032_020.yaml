body:
  text: 寶真齋法書贊卷二十宋岳珂撰宋名人真蹟米元章硯山詩帖行書八行山硯雲時抱奩書客不傳北窗多異氣正對淨名天右先臣芾大字二詩五幅案硯山詩止一首與二詩五幅之語不符當是友仁所跋本二詩而珂但得其一耳臣米友仁鑒定㳟跋行書二行右寶書米公硯山詩帖真蹟一卷硯山者公平生所寳也老謀菟裘遂以易海嶽之居予固言之矣治餉京口既得舊址兔葵燕麥動懐人之歎因築圍建祠以奉公一日觴客鵬雲樓上客鄭君猷視園之扁謂笈中甞藏公硯山詩取而是之良是贖以得之蓋紹定戊子之四月因刻以殿英光之帖贊曰壺嶺九華營是一枝何異乎持琬琰以易羊皮硯之不存而寶此詩抑類乎舎魚兔而守筌蹄不我後先得于斯是几席江山庶幾見之米元章甘露詩帖行書二十行欲雨氣不透庭梧有栖煙迴首望北固雲藏浄名天呼童速具輿凭高攬山川隠見豈不好開霽景固全須臾剛風流湛湛清露圓歸塗知有伴華月上丹淵甘露作呈夷曠右寳晉米公甘露詩帖真蹟一卷甘露之勝偉矣公詩竒筆勁亦復稱之予皆未暇論獨詳味呼輿及歸塗作伴之語公之居必在山之趾殆是海嶽未火時他日既東當不復能竟夕徃來矣山有鳯凰池丹淵蓋指此予于是益信予之記跋皆粗有依據紹定戊子四月得之蘇臺王氏紙素少暗故湛湛如碧雲色有藏書家印四字畫尤飄勁于平時實今世竒帖贊曰公甞有浄名之詩曰殷勤顧景物為爾老南徐攷乎此篇則出無晴雨之待觀無陰霽之殊晝呼竹輿墓詠歸塗既不舎于斯須其心邇于海嶽之故廬如曰易硯山之寶儲登樓平章維王及蘇自西徂東乃獲奠居此所謂舎其舊而新是圖予固因以驗予記與跋之皆不誣也米元章寶月觀詩帖行書十一行新創亭觀之盛又非海岱比也寳月觀用觀風樓基高出雲表詩曰濁盡塵難掩光分逐露圓香清得桂子珠瑩墜花鈿求一篇見海月處也右寳晉米公觀月樓詩帖真蹟一卷海岱在漣漪是蓋公宰邑時所作者本雜書簡帖中亦摘取而别之繋以贊云贊曰月之行空四海清輝豈獨于一觀見之覽層宇之翬地高而天隨而後可以觀公之詩米元章鑑逺前詩帖行書二十一行夜登鑑逺觀江南野燒作君不見紅旗一卷無奔北龍讓将軍初下蜀又不見天兵十萬領潘曹百文靈旗照江國高樓夜燈有健賞江南野燒深山谷烈勢已覺逼南辰龍蛇血膏如爆竹故應玉石俱被焚老樵拾炭拾斧斤長松巨梓中大厦一隨烈焰同埃塵人言木自為風戛木中生火自焚爇欲知利害日相應此火害人尤躁爇芾上呈右寶晉米公鑑逺前詩帖真蹟一卷帖有四印出貴臣家嘉定戊辰官鬻于鄽肆德清李氏得之予又贖之李氏其筆法蓋老作云贊曰登覽之勝隨寓有感野燒之觀玉石俱慘逞志一快忘彼物情是以老氏惡夫佳兵觀乎觀乎彼以為觀而予以為懲米元章鑑逺後詩帖行書十三行鷗鷺寒依水蒹葭静靡風朝煙開雨細輕素淡山重鑑逺樓米老案是詩已見前四大字詩帖中題云過當塗與寳晉英光集所載合今復出于此而復書云鑑逺樓米老疑是詩本係過當塗所作而復于鑑逺樓書之珂遂以為鑑逺後詩云右寳晉米公鑑逺後詩帖真蹟一卷紹定戊子嵗二月得之平江莫氏莫蓋寳晉家戚舊云贊曰野燒之觀予甞以為歎此詩之存予又以為欣一鑑逺耳而戚休之以身天乎非人米元章即事詩帖行書十一行不應武康清溪之檄端居即事呈淮陽建昌二太守辰溪監郡三公芾上秘篋大開千古到雪圖小挂滿堂寒墨濃員嶠蜂孤起枕冷燕山玉一團圓扇古人蜂雀意清風四海弟兄歡閉闗不謝勤來客畏署非縁懶作官鳧脛欲長寧可益蜩枝求足已能胖有時驚覺神瀵夢北里新聲舞翠鸞右寶晉米公即事詩帖真蹟一卷按書史公游相國得雪圖為富韓公之壻范大圭持去其記甚詳今此所挂豈别一王維耶且畏暑不應檄自開秘笈而勤來之客不拒想皆樞言康公志東軰耳又不知二太守一監郡果何如人也帖本與諸小帖同得别而出之贊曰平時不可告以情之客自不得以窺秘笈而況乎畏暑與閉闗三公得此詩固必能進退如理據空案以觀者也旁無梅子平又烏知垂涎于滿堂之寒塞馬得失海漚徃還當不足以隔四海兄弟之歡畫史之浪傳予意其當據此詩以刪之也米元章催租詩帖行書八行一司日日下賑濟一司旦旦催租税單状請出且抄納弊邑以身當夏税之責不令受賑時催百姓眼中聊一視白頭縣令受薄禄不敢鞭笞怒上帝救民無術告朝廷監廟東歸早相乞芾呈右寶晉米公催租詩帖真蹟一卷詩亦在羣帖中摘出嵗月不可攷意當在公為漣水雍邱時贊曰賑濟者何人催租者何司有令如斯而無救于背馳此古人所以設官以採詩也米元章槐前竹後詩帖行書五行槐前竹後午陰繁壺嶺華胥屢徃還雅興欲為十客具人和端使一身閒古洲居士曽觀草書一行元章字畫脱盡筆墨畦逕無一㸃塵俗氣是可寶玩槩敬書行書三行右寳晉米公槐前竹後詩帖真蹟一卷有楚胄印一紹定戊子予在京口得之亦婺將張松家物也硯山槐竹似矣餉事日殷安得身閒如公之賦詩乎予于是有感焉贊曰槐竹之與居栩栩乎華胥予方發韓滉之連艫午陰之繁維以驅原隰之車蓋健羡乎一身之閒所以縱玩乎八體之書米元章萬籟詩帖行書八行萬籟寒深響羣山隠映開遲遲暮鐘裏且喚竹輿來右寳晉米公萬籟詩帖真蹟一卷按此亦甘露作也寒夜鳴鐘猶不廢登覽江上風月公胸中固有之矣帖與甘露詩同得亦有藏書家印四贊曰甘露之江山世固指為天下之第一矣而况公胸中自有烟霞之痼疾耶予甞持斯帖據狠日望淮海弔今昔慨然歎曰神州沈陸固當待一代之英雄名勝風流亦必屬百年之翰墨也米元章壯觀前詩帖行書二十五行兩詩連書無涯小智日營營昔昔浮生夢數驚重到白沙登壯觀江湖醉眼蹔揩明夢寐中間得鹿時孔軻如在定能知江山勝處頻傾酒我是當年謝客兒右寶晉米公壯觀前詩帖真蹟一卷有内殿圖書五紹定小璽一其子友仁鑒定于後按山林集甞有是賦泱泱乎瑰辭雄談前無卿雲殆與是詩相為表裏信哉山川清竒樽爼名勝要川齷齪塵埃者所可與議也嘉定甲戌十一月予在中都得之鄽鬻者贊曰北山之麓有竒觀景絶人竒乃無間賦非雕蟲句有眼千古雄姿想蕭散我觀此卷字老孏猶似古彛親數頮借公舊詩聊永歎跪閲墨皇三復返米元章壯觀後帖行書十一行同二公遊壯觀上呈府公工部芾壯觀不到俄四朞丁寧老思模雄竒羣山勢活各奔走大川氣斂合衆離蒼嵌留雪玉刻巧碧落静滑紅輪馳寒潮不生九澤凍行膠與子約再來右寳晉米公壯觀後詩帖真蹟一卷亦在舊帖中公于壯觀拳拳如此胸次可知也贊曰四朞之不到雪與日杲停舟不棹無嫌平衝冒出此詩畫摹寫天巧觀之壯思之老詩乎可攷米元章姑孰詩帖行書二十二行下輿照澗數星星一世還如隔世經不見山東李十二青山山色只青青過姑孰作海嶽米老右姑孰詩大字先臣芾真蹟臣米友仁鑒定㳟跋右寳晉米公姑孰詩帖真蹟一卷短軸大字筆老意真有其子友仁跋凢璽印十有七厯厯咸具詩蓋為宫錦謫仙而作千載相望可以紹遺躅矣寳慶乙酉四月予得之京師鄽鬻者開卷歎息因賡其詩以為之贊贊曰天上文章一酒星生平只欠換鵝經竒才逸思通千古留待南宫眼為青米元章道林詩帖行書十四行陟巘不自期孤雲掛松頂一揖不相期飛去無留影雲已去泉更長雲泉畢世友相得每相思漣漪瑞墨堂書先子道林小詩一首友仁鑒定真蹟謹跋行書二行米元章字畫類能用其所長徃徃不擇紙筆皆得如意至于險怪脱略雖其病處亦自成研者也慶元戊午秋八月周蒙題行書四行右寶晉米公道林詩帖真蹟一卷有其子友仁鑒定他蹟皆著臣名惟此則否蓋士夫家所藏于取正于友仁者也予開禧丙寅以南徐庾吏被檄犒師宿泗至于漣漪荒壘頽垣中有十數立石皆靈壁竒甚狐榛免葵蕪穢埋没或指謂予曰此瑞墨堂故基後二十三年而得此帖于京口道林在三湘間豈漣漪别有其名耶極目莾蒼又豈雲泉松陰隨時變遷耶不然則友仁之鑒定或在他帖而此詩非道林之真耶按山林集詩無名特繫之瑞墨堂是拾遣者亦不得而攷耶贊之以傳疑焉贊曰道林之名予不得而知雲泉松石之勝寫于漣漪必其地之景物足以稱其詩也今其陳跡杳然已無復遺予蓋甞登瑞墨之基渺一境之陂陀皆平蕪與荒畦又惡覩所謂畢世相忘之奇泉侈雲歸松橋斧隨世固多有之而予獨于此奇其北向之悲也米元章賞心詩帖行書十行尾記二行共二十字案二十字原注云十行恐有誤尾記二行亦脱去今並仍原本晴新山色黛風縱蘆花雪盡日倚雕欄寒宵低細月右寳晉米公賞心詩帖真蹟一卷嘉定己邜予漕江東屢登賞心訪卧雪之圖問坡仙之跡獨未知有是也後八年二月于京口得之以三萬錢予欣然蓋自慶未始得聞也意如寳晉者豈知百餘年後為人作三萬錢地耶贊曰金陵之賞心天下之奇觀真足以當南宫之詩闕右銀青光禄大夫守尚書右僕射兼中書侍郎上柱國魯郡開國公曽布撰奉議郎充江淮荆浙等路制置發運司管勾文字武騎尉賜緋魚袋米芾書龍圖閣學士朝請大夫知揚州軍州事兼管内觀農使上䕶軍曲阜縣開國子賜紫金魚袋曽肇篆蓋治平中余為海州懷仁令而永康陳君實佐余為主簿余與君皆少且壮相得甚適後六年余以翰林學士判司農寺薦君為勾當公事余諭事貶番易君亦以憂去又二十年余在政府而君復官守京師又七年君以疾卒明年其子次中縗服自浙東來再拜且哭願得銘也余與君游四十年而又以仲孫之孫妻次中銘詎可辭君諱愷字濟公婺州之永康人曽祖思逺祖文授父億知名朝奉君與大父相繼卒君力學有大志少以文采知名朝奉君與大父相繼卒君未及冠家故貧無貲喪祭冠婚悉倚君以辦其餘力已能嫁兄弟之女未嫁者登治平四年進士第初仕蓋懐仁也徙光州軍事推官知廬州合淝縣丞事熙寧中神考肇新百度弛徭役以寛民力修水土以敦本業更常平斂散之法以恤貧弱凢經畫民事一委之司農故司農最號要地為從事者實一時高選然經始之際四方以利害言無虚日君從容研究織悉通解時以為稱職遷著作佐郎且命按察淮西農田保甲等事召對便殿復使淮浙兩路嵗大旱民轉從于道君移文郡縣賑恤之婺為甚飢殍枕藉君欲發常平之粟以紓其急部使者噤不肯從君顧而言曰吾銜命使一方民疾苦若是儻不能盡力于斯實辱君命且君職在亷察爾終能與我違戾耶責固在我爾安無恐乃大開倉廪民頼以活部使者由是銜之君之出使里人有擊鮮釃酒以勞之者而使者以在所部乃以君為墨而置之獄有司傳至卒坐法免議者以君為冤哲宗踐阼以恩復宣徳郎監福州海口鎮鹽税徙光禄寺丞分司南京已而朝廷知其非辜悉除其罪以遷為鄖國忠正武昌軍三院大小學教授秩滿除通判熙州未行改管勾步軍司差撥剰員所今天子嗣位賜五品服累遷至朝散郎飛騎尉元符三年七月屬疾謂其子曰吾且死亟告老以歸乃屏醫藥不復詢家事旬日而卒實癸巳日也享年六十有六以崇寧元年三月十七日壬申葬于龍山之北原娶錢氏封金華縣君子男五人長曰次牧太廟齋郎次曰次公次曰次中擢進士第為峽州安逺縣尉次曰次仲次道與次公舉進士女三人長適鄉貢進士袁輪次適鄉貢進士李光祖次適鄉貢進士許操孫男二人女一人君詞學爽邁少以氣自豪而又敏于從政所至輒治辦熙寧首被選擢人實期以通顯然一遭横􅀈誣服受詬坐廢幾二十年困躓有如是者余自州縣吏與君相好逮余執政君已垂老而不用于世方将從容薦于上而君不幸死矣豈命也夫銘曰仕困于仇而不克顯才屈于命而不克施有子而立嗣厥世君則不朽刋吾詩右陳朝散墓誌丞相魯公撰先子晚年真蹟紹興丙寅仲夏二十八日獲觀友仁鑒定謹書行書四行右寶晉米公書曽文肅陳濟翁墓誌帖真蹟一巻諛墓之文豊碑碩碣相望于墻間而世率不之録者書也紹定戊子二月得之霅川李氏贊曰予觀桞少師在唐以能書聞當時碑誌或非其筆則人以不孝議其子孫噫嚱陳君之傳夫豈以文如寶晉者亦庶幾乎其人矣米元章書山谷大悲憕贊帖行書六行尾批四行通身是眼不見自己欲見自己頻撤驢耳通身是手不解著鞭墨牛懶惰空打車轅通身是佛頂戴彌陁頭上安頭笑殺涪皤魯直題徐文信大悲憕贊見其人誦其語真脱塵埃耳芾元章右寶晉米公書黄山谷大悲憕贊帖真蹟一卷公與山谷同時而景慕之如此異時求薦之帖曰襄陽米某文在蘇軾黄庭堅之間其竊比之心亦可見已如是憕者以勝妙相接引衆生居閻浮提幻非幻質贊語透徹三昧流出見性成佛直指人心所謂畫者贊者皆得成就第一希有功德于此時乃能取三生八體結習為一大縁事作摩訶薩埵觀引筆行墨正念現前等是二者無有差别又所謂不于一佛二佛而種善根乃至百千萬億佛種諸善根者見聞勸喜得未曽有此嵗在丁丑室伐挐月從越口氏我乃受持復宣此因説偈讚歎又所謂受者藏者讚説者皆植福本于口世與佛有縁神通光明具足圓滿于口寶真是足以為寶矣贊曰我佛住世大開方便有大士者現自在身以千手眼一一接引指示羣迷照破諸妄如是我聞佛説了義諸鈴杵鐸寳㙮經巻輪拂瓔珞種種所執凢所執者俱非有相智慧清淨肉眼慧眼佛法天眼種種所見凢所見者俱非有著以無相故釋諸纒縳一切衆生得大解脱以無著故具足圓明一切衆生得大知見佛尚無相何況于讚佛身常住即心是佛稻麻竹葦無限劑數彼頂戴者皆真實相百千萬億何況于身涪皤説法如標月指標本在手何者為月寶晉寫讚如轉輪王運轉隨人終不成道我不見憕我不執筆非見非手眼皆具稽首大士大慈悲故去我妄想即見如來米元章臨晉武帝大水帖草書四行尾記一行去嵗大水城中大飢撫别君便常分南諸軍耳此奈卒無所復箭已送右晉武帝書李太師瑋本右晉武帝大水帖先臣芾手臨真蹟臣米友仁鑒定㳟跋二行右寳晉米公手摹晉武帝大水帖真蹟一卷寶晉平生自言法書斷自西晉其作書史載李瑋家所得晉賢十四帖中有臣詹晉武帝批答一豈此耶臣詹不知何人不足摹故止及武帝書耳按今中祕羣玉堂帖芾真蹟有云好事家所收帖有若篆籀者囘視二王頓有塵意晉武帝帖是也謝奕之流混然天成謝安清邁真宜批子敬尾也其帖首尾印多與弊笥所收同君倩唐氏陳氏之類印玉軸古錦皆故物希世之珍不可盡言恨不能同賞歸即追寫數十幅頓失故步可笑可笑觀此芾之留意蓋可見西晉字在今豈可復得得見芾之摹斯可矣其子友仁甞著鑒定縫有内祕書印紹興印二宸奎標目嘉定甲申十月客或得之宗藩以歸于我贊曰論帖至晉書法之祖遡晉而西又舉一武樸散質寓意研態魯禁臠之藏尚覿真古米元章臨謝安八月帖行書七行米芾臨謝安八月五日帖御書題籖八月五日告淵郎廓攸靖𤣥允等何圖酷禍暴疾中郎奄至逝没哀痛崩慟五情破裂不自堪忍痛當奈何當復奈何汝等哀暴斷絶號咷深至豈可為心奈何奈何安疏右謝安八月五日帖先臣芾手臨紹興九年四月二十七日臣米友仁審定㳟跋三行右寳晉米公手臨晉太傅謝安字安石八月帖真蹟一卷按帖本在淳化閣帖中東淮餉府供軍堂所刻破羗帖之次亦有此臨帖本出天上有紹興三璽幷宸翰標目亦其子審定而帖中情字作内字又中間少十二字末少奈何二字蓋臨帖縱筆隨意所謂者不若此本則與閣帖皆同也友仁謂芾平生蓄晉帖日臨學不計數夜則以小笈置枕旁攷之寶晉山林集所贊所藏芾嘗自指此為絶品宜其臨本之多也帖尾友仁跋字與前跋亦載嵗月又不知中興後所流傳者有幾而呉氏之傳與予之得脗合如一是又重可貴也寶慶乙酉二月得之故宗臣家贊曰八月一帖無為寶晉之刻則其初也兵燬而後重取而鐫遺其精而得其粗也京口供軍之碑紹興所傳芾之書也此帖亦其同時同出于尚方之儲也芾之嗜帖所謂麻紙十萬足以驗其平生之工夫也字與跋皆不同蓋所臨雖出一手而其所得之時日則殊也供軍帖字之所以寡出于率意之真而此二帖則皆臨而非摹也京口海嶽芾所居也兩臨本之並傳尚可以見其人之緒餘也米元章臨智永千文真草帖十二行天地𤣥黄至菜重芥薑海真草間列尾記二行文不録崇寧兩學書贈亦虚右智永書真草千字文真蹟先臣芾手臨臣米友仁鑒定㳟跋二行右寶晉米公手臨陳僧智永千文二卷摹臨兩法本不同摹帖如梓人作室梁櫨榱桷雖具準繩而締創既成氣象自有工拙臨帖如雙鵠並翔于九霄青天浮雲浩蕩萬里各隨所至而息寶晉蓋進乎此者也神動天隨筆與心㑹似不似未可期而真態頡頏已與千載相上下矣帖有小璽藏旴江瘳氏慶元丁巳予歸自閩九月相遇皇華館廖方以此軸投郡守丘琛予輟而取之贊曰永之法研以婉芾之體峭以健馬牛其風神合志通彼妍我峭惟神克肖故曰袒裼不浼夜戸不啟善學桞下惠莫如魯男子芾其知此米元章臨右軍四帖草書第一帖七行第二帖三行第三帖二行第四帖六行米芾臨王羲之初月十二日等帖御書題籖初月十二日羲之累書至也得去月二十六日書為慰以可不下違之不無所一欲噉不化消諸弊日甚不知何以教之罔然及不王羲之頓首官舎佳也節風故不適可憂彼云何昨得熙書殊佳甚慰甚慰得官奴晉陵書平安念懸懸此粗佳一日書以囗囗囗見尚書一日遣信以具必宜有行都情事恐不可委行使耶遲逺具問近以之尚書懐今後遣吳興也羲之真蹟四帖麻紙上書先臣芾舊所藏其二得于職方員外郎劉涇其二得于大相國寺僧清道偶合縫有唐室貞觀小璽文大觀間已獻御府迄元祐之末先臣芾權潤州州學教授時紹聖間任樞宻院事林希以待制為潤守極好古博雅出此帖示之希曰昨祕閣所見貞觀印文貞字在上觀字在下相去五六寸許遂熟視之所印上下各不相對希嘆曰益顯此書是真唐御府所藏蓋或有時上下印也先臣芾所藏晉唐真蹟無日不展于几上手不釋筆臨學之夜必收于小篋置枕邉乃眠好之之篤至于如此實一世好學所共知此帖乃先臣芾中年手臨今得祕于紹與嗣聖天府實萬世不朽之傳翰墨之學出類㧞萃必有神物䕶持亦可謂榮遇矣今臣忽得經目一閲㳟跋于後臣又繼膺宸翰所臨以賜伏覩筆意快逸意在筆先字字縱心皆相連屬龍鸞飛翔眩映觀覩深得羲之法度妙處非愚臣所敢率易窺頌得以寳之什襲傳示雲來臣之一門父子預榮實千載未易逢之幸也紹興七年閏十月十二日臣米友仁書行書二十六行右寶晉米公手摹王右軍四帖真蹟一卷其子友仁奉詔跋其後具記顛末帖有米帖翰墨印鬻熊後人印壬寅印各二首印半已不存内府書印幾暇清玩之印内祕書印各一又有宸翰標目嘉定甲申嵗十月有貴裔自都攜過金陵以售予惟京口餉臺有供軍堂前使者呉琚甞以内府所賜寳晉破羗帖刻之石珂復于是堂得此帖皆出一手皆得之天上意若神物之合自有其時而非偶然者乃復刻置堂廡俾對峙焉贊曰東淮餉府供軍堂壁有龕石鸞鵠翔問之何石摹破羗曽傍雲漢分天章廷陵刻此侈寵光後四十載猶煒煌我持搨本謹毖藏三年倚徙玩未央客來袖出雲一張曽染復古隃麝香珠璣别出十九行驚喜比並走且僵摛華絢彩交相望宛然並粲如英皇幾年絶識高君王尚取鑒定煩諸郎半歸左畹半尚方駕言駰隰留遺芳今夕何夕獲干將鏌鎁未睹龍已驤呉侯攀髯歸帝鄉秋虹挾月常貫牕誰能籋雲開斗房攜書伴我老柴桑要隨神物恢混茫更斵此石封苔蒼六丁雷電未可量㑹見難起初平羊米元章臨右軍玉潤帖行書十一行内先生字空闕官奴小女玉潤病來十餘日了不令民知昨來忽發痼至今轉篤又若頭癰頭癰以潰尚不足憂痼病少有差者憂之燋心良不可言頃者艱疾未之有良田民為家長不能克己懃脩訓化上下多犯科誡以至于此民惟歸誠待罪而已此非復常言常辭想官奴辭以具不復多白上負道德下愧先生夫復何言羲之玉潤帖世舊有石刻流傳好事之家多有雙鈎模本此帖先臣芾手臨蓋中年字也筆筆取似故無少異紹興丙辰季冬初七日臣友仁審定行書五行右寶晉米公手臨王右軍玉潤帖真蹟一卷甞入九禁有内府三印其子友仁鑒定于後筆勢所及真有衛夫人所謂洞精遒媚態度使右軍而在猶當起咄咄逼人之嘆也按書史帖乃唐人冷金紙上雙鈎摹連在稚㳟帖後字大小一如蘭亭芾自以想其真蹟神妙為言則是未甞得見真帖摹之又摹猶能如此意所到處殆所謂閉戸造車出門合轍者矣珂嘉泰甲子嵗十二月之官南徐李奉寧燕餞以是為贈贊曰熠煜客星顒逵之伍乎軒冕相禪泉石之嫵乎美疢惡石天所痼乎情之所種同此趣乎排九閶之雲巫咸之訴乎後千年有人垤澤之呼乎米元章臨筆精日寒二帖行書十三行紙筆精要深知兒至欲一物而無所書信後酬德筆永不可用都下三錢方上之選信致一者佳并自三兄道此也衛軍名書日寒凉得告承諸惡猶不勝復極甞慘痛悲灼僕病正自不差疾久自憂日深悲企甚積既慘居疾係以罪黜二三不越出門近起取叙不復益企恨壯掌有人當復見耳及不次獻之白右寳晉米公手臨王右軍筆精帖大令日寒帖真蹟一卷淳熙閣帖以為羊欣書按書史王羲之筆精帖内兩字集在諸家碑上縫有貞觀半印王獻之日寒帖有唐氏雜迹印後有兩行謝安批所謂批後為答也唐太宗不收獻之帖而收雜帖故于帖上刮去不白獻之白字謂之羊欣以應募而以前帖為薄紹之書跋尾書官姓名云大厯某年月日下剖去古姓名五代人題曰薛邕記之後題一行曰某年和傳遺予押字是薛丞相居正此即和凝丞相疑為薛氏故物以遺薛也其後歸王文正家此乃芾見真晉帖之始今此臨本後仍有不次等五字蓋芾想像刮去之遺蹟而足之者而寶章待訪録又載二帖顛未曰本故相王曽家物在其孫景融處後為倒龍圖待制沈括存中取之古跋右軍作羊欣日寒作薄紹之仍將大中嵗跋刮去數字填為薛邕記之而故相薛居正題曰和傳遺予此蓋和凝以為薛氏故物歸居正耳唐太宗雅不喜子敬書故時人以他名名之以應募所謂紹之書白乃于耳字下刮去及不次獻之頓首字猶在一分許可識大中所跋既不能辨復為不鑒之人所收遂使至寳永失其真吁可痛也所紀互是特芾所臨復𢃄筆莫知其為白或頓首也以一人之筆力合千載之二妙此臨書之所無非芾其孰能與于此哉即臨以相真當益可珍尚惜其不得見真矣帖故在李奉寧家有紹興御筆題字仍著小璽嘉定戊辰嵗二月予就試中都因即其家閲書帖見之指所題誤合二者為一摘其不然為摭米書及閣帖參定客讙不信既而皆脗合李喜舉以遺予贊曰羲獻之蹟臨者米也遡觀欣書乃二體也隨珠卞璧萃此紙也以鑒得之亦可紀也米元章臨王獻之臺符帖草書三行米芾臨王獻之臺符帖奇御書題籖元參軍雖可外將豈知何白臺符從事耳右王獻之臺符帖十六字先臣芾書紹興十年二月十五日臣米友仁番定㳟跋三行右寳晉米公手摹王獻之臺符帖真蹟一卷紹興天筆書標目注以奇字有其子友仁審定昭囘下賁萬物五色芾于是有餘榮矣帖故先君手装有芾二印内府五印藏書家一印褾軸蓋天上物云贊曰芾贊謝安帖而嘉其得太帝之翰墨龍跡震驚言猶未泐豈知其身被帝澤也哉士患不能不患不知百世俟聖乃今見之予将以之為行已之師米元章臨王獻之東問帖草書三行米芾臨王獻之東問帖御書題籖東問具道姊消息此人豈能知其況耶右王獻之東問帖十五字先臣芾書紹興十年二月十五日臣米友仁審定㳟跋三行右寶晉米公手摹王獻之東問帖真蹟一卷首尾列内府四印藏書家一印芾二印紹興天筆題其首其子友仁跋其後芾摹帖多矣簡嚴精絶惟此帖與臺符帖為然亦予藏予家故藏贊曰字有十五如月當戸騰輝以望靡忒今古匪獻莫具匪芾莫祖誰其修之其玉其斧米元章臨顔真卿放生池帖楷書六行天下放生池碑金紫光禄大夫湖州刺史上柱國真卿撰并書右先臣芾手臨顔真卿書放生池二十四字臣米友仁鑒定真蹟㳟跋三行右寶晉米公手摹唐顔魯公放生池帖真蹟一卷顔米本異體摹而傳之見其習之博而嗜之專也雖然骨格之存似不蓋真予固有稽焉帖藏御府故出杜氏存者三印表以小璽其子友仁復著鑒定嘉定壬午二月得之江陰王氏贊曰楷正而端方維顔之長軒昻而自喜維米之體多嗜而博愛故能有其態畧迹而取神故不没其真是曰唐放生之碑作者書之能者摹之江隂之王畀我儲之五御既調又日驅之於虖後生誰能如之寳真齋法書贊卷二十
