body:
  text: 寶真齊法書贊卷一宋嶽珂撰歷代帝王帖唐太宗枇杷子帖案枇杷子帖本唐髙祖書淳化閣帖誤標為唐太宗恭閲欽定重刻淳化閣帖辦事蔣王惲鎮蜀時事折衷至當垂信千秋此標題既誤其跋與贊皆誤難以改正人標題下據後例各注書體行數此獨缺佚姑並仍舊文謹識其誤使至得所進枇杷子良深慰悅嘉果珍味獨冠時新但川路既遙無勞更送今者梅炎藻夏麥氣迎秋香飄蘭坂之風鏡轉桂巖之月為善之暇想足怡神延望白雲載深離緒聊疏緑字此不多申咨二十九日右唐人摹太宗文皇帝枇杷子帖真蹟一卷字蹟略肖王導于法書中自是一體淳化祕閣帖載焉惟太宗一神武定天下而天縱字學乃與繇羲輩並驅爭先應姿天日雄略霆電藹然見于尺牘間尚可髣佛其萬一世近得之親見書精稔于士習筆筆取似閣本可稽雖摹豈易得也得帖不著嵗月軸玉標錦尚是先君手裝與後來所得御府帖無小異益信其真而可寶云贊曰武帝以蒲萄弊漢明皇以荔枝蹙唐彼自謂英姿之略同曽不知邦本之易戕觀帝之帖視人如傷蓋不特掞辭冠八代之英結字傳二晉之芳又得所謂公子御說宜君之言而合乎孟軻氏保民而王也太宗皇帝處分手札御書楷書三行王浦魏仁溥只今來學士院聽處分十三日右太宗睿文皇帝御書處分手札真蹟一卷五季不綱惟皇上帝誕啓元聖以紹三代以挈八綋武緯文經弛張迭用維時宸藻皆所以恢雄斷闡廟謨隂闔陽闢海嶽震動臣嘗伏閲國史范質王溥魏仁浦以翊戴勳同綜天縡今御筆所召獨薄仁浦二人而不及質帖尾書十三日考之建隆元年七月辛亥以河東僞宰相衛融為太府卿壬子幸宰相范質第質卧病既久上深憂之故親往視焉按長歷辛亥為十三日豈將經營太原而質方被病故不預于召耶嵗月不聨書無復可以考之聖意然二相以鼎足承君之誼為前朝四近之司早昧經綸恭祗明詔其必有以感宸心備聖問或者阿衡為不召之臣良平為帷幄之佐神謨重經他有決擇抑未可知也臣又聞帝以英武定天下雄槩大略寓之筆法類皆飄逸徑特建隆以後凡廟算區畫軍書應酬今多藏祕閣率是塗改此札凡十有七字如天臨日麗端粹靜嚴蓋尊禮宰臣指授將帥自不可以竝日語宜乎其不同也浦溥字互用殆肆筆之誤帖故入附馬都尉李瑋家有含光子臣瑋印在紹定戊子三月得之髙平范必成蓋忠宣公純仁之孫故家典刑故多中原遺物百拜紙贊冠于宸章贊曰於赫炎圖真主勃興人文其昌天開神機海嶽洗氛龜龍發祥明明廟謨麾指變更著于宸章十行之頒六合驛行動罔不臧片幅所傳神護鬼呵積于嫌緗筆縱墨濃竒正迭參藝閣之藏臣傳此札字體靜嚴意態齊莊或指以疑臣謂不然各適所當前朝大臣帝心所祗理異尋常豈以軍書龍戰鷹揚而可比方或敬而咨或召而親都俞巖廊帝心所形帝札所存默寓弛張璆琅鳴琚佩玉以趨韜鋒斂鋩闢闔坤乾風霆雲煙萬世所望意其當時左右拱承日思贊襄君臣同心始于一堂以逹八荒後三百年來瞻奎躔猶知激昻有偉副車承平之儲印以含光劫火洞昏玉􅞃金題猶識褾裝於昭帝圖詔于後昆不愆不忘惟天縱之能惟心之亨惟斷之剛臣得其真寶以昭之冠于百王太宗皇帝古詩御書草書十八行口口口口口口易過朝昏鶴影臨棊局松花落酒盆注書銷嵗月㸃易教兒孫宿客應相笑疏慵不掩門敕太宗皇帝御草書臣李瑋恭題𨽻書二行前一紙六字糜損楷書卷後不著姓名右太宗文武皇帝御書古詩真蹟一卷參墟繼伐戎弓載􅐤人文蔚興爰及游藝太清傳歷代之刻翰林置侍君之官借摹遍逮于副車搜訪旁求于異國擷英潄潤維聖授能天葩宸章晃耀八極迹其撫遺什以興慨寓神毫而掞藻修然肆筆不間蒿萊蓋由時鄧郅平政亦多暇玉除瑤殿得以寄心俯視五季風塵之搶攘八紘六合之間不啻出焦灼而被昭回也詩首六字已化龍梭卷末一題猶存蠧簡甲第之毖藏未泯北宫之印識如存紹熙庚戌六月先臣佐大戎得之尚書臣張杓贊曰乾德之五星旋于降婁開文祥兮太常之英姿跨頡歷籀開大荒兮游藝之神􅞂古轢今奚鐘王兮維副車之題在承平時謹毖藏兮維北宫之璽施于中興傳帝皇兮維臣其得之錦􅋶瓊函絢宸章兮太宗皇帝南牙謝熊白狀楷書七行外封一行面籖不存熊白五斤右伏蒙眷私逺有貺及感佩之至但切下情謹修狀陳謝伏惟照察謹狀十二月二日特進檢校太尉兼中書令行開封尹趙花書狀特進檢校太尉兼中書令行開封伊趙匡義狀謹封右太宗皇帝南牙謝熊白狀并封一卷御筆書名在焉著以一印曰開封尹新鑄印建隆友悌之德上與天通翼翼上都首重尹正體雄事特遹昭倚毗而當時餉問之往來酬酢之禮度蓋皆與外廷等開國宏模廣大明白如日麗空天倫之真聲應氣合如雨山雲躋登羲農之基締創一心又如左右手之相與畢力是宜億萬斯年衍宋丕圖彼漢抑左官六朝置籖帥坎蛙之見局局可羞蠛蠓泰山固無以議為也帖雖吏牘而潛躍之舊名京府之新印皆于是以見物以誠致不以瀆拒書以事答不以美觀國初淳古氣象又藹然于盈咫尺幅之間斯蓋足以竝龍閣之藏而侈下國之觀矣謹按李燾續通鑑長編乾德三年九月乙未令中書門下樞密院三司使及臺省寺監開封興元尹皆别鑄新印比書制悉增大焉革五代之弊陋也是印蓋當時所鑄云嘉定甲申嵗六月臣遣人往比得之中原實與謝訪支降二筆偕來用奉而傳冠于别帖之首贊曰鼎食之珍義比美芹致者何人姓名之已湮天筆之存龍跡紛緼暗于風塵拱護之有神字取其均楷取其陳質勝于文繄風俗之淳鑄印以新繫姓以親昭哉天倫繄友悌之真鳴呼有典有則詒厥子孫此帖之傳奚止乎關石之與和均臣繫以詩式著厥因聖制不磨考于斯文真宗皇帝御製朱表御書楷書二十九行尾記兩小行臣言臣欽承命歷祗紹宗祊靡資泰紫之儲仁豈獲基扃之多祐向自乾文昭錫邦禮交興云岱之峯魏脽之壤升禋而紀號奠玉而省方延丕貺于三神均太和于九域殊尤之事輝映于古今祗畏之心戰兢于夙夜不敢暫形逸豫少啓振矜庶保永圖以承純錫比者宗邸不謹炎燎驟興外接端闈內延正殿既震驚之攸甚實寤寐而罔寧是以愈務側身更思克己期膺天鑒用集民禧然懼眇姿莫諧精感虞後艱之未已倍積軫憂祈丕䕃之曲垂克流繁社稷䖍伸于仰訴冀誕照于至誠善應來同咎徴尤息誓勤育物欽答延祥臣無任懇激䖍祈之至謹奉表奏告以聞臣誠惶誠切頓首頓首謹言大中祥符八年六月六日嗣天子臣上表至六月二十七日上表焚奏井上者龍圖天章閣天聖三年六月日奉聖㫖裝褫成卷入內內侍省內侍殿頭銀青光祿大夫行內侍省內謁者勾當龍圖天章閣飛騎尉臣裴愈入內內侍省內侍殿頭朝奉郎守內侍省內侍內侍伯勾當龍圖天章閣上騎都尉臣盧道隆入內內侍省內侍殿頭朝奉郎守內侍省內府局令勾當龍圖天章閣騎都尉臣揚承德入內內侍省內東供頭奉官朝奉郎守內侍省內侍伯勾當龍圖天章閣上輕車都尉臣全克隆右真宗章聖皇帝御書御製朱表稿真蹟一卷祥符郅隆天瑞薦臻雖休勿休惟聖克念聿因仁愛以祈邦釐大矣哉肆筆之神蹤迪威之寅監也陟降左右順則弗違一諶感通遄格嘉應是書在承平時實彚藏天章閣上寫以七寶砑金箋首用御製小璽後列天聖職掌官吏臣名背用天章閣印精康失守軼落人間風塵百年神物呵毖寶慶改元之正月臣在京口餉治遺間至北京得之以歸褾以青綺東以縹帶雖塵暗碎裂尚可想汴都列閣遺制祖宗示朴之意于是尤有考焉眷瞻西清未洗鼯穴之嘯涕泗北望幸覩龍梭之神什襲敬傳昧死祗贊贊曰宋德茂三世祥符闓九清兢業帝道登陟降王心寧龍鸞夜染翰虎豹晨抽扃宸心動惕憂精思入杳冥慶隂雲裔裔飆景風泠泠朱表動淵監蒼旻聞德馨岧嶤瞻天章邃穆環禁庭昭回河漢隔澒河山河腥流傳幾百年撝呵猶六丁金箋烟玉字蜀帶要吳陵大名標北都寶慶恢中興邊塵失歐脫趙璧歸連城百年神蹟晦再拜感涕零探驪方得雋負馬仍騰英天心正昌唐文軌將收京願言豁氛霾長仰奎星明真宗皇帝南牙謝訪狀楷書八行外封一行伏蒙殊私以元侃叨奉聖恩特垂案此下缺佚字數未詳口口親王謁制前此蓋無考惟淳熙翰林學士承㫖洪邁之父忠宣公皓在燕山時嘗得神宗為頴王時封還李受門狀受之狀曰右諫議大夫天章閣待制兼侍講李受起居皇子大王而其外封題曰台銜回納下云皇子忠武軍節度使檢校太尉同中書門下平章事上柱國潁王名謹封名乃親書其後受之子覆以皇繳進因藏于顯謨閣故皓得之其事著于隨筆邁又引錢丕行年雜紀謂仁祖為升王受恩命丕為將作少監亦投賀狀王降回書僉字啓頭參稽互觀回以大狀前名後押至道之制也回書用僉啓天禧之式也書名封還門狀而不答治平之故事也豈隨時更革定于睿斷而不一耶抑友傳咨記之具議顧皆不襲用耶謙尊而光卑而不可踰今帖有之矣得之與太宗南牙帖同時繫之以贊式昭宸衷贊曰自虎闈之教廢分絶堂陛偉聖皇之訂禮得古意于胄齒南牙既啓有煜朱邸鏘鏘佩履謁刺真委不愛尺紙錫以雲體天光之下彼藹然主器不居其貴此其所以詒天禧之謀垂治平之制臣贊而藏昭示物軌以續洪氏之祕尚寶勿替式示萬世仁宗皇帝二詩御漢體書二紙各七行花領紅鬃一向偏緑槐香陌欲朝天仍嫌衆裏驕行疾傍鐙深藏白玉鞭慶歷八年四月二十八日腰間寶劒七星文臂上雕弓百戰勳見說雲中擒醜虜始知天上有將軍慶歷八年四月二十八日御押右仁宗神文皇帝御漢體書真蹟一卷慶歷詩多睱文恬武熙嚴除清廂璧跗琅鈕所以宣暉昭回燀被翾肖隨適而寓式抒聖心是詩之傳固足以紹祖武之英蹤詒太平之偉觀臣沐浴遺化企瞻盛朝聞在野而不知尚占至治望樂游而如見徙有微心嘉定戍寅仲春得之中都新婺州戎帥臣張松家書本太傳鄧公臣士遜家舊書有南陽及宋卿等八印皆存其半蓋後人所用者又有御府大小四印其一表以御押月時互載蓋出同日用嫓寶藏庸示來世贊曰鴻荒有開昉頡鳥跡字學之興亦既象物漢有議郎曰臣蔡雍帛書發竒出淳古蹤千齡寥寥嗣響逾邈貞觀御牀淳化祕閣雲漢之章施于仁皇厥惟天葩源宋跨唐萬幾燕閒成是肆筆弛張異用游戲如一士俗之成𤣥默自躬見于首篇尚絅之風安不忘危尤示注意筆墨之餘又形拊髀慶歷之治太平極功帝心所存天地與同春朝鳴珂秋塞沈析一視之仁昭此聖學海嶽八極羲娥九霄嫓于寶藏萬世見堯仁宗皇帝濃風二字御書楷書兩紙濃字北風字差小濃風右仁宗皇帝資善堂御書濃風字真蹟一卷天禧末帝在資善聖質夙成掞藻摛華時寓翰墨翰林學士臣錢惟演以左戚進因得而藏上具錢氏三印及末縫半印臣嘉定戊寅三月假守檇李有錢氏孫澥持以求售敬贖而取之贊曰維聖肆筆根于天神蹤合作皆自然徑腴華實無以偏春秋雖富力已全天禧資善環綺園隻字落紙時爭傳煌煌翰墨二百年傳家曽是金鑾仙渡江丈獻仍中原繄臣何人望奎躔欲知付受須瞻前印以忠孝錢家錢仁宗皇帝淨字御漢體書絹本淨右仁宗皇帝御漢體書淨字真蹟一卷絹本糜損惟小璽與字畫巋然皆存神氣軒翥筆力飄動宛有神護足為聖世瑞物臣嘗考帝翰墨之祖與今帖付受之緒謹按國朝㑹要乾興元年三月帝在諒暗因至定陵神御側閲視有筆以木皮為之遂取試書數字帝素未嘗攻此書偶兹閲試而筆力猶健有如夙習尋命置其書靈御前以伸哀慕及分賜執政近臣各一軸又按歐陽修歸田録云仁宗萬幾之暇無所玩好惟親翰墨而是書尤為神妙凡㸃畫象物形而㸃最難工至和中有書待昭李唐卿撰三百㸃以進自謂窮盡物象上亦頗佳之乃特為清淨二字以賜之其六㸃尤為可絶又出三百㸃外臣嘗藏慶歷二詩字體特小意所用木皮筆蓋今帖之祖也而六㸃出三百㸃外則是賜李唐卿為甚明及考中興實録紹興五年二月癸巳知韶州龔言序奏臣祖鼎臣事仁宗為侍御史嘉祐七年三月十八日春宴前一日上言謂久旱非宴樂時宜罷宴祈雨仁宗從之翼日駕回中塗雨作二十三日召先臣預宴詣寶文閣賜漢體御書清淨帝佛四字兵火散失止藏淨字一軸詔宣付史館則是龔鼎臣固嘗有是賜矣而所存者止一字已歸尚方臣嘉定甲申九月遺諜自北歸得此于真定則與紹興龔氏所獻已灼然為二本豈言序所藏乃賜龔氏而此字則賜李氏因軼遺于中原耶然得于中興之初與臣得于北方蓋相去九十年龔李二氏之賜皆止存一淨字又豈偶然耶贊曰淳化祕閣有晉右軍王羲之帖論此書為至難叙篤好之不能歎小進之可觀臣嘗謂彼以法書專門猶自歉于造次窮本之艱何上聖之天縱乃得之于遺筆一試之間如至和待詔之賜答與嘉祐御史之特頒俱有取于清淨恍交輝于龍鸞意其開基百年之家法惟在乎去殺而勝殘或文帝以之而致邦家之富或曹參以之而息獄市之姧此四十二年之宏規所以追帝堯之安安覽中興之史牒龔氏之傳寶固已閟雲章于九關後九十載李氏之軼遺乃復脫妖氛于百蠻既匪分璧免于同時乃俱窺管豹之一斑殆猶得判璋以書陽虎之玉持半玦以想王母之環固物理之有待豈神蹤之或慳此天下日月以冀巾興而臣子是有以驗天道之好還也英宗皇帝寧字御漢體書寧御押右英宗憲文皇帝御漢體書寧字真蹟一卷有御印御押表其下是書在本朝神逸清麗至昭陵而大全帝以問安視膳之餘心悟神得掞藻之妙氏肖天真信乎帝王之羲獻也治平止四年故宸毫睿畫不大布于天下而臣獨既髙平范氏併得之遂與神文龍蹟竝藏寶真顧非幸歟贊曰惟漢體書筆法之變于帝王中亦有羲獻有煜昭陵蒸雲激電品冠一神巾寓萬善于惟治平問安視膳葩竒自然得于目見傳英染華躬侍筆硯既習既觀弗咤弗眩心法斯授體勢亦擅故于游戲如墨裙練惟帝之聖統接堯禪追懷羹牆謀謹詒燕武存止戈威寓不戰五餌胸奴三登海縣耆髫茹粹支夏解辮寧人之功是履是踐帝心敢知畔援歆羡妙則已具奎文式絢揭于座隅以示警勤仁皇之仁惟聖時憲猗與此寧尸居龍見苞桑其存伐柯不逺事陋規隨戒存藥眩有籖維瑤有軸維鈿繫此贊詩于帖之殿神宗皇帝龍字御漢體書龍右神宗皇帝御漢體書龍字真蹟一卷上有御書璽褾以白玉軸雙龍騰騫製作精妙蓋京師顯謨閣故儲臣嘉定甲申十月遺諜至汴持歸以為信臣謹按本朝漢體書肇自熙陵真仁而下咸祖遺法帝雖罕傳遺跡而筆意飄動得體之全維見可考金華紙與宣和冬祀詩相類而與定陵朱全不同慶歷之璽大而方治平之璽小而表以御押此璽之制特圜尚是熙寧舊物贊曰應龍之神兮休命之申兮利見大人兮四聖之傳兮有筆如椽兮得龍之全兮時以乘兮世之熙寧兮騫騰兮天衢之亨兮與物惟新兮驅雷滃雲兮澤沛無垠兮旋坤轉乾兮聲氣自然兮其合以天兮嗟兮龍兮凜兮遺蹤兮歸來兮漢之宫兮哲宗皇帝御書魏野詩聨帖雨行中批三行洗硯魚吞墨烹茶鶴避烟元祐四年五月二十九日賜懷御書押右哲宗欽文皇帝御書處士魏野詩聨真蹟一卷元祐在宥時登太平惟帝富于春秋元臣巨儒日陪執經詞畹墨卿時寓游藝用以尊德性而道問學是帖蓋清燕之餘間御宸藻以為當時臣下之賜者也臣懷不知其為何人紹定戊字嵗三月有髙平范氏必成持以求售本忠宣公純仁傅家之藏臣疑未能别其真鷹因書以示祕書省正字臣吳潛潛方直道山因報書為臣言比因曝書閲祕閣列聖宸章賞見帝筆法云無毫髮差殊又云閣上見存一扇面及幅紙亦各書此聨蓋以賜任婆婆者皆帝肆筆意此聨之佳偶動天賞故屢入于奎文漢章之黼黻臣以是知故家文獻真有足徵者慨想盛世式揚天芬贊曰昔翰林承㫖臣蘇軾在訪落初勸講邇英賞賜燕于東宫侈賜詩之恩榮首進畫衮雲裳之篇以頌聖學之夙成䄂三十四字之昭回自謂與躔殊而竝珍臣每誦其詩懷其人見其首陋翦桐末戒用兵凡回鳯驚鸞之字皆歸之主聖而時平是以知老臣之用心凛凛常在于持盈偉百年之故家傳相閥之簪纓蔚文獻其猶存得此幅于遺贏跫然駭目之觀如復瞻黃繖之下西清臣既探九淵而得夜光遂復持支機而問客星側聞三神山之所儲是一聨者蓋出于肆筆之屢形不惟足以辨其毫釐之無差亦得以竊歎夫當時師誦後先熙光緝明故游戲從容無非墨沙而筆精三薰襲藏再拜寶真雖自幸今日之獲烟雲章以想元祐獨未知何時之遂登樂游以望泰陵也寶真齊法書贊卷一
