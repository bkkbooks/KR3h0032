body:
  text: 寶真齊法書贊卷十一宋嶽珂撰宋名人真蹟王文公赴官修學二帖苐三帖行書七行第二帖行書十一行安石啓承誨纍幅豈勝感慰初謂優游園宅足慰新懷乃知營從赴官不久煩暑尚在冀倍自調嗇令兄想侍奉佳幅安石啓推官足下吾在此粗如常得弟書喜安佳歲莫豈勝憂想不知行李何時至此日以企佇切好將息纍得十姪書切有便更寄書來也十四十六念一等孫安佳思億思憶十五切修學有便寄書來也六第日夕往來七八姪十一姪常相見諸不一一思憶思憶押送七弟右熙寧宰相維師荆國王文公安石字介甫赴官修學二帖真蹟一卷士所患無學問無氣節無望實無力量以達其志以得乎君以澤乎天下以被乎後世公蓋兼而有之而又遇有為之主伸可為之願顧其效獨反是豫每竊慨歎嘉定乙卯之十月言登鍾山其麓有隱君子焉卒然問公之為人答曰如其字札退而訪遺墨又一年而得之僅致數帖熟復有感因重歎曰是隱者其知言歟贊曰態騰踔而多疏意軒昂而多趣倐焉如薾電之駒沛然如縱壑之魚使之為山澤之癭抱自道以自娛聞清風而興起望膏澤之沾濡膚寸所形粃糠金朱豈不毅然大丈夫然而律之以芝繇之法度考之以羲獻之範模嫓行楷而已變質𨽻草而多拘顧欲以之擅八體教六書合天下同軌之車而不容有一轍之殊兹其所以僨于康莊之衢吁吕參政示諭帖行書三行示諭云云良紉厚意孤生乃今知所芘賴矣逺書不復覼縷也惠卿上右熙寧參政觀文殿學士吕惠卿字吉甫示諭帖真蹟一卷嘉泰甲子四月得之霅上贊曰發知己之私書謂其自隱于齊年彼云云者使或人亦指以詭祕之跡夫熟曰不然事君有義本無黨偏當熙寧側席以求質惜公之所芘賴求諸人而不求諸天也韓獻肅詞垣陛對二帖並楷書第一帖八行第二帖七行綘再拜久别瞻渴向在京師以待罪不敢通問比來穎尾亦以省咎之餘京師交親亦不敢致書雖聞進陟詞垣但深慰抃春韓尊候萬福末由展晤伏望為國自重不宣絳啓上提舉修注舍人閣下九日辰刻絳啓前辱臨貺未陛對尚稽謁悟重有餉饋但增悚刻餘留面悉不宣絳啓上知軍內園仁弟右熙寧宰相司空康國韓獻肅公絳字子華詞垣陛對二帖真蹟一卷有藏書家四印先君舊藏云得之南澗韓元吉家維桐隂之韓氏族鼎盛與相之畫錦對公又以材輔神祖光于芝蘭蓋天相耆德之門而以世業名稱亢其宗者贊曰東坡先生嘗贊王仲儀歷叙家世起晉城魏而以其佩玉劒履而當與窶人子齒尚考此言則是狐貉足以起縕袍之羡輕肥足以致簞瓢之恥子意未必爾也觀獻肅書清婉遒美雍容自喜同而不倚流而不靡以筆勢而格風議即字法而沂源委蓋當其家廷詩禮之間已具此廊廟大臣之體然則即真觀似以彼視此其有㫖哉其有㫖哉維桐之隂中條旎旎寶是幅紙與鸞鵠峙韓獻肅古法書詩帖楷書五行高賢忠義古今同手筆遺篇法甚工寶軸得家當不朽追懷豫思凛生風潁川韓絳題右韓獻肅古法書詩帖真蹟一卷韓氏文獻之盛甲于本朝寶軸之藏象籖錦繅意其矜富耾奇落落珠璧俱不在乙品惜乎徒見其詩而不知其所傳家者為何等書也豫生平有好古癖嘉定乙丑五月在蕭寺偶得此帖撫而歎曰酸鹹土炭固有嗜好愈于豫者耶是不可不贊贊曰韓氏之寶軸文獻相續蔚其君屋曷知夫高賢之何以見取忠義之孰為並録遺篇之若禇若柳手筆之或顧或陸想其錦繡在篚璵璠韞櫝名蹟爭麗榮光相屬既追懷古今之不朽見嗜好酸鹹之可卜是故詩者題品之攸寓贊者歌詠之不足即此帖之藏于寶真殆所謂同工而異曲者矣吳參政炎溽帖律書五行奎啓炎溽未遑祇謁悚仄悚仄人至辱手韓兼惠鹽鼓海物已收感激感激拜聞不宣奎拜啓君玉修注學士右熙寧參政資政殿大學士吳文肅公奎士長文炎溽帖真蹟一卷公以政君經國之學絶世知人之識歷輔三聖翊參萬微風績照宣具記史牒遺墨所在宜乎流傳百年共識傳寶君玉者氏王名琪仕至密學歷東南名鎮有聞于時其視公蓋君子朋也紹熙庚戌先君在從班見此帖于羅春伯點家云其家尚有子孫居于江右故得之因輟以遺贊曰公以四闕近事三朝絶識岩嶢心畫以昭帖出于近世撫臣之家又得以記先友于嘗僚也沈壑達書簡帖七帖並行書第一帖十一行尾批四行第二帖十三行尾批四行第三帖十四行第四帖十一行第五帖五行尾批二行第六帖三行第七帖六行十郎得示問承酷暑佳勝閣中安裕甚為慰也二弟皆在成均治家事想亦不易親舊上下不能無勞來恩意也何時調官一亦不久思每煩埀恤今幸得代而薦者足以為令雖出于尊府亦賴推轂也甚喜甚喜老夫山間粗如常待盡其餘日爾不足道也人還匆匆不一不一遼書寄齊郎五月二十八日文叔必不輟有書秀叔聞已解臨渙今在何許第二處有訊託申意未及别書也今歲大扺多發瘡疹永仲兒女皆病兹亦見安矣遼啓比奉書相各徹侍史前辱賜教及二山詩若見顔色所道昔遊甚詳已如坐吾庵中矣誦玩無斁尢深感愜也即日動止何似十四縣君安勝新婦煩舅姑愛恤不見其尤甚幸甚幸遼于此如故來春得張郎成婚了便無復纍胸中者人生正為業來夙息能修證必不及此正當一念不動如枯木如死灰當來初有分爾咄咄無益也歲方終氣候凝凛千萬為國加愛加愛不宣遼上穎叔閣下十月二十八日示諭倉使者已許諾至感獻父更冀終之得一職則尤佳復爾忘想忘想近得巴陵一格知書子公已善過彼久矣今想已至舂陵也遼啓京師區區人事日繁不奉書遂五十日感節懷思但有悁結即日不審履此夏暑動止何似太夫人萬福門中眷愛安勝遼即此粗遣愛間多病官局亦無事乘興即往不然杜門數日亦無吏責卜居城西地名桃源小有園林亭榭之樂足以養妻子度歲時進無所營退有所得而庭闈不逺其餘尚復何求哉但未聞召命日以遲俟爾未卜相見千萬善愛善愛不宣遼再拜頴叔閣下五月五日小兒為吏無狀所以庇于大廈者不止逃謗也又蒙其上官薦寵之衰門弱植豈其所宜當此穎叔之惠為不淺矣感刻感刻十四縣君安勝齊郎以下諸眷計無恙安行南出遂成姻事否駢蕃託于慶門尤為所幸素道有兒女在其外氏甚無聊此雖攻苦食淡為不足度亦可養其一二今有書託安行與𢃄來更煩穎叔為一言女子荷慈顧舉家銜感銜感遼上大鏡方鏡二匣籹合先送去照臺并枕近晚可得般必未行有定日希示及遼送十甥拜依元約兩數昨日當面上十郎十一郎安勝諸眷無恙修婦安否前謝十一哥書不知何時西上也企渴企渴遼十四縣君安勝不别書也知盡室遂至都下胃暑涉秋佳否十郎調何處官十一千郎必各已試歸聞在南廟必遂高輟行聽喜報也草娘安否此中粗遣山間殊無京塵但朝夕不忘思想耳向冷千萬多愛未及專作千郎書老懶不訝不訝右熙寧審官西院主簿沈公遼字睿達書簡帖七幅真蹟一卷公以善書稱王文公㑹文肅公師其筆法王得其清會傳其楷再世三秀厥惟聞家不幸以罪廢其事見于王明清揮塵銀卜居池陽名與齊山俱高遺帖固可寶也淳熙壬寅豫兄大用守池得之以遺先君有藏書家印十有二贊曰夢溪筆談載公之論書曰書之神韻雖得于心書之法度必資于學分制有法均停相若三四合體上下齊腳多寡不牽乃異世作今視其帖信乎其嗜之專而見之卓也雖然藝在當家習亦有源存中瞻前文通比肩顧翰墨文章之不殊而俱未若公之知言知言伊何以神合天古人之良意在筆前沈睿逹昭君詩帖銀硃界行紙寫楷書二十四行尾記三行圓明師為余鼓琴作昭君操因感其意辭以贈之王昭君漢宫女生如桃李華皖皖託朝露不向春風榮摧折在泥土耻將黃金市顔色空得君王一回顧黃門扶我上車去遙望漢宫隔烟霧十年簾下學畫眉不知還為蛾眉誤中間悲怨或易忘如今羈愁那可諭夢中時復作歌舞滿目異類誰與語胡風日夜驚吹沙不知春來復秋去一生此恨終難言獨自援琴傳作譜傳作譜一曲未終淚如雨我來都城下黃塵厭羈旅道人為我試一彈使我超然為懷古熙寧八年五月二十七日在普淨僧舍寫錢塘沈遼睿達譙國曹誦貫通嘗觀睿達書元豐辛酉上巳日題楷書二行右沈睿達昭君詩帖真蹟一卷昭君之詩出于文人才士之手蓋不可勝數而公獨託琴以弔古即古以寓情是有足稱者曹誦本濟陽王佾諸孫戚里家子紹聖間仕至摳密副都承㫖與公歲月僅相後先而已知敬慕如此則公之書名蓋已久矣帖與寶晉四詩同得之京口贊曰玉微十三維以寓聲支郎何心寫脂粉情漢冢春青塞霜曉白千年之悲表此遺墨唐林夫經由還家二帖並行書第一帖十行第二帖七行坰拜啓坰比者經由屢承埀訪意愛之厚戴荷何言敝舟當侯别親賔相餞送至連日解繂此心瞻望清風不勝戀戀春氣漸和惟千萬保重以副頌慕謹奉狀少代面違不宣坰拜啓僧監吉祥上人座前謹空二十五日坰啓昨夕還家遂四鼓矣其荷延寵之厚固可知也經夕尊體想佳已而聞辰刻東亭傋早饌上邀車馭望枉臨幸甚坰再拜彥逺尊兄事早刻右熙寧同知諫院唐公坰字林夫經由還家二帖真蹟一卷公初以新法進賜第奉常階清顯矣既乃以人心之未合者廷斥大臣至叩殿陛甘貶黜而不之顧元祐間僅厯鄂湖臬三郡而不迄用豈以其悔之晚耶公蓋知制誥彥猷之子父子有能書名東坡有詩曰二妙凋零筆法空忽驚雲海戲羣鴻清詩不敢私囊篋人道黃門有父風蓋以公比晉衛桓也嘻斯亦足珍矣前帖得之僧元明次帖得之吳越錢氏皆在京口時贊曰國朝之士夫子書鮮留意而况乎父子之懿如公亦可謂善繼者矣東坡謹許可比之晉二衛質之斯帖其有風致雖子亦將謂之無愧也張子野詩藁帖行書藁木第一帖六行第二帖七行韻和上先頓首前題一行紙捐不存池上飛橋亭外山野禽偷靜上鈎欄晚花露重香偏細春女衣輕體尚寒曲水略殊今日事南湖曽奉昔人歡郡圖可許增新致幾處模傳畫樣看此地舊南湖是越王弟嘗分主茲土南湖即有弟賞尚有當時亭觀材存焉案此注湖字舊字賞亭字下俱有閧文射前題紙損惟存一射字射藝功多暮未疲欲將庭火繼西暉弦聲應手破竹響旗影翻風戲鳥飛竟日中支矜互勝傍人如堵見終稀不知雙燭沙河上誰得牛心一割歸師望有雙燭沙河引騎歸之句昔王凱音牛名八百里駮與王濟對射賭之一發中的遂探牛心一割而去張子野在熙寧間致政來往杭霅兩郡是時東坡先生楊元素李公擇為守倅陳令舉栁子玉皆在蓋一時文章巨公也子野年八十餘視諸公為文人行東坡次韻春畫一篇推抑之意至矣此卷有池上飛橋亭外山野禽偷靜上鈎欄又射弓詩云弦聲應手裂竹響旗影翻風戲鳥飛絶類張文昌也每展卷想見其多才潦倒良可祕護耳庚戌十二月吉雪溪老人門演子長行書十一行東坡祭張郎中文云微詞宛轉蓋世之裔謂其精于詩詞也此書風流藴藉又詩詞之餘波云建炎四年十二月初七日㑹㮷關注書行書四行右熙寧郎官張公光字子野手書詩二篇真蹟一卷公詞名滿天下三影之作膾炙逮今方熙寧時垂車自怡往來浙右霅上六客公蓋預其一壽俊耆耋風流藴藉蓋尉然承平典型也帖以粉箋字跡已半磨落二關子長子東跂語具焉紹定戊子三月得之高平范氏贊曰觀水以心本于知者之樂取射以藝譬諸巧者之中時雖後先之不同意或迭取而互用句葩體莊字謹心縱是曰仁祖太平之詞人遺帖之存固宣後世之知所重也王文恭易漕帖楷書六行尾批二行十五姨縣君玉履萬福聞所苦猶未平嘗記揚州法雲寺有一居院有素傳膏藥傳瘡腫無不愈試一用之郡君再三申懇不及别書謝惠瓜姜今附酥一桶子圭上閒郡無所施當且易要路一漕也右元豐宰相維師岐國王文恭公圭字禹玉易漕帖真蹟一卷舊藏京師士人司馬若谷家有藏書家二即慶元己未嵗六月偕諸帖見㫒自官制之行公為首相終始事神宗實膺睿簡文鳴三朝位冠百辟書固不可無傳也贊曰以文致身以恭奉上錙銖筆態矩􅀈心匠論其鈎格則得紆餘曲致之體考其縱逸則妙雍容不迫之狀儼佩玉之度肇官儀之創百辟班見大廷宏敞方觚穎之發揮蓋已具此氣象曰誰之書元豐首相吳正憲嵗端帖楷書八行充啓嵗端之履福茨來集未遑修染先枉書縢感懌之深何可勝道未諧欵晤更冀為時自壽以迓裒擢不宣充頓首知府司勳左右右元豐宰相觀文殿大學士太一宫使侍中吳正憲公充字冲卿嵗端帖真蹟一卷神宗勵精政事公以元臣握輔㩞雖屢造排濟而君臣之際獨無間然始必有得乎帝心者慶元己未嵗六月中都士人司馬若谷以數帖授于是書在焉亦有藏書家印二贊曰濃如夏木森葱蒨淡若秋波橫組練端方亭亭復妡婉有肉不俗骨不軟情真字楷意蕭散如在竹宫樂閒燕九光玉藉觀文殿字曰沖卿諡正憲司馬文正集序帖楷書九行集序前日已白景仁更請一簡咨之光非敢憚煩但以荒惡冠于相公文筆之前太為不知量故也惶悚惶悚嚮承示論以相公作御史時曽乞台還孔范其草在否得所資也光再拜太傳十九日右元祐相國維師溫國司馬文正公光字君實集序帖真蹟一卷公以道自任以致君以拯民積之于身達之天下如洪河大川由源迄流初匪二木故其在伊洛則密雪屯膏而四海望其澤在廟朝則九鼎作鎮而神姦不能窺至矣哉合內外貫天人感通混融一誠而已豫彚羣帖久未得公書日夕以為恨紹定戌子三月容有持以示豫者亟取羣玉帖較之筆勢毫髮無小差再拜驚喜遂贖以傋祕笈詳考帖語恐是答宋莒公家子孫之求集序者孔范以言事去位在明道末莒公時為諫官目為御史或記憶之訛贊曰道本于身真蹟乃全貫以一誠雖人實天元祐之初帝賚良弼匪康其躬為民而出龍起于洛雲興于嵩有澤其膏四海之豐方其未驤一念下土九關雖扃編此守虎及其既用草偃惟風羣賢鱗差滃然而從天以誠開民以誠格混融流通何索何獲有崇南山太平之基巖巖具瞻維公宜之平生不欺涵泳浹洽心畫之作為天下法取人以直持已以謙豈徒幅箋二德之兼榮光屬天公書在櫝有德有言溫其如玉寶真齊法書贊卷十一
