body:
  text: 寶真齊法書贊卷十二宋嶽珂撰宋名人真蹟蘇文忠公書簡帖十七帖並行書第一第四第十四帖各七行第二帖八行第三第六帖各九行第五第九帖各五行第七第十三帖各十二行第八第十五帖各十一行第十帖十行弟十一帖十四行外封一行第十二第十七帖各六行第十六帖十五行此中近忽有一人能畫山水極可愛本無人知僕始擢之居人過客爭求其筆遂漸艱難異時必為奇物也今將一軸奉獻如要六幅圖但與一匹細畫絹錢兩千省便可也子軾猶未敢劣耳軾又上穆父內翰兄執事軾啓適辱訪别豈勝悵然知只今就道無暇往見後㑹未期千萬珍愛藥數品可備途中服食服食不一不一軾頓首先輩吳君足下十一月十一日軾啓自聞下車日欲作書紛冗衰病因循至今疊辱書誨感愧交集比日起居佳勝未緣瞻奉伏冀以時保練不宣軾再拜知郡朝奉閣下十一月二十三日軾啓昨日辱延顧愧感愧感改旦伏惟福履勝常田賑不知取得未幸為督之得早見果決為佳船久留恐不便耳不罪不罪軾再拜處善宣德年兄一日楊都巡本欲作書適得書云欲來循州恐已起發更不作書若尚未且為申意廬處士軾又問令兄先輩不及書不訝軾啓盛製東都賦舊于范子功處得本諸公傳玩幾至成誦非獨不肖區區仰服也示喻欲令作跋尾謹當如教顧安能為左右輕重耶適若冗迫少暇當作致之軾再拜伯原先生足下軾啓適辱奇篇伏讀驚歎愧何以當之以太守㑹上不即裁謝繼枉手教益深感怍晚來起居佳勝公窮約至老居甚卑而節獨高軾忝冒過分實內自愧相見不免踧踖來示何謙損之過也迫行不再詣惟原自愛入夜草草不宣軾再拜仲車先生足下軾啓人還辱書承起居佳勝為慰承鹽局乃爾繁重君何故去逸而就勞有可以脫去之道乎外郡雖粗俗然每日惟早衙一時辰許紛紛餘蕭然皆我有也四明既不得欲且得乞淮浙一郡不能勝暑中登舟耳其餘書不能盡萬一惟保愛保愛不一不一軾再拜子豐正字親家翁足下汝陰之别忽十餘年不謂復此㑹合增感歎也書教纍幅勤重愧佩厚意之乏人裁寫手簡草略恕之恕軾再拜軾啓適怡遣人奉啓辱教且審起居佳勝召食固當依命為章憲在武昌見候試來日又齊素必難趨赴日望恕察晚當拜見匆匆奉啓不一軾再拜安常處士足下軾再啓謫居已再經春徒以知罪信命故受之恬然除舊苦痔外亦無甚恙也杜門少出所云攜青衣童步松下好事者粉飾也羅浮初過時一至其下耳後亦不復到叔弼亦久不得書中間得書報去年二月間仲純之子臨邑尉遜者有事必已知之所云病者乃其閣中也後聞已安矣此中真井底了不知北方事風物郤粗可但無醫藥耳軾再拜手啓上文公大夫閣下軾謹封疾疫方行家人皆病老軀亦自昏憊也兒子方合藥救療不果往見許君且為致意疲倦不别簡不罪不罪不知幾日成行已遷舟未軾又白軾啓去歲塗中暫聚遽别可勝悵仰逺辱手教感慰殊深比日起居佳勝軾衰病增劇不堪繁㑹適值難食之歲未敢别乞間處勉強度日坐候汰逐耳未由展奉惟冀順時為國自重不宣軾再拜明夫提刑朝散閣下六月十六日令子先輩疊辱寵臨終不克款奉後㑹未期臨紙黯然惟侍奉外多愛以就逺業軾附白所要文字為連日人客不暇續寫得納去也軾啓近别想體中佳勝田事想煩經畫今遣姪孫齎錢赴州納有所買牛車等錢本欲擘畫百緡足今只有省陌請收檢支用如少不過來年正二月續得面納也餘惟萬萬自愛不宣軾頓首公裕蔣君良親足下十月十二日曹潛夫得三舟許為多載米來不敢指定石數但請問潛夫看可帶多少即依數發來切望留意少濟都下所闕也丁卯年租米數且便一報為冗迫不及寫單家兄弟書且致意軾又上兼託曹潛夫買少漆器仍于公裕處支錢乞依數付與諸事不免一一喧聒向時姪孫帶不盡米知寄在强景仁家如未曾寄與人來可便付潛夫也軾啓逺䝉惠書甚荷勤意比日起居安否盛年不出從官竭力報恩但眷戀鄉井何也新年宜早赴部切祝切祝餘順時自愛不一軾頓首殿直陳君足下十二月二十九日軾再拜近承范子豐傾喪親契之深伏想同增悲悼蜀公篤老有此感戚賴公過從時相開曉也軾再拜知君貧甚僕亦久容乍到未有以相濟只有五兩銀短二錢且助旦夕薪水之費不罪舍弟想旦夕過彼過彼也忙甚不悉軾又上右元帖翰林學士承㫖東坡先生蘇文忠公軾字子瞻書簡真蹟十七幅分三卷惟先生立身大節下睨萬古剛毅邁往之氣固宜磅礴八極流見于翰墨文字間今觀其書淡泊淳古委蛇不迫藹然有畎畝忠愛之意剛態毅狀見諸書法內七帖本家藏後六帖得之九江士夫家所蓄皆有付受次四帖散得之禾興建鄴京口維揚月日次序不可悉著有流傳好事家及先王故印識乃雜禠而彚傳之贊曰雲濤稽天睨而陸之神龍在淵􅀢而觸之一世諞諞稚而畜之節堅氣全墨卿卜之淳古簡嚴芝繇僕之徑直不然䖃鮓目之案䖃鮓二字未詳所以考唐韻䖃與䖃同䖃䕢不中貌䖃苴泥不熟貌磋苴鮓三字者相近或即此意蘇文忠金丹帖行書三十九行軾頓首再拜少師先生文丈執事秋冷竊惟道體勝常軾䝉免如昨窮約愈久念道漸熟常佩至言不敢失墜今年春夏微疾遂杜門謝客而傳者過實以為左右憂入秋來殊佳健子道雖未有得而異時浮念雜好殆灰滅矣先生丈丈愍其有意于此當時發藥乎王郎北歸慰喜可量恨不得助舉一觴耳憂喜過人何翅電露欲尋王即初别時意味豈復有絲毫在者則今日㑹合之喜又與造物皆逝矣近者孫鼛宣德赴偃師宅寄帶並二簟去不審逹未已令兒子往荆南買一官莊若得之遂為楚郢間人矣每念違去几杖聸奉無期未嘗不臨風嗟惋萬一天恩放停逐便當不逺千里見先生也今有少懇干求不罪不罪軾于門下至厚先生有金丹奇藥而不以數粒見分實未免耿耿若遂其請謹藏之耳未敢服也舍弟在筠甚安望其牽復解去得相聚少時近以公事為一倅所怒据托百端雖未見可以害渠者然已滯牽復矣行止飲啄非復人事亦不能念之也厚之奉議且在左右否先生邇來復有幾孫歲行晚江淮風物凄緊坐念齊閣蕭然黃花白酒有與共者乎乍冷惟乞萬萬為國自重閒居乏人止用手啓信筆不覺滿紙惶悚惶悚謹附承動靜不宣從表妷蘇軾頓首再拜少師先生文文執事八月二十二日右東坡先生金丹帖七紙真蹟一卷先生于藥全以道相從投石以針不約而合誼兼師友蓋所謂千百載間二人而已帖在先生謫黃時金丹事他不見之記録惟蘇黃門龍川志略曰豫治平未泝峽還蜀泊舟仙都山下有道士以陰真君長生金丹訣石本相示養生有內外精氣內也非金石所能堅凝四支百骸外也非精氣所能變化欲事內必調養精氣極而後內丹成然求變化輕舉不可得也惟外丹成然後可以㸃瓦礫化皮骨輕舉無礙矣然內丹未成內無以交之則服外丹者多死譬積枯草敝絮而置火其下無不焚者豫甚然其說後十餘年官于南京張公安道家有一道人陜人也為公養金丹其法用紫丹丹砂費數百千朞年乃成公喜告豫曰抱朴子言藥既成以手握之如泥出指間者藥真成也今吾藥如是以其成無疑矣豫為公道仙都所聞謂曰公自內丹成則此藥可服若猶未也姑俟之若何公笑曰我姑俟之如此則真有是也豫平生藏先生帖清逸真妙惟此為最目閲諸藏書家帖字半世矣亦未有一紙可與此帖並者瓣香之敬情事固應爾耳紹定戊子三月得之無錫故家尾著建炎門下後省之印一及有傳付六印贊曰師生一門千載二賢九轉之成意授神傳此而謂丹鼎之自然抑明皇有云魏文求靈藥于西山而不知羽翼之自天豈先生泛焉于所得之淵源而有覬乎刀圭之仙覆鹿夢蕉得魚忘筌精氣內全金石外堅草然置火之不知而托外物以引年豫知先生其必不棄于對牀之言蘇文忠歸頴帖行書九行逮既忝薦赴省試遂可就親雖叔弼尚在疚想可别令人主婚已令子由咨禀彼此欲及時子當想䝉開許也軾再拜老妻不敢拜書縣君親家母不殊此懇也叔弼丁太夫人憂將自京師歸頴仲帖也至頴仲豫方成親余時入穎幕後數後先生來作守已四十餘年令人驚歎癸丑三月十五日令時題行書五行右東坡先生歸頴帖真蹟一卷趙德麟跋其後紹定戊子二月得之錫山贊曰事師之情期以百世言雖不多意則獨至識以歲月越王之孫式時覽觀用考大倫蘇文忠與錢糧父書簡重本二帖二本共四紙並粉箋紙上行書第一帖十一行第二帖六行軾啓久不聞問奉懷悵然忽人來辱手書承比日起居佳勝感慰無量示諭欲令紀述新廟記不敢以淺陋固違但迫行冗甚不暇俟到揚州得少靜息當下筆成即遞中寄去也㑹合未緣千萬自重不宣軾啓上穆父內翰兄執事適承見訪偶出豈悵勝然新茶少許納上幸俟至事空當往同啜也軾啓上穆父內翰兄執事右東坡先生與錢內翰穆父書簡重本二帖真蹟一卷豫嘗欵所藏顔魯公朝回帖與羣玉堂刻本文皆同而字則有小大之别意必有一贋而未敢議也後收先生帖而此二帖者亦復出焉驗其紙素皆一等粉箋而筆力精到又皆非先生不能作尤以為惑後見韓季茂寺丞同在外府因論及帖事為豫言先生以翰墨雄一世每自貴重雖人簡片幅亦不苟書遇未愜意輒更寫取妍而後出以豫人期于傳世凡今帖間有同者便當視其紙長短色澤若具出一時字與之稱切勿以為贋而置疑此豫先居莊敏之所以致别也豫驚異其說强應曰諾是時家藏正有此帖飯已出局驅車疾歸發笈視之不爽毫髮則作而呼曰有是哉而今而後蓋知寶晉雙眸自信之說為足據帖蓋家藏置一處既聞韓說及褾而析之贊曰豫家吏部兄以翰墨自喜每作書尺必屢易廢紙之積如垤先君至其几間戲謂之曰世傳元祐士子有贄東坡先生以文者一覽而曰旨哉旨哉今毋乃類是耶遂相與大笑然卒不能變也今觀先生之帖始知右軍之墨池懷素之筆冢褚河南之精筆佳墨要皆此一意度諺不云乎不攻不姸不貴不傳是雖齊東野人之言亦必有得于不苟然者矣蘇文忠桞子厚覺衰詩帖行書十一行尾記二行久知老會至不謂便見侵今年宜未衰稍已來相尋齒疏髮就種奔走力不任咄此可奈何未必傷我心彭聃安在哉周孔亦已沈古稱夀聖人曾不留至今但願得美酒朋友常共斟是時春向莫桃李生繁陰日照天正緑杳杳歸鴻吟出門呼所親扶杖登西林高歌足自快商頌有遺音戊寅十二月十四日試新端硯書柳子厚覺衰一首右東城先生柳子厚覺衰詩真蹟一卷按帖尾紀年以戊寅正先生在儋耳時先生生丙子是年已六十有三豈以柳州同居南荒其不遇者同而有所感耶度先生胸中浩氣隘九州得喪齊百世必不以是芥蒂特寄情焉耳帖得于嘉泰之甲子七月鬻者牛氏贊曰人生㑹有衰何必深惜獨是先生以忠見斥抱百世之道逢千年之歷而不得以舒其謇直此先生所以惜寸陰于尺璧不然則先生之胸次夫人之所識而豈以此置欣戚瘴昏霧泣鳶跕虎黑有此竒蹟豫以占筆力蘇文忠藥方帖行書十七行尾記一行藥方有兵部手集者唐宰相李公絳所編方無不驗者療折傷骨破碎或五臟內損垂死者用生地黃搗取自然汁和熱酒服之骨破碎者自大便下復生新骨補故處有瘀血者立取下即平復云天設此法以救人命地黃滓以酒和傳傷破或腫處豫在儋耳民有相毆內損者不下粥飲且不能言豫以家傳接骨丹療之乃能言又以南嶽活血丹授之下少黑血乃能食然尚呻號不能轉動也小圃中有地黃然地瘠根細如髮乃并葉搗治飲傳之取血塊升餘遂能起行此人與進士黎先覺有親乃書以授之使多植此藥以救人命戊寅十二月五日右東坡先生藥方帖真蹟一卷先生于海山窮絶處活人一念無間斷想是方蓋可占矣淳熙己酉歲三月廬陵張子禮彥和以此帖歸先君蹟曰上醫醫國亦既贈繞朝之䇿于彼窮厄猶出隱惻使不傷且折而先有以夀其脈此先生之本心而獨無所用其力是方之傳正足以為先生惜蓋不得效腠理心腹之技而徒使之愈焦頭爛額之客也蘇文忠潘墨詩帖行書九行潘郎曉踏河陽春明珠白璧驚市人那知望拜馬蹄下胸中一斛泥與塵何似墨潘穿破褐琅琅翠餅敲𤣥笏布衫漆黑手如龜未害冰壺貯秋月世人重耳輕目前區區張李爭媸姸一朝入海尋李白空看人間畫墨仙右東坡手書潘谷墨詩真蹟一卷潘以墨名一時而窮悴不偶託興于物炯其不緇被望塵之可羞是殆先生有感于是而寄于此也寶慶乙酉二月得之盱江李君與善贊曰懷絶世之清音歎媸姸之難諶慨丸墨之未改挹古人而寄心褐黯黯以如漆笏琅琅而扺金貯冰壺其自如渺一塵之弗侵彼逺臭以何歸謾花柳之繁陰姓昧昧以汚人雖千年而亦瘖豫得此意跫然長吟想先生之清標契謫仙于同襟凌九垓而神會豈入海之可尋方將抱月乘風携壺命琴短墨帝于元圃挾客卿于翰林快騎鯨而翳鳯遂登高而俯深執此卷而撰杖筮得朋于盍簪秋露其滴玉蜍自斟捧詩硯之如箕淬詞鋒之發鐔付張李于一吷視滄溟于蹄涔逸興天游浩無古今斗杓回光䂀車發晨承謦咳于緒言猶足以投微機于芥針也蘇文公西湖聼琴觀月詩帖行書詩八行序兩行尾記一行觀月聼琴西湖一首呈坐客軾上白露下衆草碧空捲微雲清光為誰來似為我與君水天浮四坐河漢落酒樽使我冰雪腸不受麴蘖醺尚恨琴有弦出魚亂湖紋哀彈本舊曲妙耳非昔聞良時失俯仰此見寧朝昏懸知一生中道眼無由渾元祐六年九月十五日右東坡先生西湖聼琴觀月詩真蹟一卷豫嘉泰壬戌春往中都因游湖上有貴游子弟好治圃者家北山築堂水湄刻此詩在璧間而繫以跋豫覽而曰此非其地也潁與杭皆有湖湖皆在西此詩蓋為穎作主人憮然不應意豫強解事者既五日忽招致促席歎息詫坐客指豫為博且曰豫碎此政矣豫謝不敢應既乃叩其所以然則新得何人坡詩注考年譜而知其為頴州也其人已矣後二十有七年紹定戊子二日豫在京江忽得此帖于鄽鬻者家驚詫黯然問其所從得噤莫之對嗟乎時趨事遷固如此耶貴游故交情憫其遺跡之凋零故亦莫之名也按年譜先生元祐六年八月以龍圖學士知頴州閠八月滌印今詩蓋九月望去贊曰西湖之名杭頴異轍然皆足以寄七絃之清調贊共而里之明月方指地而辨訛客烘堂而纓絶迄五日之考據驗注編之一閲是詩之來豫目所别昔也傳觀今焉祕笈歎人事之易變何凋零之飄忽然則記歲月于所見而逸名氏于可闕亦豫之所不忍恝也蘇文忠二詩帖兩詩行書八行十月春寒不出門不知江柳已搖村稍聞泱泱流氷谷盡放青青沒燒痕數畝荒園留我住半鉼濁酒待君溫去年今日關山路細雨梅花正斷魂春來空谷水潺潺的皪梅花草棘間作夜東風吹石裂半隨飛雪渡關山右東坡先生梅花二詩真蹟一卷信筆而寫故詩是謂雜書此帖皆雜書也前一詩按先生集謂元豐四年正月二十日往岐亭郡人潘古郭三人送于女王城東禪莊院所作而顧施二氏注謂成都嘗有墨迹刻本題以正月二十一日出城到虎跑蓋在黃州北二十餘里是時先生尚在雪堂豫謂豈特一篇為然使皆考同異訂是非蓋有不勝辨者矣惟當取其意可也帖得之歲嘉定祀丙戌月姑洗鬻者鄭元溶贊曰物隨春而欣榮詩之偶成何間乎虎跑之與女城縱筆而書冰谷梅英凡是歲月之與所因豫皆不必強評惟當即先生雜出之書以考先生所寄之情其何以異乎孤山之清也蘇文忠大字詩帖楷書大字十行尾記三行清風終日自開簾凉月通省肯掛簷琴裏若能知賀若詩中定合愛陶潛有書東坡一首坡公墨妙如繁星麗天照映千古疇敢輕肆摹畫鄉人許傳正持示真蹟一卷遂得肅袵一觀何其幸耶嘉定癸未修禊後三日越隱張鎬題右東坡先生大字東坡詩真蹟一卷先生寫醉翁亭記赤璧賦皆大字今皆罕傳豫家多先生帖然皆詩簡嘉定乙酉八月有以此軸來售者金壇張氏跋其後蓋京口士人家所藏筆法殆與滌黃石刻無二贊曰小字鵠引騫而翔大字虎卧靖且莊我藏遺帖雖盈箱尚歎巨刻無滌黃誰憐神物開混茫想見醉墨猶淋浪此題要補束皙亡更恐有詩書雪堂蘇文忠蕭丞相樓二詩帖行書詩十一行序二行尾記六行滕元發令賦蕭丞相樓二首眉陽蘇轍繞郭靑峯睥睨屯入城流水縠紋翻樓成始覺江山勝人去方知德業尊坐久浮雲霾後嶺酒醒飛雪變前村我來邂逅公歸國猶喜登臨共一樽丞相風流直至今朱欄仍對舊山林奔馳軒冕身何有跌宕圖書意最深松繞城頭風瑟縮江浮山外氣陰森三年不起南遷想應有前人識此心元豐三年五月家弟子由過池元發令作此詩到黃為軾誦之也七年六月軾從文玉兄登斯樓因為録出贈文玉時子由在筠州將復過此汝州團練副使蘇軾書右東坡先生書頴濱蕭丞相樓詩二首帖真蹟一卷豫嘗過池登斯樓挹二難之風考百年之蹟蓋未嘗不三歎也先君述先生之遺意喜收坡帖平生嘗置凡上指此為真不紀所得之時紙皆故暗而筆勢有軒翥態蕭丞相蓋唐相蕭後文玉王姓名子琦時守池州云贊曰登高而賦維以思古二難之風意健句嫵黯然塵楮筆勢軒翥真分不諼我懷陟岵蘇文忠羅漢偈帖行書十六行東坡居士告悟清師有紹逺上人寶持唐人所畫十六大阿羅漢如護眼目逺上人亡今者是畫在黃山常歡喜所子往為我致問常公欲求是畫當可得否若彼常公愛而不捨而不可得捨而不愛則不可取不愛不捨則取以來旬有八日清師復命且以畫來居士升堂普告大衆燒香作禮為逺上人追福滅罪衆問居士今此羅漢有何勝相供養讚嘆得何功德當以何等酬報常公居士言此畫實無勝相亦無功德彼與我者即以報之乃說偈曰五更粥熱聞魚鼓起對孤燈與誰語溪邊洗鉢月中歸還君羅漢君收取元祐八年正月望日雪堂書右東坡先生十六羅漢偈真蹟一卷昔朝說之以道嘗作謝伋景思所藏先生帖跋有曰先生為兵部尚書為說之言在黃州時陳慥相戲曰公只不能作佛經曰何以知我不能曰佛經是三昧流出公未免思慮出耳先生即為作魚枕冠頌命陳為書于是筆不及並墨􅚿且笑曰便作佛經語耶今此偈序通徹義諦于勝相功德了無窒礙是又不特作佛經語精妙解脫固兼之矣豫妣大寧夫人素奉釋氏在湘東時有僧持此羅漢并偈為戲時豫方齔尚憶淳熙丁未歲除以忠武諱日供伊蒲出像堂上併閲此軸噫今四十有二年矣贊曰佛法離住相色相本非實云何阿羅漢可以色相求居士宰官身祇園夙親近㑹發宏深願現此廣長舌于後像法世讚歎說偈言筆力涵虛空三昧出胸臆撞開愚癡綱透出大千界我昔睹殊勝會聞諸佛說以音聲求我不能見如來偈語復云何能離音聲見今當解佛意一切有為法非偈亦非贊應在如此觀蘇文定衙前至京湖三口帖並行書第一帖八行第二帖十三行尾批一行第三帖十三行尾批一行轍頓首䝉别紙示諭嘗有衙前食錢之請朝廷比有成法似與所陳不甚相逺計能蚤與推行實公私之利也冗中奉答草略恕察幸甚轍頓首轍啓鄂渚之别已半年餘矣承舟御至京日欲奉問懶慢至今愧仄愧仄先䝉枉敬具審履况安適令子以下如宜至慰至慰故棲雖久不葺治幽致故應在也昔日交游有在都下可往來者否示諭欲求江淮一官于事為宜矣然何時復展晤臨風依黯倍冀若時自重不宣轍頓首定國朝請老弟六月十四日轍啓久留府中䝉眷甚厚因得頻接宴語至幸至幸奉違數日間伏計尊候安勝轍舟至湖口風雨不止泊于西岸已三日矣旦暮稍霽即行益逺左右千萬為國順時珍重謹奉手啓為謝不宣轍頓首再拜知軍大夫徐丈執事十六日右元祐黃門侍郎頴濱先生蘇文定公轍字子由衙前至京湖口之帖真蹟一卷先生道睨今古文追父兄立朝之節具在國史四海之士共知景嚮是帖之得蓋先君手藏犀軸象籖與文忠對于是可以知德之不孤矣贊曰周禾同頴趙玉連璧層見間出又其偉特有美頴濱味道自得既相師于父子亦齊驅于翰墨吾評其人槩猶可識蓋嚴重端肅者老泉之教而淳徑邁往者長公之德謂余不信視此手澤二蘇文登趨闕二帖並行書第一帖六行第二帖八行過再啓竊承文登信至丈丈尊候萬福欣慰何已并惠海魚芝藻石研棊子多品逺物未易到此乃䝉輟貺何感如之區區非面謝不盡過再拜遲頓首再拜密邇雖每聞動靜而書問不繼兹為愧負遲杜門與俗緣日逺但僑寄非安亦任運而已小妷符自蜀趨闕冒涉艱嶮非晚遂至國門逺來不知朝廷之儀凡百有教之幸甚遲頓首再拜右東坡頴濱二蘇先生之子過字叔黨遲字伯充文登趨闕二帖真蹟各一卷蘇氏文章翰墨在本朝自為一家如喬嵩大河崒嵂澎湃極天宗海有識者皆知之至于芝蘭流馨肖才濟媺各真源泒自颶風思子之外世固未之暏也豈名以制義所以示日益日損之戒得之于趨庭者固猶有不同耶先君生平喜藏蘇帖而于斜川而下無傳焉寶慶乙酉春正月容自眉山來有出是帖者得之京江合而褾之以繫其本贊曰文字之祥厥有原委父師昆弟以及諸子文兮鈄川道兮頴水以文貴道一家濟美施及翰林特游戲耳于風味中亦復是似以坡為骨以頴為體蘇門之英來者視此寶真齊法書贊卷十二
