body:
  text: 寶真齋法書贊卷七宋岳珂撰唐摹晉人帖衛恒往來帖向氏題籖前題一行帖草書三行髙閑手摹往來帖晉長水校尉衛恒書徃來者傳卿氣力頓佳甚以慰思無期但有信示問右唐人摹晉長水校尉衛恒字巨山徃來帖真蹟一卷恒瓘之子素稱能書有政宣半印四紹興珍賞印二意古而態真彷彿復見前代氣象非唐世筆力未易到此嘉定甲戌嵗四月從向薌林之孫公起購得之標曰髙閑所摹予按寶晉書史嘗以戴嵩牛經太宗御筆三字者易懐素絹帖及陸機衛恒等模晉帖與數種同歸劉涇謂之髙閑殆無攷證予故不敢以為信概之以唐庶幾得實贊曰書既造妙摹者惟欲取其肖摹既逼真題者不必託諸人以實傳信萬古一晉無目睫之徇視御府之印王廙問安王秋二帖前一帖楷書五行内詔字空闕聖體字平起後一帖章草三行臣廙言昨表不宣奉賜手詔伏承聖體勝常以慰下情不審宿昔復何如承鄭夫人乃爾委頓今復增損伏惟哀亡愍存益勞聖心謹附承動静臣廙言七月十三日告藉之䓁近日遣王秋書不具月行復半念汝獨思不可堪居奈何奈何雨凉不審右唐人摹晉侍中驃騎將軍王廙字世將問安王秋二帖真蹟一巻廙以善書名見錄于淳化之秘閣帖并有先朝印識予家藏最乆先君手記云淳熙丙戌嵗十月在廣右得于欽守趙善言家亦賜書也贊曰摹法之精必騐以真我見棗刻已同似人啓以楷書告以章草情敬之分于此焉考王導懐感帖前題一行帖五行草書晉仲父侍中丞相始興文獻公琅琊王導茂𢎞導白改朔情增傷感濕烝自何如頗小覺損不帖有應下懸耿連哀勞滿悶不具王導右唐人摹晉丞相始興文獻公王導字荗宏懐感帖真蹟一卷上有小璽筆法盛于晉尤盛于王門導其祖也是書本在淳化袐閣帖中結字得章草之遺風妙有餘而妍不足今帖乃唐世摹于硬黄紙上毫髮畢備無遺憾焉先君好収唐摹帖以為雖未得真猶勝棗刻此槖中之最古者云贖之宗姓近臣家葢賜書云所得之嵗月不可考贊曰王門之書祖始興他帖閣本皆洞精獨餘此帖難强名妙處頓使俗眼驚唐人硬黄昔流聲紙古墨暗如晨星兒曹緘口勿浪評更看羲獻森階庭郗恢授衣帖御書題籖標記一行帖行書九行晉郗恢授衣帖御書晉鎮軍將軍東安忠侯髙平郗恢道嗣九月十五日恢白授衣感深得去四月書為慰已冷比何如吾至頓弊力遣不具郗恢敬謂承不上下告念馳悚賢兄可行上下萬福慰不寧兄無近告馳情第二兒今東分張罔罔右唐人摹晉鎮軍將軍東安忠侯郗恢授衣帖真蹟一卷郗氏自鑒而曇曰儉處約曰恢道嗣皆其子也世以書法著按竇􅡄述書賦有曰處約道嗣家之後俊取草勢而兄優謹真書而弟潤恢之競爽有自來矣書有御題小璽并流傳二印識存焉摹跡與王方慶賜帖相類葢先君故藏贊曰郗姓三傳而至恢晉代七革而為唐書以世而能摹以乆而彰予將因髙平之奕葉而擷千古之遺芳於戲道徽尚其不亡兹其足以侈摹帖之藏唐人摹二王帖貞觀煟興傳自蘭亭神與其能承詔作程一門接武洛神之賦放于後人邯鄲失步馮承素蘭亭叙二十八行尾記小楷兩行永和九年嵗在癸丑暮春之初會于會稽山陰之蘭亭修褉事也羣賢畢至少長咸集此地有崇山峻嶺茂林修竹又有清流激湍映帶左右引以為流觴曲水列坐其次雖無絲竹管絃之盛一觴一詠亦足以暢叙幽情是日也天朗氣清惠風和暢仰觀宇宙之大俯察品類之盛所以遊目騁懷足以極視聽之娛信可樂也夫人之相與俯仰一世或取諸懐抱晤言一室之内或因寄所託放浪形骸之外雖趣舍萬殊靜躁不同當其欣于所遇蹔得于已快然自足曾不知老之將至及其所之既倦情隨事遷感慨係之矣向之所欣俛仰之間已為陳迹猶不能不以之興懐況修短隨化終期于盡古人云死生亦大矣豈不痛哉毎攬昔人興感之由若合一契未嘗不臨文嗟悼不能喻之于懐固知一死生為虚誕齊彭殤為妄作後之視今亦猶今之視昔悲夫故列叙時人録其所述雖世殊事異所以興懐其致一也後之攬者亦將有感于斯文貞觀五年八月二十九日臣承素奉敕模右唐馮承素橅王羲之蘭亭叙臣米友仁鑒定恭跋行書兩行右唐貞觀將仕郎直𢎞文舘馮承素奉詔摹修禊帖真蹟一卷太宗天造翰藝儲神緗素蕭軺南駕辨櫝西來緬觀羣臣仁智之情畢奏從官步趨之技承素其一也按何延之記謂當時供奉榻書曰趙模曰韓道政曰諸葛貞實偕肄筆各有數本以分賜皇太子諸王近臣流傳幾百年以元和十三年詔取入九禁又五百載乃入御府有小璽一又印縫二古篆不可識首尾有裴氏等印三其後著米存仁鑒定攷之寳晉書史載蘇耆家有蘭亭三本内次本少長字世傳衆本皆不及長字其中二筆相近末後捺筆鉤回筆鋒直至起筆處懐字内折筆轉筆抹筆皆轉側褊而見鋒蹔字内斤字足字轉筆賊毫隨之于斫筆處賊毫直出其中世之模本未嘗有也耆題以為褚遂良芾辨其非定為承素輩且製贊以表之今閲此本蹔字賊毫所出無絲髪異殆是繭紙舊帖有此一筆故凡親見真蹟于昭陵未閟之先者其臨摹之手不約而同不惟是帖足以信千古之傳而芾之精鑒至是殆尤不可及也嘉定壬午嵗二月託人從故循邸贖之凡三易所託而後至想山陰之手澤未見英姿聽空谷之足音詎無喜色式昭傳緒以覿前徽贊曰猗應龍蟠九嵕抱驪珠閟含風見似人喜若跫作者誰臣姓馮吳通微臨蘭亭叙帖二十九行尾記四行係界行紙内舊注崇山二字並移入正行舊塗改悲夫處亦不復摹首行止于初字葢以意臨寫故獨與衆本不同云永和九年文同上大中大夫行尚書職方郎中知制誥充翰林學士東海縣開國男吳通微臨書時貞元四年嵗次戊辰四月己夘朔十一日己丑記右唐人吳通微臨王右軍蘭亭叙真蹟一卷具著官位嵗月有小璽并古印文二與行業讚同得于中都按唐史有吳通𤣥嘗與陸贄竇參同時亦踐北門葢昆仲也筆灋淳古題名端勁有鴈塔之碑可攷其非贗贊曰褉帖之亡坏土其朽至于貞元夫豈一手彷彿之傳爛如晨星尚勝定武以石得名右軍初月帖草書六行初月一日羲之白忽然新故之際致歎良深君亦同懐近信過得告故云腹痛懸情災雨以復何似氣力能勝不謀為爾耳力不次王羲之右唐人摹王右軍初月帖真蹟一卷筆勢婉遒具有法則獨紙素不與他帖類似唐末者有小璽在巻端先君以淳熙庚子嵗中秋併遣信帖得之趙千里贊曰唐摹之傳取竒古髣髴硬黄疑此楮我從眼力别瑶珷安得庸奴字如許右軍遣信帖行書三行頃日親親徑過諸婚經卹體察力不復堪之故未復遣信耳懐充右唐人摹王右軍遣信帖真蹟一卷得之與初月帖同時有前朝印字體古而逸非苟作者贊曰筆健而竒而紙素猶近時彼摹者吾不能知其為誰忘筌與蹄庶幾得之右軍留女帖草書兩叚六行吾去日欲留女過吾去自當送之想可垂許一出未知還期是以昨即得丹陽水丘書與足下書同官不送往還李常公擇盥手觀此帖元章知之當為出數本矣楷書四行元章字平起丁夘仲秋六日觀于從道甥家草書兩行中散大夫會稽縣開國子鍾離景伯公序觀草書兩行人言觀元章書必數步立不得近他日殆不然故敢書于此子發行書三行右唐摹王右軍留女帖真蹟一卷予在建康初訪帖于故室檜之孫有某者不肖游娼肆蕩無一簮幾不能自存初以此求售于所託上有紹興一璽前後有古半印八中縫有古墨印一皆不可辨紙甚類唐硬黄而尤竒末著本朝李公擇鍾離等四跋葢賜書明甚予以二十萬錢得之某大喜于是帖陸續來矣帖字四十八古雅不可名狀帖之標曰右軍真蹟予審定為唐摹葢以三事與故藏晉帖紙既不類而與唐行業讚昭陵冊文皆一種硬黄一也寶晉洗手帖曰毎得一書背訖入奩印以米姓袐玩書印閲書之法洗二案相比某濯手親取展以示客客拱而慿空案從容細閲某趨步于其前客云展某展客云卷某卷惟命客據案甚尊某執事甚卑捨佚執卑者止欲不以手衣振拂之爾葢寳晉病潔故其言如此今詳跋語有盥手而觀元章知之當為出數本又有人言觀元章書必數步立不得近他日殆不然是皆戲寳晉語而跋巻末有半印存米姓二字較之家藏帖印又非袐玩印乃清玩印也正是帖下文所謂以待不可告語之客者使其為真則在玩袐乆矣是以為唐摹無疑二也帖字並大令十二月帖中令永嘉帖竒崛則無差别而神觀有異三也予雖定著如此而付受有緒合作自然審而信之猶當以竢博雅之君子贊曰或真或摹斯焉取諸是出于偃月之儲垂胄同仇于門之魚予將比乎邾右軍河南帖草書八行適重熙書如此果爾乃甚可憂張平不立勢向河南者不知諸侯何以當之熙表故未出不説説荀候疾患想當轉佳耳若熙自勉此一役當可言淺見實不見今時兵任可處理右唐人摹右軍河南帖真蹟一卷有小璽并藏書家大小全印五半印一帖在淳化閣帖中與率更何如帖同嵗月得之左畹吳氏按晉史孝宗永和七年二月趙并州刺史張平降秦十一月征西大將軍荆州刺史桓温聞石氏亂請北伐既而中止八年春中軍將軍揚州刺史殷浩又請北伐以北中郎將荀羡為都統屯壽春三月命羡鎮淮陰尋加監青州諸軍事又領兖州刺史鎮下邳右軍將軍會稽内史王羲之以書止之不聽九年十月姚襄叛浩敗績于山桑羲之又遺以書止其再舉十年正月浩免官十二年春拜温征討大都督督司兾二州諸軍事以討姚襄八月乙亥温敗襄于伊水遂入洛陽己丑修諸陵張平自秦擊襄襄與之平而罷兵羡以徐州刺史將兵救叚龕十一月龕殱于燕羡還下邳升平元年七月平自秦遣使請降拜并州刺史二年三月秦苻堅討平于銅壁降之秋八月徐兖二州刺史荀羨有疾以御史中丞郗曇為羡軍司九月燕伐平于并州平所置征西將軍諸葛驤等帥壁壘百三十八降于燕平奔平陽亦降于燕羨拔燕之茌平執㤗山太守賈堅燕將司馬悦明救㤗山羡敗而歸遂以疾篤召還命曇以北中郎將代鎮焉五年九月平竟滅于秦詳事顛末此帖當在升平二年之秋重熙葢曇之字當是以書往來及時事者贊曰予觀斯帖而得右軍之為人矣識以先物仁以及民忠以謀國哲以保身有是四者殆非一世翰墨之士所可擬其倫也知晉之禍在乎本根外寧内憂茹蘩吐珍其識之不羣固足以逹愛本之仁矣而一誠區區惜荀憫殷止北伐之書陳會稽之牋又孰知其既明之哲託于餘忠之未伸者耶鄢陵之師車馳卒奔念克敵之何裨徒隱憂于范文如昔日之偃書幾何其不為今日之温摹帖之傳世固共知字畫之可珍而未識其心之爱君也然予博攷史牒詳稽所因葢自愍懐抱痛于終天而王業偏安于江濆敵愾之勇復讎之義已不復談于搢紳則姚襄之已歸而終叛張平之既晉而復秦此皆後來必致之理安得不慨想乎擊檝之逖抜劎之琨而徒欲保所有以終身如是則右軍之書雖不免拳拳于後慮而右軍之心實未暇厯厯以前陳至于守江棄淮以憂為欣是欲保堂奥之安而乃捐其所由入之門予尤未之敢聞也右軍復尅二書帖草書四行適書至也故足下明還行復尅面王羲之白見𢎞逺二書皆以逺也動散即佳為慰右唐人摹王右軍復尅二書帖真蹟一卷帖故家藏上著四印惟貞觀兩字聫属與寳晉所述異意後人託為者贊曰書摹于唐故不當印以貞觀然而涸筆天成書名雲爛殆不止于真之亂彼無别者徒欲侈其真而汩以贗石汰玉出涇分渭判尚攷予贊右軍尚書帖草書四行尚書六日書示秀才孔君借戰國䇿可付之右唐人摹王右軍尚書帖絹本真蹟一卷按元作右軍手墨予按寳晉書史嘗于唐坰處易得此帖云得于僧清道亦有貞觀印仍帶元截紙痕一條今此乃縑素雖裂不可觸大率非晉物又無貞觀遺蹟故定著為唐摹首尾宣和御府凡六印又内府圖書璽一寳慶乙酉正月予遣問自大名歸與真廟宸章同至葢皆汴都故藏也贊曰宣和御府皆法書珍藏直及鍾王初徒綠絹素少晉儲著定聊復稱唐摹氣全神王㫁裂餘更有數體同官奴百年風塵閲穹廬囘首六閣懐東都右軍安問帖草書四行未得安問𤣥度至可憂慮得其言云小差然疾自恐難耳右唐人摹王右軍安問帖真蹟一卷與得示帖同得縫尾著御府四印中有蕭字印首尾六半印惟芾印兩字可辨葢寳晉故物也贊曰唐人善書者晨夕臨鵝池生平安問帖千古乃見之蕭齋今為誰米姓猶可窺摹筆得活法一卷當得師右軍轉勝帖草書八行見冠軍書轉勝腳中故惡猶憂此㛐懸心騰恬忽失交雖小小殊復不如不想尋制之聞見嵩髙比使人增懐不知卒當有遊理不思惟子願欲種之右唐人㒇王羲之書轉勝帖臣米友仁鑒定恭跋右唐人摹王右軍轉勝帖真蹟一卷有紹興小璽并米友仁鑒定帖書以冷金紙方未褾時䇿䇿如銀葉聲薄類蝉翼竒甚慶元己未嵗六月得之潭州士人張椿老家其人舊以貢士教授武岡新學法當用年勞得官携帖入都欲薦之時貴以求所欲不得意發病去痛且恚悉以帖售人厥價不及什二三此其一也椿老多游名貴人門故藏帖為多攷淳化袐閣帖中有大令書亦有冠軍轉勝等語與此帖不同贊曰唐人摹帖多自喜千古換鵝誰趾美順塗鹿夢豈真寐畫餅兒癡出饞水詎憐成安獲張耳泜上鼔旂那可致銅丸碧衣誰證爾重説偈言煩小米右軍得示帖草書三行比得示為慰云小人多患念勞心遲見足下未結果為力不次王羲之右唐人摹王右軍得示帖真蹟一卷首尾著三璽珍賞一印字淳而雅頗逼西晉武帝體有章草之遺于淳化閣帖中葢自是一種風度非右軍他帖比也帖舊在周益公家予愛其古嘉定甲戌十一月以易元吉獐猿二徐熙折枝一從太府丞綸併安問帖易得之贊曰淳古有真味不特見于結字兹帖之名得示縱摹倣于唐世隱然猶有西晉之遺意彼昌黎者或肆譏議謂以俗書趁姿媚予未敢以為是右軍東方朔贊帖小楷序二十二行讚十一行尾記一行大夫諱朔字㬅倩平原厭次人也魏建安中分厭次以為樂陵郡故又為郡人焉先生事漢武帝漢書具載其事先生瓌瑋博逹思周變通以為濁世不可以富樂也故薄游以取位苟出不可以直道也故􅀈抗以傲世傲世不可以垂訓故正諫以明節明節不可以乆安也故談諧以取容潔其道而穢其跡清其質而濁其文弛張而不為邪進退而不離羣若乃逺心曠度贍智宏材倜儻博物觸類多能合變以明算幽讃以知來自三墳五典八索九丘陰陽圖繪之學百家衆流之論周給敏捷之辨枝離覆逆之數經脉藥石之藝射御書計之術乃研精而䆒其理不習而盡其巧經目而諷于口過耳而闇于心夫其明濟開豁苞含𢎞大凌轢卿相謿唅豪傑戲萬乗若寮友視儔列如草芥雄節邁倫髙氣葢世可謂拔乎其萃遊方之外者也談者又以先生嘘吸沖和吐故納新蝉蜕龍變棄世登仙神友造化靈為星辰此又竒怪怳惚不可備論者也大人來守此國僕自京都言歸定省覩先生之縣邑想先生之髙風徘徊路寢見先生之遺像逍遥城郭都先生之祠宇慨然有懐乃作頌曰矯矯先生肥遁居貞退弗終否進亦避榮臨世濯足稀古振纓湼而無滓既濁能清無滓伊何髙明尅柔能清伊何視汙若浮樂在必行處儉罔憂跨世凌時逺蹈獨遊瞻望往代爰想遐蹤邈邈先生其道猶龍染跡朝隱和而不同棲遲下位聊以從容我來自東言適兹邑敬問墟墳企佇原隰虚墓徒存精靈永戢民思其軌祠宇斯立徘徊寺寢遺像在圖周游祠宇庭序荒蕪榱棟傾落草萊弗除肅肅先生豈焉是居居而弗刑遊遊我情昔在有徳罔不遺靈天秩有禮神鑒孔明彷彿風塵用垂頌聲永和十二年五月十三日書與王敬仁右唐人摹王右軍書晉夏侯湛所作漢大中大夫東方朔畫像賛真蹟一卷首尾紹興印四御府半印一按是帖在淳化秘閣與樂毅論並為真書之祖雲烟流形水月移質摹寫之合作以神合妙信乎唐人之為精也予在建康訪郿塢遺物以嘉定辛巳九月奉詔移節京口治行冗甚而售者持以至云其家之在外邑者一昔入郛留質某氏以去亟以善賈購得之葢亦内府之自出云贊曰昔唐貞觀中河南公褚遂良著定右軍真行書六十三卷真書獨存五卷而是帖居第三開元中會稽公徐浩収綴二王真蹟一百五十有八卷真書亦共存五卷而是帖居第二葢永和之所書而王修之是卑今觀兹摹具有遺製葢李嗣真所謂如巖廊簮裾之肅陰陽寒暑之備鏗鏘金石之在耳氤氲蘭麝之觸鼻縹緲仙跡昭章聖祕然河南則標以為真會稽則疑以為偽二君皆升堂而入室夫豈黨同而伐異況後六百載而予惟即其摹以觀其似而何以别其非是惟梁袁昂評古今字嘗有言曰王右軍書如王謝子弟縱復不端正者軒軒有一種風氣予謂摹本已能如此真存豈不可貴況夫山陰之鵝已訛于道徳瓦官之鴟復亡于告誓周公之征已泯晉侯之跡誰侈三一莫䆒于行法尚想熟知于黄綺或訪琅琊之新廟或答尚書之宣示或臨川丙舍之頓首或相省叔夷之死罪凡此已弗復見而又于此肆其議是殆類乎知江漢秋陽之不可尚斥有若而反其位者也孫過庭摹洛神賦帖二十八行處揚輕袿之猗靡翳修袖以延佇至悵盤桓而不能去慕痛貫案慕痛貫三字上下文無所屬跋語及之今仍原本右唐右衛胄曹參軍孫過庭字䖍禮摹王獻之洛神賦真蹟一卷嘉定戊辰嵗十月九江郡守韓君松以客燕于庾樓酒酣出古帖名畫數種分遺座間俾各賦詩予詩先成得先釂先擇遂取此帖坐者皆愠初出帖時標為孫過庭草書不指為摹晉帖縫亦有御府四印客或疑其不可攷予答之曰大令冩此賦刻在淳熙袐閣續帖第二卷中今字跡甚相類又見寳晉書史言過庭書甚有右軍法但字落腳近前而直今所存書譜是也因為證其是坐者憮然韓君啓笈亟取袐閣續帖及御府書譜石刻字字較視厯厯可見乃相與歎服帖竟以歸我袐閣本末無慕痛貫三字印識位置亦微不同葢祕閣本為真為摹皆不可知而此本則孫摹甚明慕痛貫三字乃是因紙尾戲摹淳化帖中右軍他帖以驗其筆力而非本文也卷首尾及縫有長白山居印三振武軍節度使印二書印一周咸印三荆湖南路轉運使印一河東諸州轉運使印一古半印一紹定戊子六月予在京口陵口酒正李君衎見過因閲帖自言其家藏本朝司勲員外郎知國子監書學周越書上著長白印葢周故物予謝未攷然振武節度本朝以幽冀陷乆不除官尚為唐物無疑贊曰大令好書洛神賦後人猶襲邯鄲步夫君草聖洞千古筆下縱横敏風雨凌波杳杳去無所半幅尚能迨媚嫵幾年唐印閲振武誰其别之視書譜洪元眘行業讚集王右軍書帖行書七十二行大唐會稽郡餘姚縣化囗寺主真法師行業讚并序朝議郎行餘姚縣令上柱國太原王璲撰文菩薩戒弟子洪元眘集晉右軍將軍王羲之書并鎸夫璞以假器必藉工能正敎闡揚亦資明哲承真如之奥典啓不二之法門其誰曰然不逺千里法師東陽金華人也俗姓王氏其先太原苗裔昔永嘉南遷因官而處焉總角辭家童䝉入道發大精進堅持戒地一門之中數人緇服簡而無傲咸悉慈心傳曰積善之家必有餘慶經云難行能行難忍能忍削跡名利而歸于佛難矣哉閭閻依投親戚仰止覩其顔則知三善入其門乃聞三異允諧衆望精確道宗彌縫聚落能無法忍之心空閑林中了入寂然之意法師學習師古義承先聖八部經理宛在掌中三乗法源盡于度内曉了中事恒無貢髙猶如琉璃内外明徹是謂山岳之秀河海之英國之橋梁人之師範善療衆病為大醫王應病與藥令得奉行乃我法師之器量𢎞博𦍑難得而涯也粤六載我皇帝加號爰有制度于時太守秦公長史狄公知其行髙遂以名薦主此寺焉二公常相謂曰法師通深妙法𤣥無上義聞一得三言發響應昔利涉辯博僧會智周與之齊驅未可同日退食之暇匪夕即朝私奉禮敬以為法主晏居無何事有成應舉一隅則三隅可視豈小子造次而談矣葺搆廊宇繕修佛像墾爾田疇蓄爾倉廪人有善欲天必從之䖍奉夙心雅志斯在弟子忝預同盟宗祊有叙慕仰節操欽藉堅持限以孤陋寡聞曷能宣揚盛事不録戒行何以覈諸不記精修何以示衆小子狂簡裴然成章述徳書能以傳不朽凡我同好寧孤讃之時天寳八載孟春正月童䝉入道總角辭家清理歸正忍辱降邪結習已盡不染天花心如法水瑩澈金砂其一形貎端嚴風神體正卓爾孤標堅持佛性如竹之滋如松之盛晏居寂然智慧清淨其二法門之主天人之師能息三毒更慎四知磨而不磷湼而不緇闡我正教非師而誰其三法本不生今亦無有賢哉真公戒業堅乆宣揚寳偈義傳金口記其行能永為不朽其六天寶十五載嵗次景申六月癸未朔十七日乙亥建右洪元眘集右軍書真法師行業讃真蹟臣米友仁鑒定恭跋右唐洪元眘集晉王右軍書真法師行業讃真蹟一卷唐人好集王書如元和張府君碑其證也按寶晉書史越州寺碑真蹟在僧正子文處嘗通書許借未果託提刑喬執中擕告質看亦不肯出葢即此書也其在全盛時寶毖已如此海岳于是有遺恨焉書入御府首尾著六印有米芾之子友仁審定緗素儼列發古薌之餘芬劫火洞冥幸遺蹤之未泯嘉定戊辰嵗二月得之官鬻贊曰天津織女瓊為梭的皪八體輝明河雲章玉字炯不磨一洗秦籕麾周科人世翦割同綺羅百衲尚可睨伐柯告身莫易蚓換鵝淛江轟豗老伏波龍象駭慄嚴撝訶玉函金鑰神卑珂一洗海岳遺恨多千巖唐晉春嵯峨萬嵗通天帖晉右軍將軍羲之書前一帖行書六行内姨母字平起後一帖草書八行十一月十三日羲之頓首頓首頃遘姨母哀哀痛摧剥情不自勝奈何奈何因反慘塞不次王羲之頓首頓首初月十二日山陰羲之報近欲遣此書囗行無人不辦遣信昨至此且得十一月十六日書雖逺為慰過囗卿佳不吾諸患殊劣劣方陟道憂悴力不具羲之報晉黄門郎徽之書行書八行二日告囗氏女新月哀摧不自勝奈何奈何念痛慕不可任得疏知汝故異惡懸心雨濕熱復何似食不吾牽勞並頓勿復數日逺汝比自䕶力不具徽之等書晉中書令憲侯獻之書行書三行第一行省僧權字半體廿九日獻之白昨遂不奉别悵恨深體中復何如弟甚頓匆匆不具獻之再拜齊司空簡穆公僧䖍書楷書四行元題不存以秘閣續帖本增入太子舍人王琰牒在職三載家貧仰希江郢所統小郡謹牒七月廿四日臣王僧䖍啓齊侍中懿子慈書草書前二帖各六行後一帖十六行卿柏酒䓁六種足下出此已乆忽致厚費深勞念至王慈具答唐懐充范武騎汝比可也定以何日逹東想大小並可行遲陳賜還知汝囗囗吾常耳即具翁尊體安和伏慰侍省小兒並健適遣信囗囗囗囗自當令卿知吾言之不虚也郭桂陽已至將甲甚精惟王臨慶軍馬小不稱耳以病告皆差耶秋冬不復憂病也遲更具問七月廿七日右唐人摹王方慶萬嵗通天進帖真蹟一卷金輪御朝始製十三字今帖嵗月皆用其體唐紙精古此又獨最他帖按唐史則天后嘗訪右軍筆跡于方慶家方慶進者十卷凡二十有八人惟羲獻見于此帖所謂十一代祖導十代祖洽九代祖珣八代祖曇首七代祖僧綽六代祖仲寳五代祖騫髙祖規曾祖襃皆軼焉是時則天御武成殿示羣臣仍令中書舍人崔融為寶章集以叙其事復賜方慶竇􅡄述書賦乃謂當復賜時后命盡榻本留内更加珍飾錦背歸還王氏人到于今稱之故􅡄有順天矜而永保先業從人欲而不顧兼金之句有建隆新史館印葢即當時摹取留内之本而卑之館中者建中靖國刻歸秘閣續帖有小璽并潁川印而三態備衆妙摹逼天真亦非他帖可擬淳熙己亥嵗先君在郎省以一端石四畫軸易之韓莊敏家贊曰洛石赤心以出寶圖燕涎鷄晨即瑞製書有奕王門南土華腴獻其家琛陳于玉除筆法之神匪臨伊摹史館之儲尚其不誣寶真齋法書贊卷七
