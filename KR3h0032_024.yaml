body:
  text: 寶真齊法書贊卷二十四宋嶽珂撰宋名人真蹟張忠獻時義誠力二帖並楷書第一帖十二行第二帖十三行浚再拜啓二十年之别如一彈指間每思慷慨正論未嘗不抵掌興歎也載惟心法所格自結上知擢之逺外恃為耳目而士議謂公展盡忠嘉無負于上聞之悚慰夫遇合有時進退有義君子何患哉蓋其在我以勉求諸天而已何時執手罄所懷馳仰馳仰浚再拜啓上浚再拜啓浚誠力俱不足自罹大戾憂患困苦何可勝陳中間薦辱教貺感公高義慙悚積心獨不敢輒布謝問無他恐讒間之或行也公道不振習俗以成沐知有素豈責此耶聖主如天方付公以屏之也重恩禮有隆想惟盡力報稱一路受惠至幸至幸浚再啓上右兩朝相國維師魏國忠獻公淩字德逺于時義誠力二帖真蹟一卷自諸葛忠武侯以綱常扶大漢尊漢一心百戰不屈後二千載而公生義通神明氣貫日月萬死無二炯然此心實酷似之夫隨世就功名于事變搶攘中代不乏人而心之所存顯著于當世幽質于鬼神歿信于千古與道始終正大明白自隆中而下未有若公者也家世笈中多公字蹟中更秦禍遺落殆盡珂舊從公之孫匠監忠恕游因願見公遺墨寶慶乙酉正月匠監以書來致二帖云得之故諫議大夫任古家贊曰至誠動天中貫三極堂堂南陽繼以魏國山嶽鼎震江河釡溢羣生失寧乃見人傑大義既信人紀復植于晦冥中揭以日月操固漢賊敵禍宋祐萬假之磔吾恥未滌不共戴履矧肯屈膝祁山屢郤淮隴迭出非不拙沮之死靡易我觀史冊一公與匹功雖不同心則如一隆興至今耳目尚及遺墨之寶已若尺璧造次皆忠言猶未泐天維可絶地軸可折公心之磨此理則熄兩朝開濟萬古闔闢繫此詩之以嫓廟柏李莊簡三字帖行書九行光悚息朝請郎吳師直作吏能盡公亷勤三字通知財榖兵刑之要蓋實才也僕初昧平生頃在宛陵知之相隨纍年建康以參議通判兩辟之命未下而僕以罪去今待逺闕欲得一攝職以活幼望公稍以而吏事試之有不如所舉僕為妄人矣光再拜右紹興參政李莊簡公光字泰發三字帖真蹟一卷秦禍烈矣元臣巨公耆德碩彥俱罹正論之酷公家復再世以私史嬰重劾原姧臣之釁是不惟煽其虐于一時而實欲毁其傳于萬世雖然無益也節槩如漢李膺忠言如唐陸贄直道全德如九正韓呂劉范諸大老豈以一節之貶及史事故少詘哉珂家世同患難者也嘉定己卯與公孫知季同寅江左漕臺嘗刻公遺事于官寺敬仰高風每切歎息後四載寶慶乙酉之六月始得之帖于京口贊之以見尊鄉之心焉贊曰秦禍滔天鯨洶九淵淪胥以顚而我謂不然如公之賢泰山巋然奔流百川何傷乎一卷野史所編人心之傳匪石則遷誰為之燎原兩家之先義比仲連覽此卷焉不知其涕漣王敏節歡喜帖行書二十四行庶頓首上啓伯壽制置修撰友弟别久攀仰有不勝言者私門多故去年喪妻今復逺謫何以為懷聞命離九江逺途酷暑臟腑暴下所至留滯幾至危惙者數矣八十餘日方到貶所形體支離惟餘皮骨良所苦也平生不以官職為意從來禠職罹官多矣未若此番狼狽也蓋緣取名之多反有此厄奈何又所至為人睥睨當與之歡喜領略兒子輩且令居德安緩急當就長沙奉依也或見德逺且與調護之然别無觀望人情當然故也此間如坐井中又五馬專尋下石以自求用所謂臧氏之子也我之進退莫不有命此等何足較哉八郎且令為學其才雖不甚勇鋭然忠實有守不害為賢者爾更望提耳訓誨之庶于此生進退一委之命餘希自愛為祝不宣庶再拜右紹興樞密副使王敏節公庶字子尚歡喜帖真蹟一卷世之流坎何者非天公以高名徑氣事明主志節嶄然如百錬鋼劫火不毁乃猶未能忘情于是亦足見當時搢紳之禍睚眦陰賊尚有烈于偃月者按公以紹興壬戌六月壬申責嚮德軍節度副使居道州八月庚午薨于貶所計自謫命至薨才六十日帖中八十字殆出筆誤所謂護者蓋公興張忠公獻在陜服有違言而有此疑五馬下石又出于初至即墮逆境出門有礙不能堪處以迄于死耳放之歲月公至道曾無幾時薨後五十七日郡倅孫行儉猶以為公備行館之故謫廣南監當意出必于郡守之訐而檜之用心案此下原缺八字也執卷流涕彼何人斯公之口史以寶度乙酉四月自江鄉來是帖以示因丐得之贊曰秦火燎原衣冠塗炭繞指之柔出乎百煆如公之剛猶死憂患時歟命歟一覽三歎翟忠惠秋杪帖行書十行汝文叩首再啓秋杪台候不審安否何如伏惟具宜興寢方欲上狀候行辱損教重愧不腆顧纍然在疚無緣修敬跂望使乎良自喟歎右紹興參政資政學士翟忠惠公汝文字公巽秋杪帖真蹟一卷迹奇行直學博用專在近世名臣惟公兼之以庶古人揚子雲心畫之論斷可識矣嘉泰壬戌十二月得之毗陵贊曰態跌宕而奇偉姿高明而通詭此書得于其里兹可想其人矣折樞密子友帖行書六行子友兄弟及王應仲日夕相聚每誦詠侍講詩文恨不自日親教誨也子友貧甚宮祠之奉不足糊口旦夕例須罷㩲局愈窘急矣未知門下有以振之否湖外委輪乞示及彥質再拜右紹興樞密端明學士折公彥質字仲古子友帖真蹟一卷豫始齔時侍先君漕挽湘南及識公之子知常帖得之是時蓋淳熙戊申歲贊曰陜服之俗重于義公家府谷殆且百世豫不能知子友之兄弟為謀而如已交情之不替亦足以見前修之志孫參政知命帖行書九行近到毗陵見一知命者獨謂參政十月安穩無他與諸人所說稍異今節氣已過大雪其獨驗而亦頗言自此坦履富貴功名之地非輩流所可及謾欲一聞近拜覆右紹興參知政事孫公近字叔詣知命帖真蹟一卷毗陵有士有携近世名卿帖甚多寶慶之元二月過豫京口豫閲笈中所無者得此贊曰古稱君相不言命執國大政而猶拳拳于富貴功名之兢其雖言獨應豫猶以為病何恭敏料理帖行書五行台眷上下伏惟均慶比來生事當不至不足閒居自不妨料理也久别極思一見而未繇諒亦自有此耳鑄再拜右紹興資政殿學士樞密何恭敏公鑄字伯壽料理帖真蹟一卷豫家被秦禍公獨首明其冤其特立之操可想矣嘉定庚辰三月始得公帖于餘杭贊曰虐焰熏天而公以勺水欲救其燎原觀公之帖雖久别之一見亦將以歸之時數之自然胸中所處者素定宜其敢于攖豺虺之鋒而吐天下之公言也張章簡康寧帖行書六行尾帖六行綱上問尊丈承事伏惟壽體康勝眷集君休江右有需委毋惜垂論綱上問去秋解維適丈丈小違和别來以僻尤杳不聞耗春中劉參議從者能言之云已康寧矣良以為善偶頭風不果親作書萬萬情察綱拜右紹興參政資政學士張章簡公綱字彥正康寧帖真蹟一卷書乃靖炎間問幅不知所與者為何人帖前乃史楷惟末批字帖為手蹟開禧乙丑四月豫仕餉庾得此帖于金壇一士友家其上題為李忠定丞相書是時尚未識忠定字體信而藏之後得山谷覺民帖跋語字法書名與此無異復得忠定帖位置俊逸又不同而後知為公之筆士友家于與公同鄉枌蓋其上世所傳久而萬知其倪者也帖中有江右字公平生宦游不涉其境豈靖炎間避地所遇抑持江東憲節時所作書誤謂鄱江為江右耶贊曰豫官京口前後十年接公之枌榆兮讀耆舊傳慨想其人莫覿其居兮維帖之得題標失真蹟以迷其初兮覺民跋證莫近斯于以識公書兮趙德麟召還詩帖行書九行被責三十年蒙恩召還在方行駐蹕錢塘書呈子常待郎一首三十餘年一夢同向來朝士盡沈空如今白首趨行闕不是當年長樂鐘右紹興開府儀同三司安定郡王趙公令畤字德麟召還帖詩真蹟一卷豫始識公書多跋語附他卷後紹定戊子三月始得此于京口詞簡義正譪然有承平王孫感慨宗國之意云贊曰昔東晉王茂𢎞諸人登新亭望長淮自謂風景不殊舉目有山河之異至今想之猶鬱乎其有餘哀矧預瑤牒登玉階而寄宗國之懷者耶王業偏安于海瀕故都久棄于蒿萊主議者方貪天之功而肆其雄猜朝士沉空不復向來率兆乎滔天之讒而迄乎和議之開此有志者所以歎于嗟之麟而思當道之豺也嗚呼鐘􅙇百年邊塵尚霾悠悠蒼天彼何人哉周少隱留春詞帖行書六行春似酒杯濃醉得海棠無力誰染玉肌豐臉做淺紅顔色送春風雨最無情吹殘也堪者何似且留花住喚小鬟催拍右紹興左司郎中竹坡居士周公紫芝字少隱留春詞帖真蹟一卷豫少從公之孫貢士去病游因藏此帖時慶元乙卯歲嘻今三十有四年矣贊曰絃管之流聲景物之感情激徵含商書華發英固所以合融怡于自然而惜流轉之不停亦猶夫見穿花之蛺蝶賦㸃水之蜻蜓思盡醉于風光而典春衣于杜陵也張忠文奉告晴快二帖並行書第一帖九行第二帖六行九成頓首上啓奉告竊審還自山中尊履萬福慰喜無量新詩見屬凄婉清壯足為巾篋之光來日如清賞邂逅于梅山矣豫以為喜不宣九成頓首上啓長丈刪定學士賢友九成頓首上啓晴快竊審尊履萬福新詩寵和用事切當運意巧妙極慰鄙懷也靣謝不宣九成頓首上啓長文刪定學士賢友右紹興禮部侍郎侍講敷文閣待制無垢先生張文忠公九成字子韶奉告晴快二帖真蹟一卷先生道德風誼文章氣節卓為南渡冠冕接中朝諸老之派開終學典型之宗富貴不淫流落無悔正誼自信全名爛然炎興而來一人而已九江有故幹辨軍頭司劉君必逹于先生之孫厚為姻家藏遺墨數帖實心如拱璧弗可得也珂十二三時嘗見而識其體寶慶乙酉六月在京口與西淮副帥司幹官潘君忠恕夜避暑萬歲樓下出首帖以示驚歎初見恰三十年矣尊慕所存遇必有合夫豈苟得乎哉是時上初嗣位首詔贈先生龍圖學士仍賜諡後兩月先王亦叨易名忠武之命先生繼加贈太師啓國于崇諡曰文忠蓋皆初政第一義云次帖紹熙戊子得之蘇臺故家贊曰上嗣服之初載首以忠之一字褒顯邦之臣二人亦既表百年之宗儒遂復開千社之舊勳嗚呼英衛善用兵房杜濟以文惜先生之位弗克䆒故先世之志亦終莫之伸也遺帖之存手墨如新我藏孔宜對于褒綸米元暉書簡帖七帖並行書第一帖十六行第二帖第五帖各十二行第三帖十四行第四帖九行第六帖七行第七帖三行尾批八行友仁惶恐再拜昨晚幸承教不勝欣慰奉手字審晴和台體沖勝可量感喜所喻何其蔽也不足觀不足觀緣此一事大見撓緣數人爭欲取之今渠云且已與誰則是要俟此老不在後拈出必可了身計當亦不逺矣和篇奇甚奇甚公主志刻令人尋得納上論字語謾上呈因以示仲季諸豪未及瓜間定納所示豈敢食言文字切與垂念如是則必可受厚德矣不宣友仁惶恐再拜長文提宮學士尊親汝宜省脫著衣嘗切須謹慎第一不得失飢常早歸喫飯千萬千萬吾老業離家生受生受就請受養家成甚情況汝輩安坐豈知吾辛辛勤勤今付安人藥便令圓好好收藏并附子四箇是入汝喫藥中少此四箇附子未搗末者半科切記不要差誤餘切將息將息安人十四娘新婦與兒同此押付韓師姑夫買柴時同買下米賤時亦買下月用錢續寄去友仁頓首再拜師德府判少尹兄使座春晚氣暄即日伏惟還家安居百況無不自適友仁衰蹇如此乃者曲荷奬授大賜使百指又復粗飽知德之心未易論報稍兹隔闊可勝馳情友仁勢須俟從舊迎新一假事了乃謀去就咫尺未卜良晤伏紙不勝悁仰餘憔萬為逺業珍重不宣友仁頓首再拜師德府判少尹兄使座三月二十九日友仁頓首凝寒伏惟起居佳勝朋尊奉納以祝新歲耆夀微愧微愧前者人即送去云鄭待郎昨日又送一名俟契勘先後也知之乏人奉報不罪不罪不宣友仁頓首上幹辦秉義鄉舊友仁頓首去冬隨羣出關遑遽狼狽不可言既到新昌偶大水浸田食既不足斗米忽千錢不得已東來府主憐之使竊食于此然與臨安所得之半而已欲徑復至舊巢大暑不能動中元後定成行遑遑奔走亦可太息不謂晚境蕩掃田廬乃有平原食粥之憂生平習懶之方且低昂于世其苦不可言友仁頓首令人以次寶眷伏惟一一均慶仲謀季寬承務諸仲季幾人赴官附此道意友仁五口在此六口在新昌成甚家計友仁拜問慶門仙聚各計均納多祥而曹荷問及此有可委千萬示諭也友仁拜問此紙極有古意而不合砑俗惡山水遂用紙背蒙寄糟薑深荷厚意人還遽不能致土毛徽墨絶品五圭謾以為報不罪不罪涉夏入秋老稚多不快今日偶請假乃郎得作此陪醫無況無況右紹興敷文閣直學士米公友仁字元暉書簡帖七幅真蹟一卷惟寶晉以博雅名家公漸摩異聞傅畀心法故書跡類有寶晉法度如渥窪生駒脫􅎗教駣顧景奔塵相與後先不翅一日千里至于歷瑶池望崑崙逐電籋雲流沙青海飄忽一瞬則亦瞪若乎其後矣喜定庚午歲八月豫在故府有客袖斯書以示因相與論公家傳之學大槩如此客然豫言舉以遺豫因得繫寶晉之次公之能不特賞鑒與字體其畫蹟文章皆高聣一世宣和間寶晉嘗上公所作楚山清曉圖毖之天府山谷為作字授以古篆印且贈詩曰虎兒筆力能扛鼎教字元暉繼阿章時謂不誣公字聯元本以睎王門父子尚寶晉之意贊曰父子而善書自獻而始也寥寥千載固已莫之擬也至于我朝有楚國之芉也不隕其名雖未濟厥美也其讀父書亦非括之比也瞪乎望洋混混猶此水也此帖之觀尚可見其體也米元暉韓退之五針帖行書五十七行尾記二行又自跋二十三行徐兢題草書十二行韓退之五針并序人患不知其遇既知不能改無勇也豫生四十有八年髮之短者日益白齒之搖者日益脫聰明不及于前時道德日務于初心其不至于君子而卒為小人也昭昭矣作五針以訟其惡云游針余少之時將求多能蚤夜以孜孜余今之時既飽而嬉早夜以無為嗚呼豫乎君子之業而小人之歸乎言針不知言之人烏可與言知言之人默焉而其意已傳幕中之辨人反以為叛臺中之評人反以為傾汝之懲耶而呶呶以害其生耶行針行與義乖言與法違後雖無害汝可以悔行也無邪言也無頗死而不死汝悔而何宜悔而休汝惡曷瘳宜休而悔汝善安在悔不可追悔不可為思而斯得汝則弗思好惡針無善而好不觀其道無悖而惡不詳其故前之所好今見其尤從也為比舍也為讎前之所惡今見其臧從也為愧舍也為狂維讎維比維狂維愧于身不祥于德不義不祥不義惟惡之大幾如是為而不顚沛齒之尚少庸有不思今其老矣不慎胡為知名針內不足者急于人知霈焉有餘厥聞四馳今日告汝知名之法忽病無聞病其昱昱昔者子路惟恐有聞赫然千載德譽愈尊矜汝文章負汝言語秉人不能掩以自取汝非其父汝非其師不請而教誰云不欺欺以賈憎掩以媒怨汝曾不悟以及于難小人在辱亦克知晦及其既寧終莫能戒既出汝心又銘汝前汝知不顧禍則宜然紹興乙丑中冬元暉為汝文書僕宜和之末與道山二國自同修于寶堂兼掌書學二年餘是時日得親筆硯如蘭亭修禊序為諸生迫使臨寫百餘本至今有出以示者稍亦可觀爾後遑遑奔走營哺之不暇豈復與管城氏周旋獨書簡不得已而事之所作字多不足觀交游見迫寫成往往自擲去汝文以此索字偶鄰右大爇之後冗長箱篋悉寄北關空闕竹圃中諸毫不應手作字又紙乾澀不能運墨如人意愧無足觀也友仁上見詢廣中幹至荷已屢說英石如有真山之狀可以作筆格者并檳榔軸作土毛不厭其呵呵宣和壬寅歲復置書學今元暉侍郎唐稽禮部暨愚三人同應選迄今二十有六年矣唐稽沒于京師丙午之難元暉今持從槖獨愚退處江湖築室龜峯弋水之上霞飱雲臥持自是一種樂云今觀元暉法書得元章妙處詩所謂是以似之者歟紹興丁卯夏五月晦徐兢題右米元暉書唐韓昌黎五針帖真蹟一卷宣和書學博士徐兢跋于後卷有十印皆是米氏後有徐氏二印元暉一印字特古雅豈三谷所遺者耶嘉定庚午歲八月與諸帖同得之贊曰古之大儒立言以自針蓋不惟禔其身斯亦有警世之心如彼元暉困于書淫平生之于蘭亭嘗一日而百臨是自歎其用力之深矣跋之者又謂宣和三博士同時賜佩矜更二十有六年而蹤跡各異于升沈噫嚱二君其亦自念道德之不負而齒髮之侵乎抑亦不病其昱昱而惟有冀于知音乎抑蘭亭有言不在乎今之視昔而悲乎後之視今豫意二君亦猶傳盧扁而誦其神奇實未始道脈絡而知砭針也米元暉秀軒詩帖行書七行王寅仲索余書秀軒詩四句于榜之側山氣與湖光四時足殊秀我識軒中人是為益三友吾此詩大有古人之造妙處右米元暉秀軒詩帖真蹟一卷秀軒不知何在山氣湖光其為東南之勝審矣慶元戊午八月豫在洪試漕臺有特此書售于市莫或識者豫贖而歸後彚羣帖因禠而藏焉贊曰山氣之微明湖光之清浚軒中之人秀而隱豫固未之綸獨是一篇之題自是于古無所與遜知益知損豫意猶有儷乎孔門為國之哂也米元暉陽春詞帖一十八首並行書第一第二第九首各九行第三第四首各七行第五第七第十第十六第十七首各十行第六第十三第十八首各八行第八首六行第十一第十五首各十七行第十二第十四首各十一行尾記一行跂十九行標題一行臨江仙昨夜扁舟沙外艤淮山微雨初晴斷雲飛過月還明一天風露重人在玉壺清水際不知何許是遙林口辦微青醉迷歸夢强口凌誰言東去鴈解寄此時情小重山醉倚朱欄一解衣碧雲迷望眼斷虹低近來休說帶寬圍人千里還是燕雙飛深院日初遲綺總簾幕靜恨生眉不堪虛度是前時鴻來速爭解寄相思減字木蘭花柳塘微雨兩兩飛鷗來復去倚遍重欄人在碧雲山外山一春離怨日照綺窗常幾線酒病情魔兩事春來無奈何㸃絳唇浩渺湖天酒浮黃菊攜佳侶淡烟疏雨去魯方懷士傾蓋相逢引滿哦奇語山圍處兕觥頻舉不醉君無去漁家傲從古荆溪名勝地溪光萬頃琉瓈翠極望荷花三十里香噴鼻我舟日在花間艤向晚餘霞收散綺遙山抹黛天如水滿引一樽明月裏風微起蕭然真在華胥氏阮郎歸小舟載酒向平湖新凉生曉初亂山烟外有還無王維真畫圖風遂起動襟𥚑雨來荷濺珠一樽相對喜君俱醉歸紅袖扶臨江仙一曲陽關腸斷處臨風慘對離樽紅妝揭調十分斟古來多聚散正似嶺頭雲昨夜晴霄千里月向人無限多情娟娟今夜滿虛庭一帆隨浪去郤照畫船輕醉桃源蝶夢初回栩栩柳岸幾聲鶯語蘋末起微風山外一川烟雨凝顧凝顧人在玉壺深處南欹子遇酒詞先舉逢山眼暫明一川風雨縱留人不道此郎歸與欲兼程客久情深口尋觀恨不能繩牀頓睡夢縱橫賴案此下原缺和晏元獻漁家傲韻郊外春和宜散步百花之上初凝露福地神仙多外府藏奇趣幽尋歷遍溪邊路薄宦浮家無定處萍飄梗泛前人語與子未須鄉國去來同住且看羣岫烟中雨念奴嬌村居九日九秋氣爽正溪山雨過茅簷清暇籬菊姘英知是為佳節重陽開也色妙香殊勻浮甌靣俗狀卑金斚歌狂飲俊滿簪還更盈把村外草草杯盤邊塵不動欲買應無價端使晴霄風露冷雲卷烟收平野向晚嬋娟半輪斜照想見成清序玉山頽處要看欹帽如畫臨江仙寶晉軒窗臨望處山圍水繞林榮不堪回首到江城墻跌圍瓦礫鷗鷺見人驚日願太平歸舊里更無餘事關情小營芽舍倚雲汀四時風月裏還我醉騰騰阮郎歸碧溪風動滿文漪雨餘山更奇淡烟橫處柳行低鴛鴦來去飛人似玉醉如泥一枝隨鬢欹夷猶雙漿月平西幽尋歸路迷臨江仙野外不堪無勝侶笑談安得君同四時景物一壺中醉餘臨望處逺岫數重重溪上新荷初出水花房半弄微紅曉風蕭爽韻疏松娟娟明月上人在廣寒宮念奴嬌裁成淵明歸去來辭欄干倚處戲裁成彭澤當年奇語三徑荒凉懷舊里我欲扁舟歸去鳥倦知還寓形字內今已年如許小窗容膝要尋情話親侶郭外粗有西疇故園松菊日涉方成趣流水涓溳干澗上雲繞奇峯無數窈窕經丘風清月瞭時看烟中雨蕭然巾岸引觴寄傲衡宇醉春風一陽來復羣陰往吾道從今長萬事莫關情月夕風前依舊須豪放卿雲舒卷浮清嶂從古書珍賞滿引唱新詞春意看看又到梅梢上小重山雨過風來午暑清榴花紅照眼向人明一枝低映寶叉橫菖蒲酒玉碗十分斟引滿聽新聲小軒簾半卷逺山青幾人閒處見閒情醒還醉為趣妙難名訴衷情淵明詩結廬人境美陶潛車馬不來喧勝處自多真趣飛鳥日相還心既逺地仍偏見南山手持菊穎山氣長住欲辦忘言皆吾所作詞元暉紹興戊午中春初七日懶拙道人得守滁陽既老則懶遂請宮投間泛小舟來平江大姚村過謙之于莊舍乍朝來居深村灑然如濯清風于三伏畏暑中其為快有不可勝言者大恨未能增置百斛尚依微祿以哺孥稚未能便納政為閒客相從雲水間耳豈非老業家女甥索書此柔毛頑悍作不成略無可觀是月十三日押陽春集右米元暉書自作詞十八篇名陽春集二冊紹興戊午中春在姑蘇别墅為其女甥所寫老時近班歸藝松菊猶不能忘情于翰墨間斯亦足以見嗜好之篤矣寶慶丙戌二月之得中都劉氏贊曰豫家有山林集觀寶晉自製之詞每不逮乎平鼎得過庭之異聞陶冶性情自為陽春既寓意于館甥亦祕笈而自珍于嘗商略函書髣佛梁塵規矩合作勺簫奪倫竊以為夫君金縷之衣亦未足以換墨練之裙也寶真齊法書贊卷二十四
