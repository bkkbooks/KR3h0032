body:
  text: 寶真齋法書贊卷十八宋嶽珂撰宋名人真迹李伯時醉卧圖詩帖行書四行有道難行不如醉有口難言不如睡先生醉卧在石間萬古無人知此意右紹聖御史臺檢法官李公公麟字伯時醉卧圖詩帖真迹一卷圖陳于前蓋神筆也有墨戲一印極大又一印曰神品上上而下著藏書家一印焉寶慶乙酉十月得之京口贊曰猗龍眠本書仙工而妍畫亦然醉之趣醒不傳題此詩比逃禪文周翰盛暑帖行書十行尾批一行及啓前日承垂訪冗迫未遑再詣攀仰攀仰辱教欣承盛暑動止萬福以往故相府莫酹不即奉謝至悚至悚給假指揮旦夕必下來日當為督之奉納次哲人云亡同深殄瘁之歎況出陶冶均增哀疚也朝夕奉見區區靣敘不宣及再拜居易少卿兄令妹起居朝夕歸拜見也右紹聖集賢殿修撰文公及甫字周翰盛暑帖真迹一卷喬木世臣鼎鼐遺烈固已具是惜也其不稱也帖中所述蓋王文恭圭薨以元豐八載之五月時宣仁御朝避魯王諱止稱及云贊曰同文之獄諸賢非一族殄瘁之悲獨及于禹玉豈一人之言自為之反覆傷哉利祿鄒忠公同安帖行書四行尾批一行親家太夫人伏想萬福令弟以次奉侍同安浩上三妹不别啓老母致意家人同此右建中靖國吏部侍郎鄒忠公浩上字志完同安帖真迹一卷嘉定甲申豫攝維揚郡有公之孫自毗陵來訟于府擕公綸告手澤來直于有司因是得據案拭目字徑以端迹清而厲意公之心與筆法吻合是歲十月有靳君雩者攜他帖數十售于京口皆豫篋中已具獨得公一紙以備其闕贊曰公書法本于薛少保稷建中天子嘗以是御奎畫矣公于初政實濡諫墨而迄不遇合以僨于讒慝徒使孽京輩得以投時好而襲其迹是抵掌可以肖叔敖之貌而正心豈能得公權之筆此忠義之士所憤薰蕕之雜糅而繼之以憤激也曽文昭時寒帖行數原闕肇頓首再拜官使大觀文相公台坐時寒伏惟台候動止萬福久違門下向苦道里之逺無繇望見今兹相望數舍而官守拘制又未獲造前嚮往下風不忘旦暮更祈順令頤養以副人望謹奉手啓不宣肇頓首再拜宫使大觀文相公台坐右建中靖國翰林學士侍讀曽文昭公肇字子開時寒帖真迹一卷四曽名震天下然德與位稱嶢然獨全莫公若者是帖蓋當時與故相去位者相往來意其在為守時所以有官守拘制之語然公嘗歷陳穎宋升瀛徐滁泰海并揚定和嶽凡十四部壤地既莫可考亦莫知其指誰也嘉定己巳歲十二月過雙鍾得之公諸孫邑丞宋父贊曰祖孫百年兄弟一世歸乎其全抑有公議遺墨散軼得自名裔人其監兹豈必名位朱君敗乞舟榮翰寢餗三帖並行書第一帖十一行第二帖十行第三帖五行紱悚息輒再叩覆誠出迫切不覺言之喋喋也所乞一舟若候歸船使司方行差撥竊慮稽緩恐不可待奈何前月提倉查公差一舟與蘇州持服楊承議夙見艤岸下楊君尚未終三祥聞至七八月間方服闋入京紱今所乘舟到得揚澗間足矣不議暫就查公輟那一往郤即遣還可否紱于查公不甚熟無因而至又似往圖然亦計迫遽爾凂聽殊自恧也紱悚息紱叩首拜覆紱比當上狀仰瀆嚴視滅裂僭易方懼獲譴乃蒙屈賜榮翰勤款纍幅若侍誨座秪佩謙眷銘刻敢忘匆遽具書復不及悉仰惟寬度曲以情諒紱叩首拜覆紱再拜上得比日不審寢餗何如紱憂患餘生哀慕如昔日月之速旦暮即吉尚阻敘訴臨紙不勝殞咽之深紱再拜上覆右建中靖國給事中朱公紱字君貺乞舟榮翰寢餗三帖真迹一卷黨論再起公首預名籍中雖以攀鱗之舊猶不得貰也紹興之旌褒有以也哉帖亦先君舊藏不識歲月贊曰殿門之刻未毁于彗星彼朱諤者猶不願與公同名孰知夫百年之餘忠邪之聲迹反頓異于沈升植與分朋送什迭興殆不啻高岸之為谷深谷之為陵然而利不與義羣勢不與理爭帖藏豫家覽者目明所謂片牘幅楮藏之為榮亦何算乎瑣瑣者之羞為慕藺之稱也朝無咎金山詩帖行書七行倍口中叔父發運右司口口山次韻高唱口中補之再拜口身無用還山計可成煙霞異塵世江海口高情幸阮咸集恐慙疏受聲清詩逢口口未覺負平生右建中靖國太史禮部郎中朝公補之字無咎金山詩帖真迹一卷豫在潤十年紫金之遊屢矣覽唐人之遺迹以及于本朝雲濤月波豪思傑語慨然在目口口公詩什獨未前知嘉定甲申六月口口淮海歸小憩吞海而駛足適自口口所託訪求之士友以尺函至口口數帖皆凡品帷有此詩東塗西口口淳秀隱然有蘇門四君子口口語殆是自瑞錦窠出後所作竄口口皆倣佛可考云贊曰我登吞海而帖適至事雖偶然不啻有意彼江山者秀無古今邱壑市朝則二其必阿大中郎煌煌虎節金閨卷懷亦既殊轍同此登覽而趣不同雲霄並翔翬翟宴鴻矢詞胸襟浩蕩萬里比興所存二疏是企清詩勝景何地無之不縶不維景則我隨征塵障天我亦倦翼遺墨未渝微躬奚息南零之波上派于湓詩其警豫以論候門陳忠肅書簡帖七帖並行書第一第五帖各八行第二帖五行第三第四帖各四行第六帖十二行第七帖十三行內第六第七帖尾批各二行瓘啓渴聞誨益辱訪乃不獲見馳向可知春寒不審起居如何謹啓略道下意餘遲靣盡不宣瓘再拜天成祕校賢友瓘辱問甚勤豈勝慰荷看經次修答草草幸悉令嗣洎令姪朝夕榜出可賀也瓘又上前日承訪及更得簡示併以為荷令嗣貢元安勝瓘再上羊毛筆果愈于彼否欲得一管試寫經也瓘上承老濟明書自可付毗陵還僕不必託少明也樂成屈顧正彥極見勤厚不敢使迎見必察此意適已令往拜辱如見更煩道意瓘上承上晚幸見過蕭理等至得來書審侍奉進學安勝良慰逺懷方冦就擒閩中想亦寧靜十二郎要歸今遣里慶等取之兵冦之餘道路不能無梗令與老人熟議然後可動山陽去此不逺但得有水開閘便可離南康矣諸意與他書可以互見不更及閏月晦瓘啓十七妹太君八一甥知與二兄講學不輟安居罕出積念必優想見永嘉默喜得書嘉與諸甥安樂七四罷任亦是小事他前程逺大勿以此動念也知汝心懵或吐此是脾虛只服理中丸及厚朴湯之類勿服涼藥戒之戒之嫂嫂郤未成遷居相去既逺亦難為管勾彼中也八十一郎得書寫字謹楷讀書為人必長進也十九郎十二郎各謝姑姑問及汝婆安健右建中靖國右司員外郎贈右諌議大夫了齋先生陳忠肅公瓘字瑩中書簡帖七幅真迹一卷嘉定丁丑歲十月珂自大農丞假守喜興先生子孫蓋居是拜暇日頗訪求藏帖以見尊賢尚德之意而邦人知寶敬絶無遺墨流落至己卯春蒙恩召還郎舍始得數帖于市鬻家其餘則前後萃拾偶雜置書簏歲月已軼不復可追記贊曰士有直躬夷險靡易事君以堯距詖如墨筆力徑挺德聲昭植不倚不流是謂心畫陳忠肅通鑑帖十五册之一並行書今掇光武明帝二紀共九板凡二十二行繫贊餘文多不録昭陽協洽更始元年當避祭遵吾舍中兒犯法尚殺必之不私諸卿也拔邯戰斬王郎秀收郎文書得吏民與郎交關謗毁者數千章秀不省會諸將燒之曰令反側子自安馮異謙退不伐耿弇請歸上谷益兵乃二更始鄧禹薦恂守河內建武元年蜀郡公孫述即帝位號成帝蕭王即皇帝位于鄗南光武以卓茂為太傅封褒德侯臣光曰宜其光復舊物享國久長蓋由知所先務而得其本原故也班彪馬援之徒歸隗囂馮勤典諸侯封事至郎不厭服始用孝亷為尚書郎鮑永謂馮衍曰昔高祖賞季布之罪誅丁固之功今遭明主亦何憂哉衍曰有挑其鄰人之妻者長者罵而少者報之至夫天道難知人道易守守道之臣何患死亡臣事更始不能令全誠慙以其衆幸富貴故悉罷之宋𢎞責桓談琴貴易交富易妻人情乎天下未定兩虎安得私鬬今日朕分之賈復冦恂鄧禹自馮愔叛後威名稍損馮愔宗歆守栒邑爭權相攻殺歆帝問愔所親信為誰曰護軍黃防曰縛馮歆者必黃防也又乏糧食數戰不利歸附者日益離散赤眉延岑暴亂三輔郡縣大姓各擁兵衆禹不能制帝乃遣偏將軍馮異代禹討之車駕送至河南敕異曰三輔遭王莽更始之亂重以赤眉延岑之酷元元塗炭無所依訴將軍今奉辭討諸不軌營堡降者遣其渠率俾詣京師散其小民令就農桑壞其璧壘無使復聚征伐非必略地屠城要在平定安集之耳諸將非不健鬬然好虜掠卿本能御吏士念自修敕無為縣郡所苦異頓首受命引而西所至布威信羣盜皆降臣光曰昔周人頌武王之詩曰敷時繹思我徂惟求定言王者之兵志在布陳威德安民而已觀光武之所以取關中者用此道也豈不美哉又詔召鄧禹還曰慎無與窮冦爭鋒赤眉無榖自當來降吾以飽待飢以逸待勞折箠笞之非諸將憂也無得復妄進兵建武三年璽書勞異曰始雖垂翅回溪終能奮翼澠池可謂失之東隅收之桑榆方論功賞以答大勳赤眉向宜陽忽遇大軍驚震乃遣劉恭乞降曰盆子將百萬衆降陛下何以待之曰待汝以不死耳祭遵擒張豐于琢郡隗囂使馬援親述還曰子陽井底蛙耳不如専意東方至洛陽帝岸幘坐迎笑曰至曰當今之世非但君擇臣臣亦擇君至帝王自有真也囂問何如高帝曰不如也高帝無可無不可今上好吏事動如節度又不喜飲酒囂意不懌曰如卿言反復勝耳蒼頭子密斬彭寵降祭遵帝封子密為不義侯權德輿曰云云囂不用彪言彪避地河西為融畫䇿使專意事漢授融涼州牧璽書至河西河西皆驚以為天子明見萬里之外耿弇平齊地張步弇為將平郡四十六屠城三百未嘗挫折囂不用申屠剛言遊士長者稍稍去之王元説囂請以一丸泥東封函谷關嶺南華風始于二守交址錫光九真任延太原周黨會稽嚴光至京師黨伏而不謁博士范升言私竊虛名夸上求高吳漢等拔朐斬董憲龎萌江淮山東悉平上曰且當置此兩子于度外耳囂述詔田租三十稅一如舊制七年述立囂為朔寧王三月晦日有食之詔上封事及上書不得言聖鄭興言多舉漁陽太守郭伋可大司空者至功臣用則人位繆矣至先時而合月行疾也君亢急則臣下促迫故月行疾江馮言宜令司𨽻督察三公司空掾陳元云云上親征囂郭憲諫曰天下初定車駕未可逺征乃當車拔佩刀斷車靷帝不從問馬拔援聚米至來歙班坐絶席在諸將之右潁川盜起京師騷動帝曰吾悔不用郭子橫之言自上邽晨夜東馳賜岑彭等書曰兩城若下便將兵南擊蜀虜人苦不知足既平隴復望蜀每一發兵頭須為白謂執金吾冦恂曰潁川獨卿能平之耳從九卿復出以憂國可也至願復借寇君一年平隴張步欲入海齊王陳俊斬之帝每歎曰安得憂國奉公如祭征虜者乎衛尉銚期曰羣臣各懷慚懼帝乃止所在吏民不知有軍取士皆用儒術對酒設樂必雅歌投壼述遣刺客刺來歙歙召蓋延語王元降述曰豈有降天子哉述又使刺客詐為亡奴刺岑彭郭伋為并州牧過京師帝問以得失伋曰選補衆職當簡天下賢俊不宜専用南陽人建武十二年公孫述戰死延岑以城降吳漢放兵大掠帝怒譴漢又讓劉向至良失斬將弔民之義也任延曰善事上官不敢奉詔賞上東門侯郅憚貶東侯文王不敢盤于遊田以萬民惟正之供今陛下逺獵山林夜以繼畫詔長沙王等皆降爵為侯朱祐言曰者人臣受封不加王爵皆保其福祿無誅譴者吳漢自蜀還至京師于是大饗增邑更封已歿者益封其子孫或更封支庶帝厭武事自蜀隴平後非警急未嘗復言軍旅太子問攻戰帝曰孔子不對非汝所及欲完功臣爵土不令以吏職為過遂罷左右將軍官耿弇等印綬皆列侯就第加位特進奉朝請朱祜等薦復宜為宰相帝方以吏事責三公故功臣並不用惟高密固始膠東三侯鄧禹李通賈復與公卿參議國家大事帝雖制御功臣而每能回容宥其小失韓歆及子嬰皆自殺死非其罪衆多不厭追賜錢榖以成禮葬臣光曰以光武之世而韓歆用直諫死豈不為仁明之纍哉潁川𢎞農可問河南南陽不可問時東海公陽年十二在幄後改名莊十六年交址麊泠縣雒將女子徴側徴二反十七年帝大笑曰吾治天下亦欲以柔道行之十九年馬援斬側二桓榮授太子經榮每以禮讓相厭不以辭長勝人儒者莫之及董宣疆項令湖陽公主帝笑曰天子不與白衣同後南頓田租一歲父老前叩頭言願賜復十年帝曰天下重器常恐不任日復一日安敢逺期十歲乎吏民言陛下實惜之何言謙也帝大笑復增一歲諸將或失常度帝遣人觀大司馬何為曰方修戰攻之具帝歎曰吳公差強人意隱若一敵國矣馬援謂梁松竇固曰凡人富貴當使可復賤也劉昆長者之言江陵反風滅火𢎞農虎北渡河至偶然耳西域思漢威德咸樂內屬數遣使置質于漢願請都護聖上逺覽古今因時之宜辭而未許雖大禹之敘西戎周公之讓白雉太宗之郤走馬義兼之矣二十三年朱祜薨軍人樂放縱多怨之二十四年馬援征武陵蠻矍鑠哉是翁二十五年常勝之家難與慮敵南單于稱臣臧宫欲得五千騎立功我梁松父友也效龍伯高刻鵠不成尚類鶩效杜季良畫虎不成反類狗述敦厚周慎保遭父喪致客數郡朱勃詣闕上書臧宫馬武曰如此胸奴之滅不過數年詔報曰有其有者安貪人有者殘貪殘之政雖成必敗自是諸將莫敢復言兵事者拜張佚為太子太傅桓榮為少傅佚正色曰為陰氏乎為天下乎三十年羣臣上言即位三十年宜封禪太山詔曰即位三十年百姓怨氣滿腹吾誰欺欺天乎至若郡縣逺遣吏上壽盛稱虛美必髠令屯田于是羣臣不敢復言中元元年拜第五倫會稽太守每讀詔書常歎息日此聖主也一見決矣羣臣奏言靈物仍降宜令太史撰集以傳來世帝不納常自謙無德每郡國所上輒抑而不賞故史官罕得記焉起明堂靈臺辟雍宣圖讖于天下貶桓談范蔚宗論曰桓談以不善讖流亡鄭興以遜辭僅免賈逵能附會貴顯世主以此論學悲哉顯宗永平二年宗祀光武于明堂登靈臺望雲物臨辟雍初行大射禮十月又幸辟雍初行養老禮以李躬為三老桓榮為五更三年立貴人馬氏為望后援女圖畫二十八將于南宫雲臺以鄧禹為首又益以王常李通竇融卓茂合三十二人馬援不與大起北宫時天旱鍾離意上疏永平四年欲校獵河內東平王蒼上書諫帝覽奏即還宫梁松下獄死鄭衆不染于辭興子也初上因松以縑帛請之辭曰儲君無外交之義不往宋均為尚書令謂人曰國家喜文法亷吏以為足止姧也然文吏喜為欺謾而亷吏清在一已無益百姓均欲爭之時未可改久將自苦之乃可言耳自期門羽林之士皆令通孝經章句胸奴亦遣子入學丁鴻為侍中楚王英自殺寒即袁安馬后曰諸子食數縣不已儉乎帝曰我子豈宜與先帝子等西域與漢絶六十五載至是復通班超曰不入虎穴安得虎子鄯善巫自來取騧馬于闐北海敬王睦薨中大夫曰大王忠孝慈仁敬賢樂士敢不以實對曰子危我哉此乃孤幼時進趣之行也大夫具對以孤襲爵以來志意衰惰聲色是娛犬馬是好乃為相愛爾其智慮畏慎如此館陶宫主為子求郎不許賜錢千萬曰郎官上應列宿出宰百里苟非其人則民受其殃是以難之公車以反支日不受章奏帝聞而怪曰民廢農桑逺來詣闋而復拘以禁忌豈為政之意乎遂蠲其制尚書閻章尚遷以二妹為貴人竟不用是以吏得其人民樂其業逺近畏服户口滋殖章帝即位年十八右陳忠肅公手編通鑑節要真迹十有五册先生親接溫國見聞之近日潛孔聖筆削之傳爰即成書聿提綱目閲歲積日親繫其凡偉矣哉百代之宏規三長之絶識也是書始更始元年迄于唐敬宗其間錯雜尚匪全本嘉定乙亥七月珂在中都以錢三十萬得之先生之孫某若夫先漢而上太和以次長編散軼未得以覩其大全劔合龍歸期以他日贊曰魯麟獲而編年之法廢歷二千歲有司馬氏研精覃思爰作通志而後鉛槧之士即所見之仁智擷長取粹皆有以自託于世況乎先生道醇學備炯焉其心不約而契則夫大篇焜煌流俗披靡貫穿馳騁出類拔萃其所以壽斯文之脈而續聖人之意者又豈可以淺近計哉彼陵藉者本無所至讀未終卷欠伸思睡是蓋王子淵所謂荷旃被毳者難與道純綿之麗密羮藜含糗者不足論太牢之滋味何啻如聖門之未足與議者也許文定萬里帖行書十三行尾批兩行將頓首比纍奉書郵然值改藩不審一一道否比日冬凛伏惟開府已久即辰台候萬福日月易久德清嫂嫂闕竒頓首士憲吏部朝散之竒再啓辱書承比來所履清豫良慰良慰之竒近蒙恩有天府之除衰晚何以堪此已丐辭免矣餘需面究之竒頓首右建中靖國樞密使蔣公之竒字頴叔錢塘天府二帖真迹一卷豫往來于常與諸蔣遊蓋世家文獻幾二百年矣是帖以嘉定壬辰歲二月得之西湖羽士劉元綱劉得之蔣之孫騰雲起豫亦識之自以選詩名亦雲仍之秀者贊曰尺瑜寸瑕工所不棄如公平生抑有清議雖翰墨之僅存亦世俗之共毖豫獨區區于别白是亦或出于有意昔鄒忠公以言得罪士皆縮頸以避去公乃折簡以自麗由是而去蓋已無懟然則操觚刻槧片言幅紙其知所以行已也必矣以字達識以識行字舉一知二兹帖之所以可貴佛印清勝帖行書八行了元信咨澄維那人來辱手翰喜法用清勝如在華藏甚終始周旋真行腳高士以贊佐為心也月初相見具此不宣了元信咨澄維那右佛印師了元清勝帖真迹一卷豫在京口登紫金山妙高臺見城翁與師遣像淵乎似道晬然其容意其非偶從遊者嘉定甲申十一月始得此帖于其徒褾而藏之以附甄濟牽連得書之義贊曰欲溯其洄先涉其流欲觀其人先視其與遊東坡之名在昌黎武威之間而師之能亦文暢祕演之儔德必有鄰而人焉庾世于是可以察豫之去留參寥新秋帖行書十五行道潛頓首違濶滋久豈勝馳企邇來新秋氣涼緬維山中住持法體清勝不肖昨以患禍羈囚吳門而聞詢師逺來而老文亦未嘗揮金見助益認風義之督感激尤深不肖自至東魯日欲具書上問動止蓋道逺無行李住還之便故不能如願想高明有以諒之也未緣占對希以時重不宣道潛頓首再拜幾聖寺主老丈八月五日右參寥子道潛新秋帖真迹一卷眉山之門無虛士頡頏張秦表裏元辨惟參寥為然幾邑有西菩提寺蓋師所居豫屢過之是帖以慶元己未歲八月受之僧惟月蓋師之的孫贊曰帖中書督字法當為篤世間豈有不識字參寥子耶應世以文特師之粗于此乎何拘維以觀其書寶真齋法書贊卷十八
