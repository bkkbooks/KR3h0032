body:
  text: 寶真齋法書贊卷八宋岳珂撰唐摹雜帖智永千文真草帖二十八行真草間列周發殷湯至同氣連枝右智永千文真草唐人臨寫真跡臣米友仁鑒定恭跋右唐人摹陳僧智永真草千文真蹟一卷草字始周發迄于毁傷又自之盛迄于猶子真字始平章迄于毁傷又自之盛迄于連枝互差一行筆態俱入神品如鈞天萬舞廣樂畢奏干戚羽籥各適其宜立于兩階觀聴自爾忘勌惜乎不見其大全也按何延之蘭亭記智永本右軍七代孫居永欣寺閣上臨書凡三十年得真草千文好者八百餘本浙江東諸寺各施一本今有存者猶直錢數萬此帖紙墨與歸田賦頗類未必非真特無古印識故難據以為信攷寳晉書史載此摹帖有三本一在國子監直講楊襃處乃粉蠟紙一在宣徳郎陳开䖏乃楮紙一在丞相蘇公頌處乃黄麻紙今紙類粉蠟出楊氏卷前一小印末有小璽亦以慶元庚申嵗十月託建康士人張琨于郿塢得之贊曰興嗣次韻成一家作者更書遍河沙幾年真草分正葩變現要作千體誇誰知筆椽出袈裟如擢犀角抽龍牙墨池摹倣紛天華尚想字母真摩耶褚遂良枯樹賦帖楷書四十四行殷仲文風流儒雅海内知名代異時移出為東陽太守常忽忽不樂顧庭槐而歎曰此樹婆娑生意盡矣至如白鹿貞松青牛文梓根柢盤魄山崖表裏桂何事而銷亡桐何為而半死昔之三河徙殖九畹移根開花建始之殿落寔睢陽之園聲含嶰谷曲抱雲門將雛集鳯比翼巢鴛臨風亭而唳鶴對月峽而吟猿乃有拳曲擁腫盤坳反覆熊彪顧盼魚龍起伏節豎山連文横水蹙匠石驚視公輸眩目雕鐫如就剞劂仍加平鱗鏟甲落角摧牙重重碎錦片片真花粉披草樹散亂烟霞若夫松子古度平仲君遷森梢百頃槎枿千年秦則大夫受職漢則將軍坐焉莫不苔埋菌壓鳥剥蟲穿低垂于霜露撼頓于風烟東海有白木之廟西河有枯桑之社北陸以楊葉為闗南陵以梅根作冶小山則藂桂留入扶風則長松繫馬豈獨城臨細栁之上塞落桃林之下若乃山河阻絶飄零離别拔本垂淚傷根流血火入空心膏流斷節横洞口而欹卧頓山要而半折文袤者合體俱碎理正者中心直裂一癭銜瘤藏穿抱穴木魅暘睒山精妖孽況復風雲不感羇旅無歸未能採葛還成食薇沈倫窮巷蕪沒荆扉既傷摇落彌嗟變衰淮南云木葉落長年悲斯之謂矣乃為歌曰建章三月火黄河千里槎若非金谷滿園樹即是河陽一縣花桓大司馬聞而歎曰昔年移栁依依漢南今看摇落悽愴江潭樹猶如此人何以堪貞觀四年十月八日為燕國公書凡四百六十漆字右唐人摹右僕射贈太尉河南郡公褚遂良字登善枯樹賦真蹟一卷按寶晉書史此賦是粉蠟紙搨書後未能二字是雙鈎唐人不肯欺人若無此皆以為真賦在壽春魏倫處寶章待訪集記借觀之所在潤州甘露寺予再言于潤江山之勝固攬之矣景與人會又得竒蹟名鑒以弹壓之百年風流殆不復可見也寶慶乙酉二月客以帖來自中都紙之粉蠟雖薄雙鉤未能二字皆儼然如所書帖有蘇激二印葢未歸魏氏時又出太簡參政家上有儲氏圖書二正寶晉所記虞世南枕卧帖在闗把處所著之古印必唐世一好事者今不知其為何人末有鑒定法書印一凡四百六十七字七作漆書葢真唐體書稱貞觀四年為燕公書按唐史當是于志寧然攷其時猶未進封志寧葢襲祖謹爵意史所載嵗月或誤也徐浩古蹟記謂中宗時中書令宗楚客以閒居賦同此作十二扇屏風大會貴要張以示之其此摹之祖歟中興後書入御府有紹興印著馬贊曰開禧之元予仕軍庾偕朋命駕嘗即甘露慨懐海岳賦詩弔古朅予再來乗軺兹土復登多景乃得斯賦江山几案風月樽俎俛仰迹陳卧臨意寓維賦之作自庾開府殷歎婆婆桓懷雄據染翰行墨自唐摹褚蘇印儲錄魏藏米譜後百餘載見我詩句又二十年真蹟斯睹地有顯閟物遂散聚抑人與對非鑒奚取獨慙予者莫踵遐武誰其後先傳此縑素朝猿暮鶴秋霓春霧是書其存尚想吞吐薛稷夏熱帖夏熱體中復何如二十八日遣書至魏十三兄處今早信還聞奉九姑已過揚囗追問不及極馳情也六􅂒囗當使囗往省不審囗逺囗稷再拜右唐人摹太子少保黄門侍郎薛稷字嗣通夏熱帖真蹟一卷帖無古印識而跋卷有外府一印葢近世藏書家厯官所用莫知其為誰也筆力實竒甚如極馳等字與予家藏歐陽率更臨大令何如帖正同信乎筆法源委之本無殊也寶慶乙酉二月得之霅上贊曰帖中月字用武后書體因其時也魏字粉如葩葉之當風轉而竒也遡晉千年如極如馳也既宜于今而于古亦師也既變于已而于人亦資也米芾有言功名不如翰墨抗少保而躋之謂五王其卑也予固從而貴其帖而亦未暇辨其是非也顔魯公祭文帖草書二十二行壬申十三叔銀青光禄大夫使持節蒲州諸軍事蒲州刺史上輕車都尉丹陽縣開國侯顔真卿以清酌庶羞祭于亡姪贈贊善大夫季明之靈惟爾挺生夙標幼徳宗廟瑚璉階庭蘭玉每慰人心方期戩榖何圖逆賊間釁稱兵犯順爾父竭誠常山作郡余時受命亦在平原仁兄愛我俾爾傳言爾既歸止爰開土門土門既開兇威大蹙賊臣不救孤城圍逼父陷子死巢傾卵覆天不悔禍誰為荼毒念爾遘殘百身何贖嗚呼哀哉吾承天澤移牧河闗泉明頃者再陷常山攜爾首櫬及兹同還撫念摧切震悼心顔方俟還日卜爾幽宅魂而有知無嗟乆客嗚呼哀哉尚饗右唐人摹顔魯公祭文帖真蹟一卷公節偉矣日月有蔽蝕山河有隤決而一門之全名英烈言言炳炳實與天地相為終窮是帖葢當時奠祝之文片言所存皆足以對越無愧數百世而下讀之尚使人凛凛有生氣也嘉定乙酉嵗十一月髙安倅沈君鏜聲甫得之霅上名卿家明年二月書來緘以見遺筆法葢雙鉤摹體紙亦唐世物贊曰當天寶之季嵗騰紫宫之長彗駭漁陽之駃騠將道洛以飲渭以十五萬衆鼓行之勇涉二十四郡無人之地偉顔門之競爽獨舍生而取義有常山以為之兄有魯公以為之弟合羣從而死難慟三軍而雪涕葢將豁百世而開瞶矇澄六合而蕩氛翳手締絶紐躬支横潰射羿日之並出扶杞天于將墜斯文也所謂質之鬼神而無疑建諸天地而不悖人豈止于區區之一酹于虖誤主有人效忠何罪胡大僇之正不致于林甫之流而所遭之慘乃及于泉明之輩予持此評氣洶心痗豈徒贊八體之書抑以代千載之誄李邕光八郎帖行書十行即欲迎濮王八郎後來足得未勞急也䝉周至惠鹿欲報適來風水事也少于道左申謝耳回還使馳白不次李邕狀諮光八郎記室二日勞借馬甚堪騎悚息濮王少若門還報驛上安置得不示之右唐人摹北海太守贈袐書監李邕字㤗和光八郎帖真蹟一卷明皇之子琚封于光太宗之曾孫嶠襲于濮唐世重郎稱在至尊猶或名之故雖帝子之貴弗為瀆也邕以宗室在属籍致迎勞通假借親親之誼為有加焉按寶晉書史帖以元祐丁夘得之甬上石夷庚處有唐氏雜迹陳氏圖書印寳晉為之賛凡三十二字今此帖無印識字有雙鈎摹體葢唐世本也珂慶元己未嵗在九江嘗與寓公直秘閣張棟之子似仲有之游見其家藏米筆甚富有一帖言唐人摹邕帖筆法梗概而無其帖彚在米卷中今尚省其語後二十一年珂掾西府見此帖于一醫家云得之天上故貴臣之藏有印識又五年嵗甲申月黄鐘託中都士人購得之有之已死其家湮矣不復可見寶晉帖意竒物之合必有時慨想真蹟尤未易見也贊曰北海書名亢其宗雖摹猶足傳竒蹤已鳴褚籥調歐鏞更拔永㦸推羲鋒平生鑒賞襄陽公二寳相避如燕鴻青氈閲世儻可逢定見重合延平龍庚無名人帖非紀録不概非繫著不詳或軼氏名或鮮倫類猶不可闕祕閣尚矣因引而伸之李𤣥胄清慎帖楷字五行李𤣥胄曰先帝囗囗囗囗囗者何先或對曰清固為先次復問吾吾答詔曰清慎之道相湏而成必不獲已慎為大也清者不必慎慎者必自清亦由仁者必有案此下原本有缺字右録李𤣥胄清慎問答唐人真蹟臣米友仁鑒定恭跋右唐人李𤣥胄清慎問答帖真蹟一卷絹素百裂僅可補綴氣全神秀落落如星斗爭耀光芒陸離有藏書家印後登御府有一璽在旁嘗著石刻今按元刻已亡十餘字葢斷爛之不容収拾者嘉定辛巳嵗二月予官江東漕臺初購此帖于四姓小侯劉氏家函貯以來偶與客燕坐忠宣堂上發書展玩字字隨風吹舞客驚亟掩卷曰古則古矣褾而新之誰當知者予復之曰當遂以子為證相與一笑觀他書竟不再視至甲申嵗九月始褫而藏之贊曰洗箕山之耳緘周廟之口雷孤竹之腹䇿六馬之手清乎慎乎有餘緼乎二者之間吾其隱乎楞伽經注帖草書三十一行題目係楷書唐楞伽經注力有十力明有三明現千種萬類一時俱生無有障辱心不用故得自覺聖智佛言我不對小乗説我大乗佛乗者非言説文章亦非真諦解脱此明其體斷二根本者貪愛與無明名二根本諸使隨泯不現無有生根名害如甘䑕嚙人瘡雖差遇雷聲即微發此微細習使斷名害羅漢以三空觀已陰無和合畢志不生名破僧斷除七種識覺想分别知名出佛身血不印八故以八體真梵音有八種一最醇聲二諦了聲三柔軟聲四調和聲五尊重聲六不誤聲七深逺聲八不女聲此八聲有八故八八六十四念更正勤神足根力覺下一字紙裂不可辨我之所攝受記著生所生二心壊二俱離相非非平䓁性生因果平等我無我平等平等者是人法平等非性者明非有性非非性者明非無性非性悉離者雙破二非也對異説如對有説空對生死説世世對六道説法界對五陰説如生身對治門故聞是心量聲聞對囗口囗故緣覺計十二因縁四字紙裂難辨縁自覺聖智内正得生不由他悟知我滅知自囗相知不生不滅此是蘆迦耶陁弟子以得俗通惟説身覺不離于量見聞覺識此等三法但有其名而無實體以息論端自覺聖智為一自宗有無是二心執冥初是當求那亦依諦六法論者一天文二陰陽三算數四醫方五知文六知武右唐無名人書楞伽經注真蹟一卷首尾大小凡五璽按元標帖曰褚河南乃侍書輩所作匪出宸翰予故疑其未然或售者益之者也然其為故物明甚褚法清勁今書圖妙體勢固易察識寳慶乙酉三月得之后家髙氏凡注文皆簡當與今釋藏所著定不同贊曰貝多之葉來金仙益以注釋非忘言䮚伽著在西域編名雖或訛經則傳唐世經生筆力便兹文流布今幾年河南題字恐未然留與末世觀蹄筌使至帖行書五行尾批草書一行使至得狀為慰五月中楊慶廻已遣書此不一一付白肜所七月十二日無事勿専使人來右唐無名人使至帖三十六字真者二十有八草者七花書者一筆法類李邕而花書之名弗復可識疑以傳疑故惟以歸之無名人也有永存珍袐印二其一所存者半未著御府大小五印得此帖時又有格天閣一印既得而裂去葢郿塢所珍者嘉定庚辰七月十二日得之建康贊曰帖録于永存之袐葢出于唐之初世而莫知其名氏帖題日曰七月十二予亦得之是月之乙巳日月之適契表之王涯兹謂天意格天之印褾以題識亦既三褫大弓之竊辱于淪棄我乃一洗贊以志其始奉禮帖草書五行褚奉禮謝世法當囗憾度越中書人零落殆盡逺公夙徳不可接對但時復看古帖窺先賢之跡以遣日而已右唐無名人奉禮帖真蹟一卷紙素皆唐物態圓力健有貞觀初年風度近世薛紹彭道祖葢倣其體者也山隂自晉世而後代為名書人所居鵝沼蘭亭欣藍永閣遺蹟可攷褚奉禮者不知為何人豈河南家世耶逺公似亦辯才輩流故有夙徳之稱書入御府淳熙己亥嵗偕不倦帖青峰詩得之韓莊敏家先君手題不書月日贊曰羣賢修禊書法遂東永欣之傳盛于越中褚雖莫留猶有逺公至今千巖颯然清風不倦帖草書四行筆硯用來多時漸欲調適殊發人書興若不醉有目疾亦到暮書之不倦也右唐無名人不倦帖真蹟一卷有小璽在巻右似與奉禮帖同出一手觀帖語大概墨池筆塚于是可想矣贊曰昔漢趙壹之非草書曰十日一筆月數丸墨領袖如皂唇齒常黑雖處衆坐不遑談戲展指畫地以草劌臂手皮刮指爪推折見腮出血猶不休輟今視此帖信乎斯世之有斯人也不學則已學必以工苟焉而為焉往不窮予既折衷壹之遺論亦以戒學書者之安于庸也青峰詩帖草書八行野人不相識偶坐為林泉莫漫愁沽酒囊中自有錢迴瞻林下路已在翠微間時見雲林外青峰一㸃圓近見崔法曹書此詩愛之不覺下筆也右唐無名人青峰詩帖真蹟一卷帖亦與奉禮不倦二帖相似意皆出于習書之勤者贊曰心潜書法神造詩境予意是時萬念俱屏樂非外騖自得雋永坐令塵埃頓發深省吳越三王判牘帖第一帖十一行内字有不全處第二帖牒九行判押三行第三帖十一行第四帖狀十五行判押三行狀字有為判押所葢不可辨處武肅王敕淮南鎮海鎮東等軍節度使牒節度正隨身劉仁規奉處分前件人乆在軍門志懐忠幹或比差隨局皆推奉上之心或職列巡封備顯嵗寒之節今者驂隨歸使合議甄升各加超擢之恩以示奬酬之寵事湏改補節度㪚子將仍牒知者故牒乾化四年四月日牒使尚父守尚書令吳越王佐正匡國功臣東面防遏都指揮使嘉興鎮遏使光禄大夫檢校司徒前珍州刺史濮陽縣開國子食邑五百戸吳重裕右重裕奉指揮下鎮排㸃將士袛候大軍進發除留在鎮差使外揀㸃節級將士已具夾名㭊申上訖今不審便押赴使袛候指揮謹錄狀申伏聴處分口且在鎮候案此四字係錢鏐所判右牒件狀如前謹牒文帖即付軍前案此六字係錢鏐所判貞明四年六月日佐正匡國功臣東面防遏都指揮使嘉興鎮遏使光禄大夫檢校司徒前珍州刺史濮陽縣開國子食邑五百戸吳重裕牒二十三日押案二十三日四字及押字皆錢鏐所判文穆王敕鎮海鎮東等軍節度使節度散子將充上直從散員旗副將檢校太子賓客楊瑫牒奉處分前人毅勇資身忠貞秉志或屢隨征討或頻効驅馳予自紹統山河已曾遍施酬奬昨者疊膺雙冊繼耀土茅今則特均雨露之恩溥示維新之命更聞盡節洊可甄升事湏改補節度子將仍牒知者故牒清㤗三年正月日牒使都統檢校太師守中書令吳越王押忠懿王衣錦興國軍安國縣西市看守𢎞聖王大坵陵客程仁紹右仁紹戸税係衣錦北鄉毎年先次送納並足且仁紹翁祖去乾寧二年䝉太祖武肅王給帖巡看大坵陵并及四面山林年前後並無闕失戸内所有雜色差配夫役從前䝉太祖武肅王批命放免并本軍台命其祖王批命見在今縣司不委從前看守官中𢎞聖王大坵陵滚同一例差㸃不敢辭論且仁紹戸内塩税米等先次送納不敢逋欠正限其戸内雜色差配夫役甲頭䓁伏乞元帥大王鴻恩特降批命念以看守大坵陵年深不同别事墳戸日夜巡看尚憂闕違許容下縣准前蠲免冒犯明庭伏候王㫖下縣指揮十月日安國縣西市看守𢎞聖王大坵陵客程仁紹上狀建炎己酉八月伯言將適湖湘自江漲挐小舟携幼子成允過耆仲元于臨安出三王筆判以觀中秋前四日伯言恭題紹興丙寅二月十三日悦恭覽二跋七行右吳越三王判牘真蹟一卷有文肅勰之子紹興從臣伯言跋其卷後錢氏起甿閭開覇府金印玉冊奕世相授功荗慶衍福于東南一門英烈萬古慨想龍筋鳯髓寓此判墨猶可以覿葢世之雄姿也四帖皆有印識一曰鎮海軍節度使之印二曰東面防遏都指揮使印三曰鎮東鎮海軍節度使印四曰天下兵馬大元帥印其印凡十有二皆可攷云贊曰玉冊之樓壓吳杭山川錦繡開故鄉英姿颯颯熊虎相紅袍金印交煒煌百年霸府儀物龎山判近出功臣堂風尾畫諾鵲抵章五雲八體嚴且莊流傳世世民弗忘鬼神呵䕶謹毖藏題染猶帶猊鑪香卷端藻墨十二行紫槖曾是天台房我寳此帖隨縑緗匪徒嗜古思耿光大誼猶可占尊王五代名人真蹟豆盧草田園帖行書十行内大徳來㫖垂悉並平起外郎云大徳欲要一居處畿甸間舊無田園鄜州雖有兩三處小莊子緣百姓租甸多年累有令公大王書請却給還人户盖不欲侵奪疲民兼慮無知之輩妄有影庇色役以此未便副來㫖其他計外郎當亦細話垂悉謹狀方茶一斤團茶一斤専令寄往右後唐同光宰相豆盧革田園帖真蹟一卷唐季不綱龍戰四野犢子之讖既兆戎温朱耶取之雖得猶失革自名家子起為行臺左丞相遂開佐厯此帖乃所與僧往還書其畏彊藩避罪罟葢慄慄淵冰然其後卒以故縱田客貶夜郎正坐所畏信乎亂邦之不可居也是時據鄜乃髙萬興官檢校太師中書令封北平王即革所謂令公大王者官故梁授唐命維新而顓面正朝者不能致褫鞶之誅而反竊貢秉旄之佞唐之不競職有由矣帖中名不類革字葢五代花書體嘉定甲申嵗十月得之中都有前朝五印并古印一贊曰書名之訛創自韋陟季衣其風始見書尺狙冠豺綬乃唐之賊相不加誅而反畏惕禮度盡壊王綱倒植存此謂何覽者太息楊凝式烟桞詩帖行書六行天街小雨潤如酥草色遥看近却無最是一年春好處絶勝烟栁滿皇都右五代太子太保楊凝式字㬌度烟栁詩真蹟一卷六臣在唐遺臭萬古汚池蓮瑞人唾不顧如凝式者迹混節苦既託興于昌黎亦絜蹤于巢許是葢取伯夷之事君而褚賁之媿父則所謂筆法端勁意態掀舞殆出于天真之自然而亦可以見其心跡之粗著也更藏書家有四印具予得此帖嵗在庚午月紀孟陬日躔端五售者高仲駔于京府贊曰昔蔡仲之命曰爾尚葢前人之愆惟忠惟孝孔子曰危邦不入亂邦不居亦既慟攀車之頻見未易樂執翿之只且汗漫翰墨浮沈里閭雖所寓之或偏尚此心之炯如然則箕子之奴蒯徹之巫晏平仲之知寗武子之愚公兼而全之何有于書乎寶真齋法書贊卷八
