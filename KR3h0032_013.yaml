body:
  text: 寶眞齋法書贊卷十三宋岳珂撰宋名人眞蹟薛道祖書簡帖二十一帖並行書第一第九第十一第十六帖各十二行第二第十二第十四第十八第十九帖各十行第三第五第六第八第十三帖各十一行第四帖九行第七第十七帖各十四行第十五第二十帖各十三行第十帖二行第二十一帖八行紹彭頓首移刻伏想尊候萬福適已面叩以左右行期不逺欲望特給女子寛假今遣人轎去伏冀津遣仍告許令嗣祕校同過此留宿千萬不阻家人同此懇悃謹啟不宣紹彭再拜縣君親家母妝閣韓郎祕校經夕想同廿六娘佳安明黃尅絲淺色紗四匹繡衣一襲羊酒等送去聊為暖女之儀幸檢留不笑淺鮮諸留面話不次丈母同此意二十四日紹彭祗白錢拾緡與廿六娘食錢等用紹彭頓首啟久跂使車之音不勝馳仰伏審已次近郊秋暑冐涉良勤恭想尊候萬福如聞朝旨催發不審軒從入城否㡬日在舍館即得出城參候謹先奉手狀諸留面布不宣紹彭頓首再拜允之提㸃奉議閣下二十日紹彭頓首再拜午刻伏審尊候萬福鄙拙凂清覽乃蒙貶損翰墨過形寵諭媿恧之至何可勝述謹復手啟上謝不宣紹彭頓首再拜知府給事執事十六日謹空紹彭頓首近已奉狀想得呈達到都未得來問思仰不可言春和伏惟貳政多暇尊履萬福紹彭到都兩月餘區區如昨會晤何日萬冀若時珍嗇以佇光亨不宣紹彭頓首上啟無逸通守奉議執事二十一日紹彭頓首此附置兩上狀皆達几格否違闊兩見夏序思奉博約馳情何涯清和伏惟朱邸餘閒起居萬福紹彭寡昩天末老親幸安諸不足道何日一笑臨紙耿耿惟萬萬為時自嗇早踐華要副茲瞻詠為禱謹啟不宣紹彭頓首再拜宗記室閣下四月一日紹彭再拜兹者聯姻于傾葢之際風誼曠厚非流俗可擬衰族之幸以此鄙意成禮之初正頼吾賢者主持今乃承迫于朝旨先行殆非人意所及深用慊慊如聞柅節之地不逺繼得上狀且此為謝不次紹彭再拜拙者罷官逾年盡室久困桂玉不堪其憂婚禮諸事若得少從簡易為厚幸望以此達令兄及宅中為幸不罪紹彭頓首啟前日過蒙延禮獲款言侍感慰可量漸凉伏審尊履禔福惠示寵和古律二詩得窺哲匠制作欽服銘佩并深鄙懷區區諸俟面謝使還不宣紹彭頓首再拜知府給事閣下二日謹空紹彭頓首再拜昨日奉教賜不果即裁謝經夕伏惟台候萬福蒙示及三畫謹復歸納復古極少時筆學李成道寧體者老年不如此專以闗種為主矣淵明粗得典型但墨淡爾張運判書上呈所求可得否朝夕面啟不宣紹彭頓首再拜知府給事閣下二十七日謹空唱和在墨本卷後伏冀照悉紹彭再拜紹彭再拜田事蒙留念委以皇彦遂漸有主為幸實多非無逸敦篤垂惻何以致此然皇彦所以為用者賴無逸爾更望以時提撕之地逺今年秋課無力遣人去且乞勾收在宅庫因來年遣人去請領次紹彭再拜皇彦要引約束佃户今冩去望付之紹彭頓首啟陽復令辰君子之休伏惟履此亨會坐近新祉紹彭局守所拘不遑前慶伏蘄早膺殊寵以副誠頌謹啟上賀不宣紹彭頓首上啟當時運判户部節下至日紹彭啟違闊多年每深馳仰宋郪縣近始到官忽云與無逸别久頗不能道左右近日動靜比辰不審尊候何如紹彭逺官良非所堪奉親到此累月諸幸粗遣手足在北音問不繼朝夕耿耿無逸才高安可獨浮沉里中耶紹彭再拜紹彭頓首得來教後已兩發書達左右否比惟尊候多福紹彭奉親官下幸安不煩念及會晤未期千萬加愛加愛偶便人去此數字不次紹彭頓首宗玉記室學士三月二十二日要務具于公移非常常者也留念加意為善今日會相度家産簿依保甲簿式此事必達恐宜慎重欲作無未便回申即諸州諭列五等等第淆亂于簿中為不便明是非便不知貴臺已如何申報切見教相照應回報貴無牴牾也何不早出一集佇望佇望紹彭再啟元均已下引年章記成甫㡬日成行皆先及之也紹彭啟久不聞動靜下情馳仰何可以言比日不審尊候何如伏想起居萬福闊别累年曾未邂逅從者嘗入都否今領何局也未期展晤臨書惘惘秋冷萬萬多愛多愛不宣紹彭頓首子充通眞閣下閏九月十日大卿尊候康寧眷聚各惟佳安紹彭修書如非幸亦結局調山東一倅聊藏拙魯也或得邂逅為幸都下有幹萬萬不外不外紹彭再拜田僕文字奉煩多矣今再以一角干聒望為達之昔年為織到鸞綾甚佳欲煩再為織兩匹如何章丘簿租中納直也紹彭啟比人還奉狀必達左右冬凜伏想尊候康福自入上旬日俟使斾而邈無車音何耶傾渴言笑日深馳結未閒更加厚愛别佇嘉擢不宣紹彭再拜當時運判戸部閣下十一日晚紹彭頓首啟專介惠翰益佩眷縟臈寒伏惟按臨多暇尊候萬福承使斾欲出非晩晤見何慰如之未閒尚冀厚愛以需進擢不宣紹彭再拜當時運判户部閣下紹彭頓首拜别逾年每深馳仰至此日跂使斾比方聞星傳已次蜀境雖瞻風未果詗候有便已極欣悚比惟艱難蜀道涉履良勞叱馭之餘尊履安吉無緣前造更冀珍衞不宣紹彭狀上運判考功閣下二十五日紹彭再拜都城之别容易十載箕南斗北致疎記室之問去冬陳法漕經由治部曾貢手訥想徹𨽻人之眎暌逺譚塵傾繫良深雲山修阻何當一預清集以釋鄙吝耶紹彭再拜右元豐同知樞密院薛公向長子紹彭字道祖書簡帖二十一幅分四卷向帥定武有宋景文公時樂營吏孟水清舊獻游士所攜禊帖石本在公帑刻意模倣積日夜不少置遂得筆法大意後自成一家書名亞海嶽禊石遂歸薛氏大觀間次子嗣昌以内九禁今觀此書字字縱歛有源委而書名皆禊序中彭字體製信乎好之篤信之堅與之俱化眞積力久固應爾也昔米芾䟦禇河南臨禊帖有曰永和字全呈其雅韻九觴字備著于清標浪字無異于書名由字益彰其楷則予于此帖亦云嘉定庚午八月得之中都高氏書有印文曰三朋圖書合瑞又御府寶章在焉通他印凡四十所贊曰崇觀太平博雅彚征秀出簪纓楚芉蜀劉三英幷輈道祖其儔沈浸深醇薰陶見聞厥藝以振方旅蘭芝水清獻奇發千古機擷其所長韜鋒斂鋩類曲水之觴即權合經不特製名雅韻盡呈涇芾已仙是書之傳孰探其天風期九垓黃鵠下來然予言哉薛道祖鵓鳩帖行書七行余家舊有花下一金盆旁一鵓鳩謂之金盆鵓鳩者是已傾在都城為元章借去久不肯歸余比得巨濟書聞元章已下世大可痛惜此畫今亦不知流落何處使人嗟嘆之不足紹彭頓首右薛道祖金盆鵓鳩帖眞蹟一卷是帖實與山谷湯方蔬法同有小璽款縫予嘗攷寶晉山林集云道祖有花下一金盆盆旁兩鵓鳩謂之金盆鵓鳩豈是名畫可笑是固以為不然矣而今帖乃謂頃在都城為元章借去久不肯歸何耶贊曰朋友之宿草未黃眷眷于舊藏畫史之詆訾未忘齗齗乎弗償鳩搶枋而下垂鶴唳天而高翔誰能游九垓以問太虚其必有以别二子之短長也薛道祖書簡重本三帖三本共六紙並行書第一第二第三帖各十二行第四第五帖各七行内第五帖與第六帖全無異同故不複出紹彭頓首啟衮衮短景復以近出宕渠往復幾二千里久不果修起居之問瞻懷盛徳日極馳情冬凜伏惟澄清餘休尊履寧福密邇使臺未遑告謁敢祈珍育以迓寵休謹奉啟不宣紹彭再拜冲允運判考功閣下十一月二十七日狀紹彭頓首啟衮衮短景復以近出宕渠往復幾二千里久不修起居之問瞻懷盛徳日劇馳情冬凜伏惟澄清餘暇尊履寧福密邇使臺未遑造謁願蘄珍育以訝寵休謹奉啟不宣紹彭狀上運判考功閣下十四日門中上下眷聚乍到殊土想皆安寧鄧京西過洛相見良款比報得鄉壘亦頗便否米元章到此已得三書其篤厚故人如此殊可人意也紹彭少煩左右新繁縣王欽與之有素欲求一職令削諸公偶與無素欲望左右特與成之其人今年四月替非明公垂意不可望也紹彭頓首紹彭少煩左右新繁縣王欽與之有素欲求一職令削諸公偶與無素欲望左右特與成之其人今年四月替非明公垂念不可望也紹彭又上紹彭啟近兩奉書及絹字碑額去當一一得達比日伏想按部多暇尊候清安嘉節阻奉燕觴不勝馳仰尚祈珍育以副言願紹彭頓首右薛道祖書簡重本三帖凡六幅眞蹟一卷予于顔魯公帖疑矣而未有以并故不敢論于蘇長公帖信矣而未有以據故不敢騐此帖又同而出于御府有縫璽在道祖之書又決無人偽為紙素復一等于是益信季茂之言為不可易帖皆牽聯列以繫贊用證前帖贊曰帖之疑也非取而幷不足以為證非視其印不足以為信旣信矣又何加焉曰一以訂吾友之言一以貽吾家之傳傷彼苟且秖益可憐於虖昔賢薛道祖祕閣詩帖行書六十四行訪古求書二十年二王眞蹟幾人傳每尋同好得消息聞韶忘味心拳拳諸家眞贗可屈指緹巾入手分媸姸道山東觀富奇古世人想望如雲天此生塵俗分不到九重有路來無緣豈知司存預符璽芸臺高議開賓筵翰林八坐中執法末容凡吏陪諸仙酒闌接武上祕閣皇居紫禁凌非烟晉唐法書在寶櫝傍架牙籖一一穿紫衣黃門許一見忽開復閉嚴關鍵右軍盡善厯代寶八法獨高東晉賢宏文舊物印章在開元小篆朱猶鮮草行無窮少真楷硬黃色淨昏麻牋鳯翥龍翔斜復直烟霏霧結斷還連溟漲筆力老轉劇臨池尚歎張學專言奴得法號神俊逼人體勢殊翩翩自方家尊騁豪翰駸駸欲過驊騮前崇虚鵞羣最眞蹟萬里古色星日懸筆乾墨淡不可搨拙手添暈難磨湔小璽肥書兩貞觀毎角一字居四邉南朝妙鑒各題檢懷充在後前僧權爭妍取勢押縫尾磐石臥虎推滿騫琅琊世譜今乃識寶章十代何蟬聯忠良賊孽無去取茂宏處仲同一編其間楷眞特蕭散南平祕法傳僧䖍卷杪題官記年月方慶疏封在石泉當時盛事今不泯曾看崔序傳遣篇想見舉朝推好尚小鍾發論頭風痊髹奩别貯古雜跡厯代作者堪比肩叔懷陳人有晉法伯英漢帖疑呉顚誠懸送𤓰特枯硬歐取方險虞勁圓虞文發願乃合作壯古遒麗功力全世間此帖豈有二孔廟破石人猶憐阿武章草五字句畫松分行如直弦牝雞之晨足才致蛾眉文墨爭嬋娟青綾高標卷二十淳化刻在諸帖先仲尼夏禹謝太傅山濤漢章西晉宣體凡格陋漫收掇一手臨寫煩雕鐫二王妙跡半遺落寶章虞柳俱見捐無鹽刻畫廢西子騏驥不御蹇著鞭永熙聖學貴斯事討論王著何備員百年文物盛于昔繼文眞主方御乾巖廓道業仰䕫禹太平黼藻宗雲淵寶書傳世久未輯明時盛事猶缺然誰能借辨達聰聽願求精識重評詮收遺去陋再刋勒鳩工不費數萬錢嗟哉百卷頃刻過安得放意徐窮研歸來欲説急記取瀛洲回首情悁悁心存黙想尚可記以指畫被夜不眠休論頑仙與才鬼但得典掌甘終焉右薛道祖祕閣觀書詩帖眞蹟一卷國朝石渠東觀之盛邃列紫垣流略星分縑素雲委自熙陵右文燕及崇觀太平偉蹟極于是時公精鑑能書為一代稱首縱覽其間如后䕫涓曠屬耳韶濩音響節奏固有黙會而不容于名言者詩篇之作辭藻雖未稱而翰墨賞識要不可廢先君以淳熙癸卯將漕鄂渚與總餉趙汝誼言燕南樓席間出是帖以二英石易得之有御府紹興印二半印一薛氏印七半印一贊曰中祕法書之積自淳化至于崇觀富矣而未加别也翰墨博雅之能自劉米逮于道祖著矣而未多閲也伯牙之珍百世知音偉奇能之表表本和樂之愔愔予嘗歎太平之盛際士大夫可以盡其好尚之心盤薄時清彷徉書淫彼何預于帝力殆有類乎魚鳶之在天淵各自得以遂其高深也薛道祖清閟閣詩帖行書序三十九行詩八行四方士大夫宦遊京師類多僦舍往往庳狹湫隘室無天游容膝而已廳寢廚廐皆苟完苟合能有齋閣為便燕棲遲之所者鮮矣況有隙地以植嘉卉乎河東三鳯後人道祖于堂之中庭植叢竹甚茂竹之傍隅榜閣曰清閟蓋取退之筍添南階竹日日成清閟以名之也松柏與竹皆有士君子操厯隆冬勁寒不改柯易葉人所顧玩常與凡草木異然松柏難植而遲茂插根數年其幹始逾拱把非廣庭盛圃詎能多容雖有清隂常疎而不密殆不若竹之易植而速繁也幽軒曲檻在在宜之或臨牖或緣逕始種數竿不閲嵗如林清森閟邃蔽映庭户掃砌拂簷靜若天帚非高竒之士孰能愛哉少陵杜之美達道翁也僑居逺域猶曰平生憩息地必種數竿竹清玩彌劇則復有客至從嗔不出迎之語子美所謂善假物以捐俗情者道祖高意正在是爾若夫炎曦爍石夏雲火蒸道無行車林鳥吞聲觸熱拭汗自公就寧虚堂停翣靜几郤氷蠅蚋歛跡凉氣自生翛然一榻由竹而清通津要塗鳧趨鴈萃千百其朋噂􅊱如市我歸吾盧以恬養智繁枝梢雲密葉凝翠隟無塵飛人不雜至邃然一齋由竹而閟君于是逍遙其間小冠散襟左圖右書意澹如也有客至則闔扉而飭長鬚曰余方對此君披黃卷與聖賢語耳客樂此則予通否則予拒毋俾敗予意文登馬琮嘗叩關欵訪君鏗然抽扃晤言久之遂許觀文房之富因書清閟之實又繼之以歌曰虚堂幽幽竹森森直節常便靜者心秋檻風高聲戛玉夜庭月白影篩金檀欒相對復何有掛壁丹青古名手飛泉激石湧崖間更愛霜鴻下葦灘錦題玉軸照清閟敻無一㸃塵埃氣百㝷砌下日相親千畝渭川空自翠右薛道祖清閟閣詩帖眞蹟一卷東華軟紅塵中士大夫率以是老歳月清閟之樂固所謂濯濯泥中之蓮超然不染者嘉定己卯夏五月予在郎舍偶得是詩于鄽鬻者慨想承平之風流恨斯人之不可接也時寓舍堂下適有藝竹清隂晝繁午暑稍卻覽卷為之三歎息焉卷有紹興印二半印二薛氏印三半印一印適與觀書詩相合殆後人裂取而藏者贊曰此君之淸閟昌黎所憇何啻得其細三鳯之呈瑞非實不餌亦姑即其意予陋且蔽嘗竊歎喟謂必見其眞與境契而後可以處絶塵之地而歸對出而棄十寒而一暴久暌而暫慰則亦何足以得二者之味詩乎竹乎予將求其所以無愧薛道祖二花詩帖行書七行鮮鮮中園菊粲粲籬東畔的的秋水蓮嫋嫋西風岸迢迢白衣人皓皓涉江腕重陽尊酒親霧夕容光爛物生各有宜不許年華晏男經孫仲邕永寶行書一行右薛道祖二花詩帖眞蹟一卷帖上有御府印蓋先君舊藏得之越之王氏不書歳月贊曰菊粲粲兮東籬蓮的的兮西風是皆不受夫一塵之染而特立于九秋之中予固喜其潔清而自全亦以觀其筆之妙而句之工也薛道祖寄黃魯直詩帖行書十行奉寄魯直學士紹彭瘴地經行促棹謳周南太史幾年留書來遙識猶青眼别久縣知半白頭宋玉又經巫峽去謫仙初罷夜郎遊長江風水追難及悵望春波一葉舟男經孫仲邕等永寶行書一行右薛道祖寄黃太史魯直詩帖眞蹟一卷建中靖國初黨禁稍弛太史自戎州放還監鄂州市征公此詩蓋其時也帖亦先君舊藏有一印贊曰詩以情寄而拳拳乎子姪之示又使之寶而勿棄亦足以見其得意薛道祖試劍石詩帖行書十行尾批二行豐沛布衣闗内客回首咸秦坐悽惻漫隨覇楚西道遷未甘漢地山河窄隨身三尺青龍子曾斷當塗素靈死手提巖上試秋水大石迎風開披靡東歸欲整堂堂陣呉兒未足勞餘刃炎靈天啟定中原大言成事人方信君不見不侯飛將能射虎誤中仙山猶飲羽漢高帝試劍石道祖八月二十四日寫右薛道祖漢高帝試劔石詩帖眞蹟一卷上著薛氏印四半紹興印二韓莊敏彦直在温以書遺先君雜帖十此其一也石今在漢中贊曰予嘗登虎丘有石巋然剖而為二攷之傳記亦曰闔廬之劔所試也豈屬鏤之剛與帝斬蛇之佩見之于用若合符契人不知此等通靈之劔何以不復見于後世也或曰帝之鑄劔出于豐沛窮谷之冶投以高宗鬼方之器宜乎其有異予則曰是固神物之天啟用以殲三猾清萬里則固當屬之赤帝之子然亦豈與頑石者爭一剖之利哉予意帝之必不爾也則又曰流言至智者而止于以觀其理薛道祖馬伏波事詩行書九行人生在衣食但取飽與温下澤駕款叚曾不羡華軒仕為郡掾吏身自守丘園鄉里稱善人此外不足論志大心自勞福厚禍有根提兵泊浪間薏苡䜛謗喧飛鳶跕跕墮臥視㢓水昏永懷平生時空愧少游音右薛道祖馬伏波事詩帖眞蹟一卷有半印者六先君在湘南得此帖于成都使者折知常時登湘山觀閲帖予方六齡先君執卷歎且顧曰小子識之蓋淳熙戊申之六月噫四十年矣贊曰款叚下澤為郡掾吏不負于善士此先君子之志也而予由謭才躐取顯美歳遷年除迄負遺旨猶驅馳而不止日月其駛契闊桑梓此其想謦欬于膝下三歎而繼之以顙泚也薛道祖白石潭詩帖行書十行輕舟繫石倚蒹葭春後清江便是家蓬底㸑烟將稚子共携漁網曬晴沙白石潭昨汎汶江所見如此若得妙手據此詩畫出豈非佳境也右薛道祖白石潭詩帖眞蹟一卷予兄吏部君嘗拜賜天下蓋阜陵以其筆札似公此帖蓋兄家物以歸先君者有六印著焉贊曰畫以有聲著詩以無聲名有聲者道祖之所已知無聲者道祖之所欲為而未能者也薛道祖荼䕷詩帖行書五行野白荼䕷夾路長迎風不斷挹濃芳鳯池荀令曾來否幾許薰鑪敵此香右薛道祖荼䕷詩帖眞蹟一卷舊與白石潭詩相連亦有六印予讀此詩頗類晩唐字亦婉逸可喜因賡之以為贊焉贊曰夾路濃隂野興長荼䕷想見競年芳至今四月花如雪猶帶河東翰墨香薛道祖經行詩帖行書十四行辯士祠邊半嶺松不容凡木亂江風笻枝拄到峯頭閣天籟都歸十八公水石相迎繫目新兩峯秀色引朱輪使君自比蘭亭後金字磨崖更幾人月分圓影委金波峯靣無塵瑩不磨應是飛仙梳洗處碧臺青綬掛雲蘿右皆仲氏嘗經行之地尚可攷記否右薛道祖經行三詩帖眞蹟一卷公之弟曰嗣昌仕于宣和光顯矣仲氏豈其人耶此詩亦出予兄家賜帖有六印贊曰仲氏旣不能定其名經行又不能指其地睹奇逸于筆勢想溪山于詩意暸然景物之皆備又何必吾身之親至也薛道祖皇華詩帖草書三行橘樹松林綠徑長竹籬縈繞當城隍皇華何異投荒客已過山川是夜郎右薛道祖皇華詩帖眞蹟一卷詩本附雜帖中而其文當别出繫以贊而嗣書焉贊曰逺有光華者固所以送使臣徳意之布宣民瘼之咨詢此遐陬僻壤之望繡斧之光而瞻駟車之塵詎容自比于寂寞之濱維詩之箴以警駪駪寶眞齋法書贊卷十三
