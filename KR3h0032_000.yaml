body:
  text: 寶真齊法書贊藝術類一書畫之屬提要臣等謹案寶真齊法書贊宋嶽珂撰珂字肅之號亦齊又號倦翁鄂國忠武王飛之孫敷文閣待制霖之子歷官户部侍郎淮東總領是書以其家所藏前人墨蹟自晉唐迄於南宋各繫以跋而為之贊其祖父手蹟則别為鄂國傳家帖附之於末珂處南渡積弱之餘又當家難流離之後故其間關涉時事者多發憤激烈情見乎詞至於諸家古帖尤徵人論世考核精密其文亦能兼備衆體新穎百變層出不窮可謂以賞鑒而兼文章者矣珂所著九經三傳例桯史金陀粹編愧郯録諸書世多傳本獨是編諸家皆未論及惟米芾外紀所引英光堂帖載其一條即珂所刻米芾墨蹟其文視此稍略蓋彼為帖後跋尾此則編輯以成書猶歐陽修集古録有真蹟集本之異也原本為永樂大典割裂分繫其卷目已不可考今就其僅存者排比推求大抵以類分編首以歷代帝王次晉及梁陳真蹟次唐五代至宋真蹟而唐摹又自分二王及雜蹟五代又先以吳越三王宋則終以鄂國傳家每類之首有總標如吳越王判牘鄂國傳家帖可以考也總標之下先繫以總贊如唐摹二王之貞觀煟興云云無名氏帖之非紀録不概云云可以考也其總贊無可專屬永樂大典皆棄不録惟此二首連前後帖尾幸而得存猶可尋當日體例耳所類諸帖晉唐以前簡幅省少帖各為贊南北宋人篇翰繁多則連類為贊而每帖之或真或草幾幅幾行題記乙塗又附注於分標之下約略編次尚可二十八卷其間遺聞佚事可訂史傳之是非短什長篇可補文集之訛缺如朱子儲議一帖辨論幾及萬言許渾鳥闌百篇文異殆逾千字考證頗為有功且所載諸帖石刻流傳者十僅二三墨蹟僅存者百鮮一二皆因珂之彚集以傳其書泯沒零落逾數百年遭逢聖代右文得邀裒輯復見於世可謂珂之大幸亦可謂歷代書家之大幸矣至於前賢法帖釋者聚訟珂所載亦間有異詞其已經欽定重刻閣帖釐訂者並敬遵駁正間有參差歧出數說皆通者亦並用參存不沒其實焉乾隆四十九年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
